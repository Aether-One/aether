\u003ccode>package-lock.json\u003c/code> is present, so npm is the expected package manager)\u003c/li>\u003c/ul>\n\u003cp>No other runtimes, databases, or Docker are required.\u003c/p>\n\u003ch2 id=\"md-install\">Install\u003c/h2>\n\u003cp>bash\u003c/p>\n\u003ch1 id=\"md-clone-the-repository\">Clone the repository\u003c/h1>\n\u003cp>git clone https://github.com/aether-one/aether.git cd aether\u003c/p>\n\u003ch1 id=\"md-install-dependencies\">Install dependencies\u003c/h1>\n\u003cp>npm install\u003c/p>\n\u003ch2 id=\"md-configuration\">Configuration\u003c/h2>\n\u003cp>No configuration is required to run the CLI in development mode. The tool reads project configuration from a global \u003ccode>~/.aether/config.json\u003c/code> (created via the \u003ccode>/config\u003c/code> command) and from per-project \u003ccode>.aether/config.json\u003c/code> or \u003ccode>.aether/settings/config.json\u003c/code>. An \u003ccode>AETHER_API_KEY\u003c/code> environment variable can also supply an API key, but it's optional — the CLI works without AI providers for static analysis.\u003c/p>\n\u003cp>If you want to use AI-powered documentation generation, you'll need an API key from one of the supported providers (OpenAI, Anthropic, Gemini, OpenRouter) and run \u003ccode>/config\u003c/code> inside the CLI to save it.\u003c/p>\n\u003ch2 id=\"md-run-it\">Run it\u003c/h2>\n\u003ch3 id=\"md-development-mode-hot-reload-via-tsx\">Development mode (hot reload via tsx)\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run dev\u003c/code>\u003c/pre>\n\u003cp>This starts the interactive CLI directly from TypeScript source. You'll see a startup animation (unless you pass \u003ccode>--no-animation\u003c/code>), then a prompt where you can type \u003ccode>/genesis\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/help\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>, \u003ccode>/exit\u003c/code>, \u003ccode>/clear\u003c/code>, etc.\u003c/p>\n\u003ch3 id=\"md-type-check-only\">Type-check only\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run typecheck\u003c/code>\u003c/pre>\n\u003cp>Runs \u003ccode>tsc --noEmit\u003c/code> — useful before committing.\u003c/p>\n\u003ch3 id=\"md-production-build\">Production build\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run build\u003c/code>\u003c/pre>\n\u003cp>Compiles TypeScript to \u003ccode>dist/\u003c/code>. The binary entry point is \u003ccode>dist/cli/index.js\u003c/code>.\u003c/p>\n\u003ch3 id=\"md-run-built-cli\">Run built CLI\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm start\u003c/code>\u003c/pre>\n\u003cp>Runs \u003ccode>node dist/cli/index.js\u003c/code> — same interactive CLI, but from compiled output.\u003c/p>\n\u003ch3 id=\"md-build-single-executable-application-optional\">Build Single Executable Application (optional)\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run build:sea\u003c/code>\u003c/pre>\n\u003cp>Produces a standalone binary via Node's SEA (Single Executable Application) using \u003ccode>scripts/build-sea.mjs\u003c/code>.\u003c/p>\n\u003ch2 id=\"md-verify-it-works\">Verify it works\u003c/h2>\n\u003cp>Run the development CLI:\u003c/p>\n\u003cpre>\u003ccode class=\"language-bash\">npm run dev\u003c/code>\u003c/pre>\n\u003cp>You should see:\u003c/p>\n\u003col>\u003cli>A short animated logo with the tagline &quot;Transform any codebase into an AI-native workspace&quot;\u003c/li>\u003cli>A help hint: \u003ccode>Type /help for commands\u003c/code>\u003c/li>\u003cli>An interactive prompt: \u003ccode>›\u003c/code>\u003c/li>\u003c/ol>\n\u003cp>Try a command:\u003c/p>\n\u003cp>/help\u003c/p>\n\u003cp>You'll see the list of available commands (\u003ccode>/genesis\u003c/code>, \u003ccode>/sync\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>, \u003ccode>/exit\u003c/code>, \u003ccode>/clear\u003c/code>).\u003c/p>\n\u003cp>Exit with:\u003c/p>\n\u003cp>/exit\u003c/p>\n\u003ch2 id=\"md-next-steps\">Next steps\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Onboarding guide\u003c/strong> — See \u003ccode>onboarding.md\u003c/code> (generated after running \u003ccode>/genesis\u003c/code> on a project) for the mental model of how Aether understands a codebase.\u003c/li>\u003cli>\u003cstrong>Contributing guide\u003c/strong> — See \u003ccode>CONTRIBUTING.md\u003c/code> in the repository root for branch naming, commit conventions, and the PR process.\u003c/li>\u003cli>\u003cstrong>Try it on a project\u003c/strong> — Run \u003ccode>/genesis\u003c/code> inside any codebase to generate its \u003ccode>.aether/\u003c/code> knowledge base.\u003c/li>\u003cli>\u003cstrong>Exclude paths\u003c/strong> — Use \u003ccode>/exclude &lt;path&gt;\u003c/code> (or type \u003ccode>@\u003c/code> in the prompt to pick one) to skip large directories that don't need documenting during \u003ccode>/genesis\u003c/code> or \u003ccode>/sync\u003c/code>. Excludes are stored in \u003ccode>.aether/settings/exclude.json\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Clean code review\u003c/strong> — Run \u003ccode>/cleancode review\u003c/code> to scan a project or file for clean code violations (heuristic + optional AI hybrid). Reports are written to \u003ccode>.aether/clean/report.md\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Optimized prompts\u003c/strong> — Run \u003ccode>/prompt &lt;intent&gt;\u003c/code> to generate an optimized, file-referencing prompt for another AI assistant based on the project's \u003ccode>.aether/docs/\u003c/code>.\u003c/li>\u003c/ul>","text":"Getting Started with Aether What this is Aether is a CLI tool that analyzes a codebase and builds an AI-ready knowledge layer — documentation, architecture maps, and context files that help both humans and AI assistants understand the project. You run it against a repository (including this one) to generate a .aether/ knowledge base. This guide covers running Aether itself for development. Prerequisites Node.js 20+ (from engines in package.json ) npm (a package-lock.json is present, so npm is the expected package manager) No other runtimes, databases, or Docker are required. Install bash Clone the repository git clone https://github.com/aether-one/aether.git cd aether Install dependencies npm install Configuration No configuration is required to run the CLI in development mode. The tool reads project configuration from a global ~/.aether/config.json (created via the /config command) and from per-project .aether/config.json or .aether/settings/config.json . An AETHER_API_KEY environment variable can also supply an API key, but it's optional — the CLI works without AI providers for static analysis. If you want to use AI-powered documentation generation, you'll need an API key from one of the supported providers (OpenAI, Anthropic, Gemini, OpenRouter) and run /config inside the CLI to save it. Run it Development mode (hot reload via tsx) npm run dev This starts the interactive CLI directly from TypeScript source. You'll see a startup animation (unless you pass --no-animation ), then a prompt where you can type /genesis , /config , /help , /exclude , /clean , /cleancode , /prompt , /exit , /clear , etc. Type-check only npm run typecheck Runs tsc --noEmit — useful before committing. Production build npm run build Compiles TypeScript to dist/ . The binary entry point is dist/cli/index.js . Run built CLI npm start Runs node dist/cli/index.js — same interactive CLI, but from compiled output. Build Single Executable Application (optional) npm run build:sea Produces a standalone binary via Node's SEA (Single Executable Application) using scripts/build-sea.mjs . Verify it works Run the development CLI: npm run dev You should see: A short animated logo with the tagline \"Transform any codebase into an AI-native workspace\" A help hint: Type /help for commands An interactive prompt: › Try a command: /help You'll see the list of available commands ( /genesis , /sync , /config , /clean , /exclude , /cleancode , /prompt , /exit , /clear ). Exit with: /exit Next steps Onboarding guide — See onboarding.md (generated after running /genesis on a project) for the mental model of how Aether understands a codebase. Contributing guide — See CONTRIBUTING.md in the repository root for branch naming, commit conventions, and the PR process. Try it on a project — Run /genesis inside any codebase to generate its .aether/ knowledge base. Exclude paths — Use /exclude \u003cpath> (or type @ in the prompt to pick one) to skip large directories that don't need documenting during /genesis or /sync . Excludes are stored in .aether/settings/exclude.json . Clean code review — Run /cleancode review to scan a project or file for clean code violations (heuristic + optional AI hybrid). Reports are written to .aether/clean/report.md . Optimized prompts — Run /prompt \u003cintent> to generate an optimized, file-referencing prompt for another AI assistant based on the project's .aether/docs/ ."},{"id":"guides/onboarding","title":"Onboarding","section":"Guides","summary":"The mental model, the why, and how to make your first change.","html":"\u003ch1 id=\"md-onboarding-guide-for-aether\">Onboarding Guide for Aether\u003c/h1>\n\u003cblockquote>\u003cp>\u003cstrong>You've run the project. Now you need to understand it well enough to change it safely.\u003c/strong>\u003c/p>\u003c/blockquote>\n\u003chr>\n\u003ch2 id=\"md-why-this-project-exists\">Why This Project Exists\u003c/h2>\n\u003cp>AI coding assistants are powerful but fundamentally limited: \u003cstrong>they only know what you tell them.\u003c/strong> Most repositories have outdated docs, hidden business rules, unknown architecture decisions, and poor onboarding. Aether exists to bridge that gap by automatically building and maintaining an \u003cstrong>AI-ready knowledge layer\u003c/strong> for any codebase.\u003c/p>\n\u003cp>The product vision (from README.md and CONTRIBUTING.md) frames this as a \u003cstrong>universe, not a tool\u003c/strong>. Each command represents a phase in a project's lifecycle:\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Genesis\u003c/strong> → the project is born (analysis, documentation)\u003c/li>\u003cli>\u003cstrong>Sync\u003c/strong> → the project evolves (continuous updates)\u003c/li>\u003cli>\u003cstrong>Doctor\u003c/strong> → the project is healthy (validation) — \u003cem>planned, not built\u003c/em>\u003c/li>\u003cli>\u003cstrong>Explain\u003c/strong> → the project speaks (knowledge queries) — \u003cem>planned, not built\u003c/em>\u003c/li>\u003cli>\u003cstrong>Export\u003c/strong> → the project connects (AI integrations) — \u003cem>planned, not built\u003c/em>\u003c/li>\u003c/ul>\n\u003cp>Today, \u003cstrong>Genesis\u003c/strong>, \u003cstrong>Sync\u003c/strong>, \u003cstrong>Config\u003c/strong>, \u003cstrong>Clean\u003c/strong>, \u003cstrong>CleanCode\u003c/strong>, and \u003cstrong>Prompt\u003c/strong> are implemented. The rest are roadmap items.\u003c/p>\n\u003ch2 id=\"md-mental-model-how-the-pieces-fit-together\">Mental Model: How the Pieces Fit Together\u003c/h2>\n\u003cp>Think of Aether as a \u003cstrong>pipeline that turns a codebase into structured documentation\u003c/strong>, with an interactive CLI wrapped around it.\u003c/p>\n\u003ch3 id=\"md-the-core-pipeline-genesis\">The Core Pipeline (Genesis)\u003c/h3>\n\u003cp>scanContext() → buildPlannerDigest() → planDocs() → buildSharedProjectContext() → generate docs in parallel\u003c/p>\n\u003cpre class=\"tree\">\u003ccode>     │                │                    │                    │                        │\u003c/code>\u003c/pre>\n\u003cp>▼                ▼                    ▼                    ▼                        ▼ ProjectContext   Digest string         DocDefinition[]      Shared context string    .aether/docs/*.md\u003c/p>\n\u003col>\u003cli>\u003cstrong>Scan\u003c/strong> (\u003ccode>genesis/context.ts\u003c/code>) — Walks the target directory, collects config files, vision files (CONTEXT.md, ARCHITECTURE.md, etc.), entry points, and source files. Produces a \u003ccode>ProjectContext\u003c/code> with a directory tree and importance-ranked source files. Respects hard limits (\u003ccode>MAX_FILES_WALKED=10k\u003c/code>, \u003ccode>MAX_TOTAL_CHARS=2M\u003c/code>, \u003ccode>MAX_WALK_DEPTH=12\u003c/code>).\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Digest\u003c/strong> (\u003ccode>genesis/digest.ts\u003c/code>) — Compresses the \u003ccode>ProjectContext\u003c/code> into a planner-friendly summary: file counts, detected signals (routes, domain logic, tests), and top-level symbols per file. This is what the LLM sees when deciding \u003cem>what\u003c/em> docs to generate.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Plan\u003c/strong> (\u003ccode>genesis/planner.ts\u003c/code>) — Sends the digest to the LLM with \u003ccode>PLANNER_PROMPT\u003c/code>. The LLM returns a JSON array of doc IDs to generate (from a known catalog of 13) plus up to 5 custom docs. Six &quot;core&quot; docs are \u003cem>always\u003c/em> generated: system-overview, folder-structure, tech-stack, ai-context, getting-started, onboarding. The rest are conditional on evidence.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Shared Context\u003c/strong> (\u003ccode>genesis/scope.ts\u003c/code>) — Builds a single context string used by \u003cem>all\u003c/em> doc generations. If the prompt fits within \u003ccode>DOC_CONTEXT_BUDGET=48k\u003c/code> chars, it's used verbatim. Otherwise, source files are \u003cstrong>distilled incrementally\u003c/strong> (\u003ccode>genesis/distill.ts\u003c/code>): chunked, summarized by the LLM with caching (keyed by model + content hash), and reassembled. This is the most complex part of the codebase.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Generate\u003c/strong> — Each \u003ccode>DocDefinition\u003c/code> gets its own prompt (from \u003ccode>prompts/docs/*.ts\u003c/code>), the shared context is injected, and the LLM writes the markdown. Runs in parallel (\u003ccode>GEN_CONCURRENCY=4\u003c/code>).\u003c/li>\u003c/ol>\n\u003ch3 id=\"md-the-sync-pipeline\">The Sync Pipeline\u003c/h3>\n\u003cp>/sync reads snapshot → scanContext → diffFingerprint → planSync (LLM) → refresh/add docs → write new snapshot\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Snapshot\u003c/strong> (\u003ccode>genesis/sync.ts\u003c/code>) stores: git commit, file fingerprints (SHA256 + size), and metadata for each generated doc.\u003c/li>\u003cli>\u003cstrong>Diff\u003c/strong> compares current fingerprints vs snapshot. Only changed files trigger doc updates.\u003c/li>\u003cli>\u003cstrong>PlanSync\u003c/strong> asks the LLM which existing docs need refresh and which new catalog docs should be added.\u003c/li>\u003cli>\u003cstrong>Refresh\u003c/strong> uses \u003ccode>DOC_UPDATE_INSTRUCTIONS\u003c/code> (smallest-change editing) or \u003ccode>SECTION_PATCH_INSTRUCTIONS\u003c/code> (section-level patches).\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-cleancode-pipeline\">CleanCode Pipeline\u003c/h3>\n\u003cp>/cleancode review → scanContext → runHeuristics (static) → flaggedFiles → scanCleanCodeHybrid (AI) → report.md\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Heuristics\u003c/strong> (\u003ccode>genesis/cleancode-heuristics.ts\u003c/code>) — Fast static detectors for long functions, deep nesting, magic numbers, dead code, poor naming. Runs per paradigm (clean-code, SOLID, functional, Google-style).\u003c/li>\u003cli>\u003cstrong>Hybrid AI Review\u003c/strong> (\u003ccode>genesis/cleancode.ts\u003c/code>) — If a provider is configured and reachable, flagged files are sent to the LLM with a paradigm-specific prompt (\u003ccode>buildCleanCodeScanPrompt\u003c/code>). Returns structured violations (file, line, severity, category, description, suggestion).\u003c/li>\u003cli>\u003cstrong>Report\u003c/strong> — Markdown written to \u003ccode>.aether/clean/report.md\u003c/code> with summary table, per-file issues, and AI cleanup instructions.\u003c/li>\u003cli>\u003cstrong>Ignore &amp; Paradigm\u003c/strong> — Patterns stored in \u003ccode>.aether/settings/cleancode-ignore.json\u003c/code>; paradigm in \u003ccode>.aether/settings/cleancode-paradigm.json\u003c/code>.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-prompt-pipeline\">Prompt Pipeline\u003c/h3>\n\u003cp>/prompt &lt;intent&gt; → scanContext → checkStaleness → buildDocsContext → OPTIMIZE_PROMPT (LLM) → .aether/prompts/&lt;slug&gt;.md\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Staleness Check\u003c/strong> — Compares current fingerprint vs saved snapshot; warns if docs are outdated.\u003c/li>\u003cli>\u003cstrong>Context Building\u003c/strong> — Reads up to 24k chars from key docs (README, AI_CONTEXT, architecture) + directory tree (8k).\u003c/li>\u003cli>\u003cstrong>Optimization\u003c/strong> — Single LLM call with \u003ccode>OPTIMIZE_PROMPT\u003c/code> + \u003ccode>buildOptimizePrompt\u003c/code> produces a file-referencing, convention-aware prompt for another AI assistant.\u003c/li>\u003cli>\u003cstrong>Output\u003c/strong> — Saved with metadata header (intent, timestamp, provider/model, stale warning).\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-cost-estimation-metering\">Cost Estimation &amp; Metering\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Pricing\u003c/strong> (\u003ccode>pricing/index.ts\u003c/code>) — Fetches live model pricing from OpenRouter (cached 24h) with a static fallback table for 10 common models. Returns per-token input/output costs.\u003c/li>\u003cli>\u003cstrong>Estimation\u003c/strong> (\u003ccode>genesis/estimate.ts\u003c/code>) — Computes token counts and cost ranges for genesis, sync, and cleancode runs before any LLM calls. Used to show the user a cost estimate and prompt for confirmation.\u003c/li>\u003cli>\u003cstrong>Metering\u003c/strong> (\u003ccode>providers/metered.ts\u003c/code>) — Wraps any \u003ccode>LLMProvider\u003c/code> to track actual token usage (prompt, completion, total) and call counts across the session. Falls back to estimation if the provider doesn't return usage.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-the-cli-shell\">The CLI Shell\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Command Registry\u003c/strong> (\u003ccode>commands/registry.ts\u003c/code>) — Simple map of name → \u003ccode>{ description, usage, handler }\u003c/code>. Commands register themselves in \u003ccode>cli/index.ts\u003c/code> in a fixed order.\u003c/li>\u003cli>\u003cstrong>Interactive Chat\u003c/strong> (\u003ccode>ui/prompt.ts\u003c/code>) — Readline-based REPL with \u003ccode>/\u003c/code> command dropdown (ANSI cursor tricks), free-text keyword matching, and rotating tips.\u003c/li>\u003cli>\u003cstrong>Progress UI\u003c/strong> (\u003ccode>ui/steps.ts\u003c/code>) — \u003ccode>StepRunner\u003c/code> with pooled concurrency and per-step spinners; \u003ccode>LineSpinner\u003c/code> for single long-running tasks.\u003c/li>\u003cli>\u003cstrong>Startup\u003c/strong> (\u003ccode>ui/animation.ts\u003c/code>) — Animated logo on TTY, static banner otherwise.\u003c/li>\u003cli>\u003cstrong>Cancellation\u003c/strong> (\u003ccode>ui/cancel.ts\u003c/code>) — Raw-mode stdin listener for ESC/q/Ctrl+C; integrates with \u003ccode>AbortController\u003c/code> to cancel in-flight LLM calls.\u003c/li>\u003cli>\u003cstrong>Confirmation\u003c/strong> (\u003ccode>ui/confirm.ts\u003c/code>) — Single-key (y/n) prompts with TTY raw mode; non-TTY falls back to default.\u003c/li>\u003cli>\u003cstrong>Cost Display\u003c/strong> (\u003ccode>ui/cost.ts\u003c/code>) — Formats USD amounts and multi-line cost estimates with provider/model, token counts, and cost ranges.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-configuration-providers\">Configuration &amp; Providers\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Config Precedence\u003c/strong> (\u003ccode>config/index.ts\u003c/code>): global default → global project entry → in-repo \u003ccode>.aether/config.json\u003c/code> → \u003ccode>AETHER_API_KEY\u003c/code> env var.\u003c/li>\u003cli>\u003cstrong>Providers\u003c/strong> (\u003ccode>providers/factory.ts\u003c/code>) — All four (OpenAI, Anthropic, Gemini, OpenRouter) use \u003ccode>OpenAICompatibleProvider\u003c/code>. \u003cem>There's a TODO in the code noting Anthropic's API format differs.\u003c/em>\u003c/li>\u003cli>\u003cstrong>OpenRouter Provider\u003c/strong> (\u003ccode>providers/openrouter.ts\u003c/code>) — Extends \u003ccode>OpenAICompatibleProvider\u003c/code> and disables reasoning tokens via \u003ccode>providerParams()\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Retry Logic\u003c/strong> (\u003ccode>providers/retry.ts\u003c/code>) — Exponential backoff with special handling for 429 (rate limit): upgrades max retries, respects \u003ccode>Retry-After\u003c/code> headers, minimum 15s base delay.\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-where-things-live-i-want-to-change-x-look-in-y\">Where Things Live: &quot;I Want to Change X → Look in Y&quot;\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Goal\u003c/th>\u003cth>Primary File(s)\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Add a new built-in command\u003c/td>\u003ctd>\u003ccode>commands/builtins.ts\u003c/code> + \u003ccode>commands/registry.ts\u003c/code>\u003c/td>\u003ctd>Register in \u003ccode>registerBuiltinCommands()\u003c/code>; follow \u003ccode>/genesis\u003c/code> pattern\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Add a new document type (catalog)\u003c/td>\u003ctd>\u003ccode>genesis/docs.ts\u003c/code> (add to \u003ccode>DOC_DEFINITIONS\u003c/code>), \u003ccode>prompts/docs/\u003c/code> (new prompt), \u003ccode>genesis/planner.ts\u003c/code> (add to conditional IDs)\u003c/td>\u003ctd>Must update planner's known catalog IDs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Modify an existing doc's prompt\u003c/td>\u003ctd>\u003ccode>prompts/docs/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>Prompts are pure string templates; imported in \u003ccode>genesis/docs.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Change how context is scanned\u003c/td>\u003ctd>\u003ccode>genesis/context.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>CONFIG_FILES\u003c/code>, \u003ccode>VISION_FILE_CANDIDATES\u003c/code>, \u003ccode>SOURCE_EXTENSIONS\u003c/code>, \u003ccode>IGNORED_DIRS\u003c/code> are constants at top\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Manage excluded paths\u003c/strong>\u003c/td>\u003ctd>\u003ccode>genesis/exclude.ts\u003c/code> + \u003ccode>commands/exclude.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>loadExcludes()\u003c/code>, \u003ccode>addExclude()\u003c/code>, \u003ccode>removeExclude()\u003c/code>, \u003ccode>isExcluded()\u003c/code>; stored in \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Adjust distillation behavior\u003c/td>\u003ctd>\u003ccode>genesis/distill.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>chunkBudget\u003c/code>, \u003ccode>DISTILL_CONCURRENCY\u003c/code>, \u003ccode>distillInstruction()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Change planner logic\u003c/td>\u003ctd>\u003ccode>genesis/planner.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>CORE_IDS\u003c/code>, \u003ccode>MAX_CUSTOM_DOCS\u003c/code>, \u003ccode>parsePlan()\u003c/code>, \u003ccode>extractJsonArray()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Modify sync diffing/refresh\u003c/td>\u003ctd>\u003ccode>genesis/sync.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>diffFingerprint\u003c/code>, \u003ccode>planSync\u003c/code>, \u003ccode>refreshDoc\u003c/code>, \u003ccode>formatChanges\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Add a new LLM provider\u003c/td>\u003ctd>\u003ccode>providers/factory.ts\u003c/code> (add case), \u003ccode>config/types.ts\u003c/code> (add to \u003ccode>AetherConfig.provider\u003c/code> union)\u003c/td>\u003ctd>All current providers route through \u003ccode>OpenAICompatibleProvider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Change config precedence/loading\u003c/td>\u003ctd>\u003ccode>config/index.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>loadConfig()\u003c/code>, \u003ccode>saveConfig()\u003c/code>, \u003ccode>projectId()\u003c/code>, \u003ccode>getProjectCacheDir()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Tweak CLI UX (colors, spinner, tips)\u003c/td>\u003ctd>\u003ccode>ui/theme.ts\u003c/code>, \u003ccode>ui/steps.ts\u003c/code>, \u003ccode>ui/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>TIPS\u003c/code> array in \u003ccode>prompt.ts\u003c/code>; \u003ccode>SPINNER_FRAMES\u003c/code> in \u003ccode>steps.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Change global cache/config location\u003c/td>\u003ctd>\u003ccode>config/index.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>getGlobalDir()\u003c/code> → \u003ccode>~/.aether\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Modify cost estimation logic\u003c/td>\u003ctd>\u003ccode>genesis/estimate.ts\u003c/code>\u003c/td>\u003ctd>Token ratios, output multipliers, distill thresholds\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Change pricing source/fallback\u003c/td>\u003ctd>\u003ccode>pricing/index.ts\u003c/code>\u003c/td>\u003ctd>OpenRouter fetch, static table, cache TTL\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Adjust metering/usage tracking\u003c/td>\u003ctd>\u003ccode>providers/metered.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>UsageTotals\u003c/code>, \u003ccode>estimateTokens()\u003c/code> fallback\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Customize cancellation behavior\u003c/td>\u003ctd>\u003ccode>ui/cancel.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>watchCancelKey()\u003c/code> key bindings\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Change confirmation UX\u003c/td>\u003ctd>\u003ccode>ui/confirm.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>promptConfirm()\u003c/code> fallback logic\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Format cost display differently\u003c/td>\u003ctd>\u003ccode>ui/cost.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>formatUSD()\u003c/code>, \u003ccode>formatEstimate()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Modify clean-code heuristics\u003c/strong>\u003c/td>\u003ctd>\u003ccode>genesis/cleancode-heuristics.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>LONG_FUNCTION_LINES\u003c/code>, \u003ccode>DEEP_NESTING_LEVELS\u003c/code>, detectors per paradigm\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Change clean-code AI prompt\u003c/strong>\u003c/td>\u003ctd>\u003ccode>prompts/pipeline/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>PARADIGMS\u003c/code>, \u003ccode>buildCleanCodeScanPrompt()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Adjust clean-code hybrid flow\u003c/strong>\u003c/td>\u003ctd>\u003ccode>genesis/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>scanCleanCodeHybrid\u003c/code>, \u003ccode>flaggedFiles\u003c/code>, \u003ccode>buildCleanCodeMarkdown\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Manage clean-code ignore/paradigm\u003c/strong>\u003c/td>\u003ctd>\u003ccode>genesis/cleancode.ts\u003c/code> + \u003ccode>commands/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>loadCleanCodeIgnore\u003c/code>, \u003ccode>addCleanCodeIgnorePattern\u003c/code>, \u003ccode>loadCleanCodeParadigm\u003c/code>, \u003ccode>setCleanCodeParadigm\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Modify prompt optimization\u003c/strong>\u003c/td>\u003ctd>\u003ccode>prompts/pipeline/optimize.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>OPTIMIZE_PROMPT\u003c/code>, \u003ccode>buildOptimizePrompt()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Change prompt staleness check\u003c/strong>\u003c/td>\u003ctd>\u003ccode>commands/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>checkStaleness\u003c/code>, \u003ccode>buildDocsContext\u003c/code>, \u003ccode>parseOptimized\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Adjust prompt output location\u003c/strong>\u003c/td>\u003ctd>\u003ccode>commands/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>uniquePromptPath\u003c/code>, \u003ccode>composeFile\u003c/code> (\u003ccode>.aether/prompts/\u003c/code>)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-key-decisions-the-reasoning\">Key Decisions &amp; The Reasoning\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Decision\u003c/th>\u003cth>Why\u003c/th>\u003cth>Can It Change?\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Static analysis first, AI second\u003c/strong>\u003c/td>\u003ctd>Works without API keys; reduces token costs; AI only for deep understanding (business logic, architecture narrative)\u003c/td>\u003ctd>Core philosophy — unlikely to change\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Single \u003ccode>OpenAICompatibleProvider\u003c/code> for all 4 providers\u003c/strong>\u003c/td>\u003ctd>OpenAI, Gemini, OpenRouter share OpenAI-compatible APIs; Anthropic \u003cem>mostly\u003c/em> does (TODO notes format differences)\u003c/td>\u003ctd>Anthropic may need a dedicated provider later\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distillation with per-model caching\u003c/strong>\u003c/td>\u003ctd>Context windows are small; re-distilling unchanged files on every run is wasteful. Cache keyed by \u003ccode>model + content hash\u003c/code>.\u003c/td>\u003ctd>Cache invalidation is tied to model — changing model clears cache\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Snapshot-based sync (git commit + fingerprints)\u003c/strong>\u003c/td>\u003ctd>Git history gives semantic change context; fingerprints detect content changes without re-reading all files\u003c/td>\u003ctd>Solid foundation; \u003ccode>planSync\u003c/code> uses LLM to interpret \u003cem>which\u003c/em> docs are affected\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command registry pattern (not a framework)\u003c/strong>\u003c/td>\u003ctd>Zero dependencies, explicit registration order, easy to add commands\u003c/td>\u003ctd>Works well; no need for Commander.js or similar\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config at \u003ccode>~/.aether/config.json\u003c/code> with per-project entries\u003c/strong>\u003c/td>\u003ctd>API keys stay out of repo; multiple projects share one global config; project ID = \u003ccode>basename-sha1(path)[:12]\u003c/code>\u003c/td>\u003ctd>Stable; \u003ccode>projectId()\u003c/code> is used for cache isolation too\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No test suite\u003c/strong>\u003c/td>\u003ctd>Not in \u003ccode>package.json\u003c/code>, no test files in structure\u003c/td>\u003ctd>\u003cstrong>This is a gap\u003c/strong> — adding tests would be high-value\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>TypeScript strict mode, ESM, Node 20+\u003c/strong>\u003c/td>\u003ctd>Modern baseline; \u003ccode>tsconfig.json\u003c/code> enforces strictness\u003c/td>\u003ctd>Non-negotiable for this codebase\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost estimation before every AI run\u003c/strong>\u003c/td>\u003ctd>Users see a cost range (low/high) and must confirm unless \u003ccode>--yes\u003c/code>; prevents surprise bills\u003c/td>\u003ctd>Core UX — unlikely to change\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Metered provider wraps all LLM calls\u003c/strong>\u003c/td>\u003ctd>Tracks actual usage across genesis/sync; falls back to estimation if provider omits usage\u003c/td>\u003ctd>Stable; enables post-run cost reporting\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>OpenRouter as pricing source\u003c/strong>\u003c/td>\u003ctd>Single source for 100+ models; 24h cache avoids rate limits; static fallback for offline\u003c/td>\u003ctd>Could add more sources if needed\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cancellation via raw stdin + AbortController\u003c/strong>\u003c/td>\u003ctd>Works in TTY; propagates to in-flight \u003ccode>chat()\u003c/code>/\u003ccode>chatStream()\u003c/code> calls\u003c/td>\u003ctd>Stable; \u003ccode>watchCancelKey()\u003c/code> is reusable\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Single-key confirmation (y/n/ESC)\u003c/strong>\u003c/td>\u003ctd>Fast, no Enter required; non-TTY falls back to default\u003c/td>\u003ctd>Stable; \u003ccode>promptConfirm()\u003c/code> is reusable\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Heuristics-first clean-code review\u003c/strong>\u003c/td>\u003ctd>Fast static scan filters files before expensive AI call; paradigm-specific detectors keep it focused\u003c/td>\u003ctd>Core to cleancode — unlikely to change\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Paradigm-driven AI prompts\u003c/strong>\u003c/td>\u003ctd>Clean Code, SOLID, Functional, Google-style each have distinct violation categories; prompt built per paradigm\u003c/td>\u003ctd>Extensible — new paradigms can be added to \u003ccode>PARADIGMS\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt optimization as a separate pipeline\u003c/strong>\u003c/td>\u003ctd>Generates prompts for \u003cem>other\u003c/em> AIs, not for Aether itself; uses project knowledge base as context\u003c/td>\u003ctd>New capability — may evolve with use cases\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Staleness warning before prompt generation\u003c/strong>\u003c/td>\u003ctd>Prevents generating optimized prompts from outdated docs; compares fingerprint vs snapshot\u003c/td>\u003ctd>Core safety — unlikely to change\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-making-your-first-change-walkthrough\">Making Your First Change: Walkthrough\u003c/h2>\n\u003cp>\u003cstrong>Task:\u003c/strong> \u003cem>Add a new &quot;Security&quot; document to the Architecture section that documents authentication, authorization, and data protection patterns detected in the codebase.\u003c/em>\u003c/p>\n\u003ch3 id=\"md-1-create-the-prompt\">1. Create the Prompt\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/prompts/docs/security.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">export const SECURITY_PROMPT = `Generate a Security Overview document...\n- Authentication mechanisms (JWT, sessions, API keys, OAuth)\n- Authorization patterns (RBAC, ABAC, middleware, guards)\n- Data protection (encryption at rest/in transit, PII handling)\n- Input validation &amp; sanitization\n- Audit logging\nOnly document patterns explicitly found in the code.`;\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-2-register-the-prompt\">2. Register the Prompt\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/prompts/index.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">export { SECURITY_PROMPT } from &quot;./docs/security.js&quot;;\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-3-add-the-docdefinition\">3. Add the DocDefinition\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/genesis/docs.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">import { SECURITY_PROMPT } from &quot;../prompts/index.js&quot;;\n\n// In DOC_DEFINITIONS array, after DIAGRAMS:\n{\n  id: &quot;security&quot;,\n  outputPath: &quot;architecture/security.md&quot;,\n  label: &quot;Security Overview&quot;,\n  title: &quot;Security Overview&quot;,\n  section: &quot;Architecture&quot;,\n  summary: &quot;Authentication, authorization, and data protection patterns&quot;,\n  prompt: SECURITY_PROMPT,\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-4-make-it-conditionally-planned\">4. Make It Conditionally Planned\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/genesis/planner.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">// In PLANNER_PROMPT (the string constant), add to &quot;Conditional known IDs&quot;:\n// - security (if auth middleware, JWT handling, RBAC, encryption, or audit logging detected)\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-5-verify-it-works\">5. Verify It Works\u003c/h3>\n\u003cp>bash npm run dev\u003c/p>\n\u003ch1 id=\"md-in-the-chat\">In the chat:\u003c/h1>\n\u003cp>/genesis /path/to/test/project\u003c/p>\n\u003cp>Check \u003ccode>.aether/docs/architecture/security.md\u003c/code> is generated. Run \u003ccode>/sync\u003c/code> after adding auth code to see it refresh.\u003c/p>\n\u003ch3 id=\"md-6-type-check-build\">6. Type Check &amp; Build\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run typecheck\nnpm run build\u003c/code>\u003c/pre>\n\u003chr>\n\u003cp>\u003cstrong>Task:\u003c/strong> \u003cem>Add a new clean-code paradigm (e.g., &quot;pragmatic&quot;) that focuses on practical maintainability over dogma.\u003c/em>\u003c/p>\n\u003ch3 id=\"md-1-define-the-paradigm\">1. Define the Paradigm\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">// In PARADIGMS record, add:\n&quot;pragmatic&quot;: {\n  label: &quot;Pragmatic&quot;,\n  focus: &quot;Practical maintainability — favor clarity, avoid premature abstraction, tolerate duplication over wrong abstraction&quot;,\n  categories: &quot;premature-abstraction | unclear-intent | over-engineering | missing-error-handling | inconsistent-pattern | other&quot;,\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-2-add-to-type-union\">2. Add to Type Union\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/genesis/types.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">export type CleanCodeParadigm = &quot;clean-code&quot; | &quot;solid&quot; | &quot;functional&quot; | &quot;google-style&quot; | &quot;pragmatic&quot;;\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-3-add-heuristic-detectors\">3. Add Heuristic Detectors\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">// In runHeuristics(), add case for &quot;pragmatic&quot;:\ncase &quot;pragmatic&quot;:\n  return [\n    ...detectLongFunctions(file),\n    ...detectPoorNaming(file),\n    ...detectDeadCode(file),\n  ];\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-4-update-paradigm-helpers\">4. Update Paradigm Helpers\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">// isCleanCodeParadigm() in cleancode.ts and listParadigms() will automatically include it\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-5-verify\">5. Verify\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run dev\n/cleancode paradigm pragmatic\n/cleancode review\u003c/code>\u003c/pre>\n\u003chr>\n\u003cp>\u003cstrong>Task:\u003c/strong> \u003cem>Change the prompt optimization to include test file patterns in the generated prompt.\u003c/em>\u003c/p>\n\u003ch3 id=\"md-1-modify-the-optimization-prompt\">1. Modify the Optimization Prompt\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/prompts/pipeline/optimize.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">// In OPTIMIZE_PROMPT, add instruction:\n// - Include test file patterns and conventions (e.g., *.test.ts, __tests__/, vitest/jest)\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-2-adjust-context-building\">2. Adjust Context Building\u003c/h3>\n\u003cp>\u003cstrong>File:\u003c/strong> \u003ccode>src/commands/prompt.ts\u003c/code>\u003c/p>\n\u003cpre>\u003ccode class=\"language-typescript\">// In buildDocsContext(), ensure test-related docs are included if they exist\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-3-verify\">3. Verify\u003c/h3>\n\u003cpre>\u003ccode class=\"language-bash\">npm run dev\n/prompt &quot;add a new API endpoint with tests&quot;\u003c/code>\u003c/pre>\n\u003cp>Check \u003ccode>.aether/prompts/&lt;slug&gt;.md\u003c/code> references test conventions.\u003c/p>\n\u003ch2 id=\"md-gotchas-non-obvious-things-that-trip-people-up\">Gotchas: Non-Obvious Things That Trip People Up\u003c/h2>\n\u003col>\u003cli>\u003cstrong>Anthropic provider is a TODO\u003c/strong> — \u003ccode>providers/factory.ts\u003c/code> routes Anthropic through \u003ccode>OpenAICompatibleProvider\u003c/code> with a comment: \u003ccode>// TODO: Anthropic uses a different API format\u003c/code>. If you test with Anthropic, expect breakage.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Distillation cache is per-model\u003c/strong> — Switching \u003ccode>config.model\u003c/code> invalidates the entire cache. The cache file lives at \u003ccode>~/.aether/cache/&lt;project-id&gt;/distill-cache.json\u003c/code>.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Config precedence is subtle\u003c/strong> — \u003ccode>loadConfig()\u003c/code> merges: global default → global project entry → in-repo \u003ccode>.aether/config.json\u003c/code> → \u003ccode>AETHER_API_KEY\u003c/code> env. The \u003cem>first\u003c/em> saved config becomes the global default. \u003ccode>saveConfig()\u003c/code> writes to global file only.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>No tests exist\u003c/strong> — \u003ccode>package.json\u003c/code> has no test script, no test files in \u003ccode>src/\u003c/code>. Any refactor is manual verification only. Adding a test harness would be a major contribution.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Command registration order matters\u003c/strong> — In \u003ccode>cli/index.ts\u003c/code>, commands register in this sequence: \u003ccode>help\u003c/code>, \u003ccode>builtins\u003c/code>, \u003ccode>config\u003c/code>, \u003ccode>clean\u003c/code>, \u003ccode>cleancode\u003c/code>, \u003ccode>exclude\u003c/code>, \u003ccode>prompt\u003c/code>. The registry is a \u003ccode>Map\u003c/code>; later registrations with same name would overwrite (but none do).\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Free-text in chat is keyword-matched, not LLM-powered\u003c/strong> — \u003ccode>ui/prompt.ts\u003c/code> \u003ccode>respond()\u003c/code> matches lowercase input against hardcoded keyword arrays (\u003ccode>help|ajuda|comando\u003c/code>, \u003ccode>genesis|analisa|documenta\u003c/code>, etc.). It's not an AI chat.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>\u003ccode>/genesis\u003c/code> refuses to overwrite without \u003ccode>--force\u003c/code>\u003c/strong> — If \u003ccode>.aether/docs\u003c/code> exists, it tells you to use \u003ccode>/sync\u003c/code> instead. This is intentional (protects user work).\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>File walking has hard limits\u003c/strong> — \u003ccode>MAX_FILES_WALKED=10_000\u003c/code>, \u003ccode>MAX_TOTAL_CHARS=2_000_000\u003c/code>, \u003ccode>MAX_WALK_DEPTH=12\u003c/code>. Large monorepos will hit these. They're env-overridable via \u003ccode>genesis/constants.ts\u003c/code> (\u003ccode>envInt()\u003c/code>).\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Snapshot stores git commit, not branch\u003c/strong> — \u003ccode>getGitInfo()\u003c/code> captures \u003ccode>HEAD\u003c/code> commit and branch name, but \u003ccode>planSync\u003c/code> uses \u003ccode>git log &lt;sinceCommit&gt;..HEAD\u003c/code>. If you rewrite history, sync may miss changes.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Custom docs are limited to 5\u003c/strong> — \u003ccode>MAX_CUSTOM_DOCS = 5\u003c/code> in \u003ccode>planner.ts\u003c/code>. The planner can propose more but they're truncated.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Cost estimation uses heuristics, not exact counts\u003c/strong> — \u003ccode>estimateGenesis()\u003c/code>, \u003ccode>estimateSync()\u003c/code>, and \u003ccode>estimateCleanCode()\u003c/code> approximate tokens from chars (÷4), apply output multipliers (0.7–1.3×), and assume distillation when context exceeds budget. Actual usage may differ.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Pricing cache is 24h\u003c/strong> — \u003ccode>pricing/index.ts\u003c/code> caches OpenRouter model list for 24h. New models or price changes won't reflect until cache expires or is manually cleared (\u003ccode>/clean cache\u003c/code>).\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Metered provider estimates tokens if provider omits usage\u003c/strong> — \u003ccode>estimateTokens()\u003c/code> uses a rough 4 chars/token heuristic. For accurate post-run costs, use providers that return \u003ccode>usage\u003c/code> in responses.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Cancellation only works in TTY\u003c/strong> — \u003ccode>watchCancelKey()\u003c/code> enables raw mode on stdin; if not a TTY, ESC/q/Ctrl+C are not captured. The \u003ccode>AbortController\u003c/code> signal is still passed to LLM calls but cannot be triggered interactively.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Confirmation defaults to \u003ccode>true\u003c/code> in non-TTY\u003c/strong> — \u003ccode>promptConfirm()\u003c/code> returns the fallback (default \u003ccode>true\u003c/code>) when stdin is not a TTY. Scripts piping input will auto-confirm unless you pass \u003ccode>--yes\u003c/code> explicitly.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Excluded paths are respected during scan and sync\u003c/strong> — \u003ccode>genesis/context.ts\u003c/code> and \u003ccode>genesis/sync.ts\u003c/code> both call \u003ccode>isExcluded()\u003c/code> from \u003ccode>genesis/exclude.ts\u003c/code>. Add exclusions via \u003ccode>/exclude &lt;path&gt;\u003c/code> or type \u003ccode>@\u003c/code> in the prompt to pick from a dropdown. Exclusions persist in \u003ccode>.aether/settings/exclude.json\u003c/code> per project.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Clean-code review requires a configured provider for AI analysis\u003c/strong> — Heuristics run always; hybrid AI review only runs if \u003ccode>loadConfig()\u003c/code> returns a valid provider and \u003ccode>ping()\u003c/code> succeeds. Use \u003ccode>--yes\u003c/code> to skip cost confirmation.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Clean-code ignore patterns are globs, not regexes\u003c/strong> — \u003ccode>matchesPattern()\u003c/code> converts \u003ccode>**\u003c/code> → \u003ccode>.*\u003c/code>, \u003ccode>*\u003c/code> → \u003ccode>[^/]*\u003c/code>, \u003ccode>?\u003c/code> → \u003ccode>.\u003c/code>. Stored in \u003ccode>.aether/settings/cleancode-ignore.json\u003c/code>.\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Prompt optimization reads from \u003ccode>.aether/docs/\u003c/code>, not source files directly\u003c/strong> — \u003ccode>buildDocsContext()\u003c/code> loads up to 24k chars from key docs + 8k from directory tree. If docs are stale, the optimized prompt may miss recent changes (staleness warning is shown).\u003c/li>\u003c/ol>\n\u003col>\u003cli>\u003cstrong>Prompt output goes to \u003ccode>.aether/prompts/\u003c/code>, not the chat\u003c/strong> — \u003ccode>/prompt\u003c/code> writes a markdown file with metadata header; it does not print the optimized prompt to stdout.\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-final-note\">Final Note\u003c/h2>\n\u003cp>Aether is \u003cstrong>early-stage\u003c/strong>. The implemented surface (genesis, sync, config, clean) is solid and usable. The unimplemented commands (doctor, explain, export, MCP, VS Code) are where the product vision expands. If you're contributing, start by understanding the \u003cstrong>genesis → distill → plan → generate\u003c/strong> flow — that's the engine. Everything else (CLI, config, sync, UI) serves it.\u003c/p>","text":"Onboarding Guide for Aether You've run the project. Now you need to understand it well enough to change it safely. Why This Project Exists AI coding assistants are powerful but fundamentally limited: they only know what you tell them. Most repositories have outdated docs, hidden business rules, unknown architecture decisions, and poor onboarding. Aether exists to bridge that gap by automatically building and maintaining an AI-ready knowledge layer for any codebase. The product vision (from README.md and CONTRIBUTING.md) frames this as a universe, not a tool . Each command represents a phase in a project's lifecycle: Genesis → the project is born (analysis, documentation) Sync → the project evolves (continuous updates) Doctor → the project is healthy (validation) — planned, not built Explain → the project speaks (knowledge queries) — planned, not built Export → the project connects (AI integrations) — planned, not built Today, Genesis , Sync , Config , Clean , CleanCode , and Prompt are implemented. The rest are roadmap items. Mental Model: How the Pieces Fit Together Think of Aether as a pipeline that turns a codebase into structured documentation , with an interactive CLI wrapped around it. The Core Pipeline (Genesis) scanContext() → buildPlannerDigest() → planDocs() → buildSharedProjectContext() → generate docs in parallel │ │ │ │ │ ▼ ▼ ▼ ▼ ▼ ProjectContext Digest string DocDefinition[] Shared context string .aether/docs/*.md Scan ( genesis/context.ts ) — Walks the target directory, collects config files, vision files (CONTEXT.md, ARCHITECTURE.md, etc.), entry points, and source files. Produces a ProjectContext with a directory tree and importance-ranked source files. Respects hard limits ( MAX_FILES_WALKED=10k , MAX_TOTAL_CHARS=2M , MAX_WALK_DEPTH=12 ). Digest ( genesis/digest.ts ) — Compresses the ProjectContext into a planner-friendly summary: file counts, detected signals (routes, domain logic, tests), and top-level symbols per file. This is what the LLM sees when deciding what docs to generate. Plan ( genesis/planner.ts ) — Sends the digest to the LLM with PLANNER_PROMPT . The LLM returns a JSON array of doc IDs to generate (from a known catalog of 13) plus up to 5 custom docs. Six \"core\" docs are always generated: system-overview, folder-structure, tech-stack, ai-context, getting-started, onboarding. The rest are conditional on evidence. Shared Context ( genesis/scope.ts ) — Builds a single context string used by all doc generations. If the prompt fits within DOC_CONTEXT_BUDGET=48k chars, it's used verbatim. Otherwise, source files are distilled incrementally ( genesis/distill.ts ): chunked, summarized by the LLM with caching (keyed by model + content hash), and reassembled. This is the most complex part of the codebase. Generate — Each DocDefinition gets its own prompt (from prompts/docs/*.ts ), the shared context is injected, and the LLM writes the markdown. Runs in parallel ( GEN_CONCURRENCY=4 ). The Sync Pipeline /sync reads snapshot → scanContext → diffFingerprint → planSync (LLM) → refresh/add docs → write new snapshot Snapshot ( genesis/sync.ts ) stores: git commit, file fingerprints (SHA256 + size), and metadata for each generated doc. Diff compares current fingerprints vs snapshot. Only changed files trigger doc updates. PlanSync asks the LLM which existing docs need refresh and which new catalog docs should be added. Refresh uses DOC_UPDATE_INSTRUCTIONS (smallest-change editing) or SECTION_PATCH_INSTRUCTIONS (section-level patches). CleanCode Pipeline /cleancode review → scanContext → runHeuristics (static) → flaggedFiles → scanCleanCodeHybrid (AI) → report.md Heuristics ( genesis/cleancode-heuristics.ts ) — Fast static detectors for long functions, deep nesting, magic numbers, dead code, poor naming. Runs per paradigm (clean-code, SOLID, functional, Google-style). Hybrid AI Review ( genesis/cleancode.ts ) — If a provider is configured and reachable, flagged files are sent to the LLM with a paradigm-specific prompt ( buildCleanCodeScanPrompt ). Returns structured violations (file, line, severity, category, description, suggestion). Report — Markdown written to .aether/clean/report.md with summary table, per-file issues, and AI cleanup instructions. Ignore & Paradigm — Patterns stored in .aether/settings/cleancode-ignore.json ; paradigm in .aether/settings/cleancode-paradigm.json . Prompt Pipeline /prompt \u003cintent> → scanContext → checkStaleness → buildDocsContext → OPTIMIZE_PROMPT (LLM) → .aether/prompts/\u003cslug>.md Staleness Check — Compares current fingerprint vs saved snapshot; warns if docs are outdated. Context Building — Reads up to 24k chars from key docs (README, AI_CONTEXT, architecture) + directory tree (8k). Optimization — Single LLM call with OPTIMIZE_PROMPT + buildOptimizePrompt produces a file-referencing, convention-aware prompt for another AI assistant. Output — Saved with metadata header (intent, timestamp, provider/model, stale warning). Cost Estimation & Metering Pricing ( pricing/index.ts ) — Fetches live model pricing from OpenRouter (cached 24h) with a static fallback table for 10 common models. Returns per-token input/output costs. Estimation ( genesis/estimate.ts ) — Computes token counts and cost ranges for genesis, sync, and cleancode runs before any LLM calls. Used to show the user a cost estimate and prompt for confirmation. Metering ( providers/metered.ts ) — Wraps any LLMProvider to track actual token usage (prompt, completion, total) and call counts across the session. Falls back to estimation if the provider doesn't return usage. The CLI Shell Command Registry ( commands/registry.ts ) — Simple map of name → { description, usage, handler } . Commands register themselves in cli/index.ts in a fixed order. Interactive Chat ( ui/prompt.ts ) — Readline-based REPL with / command dropdown (ANSI cursor tricks), free-text keyword matching, and rotating tips. Progress UI ( ui/steps.ts ) — StepRunner with pooled concurrency and per-step spinners; LineSpinner for single long-running tasks. Startup ( ui/animation.ts ) — Animated logo on TTY, static banner otherwise. Cancellation ( ui/cancel.ts ) — Raw-mode stdin listener for ESC/q/Ctrl+C; integrates with AbortController to cancel in-flight LLM calls. Confirmation ( ui/confirm.ts ) — Single-key (y/n) prompts with TTY raw mode; non-TTY falls back to default. Cost Display ( ui/cost.ts ) — Formats USD amounts and multi-line cost estimates with provider/model, token counts, and cost ranges. Configuration & Providers Config Precedence ( config/index.ts ): global default → global project entry → in-repo .aether/config.json → AETHER_API_KEY env var. Providers ( providers/factory.ts ) — All four (OpenAI, Anthropic, Gemini, OpenRouter) use OpenAICompatibleProvider . There's a TODO in the code noting Anthropic's API format differs. OpenRouter Provider ( providers/openrouter.ts ) — Extends OpenAICompatibleProvider and disables reasoning tokens via providerParams() . Retry Logic ( providers/retry.ts ) — Exponential backoff with special handling for 429 (rate limit): upgrades max retries, respects Retry-After headers, minimum 15s base delay. Where Things Live: \"I Want to Change X → Look in Y\" Goal Primary File(s) Notes Add a new built-in command commands/builtins.ts + commands/registry.ts Register in registerBuiltinCommands() ; follow /genesis pattern Add a new document type (catalog) genesis/docs.ts (add to DOC_DEFINITIONS ), prompts/docs/ (new prompt), genesis/planner.ts (add to conditional IDs) Must update planner's known catalog IDs Modify an existing doc's prompt prompts/docs/\u003cname>.ts Prompts are pure string templates; imported in genesis/docs.ts Change how context is scanned genesis/context.ts CONFIG_FILES , VISION_FILE_CANDIDATES , SOURCE_EXTENSIONS , IGNORED_DIRS are constants at top Manage excluded paths genesis/exclude.ts + commands/exclude.ts loadExcludes() , addExclude() , removeExclude() , isExcluded() ; stored in .aether/settings/exclude.json Adjust distillation behavior genesis/distill.ts chunkBudget , DISTILL_CONCURRENCY , distillInstruction() Change planner logic genesis/planner.ts CORE_IDS , MAX_CUSTOM_DOCS , parsePlan() , extractJsonArray() Modify sync diffing/refresh genesis/sync.ts diffFingerprint , planSync , refreshDoc , formatChanges Add a new LLM provider providers/factory.ts (add case), config/types.ts (add to AetherConfig.provider union) All current providers route through OpenAICompatibleProvider Change config precedence/loading config/index.ts loadConfig() , saveConfig() , projectId() , getProjectCacheDir() Tweak CLI UX (colors, spinner, tips) ui/theme.ts , ui/steps.ts , ui/prompt.ts TIPS array in prompt.ts ; SPINNER_FRAMES in steps.ts Change global cache/config location config/index.ts getGlobalDir() → ~/.aether Modify cost estimation logic genesis/estimate.ts Token ratios, output multipliers, distill thresholds Change pricing source/fallback pricing/index.ts OpenRouter fetch, static table, cache TTL Adjust metering/usage tracking providers/metered.ts UsageTotals , estimateTokens() fallback Customize cancellation behavior ui/cancel.ts watchCancelKey() key bindings Change confirmation UX ui/confirm.ts promptConfirm() fallback logic Format cost display differently ui/cost.ts formatUSD() , formatEstimate() Modify clean-code heuristics genesis/cleancode-heuristics.ts LONG_FUNCTION_LINES , DEEP_NESTING_LEVELS , detectors per paradigm Change clean-code AI prompt prompts/pipeline/cleancode.ts PARADIGMS , buildCleanCodeScanPrompt() Adjust clean-code hybrid flow genesis/cleancode.ts scanCleanCodeHybrid , flaggedFiles , buildCleanCodeMarkdown Manage clean-code ignore/paradigm genesis/cleancode.ts + commands/cleancode.ts loadCleanCodeIgnore , addCleanCodeIgnorePattern , loadCleanCodeParadigm , setCleanCodeParadigm Modify prompt optimization prompts/pipeline/optimize.ts OPTIMIZE_PROMPT , buildOptimizePrompt() Change prompt staleness check commands/prompt.ts checkStaleness , buildDocsContext , parseOptimized Adjust prompt output location commands/prompt.ts uniquePromptPath , composeFile ( .aether/prompts/ ) Key Decisions & The Reasoning Decision Why Can It Change? Static analysis first, AI second Works without API keys; reduces token costs; AI only for deep understanding (business logic, architecture narrative) Core philosophy — unlikely to change Single OpenAICompatibleProvider for all 4 providers OpenAI, Gemini, OpenRouter share OpenAI-compatible APIs; Anthropic mostly does (TODO notes format differences) Anthropic may need a dedicated provider later Distillation with per-model caching Context windows are small; re-distilling unchanged files on every run is wasteful. Cache keyed by model + content hash . Cache invalidation is tied to model — changing model clears cache Snapshot-based sync (git commit + fingerprints) Git history gives semantic change context; fingerprints detect content changes without re-reading all files Solid foundation; planSync uses LLM to interpret which docs are affected Command registry pattern (not a framework) Zero dependencies, explicit registration order, easy to add commands Works well; no need for Commander.js or similar Global config at ~/.aether/config.json with per-project entries API keys stay out of repo; multiple projects share one global config; project ID = basename-sha1(path)[:12] Stable; projectId() is used for cache isolation too No test suite Not in package.json , no test files in structure This is a gap — adding tests would be high-value TypeScript strict mode, ESM, Node 20+ Modern baseline; tsconfig.json enforces strictness Non-negotiable for this codebase Cost estimation before every AI run Users see a cost range (low/high) and must confirm unless --yes ; prevents surprise bills Core UX — unlikely to change Metered provider wraps all LLM calls Tracks actual usage across genesis/sync; falls back to estimation if provider omits usage Stable; enables post-run cost reporting OpenRouter as pricing source Single source for 100+ models; 24h cache avoids rate limits; static fallback for offline Could add more sources if needed Cancellation via raw stdin + AbortController Works in TTY; propagates to in-flight chat() / chatStream() calls Stable; watchCancelKey() is reusable Single-key confirmation (y/n/ESC) Fast, no Enter required; non-TTY falls back to default Stable; promptConfirm() is reusable Heuristics-first clean-code review Fast static scan filters files before expensive AI call; paradigm-specific detectors keep it focused Core to cleancode — unlikely to change Paradigm-driven AI prompts Clean Code, SOLID, Functional, Google-style each have distinct violation categories; prompt built per paradigm Extensible — new paradigms can be added to PARADIGMS Prompt optimization as a separate pipeline Generates prompts for other AIs, not for Aether itself; uses project knowledge base as context New capability — may evolve with use cases Staleness warning before prompt generation Prevents generating optimized prompts from outdated docs; compares fingerprint vs snapshot Core safety — unlikely to change Making Your First Change: Walkthrough Task: Add a new \"Security\" document to the Architecture section that documents authentication, authorization, and data protection patterns detected in the codebase. 1. Create the Prompt File: src/prompts/docs/security.ts export const SECURITY_PROMPT = `Generate a Security Overview document... - Authentication mechanisms (JWT, sessions, API keys, OAuth) - Authorization patterns (RBAC, ABAC, middleware, guards) - Data protection (encryption at rest/in transit, PII handling) - Input validation & sanitization - Audit logging Only document patterns explicitly found in the code.`; 2. Register the Prompt File: src/prompts/index.ts export { SECURITY_PROMPT } from \"./docs/security.js\"; 3. Add the DocDefinition File: src/genesis/docs.ts import { SECURITY_PROMPT } from \"../prompts/index.js\"; // In DOC_DEFINITIONS array, after DIAGRAMS: { id: \"security\", outputPath: \"architecture/security.md\", label: \"Security Overview\", title: \"Security Overview\", section: \"Architecture\", summary: \"Authentication, authorization, and data protection patterns\", prompt: SECURITY_PROMPT, } 4. Make It Conditionally Planned File: src/genesis/planner.ts // In PLANNER_PROMPT (the string constant), add to \"Conditional known IDs\": // - security (if auth middleware, JWT handling, RBAC, encryption, or audit logging detected) 5. Verify It Works bash npm run dev In the chat: /genesis /path/to/test/project Check .aether/docs/architecture/security.md is generated. Run /sync after adding auth code to see it refresh. 6. Type Check & Build npm run typecheck npm run build Task: Add a new clean-code paradigm (e.g., \"pragmatic\") that focuses on practical maintainability over dogma. 1. Define the Paradigm File: src/prompts/pipeline/cleancode.ts // In PARADIGMS record, add: \"pragmatic\": { label: \"Pragmatic\", focus: \"Practical maintainability — favor clarity, avoid premature abstraction, tolerate duplication over wrong abstraction\", categories: \"premature-abstraction | unclear-intent | over-engineering | missing-error-handling | inconsistent-pattern | other\", } 2. Add to Type Union File: src/genesis/types.ts export type CleanCodeParadigm = \"clean-code\" | \"solid\" | \"functional\" | \"google-style\" | \"pragmatic\"; 3. Add Heuristic Detectors File: src/genesis/cleancode-heuristics.ts // In runHeuristics(), add case for \"pragmatic\": case \"pragmatic\": return [ ...detectLongFunctions(file), ...detectPoorNaming(file), ...detectDeadCode(file), ]; 4. Update Paradigm Helpers File: src/prompts/pipeline/cleancode.ts // isCleanCodeParadigm() in cleancode.ts and listParadigms() will automatically include it 5. Verify npm run dev /cleancode paradigm pragmatic /cleancode review Task: Change the prompt optimization to include test file patterns in the generated prompt. 1. Modify the Optimization Prompt File: src/prompts/pipeline/optimize.ts // In OPTIMIZE_PROMPT, add instruction: // - Include test file patterns and conventions (e.g., *.test.ts, __tests__/, vitest/jest) 2. Adjust Context Building File: src/commands/prompt.ts // In buildDocsContext(), ensure test-related docs are included if they exist 3. Verify npm run dev /prompt \"add a new API endpoint with tests\" Check .aether/prompts/\u003cslug>.md references test conventions. Gotchas: Non-Obvious Things That Trip People Up Anthropic provider is a TODO — providers/factory.ts routes Anthropic through OpenAICompatibleProvider with a comment: // TODO: Anthropic uses a different API format . If you test with Anthropic, expect breakage. Distillation cache is per-model — Switching config.model invalidates the entire cache. The cache file lives at ~/.aether/cache/\u003cproject-id>/distill-cache.json . Config precedence is subtle — loadConfig() merges: global default → global project entry → in-repo .aether/config.json → AETHER_API_KEY env. The first saved config becomes the global default. saveConfig() writes to global file only. No tests exist — package.json has no test script, no test files in src/ . Any refactor is manual verification only. Adding a test harness would be a major contribution. Command registration order matters — In cli/index.ts , commands register in this sequence: help , builtins , config , clean , cleancode , exclude , prompt . The registry is a Map ; later registrations with same name would overwrite (but none do). Free-text in chat is keyword-matched, not LLM-powered — ui/prompt.ts respond() matches lowercase input against hardcoded keyword arrays ( help|ajuda|comando , genesis|analisa|documenta , etc.). It's not an AI chat. /genesis refuses to overwrite without --force — If .aether/docs exists, it tells you to use /sync instead. This is intentional (protects user work). File walking has hard limits — MAX_FILES_WALKED=10_000 , MAX_TOTAL_CHARS=2_000_000 , MAX_WALK_DEPTH=12 . Large monorepos will hit these. They're env-overridable via genesis/constants.ts ( envInt() ). Snapshot stores git commit, not branch — getGitInfo() captures HEAD commit and branch name, but planSync uses git log \u003csinceCommit>..HEAD . If you rewrite history, sync may miss changes. Custom docs are limited to 5 — MAX_CUSTOM_DOCS = 5 in planner.ts . The planner can propose more but they're truncated. Cost estimation uses heuristics, not exact counts — estimateGenesis() , estimateSync() , and estimateCleanCode() approximate tokens from chars (÷4), apply output multipliers (0.7–1.3×), and assume distillation when context exceeds budget. Actual usage may differ. Pricing cache is 24h — pricing/index.ts caches OpenRouter model list for 24h. New models or price changes won't reflect until cache expires or is manually cleared ( /clean cache ). Metered provider estimates tokens if provider omits usage — estimateTokens() uses a rough 4 chars/token heuristic. For accurate post-run costs, use providers that return usage in responses. Cancellation only works in TTY — watchCancelKey() enables raw mode on stdin; if not a TTY, ESC/q/Ctrl+C are not captured. The AbortController signal is still passed to LLM calls but cannot be triggered interactively. Confirmation defaults to true in non-TTY — promptConfirm() returns the fallback (default true ) when stdin is not a TTY. Scripts piping input will auto-confirm unless you pass --yes explicitly. Excluded paths are respected during scan and sync — genesis/context.ts and genesis/sync.ts both call isExcluded() from genesis/exclude.ts . Add exclusions via /exclude \u003cpath> or type @ in the prompt to pick from a dropdown. Exclusions persist in .aether/settings/exclude.json per project. Clean-code review requires a configured provider for AI analysis — Heuristics run always; hybrid AI review only runs if loadConfig() returns a valid provider and ping() succeeds. Use --yes to skip cost confirmation. Clean-code ignore patterns are globs, not regexes — matchesPattern() converts ** → .* , * → [^/]* , ? → . . Stored in .aether/settings/cleancode-ignore.json . Prompt optimization reads from .aether/docs/ , not source files directly — buildDocsContext() loads up to 24k chars from key docs + 8k from directory tree. If docs are stale, the optimized prompt may miss recent changes (staleness warning is shown). Prompt output goes to .aether/prompts/ , not the chat — /prompt writes a markdown file with metadata header; it does not print the optimized prompt to stdout. Final Note Aether is early-stage . The implemented surface (genesis, sync, config, clean) is solid and usable. The unimplemented commands (doctor, explain, export, MCP, VS Code) are where the product vision expands. If you're contributing, start by understanding the genesis → distill → plan → generate flow — that's the engine. Everything else (CLI, config, sync, UI) serves it."},{"id":"guides/contributing","title":"Contributing","section":"Guides","summary":"Conventions, quality gates, and how to submit a change.","html":"\u003ch1 id=\"md-contributing-to-aether\">Contributing to Aether\u003c/h1>\n\u003cp>This guide reflects how the project actually works today, based on the codebase and configuration you'll find in the repository.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-development-setup\">Development Setup\u003c/h2>\n\u003cp>bash\u003c/p>\n\u003ch1 id=\"md-clone-your-fork\">Clone your fork\u003c/h1>\n\u003cp>git clone https://github.com/YOUR_USERNAME/aether.git cd aether\u003c/p>\n\u003ch1 id=\"md-install-dependencies-nodejs-20-required\">Install dependencies (Node.js 20+ required)\u003c/h1>\n\u003cp>npm install\u003c/p>\n\u003ch1 id=\"md-run-in-development-mode-uses-tsx-for-typescript-execution\">Run in development mode (uses tsx for TypeScript execution)\u003c/h1>\n\u003cp>npm run dev\u003c/p>\n\u003ch1 id=\"md-build-the-project-typescript-compilation\">Build the project (TypeScript compilation)\u003c/h1>\n\u003cp>npm run build\u003c/p>\n\u003ch1 id=\"md-type-check-without-emitting-files\">Type-check without emitting files\u003c/h1>\n\u003cp>npm run typecheck\u003c/p>\n\u003ch1 id=\"md-build-the-single-executable-application-sea\">Build the Single Executable Application (SEA)\u003c/h1>\n\u003cp>npm run build:sea\u003c/p>\n\u003cp>\u003cstrong>Requirements:\u003c/strong> Node.js ≥ 20.0.0 (enforced in \u003ccode>package.json\u003c/code> engines field).\u003c/p>\n\u003ch2 id=\"md-project-structure-actual\">Project Structure (Actual)\u003c/h2>\n\u003cp>The \u003ccode>CONTRIBUTING.md\u003c/code> file describes an older structure. The actual \u003ccode>src/\u003c/code> layout is:\u003c/p>\n\u003cpre class=\"tree\">\u003ccode>src/\n├── cli/              # CLI entry point (index.ts)\n├── commands/         # Slash-command implementations (genesis, config, help, clean, exclude)\n├── config/           # Configuration loading, scaffolding, types\n├── genesis/          # Core analysis pipeline (scan, context, distill, plan, docs, sync, estimate, exclude)\n├── pricing/          # Model pricing lookup (OpenRouter catalog + static fallback)\n├── prompts/          # Prompt templates for AI-generated docs\n├── providers/        # LLM provider abstractions (OpenAI-compatible, Anthropic, OpenRouter, retry logic, metered usage)\n├── ui/               # Terminal UI (animation, prompts, steppers, theme, cancel/confirm, cost formatting)\n└── util/             # Small utilities (env parsing, hashing, token estimation)\u003c/code>\u003c/pre>\n\u003cp>Key architectural pieces:\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Commands\u003c/strong> register via \u003ccode>src/commands/registry.ts\u003c/code> (\u003ccode>CommandRegistry\u003c/code>)\u003c/li>\u003cli>\u003cstrong>Genesis pipeline\u003c/strong> (\u003ccode>genesis/\u003c/code>) runs: scan → context → distill → plan → generate docs\u003c/li>\u003cli>\u003cstrong>Providers\u003c/strong> (\u003ccode>providers/\u003c/code>) wrap OpenAI-compatible APIs with retry logic and usage metering\u003c/li>\u003cli>\u003cstrong>Prompts\u003c/strong> (\u003ccode>prompts/\u003c/code>) are string templates imported by the genesis pipeline\u003c/li>\u003cli>\u003cstrong>CLI entry\u003c/strong> (\u003ccode>cli/index.ts\u003c/code>) boots animation, registers commands, starts REPL\u003c/li>\u003cli>\u003cstrong>Pricing\u003c/strong> (\u003ccode>pricing/\u003c/code>) fetches live model prices from OpenRouter with 24h cache, falls back to static table\u003c/li>\u003cli>\u003cstrong>Estimation\u003c/strong> (\u003ccode>genesis/estimate.ts\u003c/code>) computes token/cost estimates for genesis and sync operations\u003c/li>\u003cli>\u003cstrong>Exclude\u003c/strong> (\u003ccode>genesis/exclude.ts\u003c/code>, \u003ccode>commands/exclude.ts\u003c/code>) manages excluded paths for genesis/sync\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-coding-conventions\">Coding Conventions\u003c/h2>\n\u003cp>Enforced by the TypeScript configuration (\u003ccode>tsconfig.json\u003c/code>):\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Strict TypeScript\u003c/strong> — \u003ccode>strict: true\u003c/code>, no \u003ccode>any\u003c/code>, explicit types\u003c/li>\u003cli>\u003cstrong>ES2022 / NodeNext modules\u003c/strong> — \u003ccode>import\u003c/code>/\u003ccode>export\u003c/code> syntax, \u003ccode>.js\u003c/code> extensions in imports\u003c/li>\u003cli>\u003cstrong>Small, focused functions\u003c/strong> — prefer pure functions over classes where practical\u003c/li>\u003cli>\u003cstrong>No \u003ccode>any\u003c/code>\u003c/strong> — use \u003ccode>unknown\u003c/code> or proper types\u003c/li>\u003cli>\u003cstrong>Explicit imports\u003c/strong> — \u003ccode>import { foo } from &quot;./foo.js&quot;\u003c/code> (\u003ccode>.js\u003c/code> extension required by \u003ccode>moduleResolution: NodeNext\u003c/code>)\u003c/li>\u003c/ul>\n\u003cp>No ESLint, Prettier, or other formatters are configured. Follow the existing code style in the repository.\u003c/p>\n\u003ch2 id=\"md-quality-gates-before-a-pr\">Quality Gates Before a PR\u003c/h2>\n\u003cp>Run these locally before opening a PR:\u003c/p>\n\u003cp>bash\u003c/p>\n\u003ch1 id=\"md-1-type-check-strict-no-emit\">1. Type-check (strict, no emit)\u003c/h1>\n\u003cp>npm run typecheck\u003c/p>\n\u003ch1 id=\"md-2-build-emits-to-dist\">2. Build (emits to dist/)\u003c/h1>\n\u003cp>npm run build\u003c/p>\n\u003ch1 id=\"md-3-test-manually-in-dev-mode\">3. Test manually in dev mode\u003c/h1>\n\u003cp>npm run dev\u003c/p>\n\u003cp>\u003cstrong>There is no test suite configured.\u003c/strong> The \u003ccode>package.json\u003c/code> has no \u003ccode>test\u003c/code> script, and no test files exist in the repository. Do not invent a test command — manual verification via \u003ccode>npm run dev\u003c/code> is the current validation path.\u003c/p>\n\u003ch2 id=\"md-branch-commit-conventions\">Branch &amp; Commit Conventions\u003c/h2>\n\u003cp>From \u003ccode>CONTRIBUTING.md\u003c/code> (this matches the project's stated convention):\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Prefix\u003c/th>\u003cth>Use\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>feat/\u003c/code>\u003c/td>\u003ctd>New features\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>fix/\u003c/code>\u003c/td>\u003ctd>Bug fixes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>docs/\u003c/code>\u003c/td>\u003ctd>Documentation only\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>refactor/\u003c/code>\u003c/td>\u003ctd>Code changes that don't fix bugs or add features\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>test/\u003c/code>\u003c/td>\u003ctd>Adding or updating tests (when tests exist)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Commit message format:\u003c/strong>\u003c/p>\n\u003cp>feat: add dependency detection for Python projects fix: handle empty directories in scanner docs: update roadmap with new commands refactor: extract technology detection into separate module\u003c/p>\n\u003cp>Branch from \u003ccode>main\u003c/code>. Keep commits focused and messages descriptive.\u003c/p>\n\u003ch2 id=\"md-submitting-changes\">Submitting Changes\u003c/h2>\n\u003col>\u003cli>\u003cstrong>Fork\u003c/strong> the repository\u003c/li>\u003cli>\u003cstrong>Create a branch\u003c/strong> from \u003ccode>main\u003c/code> using the prefix convention above\u003c/li>\u003cli>\u003cstrong>Make your changes\u003c/strong> — keep functions small, add types, follow existing patterns\u003c/li>\u003cli>\u003cstrong>Run quality gates\u003c/strong> — \u003ccode>npm run typecheck &amp;&amp; npm run build\u003c/code>\u003c/li>\u003cli>\u003cstrong>Test manually\u003c/strong> — \u003ccode>npm run dev\u003c/code> and exercise your change\u003c/li>\u003cli>\u003cstrong>Commit\u003c/strong> with a clear message\u003c/li>\u003cli>\u003cstrong>Push\u003c/strong> and open a Pull Request against \u003ccode>main\u003c/code>\u003c/li>\u003c/ol>\n\u003cp>The project is in early stages. There is no formal CI pipeline, no PR template, and no required review process documented. PRs are reviewed by maintainers when capacity allows.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-project-vision-context\">Project Vision Context\u003c/h2>\n\u003cp>Aether's goal is to \u003cstrong>transform any codebase into an AI-native workspace\u003c/strong> by building a living knowledge base (\u003ccode>.aether/\u003c/code>) through static analysis first, then optional AI enrichment. The \u003ccode>genesis\u003c/code> command is the only implemented command today; \u003ccode>sync\u003c/code>, \u003ccode>doctor\u003c/code>, \u003ccode>explain\u003c/code>, \u003ccode>export\u003c/code>, MCP server, and VS Code extension are on the roadmap (see \u003ccode>README.md\u003c/code>).\u003c/p>\n\u003cp>When contributing, consider how your change fits into the \u003cstrong>genesis → sync → doctor → explain → export\u003c/strong> lifecycle described in the README's philosophy section.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-questions\">Questions?\u003c/h2>\n\u003cp>Open an issue or start a discussion on GitHub. No question is too small.\u003c/p>","text":"Contributing to Aether This guide reflects how the project actually works today, based on the codebase and configuration you'll find in the repository. Development Setup bash Clone your fork git clone https://github.com/YOUR_USERNAME/aether.git cd aether Install dependencies (Node.js 20+ required) npm install Run in development mode (uses tsx for TypeScript execution) npm run dev Build the project (TypeScript compilation) npm run build Type-check without emitting files npm run typecheck Build the Single Executable Application (SEA) npm run build:sea Requirements: Node.js ≥ 20.0.0 (enforced in package.json engines field). Project Structure (Actual) The CONTRIBUTING.md file describes an older structure. The actual src/ layout is: src/ ├── cli/ # CLI entry point (index.ts) ├── commands/ # Slash-command implementations (genesis, config, help, clean, exclude) ├── config/ # Configuration loading, scaffolding, types ├── genesis/ # Core analysis pipeline (scan, context, distill, plan, docs, sync, estimate, exclude) ├── pricing/ # Model pricing lookup (OpenRouter catalog + static fallback) ├── prompts/ # Prompt templates for AI-generated docs ├── providers/ # LLM provider abstractions (OpenAI-compatible, Anthropic, OpenRouter, retry logic, metered usage) ├── ui/ # Terminal UI (animation, prompts, steppers, theme, cancel/confirm, cost formatting) └── util/ # Small utilities (env parsing, hashing, token estimation) Key architectural pieces: Commands register via src/commands/registry.ts ( CommandRegistry ) Genesis pipeline ( genesis/ ) runs: scan → context → distill → plan → generate docs Providers ( providers/ ) wrap OpenAI-compatible APIs with retry logic and usage metering Prompts ( prompts/ ) are string templates imported by the genesis pipeline CLI entry ( cli/index.ts ) boots animation, registers commands, starts REPL Pricing ( pricing/ ) fetches live model prices from OpenRouter with 24h cache, falls back to static table Estimation ( genesis/estimate.ts ) computes token/cost estimates for genesis and sync operations Exclude ( genesis/exclude.ts , commands/exclude.ts ) manages excluded paths for genesis/sync Coding Conventions Enforced by the Typ
