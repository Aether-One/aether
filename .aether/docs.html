ext. No additional frameworks — No Express, Fastify, React, or other application frameworks imported. Single Executable Application (SEA) — build:sea script uses esbuild + postject to produce a standalone binary (see scripts/build-sea.mjs ). AI Provider Integrations — Supports OpenAI, Anthropic, Gemini, and OpenRouter via dedicated provider classes ( src/providers/ ). Cost Estimation & Metering — Built-in token pricing catalog (OpenRouter + static fallback), usage tracking via MeteredProvider , and cost formatting for user confirmation prompts. Interactive CLI — Uses @clack/core for spinners, prompts, and cancellation handling (ESC/q/Ctrl+C). Distillation Caching — Incremental LLM-based file distillation with content-addressable caching (SHA-256) to avoid re-processing unchanged files during /genesis and /sync . Clean Code Review — Hybrid static + AI analysis ( /cleancode review ) with heuristic detectors (long functions, deep nesting, magic numbers, dead code, poor naming) and paradigm support (Clean Code, SOLID, Functional, Google Style). Optimized Prompt Generation — /prompt command generates file-referencing prompts for other AI assistants using project knowledge base from .aether/docs/ . Core Dependencies Category Technology Version Purpose Core Dependencies chalk 5.4.1 Terminal styling (colors, bold, dim) across CLI output, animations, themes @clack/core 1.4.3 Interactive CLI primitives (spinners, prompts, text input) used in UI components esbuild 0.28.1 Used in scripts/build-sea.mjs for Single Executable Application bundling postject 1.0.0-alpha.6 Injects JS bundle into Node.js binary for SEA build tsx 4.19.4 Development runner ( npm run dev ); executes TS directly TypeScript Compiler (tsc) 5.8.3 Compiles src/ → dist/ ; emits declarations, source maps Development Tools Category Technology Version Purpose Development Tools @types/node 22.15.21 Type definitions for Node.js APIs (fs, path, crypto, child_process, readline)"},{"id":"modules/overview","title":"Modules Overview","section":"Architecture","summary":"Per-module breakdown of responsibilities and exports.","html":"\u003ch1 id=\"md-modules-overview\">Modules Overview\u003c/h1>\n\u003ch2 id=\"md-1-srccli-cli-entry-point\">1. src/cli — CLI Entry Point\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Entry point for the \u003ccode>aether\u003c/code> CLI. Handles version flags, command registration, interactive detection, startup animation, and launches the interactive chat loop.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/cli/index.ts\u003c/code> — \u003ccode>main()\u003c/code> async entry point; registers commands in order (help, builtins, config, clean, cleancode, exclude, prompt); detects TTY; plays startup animation or prints banner; calls \u003ccode>startChat()\u003c/code>.\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>main()\u003c/code> — async entry point (called via \u003ccode>bin\u003c/code> entry in \u003ccode>package.json\u003c/code>)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>../ui/animation.ts\u003c/code> → \u003ccode>playStartupAnimation()\u003c/code>, \u003ccode>printBanner()\u003c/code>\u003c/li>\u003cli>\u003ccode>../ui/prompt.ts\u003c/code> → \u003ccode>startChat()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/help.ts\u003c/code> → \u003ccode>registerHelpCommand()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/builtins.ts\u003c/code> → \u003ccode>registerBuiltinCommands()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/config.ts\u003c/code> → \u003ccode>registerConfigCommand()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/clean.ts\u003c/code> → \u003ccode>registerCleanCommand()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/cleancode.ts\u003c/code> → \u003ccode>registerCleanCodeCommand()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/exclude.ts\u003c/code> → \u003ccode>registerExcludeCommand()\u003c/code>\u003c/li>\u003cli>\u003ccode>../commands/prompt.ts\u003c/code> → \u003ccode>registerPromptCommand()\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003col>\u003cli>Parse \u003ccode>--version\u003c/code>/\u003ccode>-v\u003c/code> → print version and exit  \u003c/li>\u003cli>Register all commands via registry  \u003c/li>\u003cli>Detect TTY (\u003ccode>process.stdin.isTTY\u003c/code>)  \u003c/li>\u003cli>If TTY and not \u003ccode>--no-animation\u003c/code> → \u003ccode>playStartupAnimation()\u003c/code> else \u003ccode>printBanner()\u003c/code>  \u003c/li>\u003cli>Call \u003ccode>startChat()\u003c/code> → enters interactive REPL loop  \u003c/li>\u003cli>Catch errors → stderr + exit(1)\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-2-srccommands-command-implementations-registry\">2. src/commands — Command Implementations &amp; Registry\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Implements all slash-commands (\u003ccode>/help\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/prompt\u003c/code>, \u003ccode>/genesis\u003c/code> via builtins) and provides the command registry for dispatch.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/commands/registry.ts\u003c/code> — \u003ccode>CommandRegistry\u003c/code> class (Map-based), \u003ccode>Command\u003c/code> interface, \u003ccode>registry\u003c/code> singleton, \u003ccode>execute(input)\u003c/code> parser  \u003c/li>\u003cli>\u003ccode>src/commands/help.ts\u003c/code> — \u003ccode>registerHelpCommand()\u003c/code> → lists all registered commands with descriptions/usage  \u003c/li>\u003cli>\u003ccode>src/commands/config.ts\u003c/code> — \u003ccode>registerConfigCommand()\u003c/code> → \u003ccode>/config [--provider|--model|--url|--key]\u003c/code> + subcommands (\u003ccode>show\u003c/code>, \u003ccode>set\u003c/code>, \u003ccode>quick-setup\u003c/code>)  \u003c/li>\u003cli>\u003ccode>src/commands/clean.ts\u003c/code> — \u003ccode>registerCleanCommand()\u003c/code> → \u003ccode>/clean\u003c/code> (removes \u003ccode>.aether/\u003c/code> cache)  \u003c/li>\u003cli>\u003ccode>src/commands/cleancode.ts\u003c/code> — \u003ccode>registerCleanCodeCommand()\u003c/code> → \u003ccode>/cleancode review [path|file] [--yes|-y]\u003c/code>, \u003ccode>/cleancode ignore [pattern]\u003c/code>, \u003ccode>/cleancode paradigm [name]\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/commands/exclude.ts\u003c/code> — \u003ccode>registerExcludeCommand()\u003c/code> → \u003ccode>/exclude &lt;path&gt;\u003c/code> (or \u003ccode>@\u003c/code> in prompt to pick) + \u003ccode>list\u003c/code>, \u003ccode>remove\u003c/code>/\u003ccode>rm\u003c/code> subcommands; manages \u003ccode>.aether/settings/exclude.json\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/commands/prompt.ts\u003c/code> — \u003ccode>registerPromptCommand()\u003c/code> → \u003ccode>/prompt &lt;intent&gt;\u003c/code> (optimizes a developer task into an AI-ready prompt)  \u003c/li>\u003cli>\u003ccode>src/commands/builtins.ts\u003c/code> — \u003ccode>registerBuiltinCommands()\u003c/code> → registers \u003ccode>/genesis\u003c/code> (delegates to genesis pipeline)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>registry\u003c/code> (singleton \u003ccode>CommandRegistry\u003c/code>)  \u003c/li>\u003cli>\u003ccode>registerHelpCommand()\u003c/code>, \u003ccode>registerBuiltinCommands()\u003c/code>, \u003ccode>registerConfigCommand()\u003c/code>, \u003ccode>registerCleanCommand()\u003c/code>, \u003ccode>registerCleanCodeCommand()\u003c/code>, \u003ccode>registerExcludeCommand()\u003c/code>, \u003ccode>registerPromptCommand()\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>../config/index.ts\u003c/code> → \u003ccode>loadConfig()\u003c/code>, \u003ccode>saveConfig()\u003c/code>, \u003ccode>validateConfig()\u003c/code>, \u003ccode>getDefaultConfig()\u003c/code>, \u003ccode>maskKey()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../config/types.ts\u003c/code> → \u003ccode>AetherConfig\u003c/code>  \u003c/li>\u003cli>\u003ccode>../ui/theme.ts\u003c/code> → \u003ccode>ACCENT\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code>  \u003c/li>\u003cli>\u003ccode>../genesis/exclude.ts\u003c/code> → \u003ccode>loadExcludes()\u003c/code>, \u003ccode>addExclude()\u003c/code>, \u003ccode>removeExclude()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../genesis/cleancode.ts\u003c/code> → \u003ccode>scanCleanCodeHeuristics()\u003c/code>, \u003ccode>scanCleanCodeHybrid()\u003c/code>, \u003ccode>estimateCleanCode()\u003c/code>, \u003ccode>buildCleanCodeReport()\u003c/code>, \u003ccode>buildCleanCodeMarkdown()\u003c/code>, \u003ccode>writeCleanCodeMarkdown()\u003c/code>, \u003ccode>cleanCodeMarkdownRelPath()\u003c/code>, \u003ccode>loadCleanCodeIgnore()\u003c/code>, \u003ccode>addCleanCodeIgnorePattern()\u003c/code>, \u003ccode>loadCleanCodeParadigm()\u003c/code>, \u003ccode>setCleanCodeParadigm()\u003c/code>, \u003ccode>flaggedFiles()\u003c/code>, \u003ccode>filterIgnored()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../pricing/index.ts\u003c/code> → \u003ccode>getModelPricing()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../providers/factory.ts\u003c/code> → \u003ccode>createProvider()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../providers/retry.ts\u003c/code> → \u003ccode>chatWithRetry()\u003c/code>, \u003ccode>formatRetryLine()\u003c/code>, \u003ccode>PingResult\u003c/code>  \u003c/li>\u003cli>\u003ccode>../config/index.ts\u003c/code> → \u003ccode>getGlobalDir()\u003c/code>, \u003ccode>getGlobalConfigPath()\u003c/code>  \u003c/li>\u003cli>\u003ccode>chalk\u003c/code> (external)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003col>\u003cli>CLI calls \u003ccode>register*Command()\u003c/code> during startup → populates \u003ccode>registry\u003c/code> Map  \u003c/li>\u003cli>User types \u003ccode>/command args\u003c/code> in chat → \u003ccode>registry.execute(input)\u003c/code> parses \u003ccode>/name args\u003c/code> → calls \u003ccode>handler(args)\u003c/code>  \u003c/li>\u003cli>Handlers use config API, chalk/theme for output, and genesis pipeline (for \u003ccode>/genesis\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>) or exclude API (for \u003ccode>/exclude\u003c/code>)\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-3-srcconfig-configuration-management\">3. src/config — Configuration Management\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Manages global and per-project configuration: provider, model, baseUrl, apiKey, timeouts. Handles precedence (project &gt; global default &gt; env), validation, scaffolding \u003ccode>.aether/README.md\u003c/code>.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/config/types.ts\u003c/code> — \u003ccode>AetherConfig\u003c/code> interface (\u003ccode>provider\u003c/code>, \u003ccode>model\u003c/code>, \u003ccode>baseUrl\u003c/code>, \u003ccode>apiKey?\u003c/code>, \u003ccode>timeout?\u003c/code>)  \u003c/li>\u003cli>\u003ccode>src/config/index.ts\u003c/code> — Core logic: \u003ccode>DEFAULT_CONFIGS\u003c/code>, \u003ccode>PROVIDER_HOSTS\u003c/code>, \u003ccode>detectProviderFromBaseUrl()\u003c/code>, \u003ccode>getGlobalDir()\u003c/code>, \u003ccode>getGlobalConfigPath()\u003c/code>, \u003ccode>projectId()\u003c/code>, \u003ccode>getProjectCacheDir()\u003c/code>, \u003ccode>loadConfig()\u003c/code>, \u003ccode>saveConfig()\u003c/code>, \u003ccode>validateConfig()\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/config/scaffold.ts\u003c/code> — \u003ccode>ensureProjectReadme(rootDir)\u003c/code> writes \u003ccode>.aether/README.md\u003c/code> from \u003ccode>AETHER_README\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/config/readme.ts\u003c/code> — \u003ccode>AETHER_README\u003c/code> markdown constant documenting \u003ccode>.aether/\u003c/code> structure\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>AetherConfig\u003c/code> type  \u003c/li>\u003cli>\u003ccode>DEFAULT_CONFIGS\u003c/code>, \u003ccode>PROVIDER_HOSTS\u003c/code>  \u003c/li>\u003cli>\u003ccode>getDefaultConfig(provider)\u003c/code>, \u003ccode>detectProviderFromBaseUrl(url)\u003c/code>  \u003c/li>\u003cli>\u003ccode>getGlobalDir()\u003c/code>, \u003ccode>getGlobalConfigPath()\u003c/code>, \u003ccode>projectId(rootDir)\u003c/code>, \u003ccode>getProjectCacheDir(rootDir)\u003c/code>  \u003c/li>\u003cli>\u003ccode>loadConfig(rootDir)\u003c/code>, \u003ccode>saveConfig(rootDir, config)\u003c/code>, \u003ccode>validateConfig(config)\u003c/code>  \u003c/li>\u003cli>\u003ccode>ensureProjectReadme(rootDir)\u003c/code>  \u003c/li>\u003cli>\u003ccode>AETHER_README\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>node:fs/promises\u003c/code>, \u003ccode>node:fs\u003c/code>, \u003ccode>node:path\u003c/code>, \u003ccode>node:os\u003c/code> (homedir)  \u003c/li>\u003cli>\u003ccode>../util/hash.ts\u003c/code> → \u003ccode>hashContent()\u003c/code> (for projectId)  \u003c/li>\u003cli>\u003ccode>../util/env.ts\u003c/code> → \u003ccode>envInt()\u003c/code> (not directly used here but in constants)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003col>\u003cli>\u003ccode>loadConfig(rootDir)\u003c/code> reads: global config (\u003ccode>~/.aether/config.json\u003c/code>) → project override (\u003ccode>.aether/config.json\u003c/code> or \u003ccode>.aether/settings/config.json\u003c/code>) → \u003ccode>AETHER_API_KEY\u003c/code> env  \u003c/li>\u003cli>Precedence: project override &gt; global default &gt; env  \u003c/li>\u003cli>\u003ccode>saveConfig()\u003c/code> writes to global file; first config becomes \u003ccode>default\u003c/code>, subsequent per-project under \u003ccode>projects[projectId]\u003c/code>  \u003c/li>\u003cli>\u003ccode>validateConfig()\u003c/code> enforces required fields and valid provider enum  \u003c/li>\u003cli>\u003ccode>ensureProjectReadme()\u003c/code> scaffolds \u003ccode>.aether/README.md\u003c/code> on first genesis\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-4-srcgenesis-core-analysis-documentation-pipeline\">4. src/genesis — Core Analysis &amp; Documentation Pipeline\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Core &quot;genesis&quot; pipeline: scans a project, builds context, fingerprints files, plans documentation, distills large codebases, generates documentation via LLM, manages snapshots for sync, and performs clean-code reviews.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/genesis/types.ts\u003c/code> — Core types: \u003ccode>ProjectContext\u003c/code>, \u003ccode>FileFingerprint\u003c/code>, \u003ccode>GitInfo\u003c/code>, \u003ccode>DistillCache\u003c/code>, \u003ccode>DocDefinition\u003c/code>, \u003ccode>DocSection\u003c/code>, \u003ccode>Snapshot\u003c/code>, \u003ccode>FileDiff\u003c/code>, \u003ccode>SyncPlan\u003c/code>, \u003ccode>SectionPatch\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/constants.ts\u003c/code> — Env-overridable limits: \u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>MAX_TOTAL_CHARS\u003c/code>, \u003ccode>MAX_FILES_WALKED\u003c/code>, \u003ccode>MAX_WALK_DEPTH\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>DISTILL_CONCURRENCY\u003c/code>, \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/context.ts\u003c/code> — builds \u003ccode>ProjectContext\u003c/code> from filesystem scan; respects exclude patterns from \u003ccode>.aether/settings/exclude.json\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/digest.ts\u003c/code> — \u003ccode>buildPlannerDigest(context)\u003c/code> → compact summary for planner; \u003ccode>detectSignals()\u003c/code>, \u003ccode>extractSymbols()\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/fingerprint.ts\u003c/code> — \u003ccode>buildFingerprint(context)\u003c/code>, \u003ccode>getGitInfo(rootDir)\u003c/code>, \u003ccode>getGitLog(rootDir, sinceCommit)\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/scope.ts\u003c/code> — \u003ccode>buildSharedProjectContext(context, provider, model, hooks?)\u003c/code> → builds shared context prompt; distills if over \u003ccode>DOC_CONTEXT_BUDGET\u003c/code> using incremental cache  \u003c/li>\u003cli>\u003ccode>src/genesis/distill.ts\u003c/code> — \u003ccode>distillFilesIncremental(files, provider, model, budget, prevCache, hooks)\u003c/code> → incremental LLM-based distillation with caching  \u003c/li>\u003cli>\u003ccode>src/genesis/planner.ts\u003c/code> — \u003ccode>planDocs(contextPrompt, provider, model, options?)\u003c/code> → LLM plans which docs to generate; \u003ccode>parsePlan()\u003c/code>, \u003ccode>extractJsonArray()\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/docs.ts\u003c/code> — \u003ccode>DOC_DEFINITIONS\u003c/code> (13 built-in docs), \u003ccode>buildDocPrompt()\u003c/code>, \u003ccode>buildDocUpdatePrompt()\u003c/code>, \u003ccode>buildSectionPatchPrompt()\u003c/code>, \u003ccode>buildCustomDocDefinition()\u003c/code>, \u003ccode>buildDocsIndex()\u003c/code>, \u003ccode>SECTION_ORDER\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/sync.ts\u003c/code> — sync planning/diffing  \u003c/li>\u003cli>\u003ccode>src/genesis/estimate.ts\u003c/code> — \u003ccode>estimateGenesis()\u003c/code>, \u003ccode>estimateSync()\u003c/code>, \u003ccode>estimateCleanCode()\u003c/code> → cost estimation for genesis/sync/cleancode operations  \u003c/li>\u003cli>\u003ccode>src/genesis/exclude.ts\u003c/code> — \u003ccode>loadExcludes(rootDir)\u003c/code>, \u003ccode>addExclude(rootDir, path)\u003c/code>, \u003ccode>removeExclude(rootDir, path)\u003c/code>; manages \u003ccode>.aether/settings/exclude.json\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> — \u003ccode>scanCleanCodeHeuristics(context, paradigm)\u003c/code> → static analysis for clean-code violations  \u003c/li>\u003cli>\u003ccode>src/genesis/cleancode.ts\u003c/code> — \u003ccode>scanCleanCodeHybrid(context, provider, model, paradigm, hooks?)\u003c/code>, \u003ccode>estimateCleanCode(context, model, provider)\u003c/code>, \u003ccode>buildCleanCodeReport()\u003c/code>, \u003ccode>buildCleanCodeMarkdown()\u003c/code>, \u003ccode>writeCleanCodeMarkdown()\u003c/code>, \u003ccode>cleanCodeMarkdownRelPath()\u003c/code>, \u003ccode>loadCleanCodeIgnore()\u003c/code>, \u003ccode>addCleanCodeIgnorePattern()\u003c/code>, \u003ccode>loadCleanCodeParadigm()\u003c/code>, \u003ccode>setCleanCodeParadigm()\u003c/code>, \u003ccode>flaggedFiles()\u003c/code>, \u003ccode>filterIgnored()\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>Types: \u003ccode>ProjectContext\u003c/code>, \u003ccode>FileContent\u003c/code>, \u003ccode>FileFingerprint\u003c/code>, \u003ccode>GitInfo\u003c/code>, \u003ccode>DistillCache\u003c/code>, \u003ccode>DistillHooks\u003c/code>, \u003ccode>DocSection\u003c/code>, \u003ccode>DocDefinition\u003c/code>, \u003ccode>CustomDocSpec\u003c/code>, \u003ccode>DocIndexEntry\u003c/code>, \u003ccode>DocMeta\u003c/code>, \u003ccode>Snapshot\u003c/code>, \u003ccode>FileDiff\u003c/code>, \u003ccode>SyncPlan\u003c/code>, \u003ccode>SectionPatch\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>  \u003c/li>\u003cli>Constants: \u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>MAX_TOTAL_CHARS\u003c/code>, \u003ccode>MAX_FILES_WALKED\u003c/code>, \u003ccode>MAX_WALK_DEPTH\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>DISTILL_CONCURRENCY\u003c/code>, \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code>  \u003c/li>\u003cli>Functions: \u003ccode>buildPlannerDigest()\u003c/code>, \u003ccode>detectSignals()\u003c/code>, \u003ccode>extractSymbols()\u003c/code>, \u003ccode>buildFingerprint()\u003c/code>, \u003ccode>getGitInfo()\u003c/code>, \u003ccode>getGitLog()\u003c/code>, \u003ccode>buildSharedProjectContext()\u003c/code>, \u003ccode>distillFilesIncremental()\u003c/code>, \u003ccode>planDocs()\u003c/code>, \u003ccode>parsePlan()\u003c/code>, \u003ccode>buildDocPrompt()\u003c/code>, \u003ccode>buildDocUpdatePrompt()\u003c/code>, \u003ccode>buildSectionPatchPrompt()\u003c/code>, \u003ccode>buildCustomDocDefinition()\u003c/code>, \u003ccode>buildDocsIndex()\u003c/code>, \u003ccode>DOC_DEFINITIONS\u003c/code>, \u003ccode>SECTION_ORDER\u003c/code>, \u003ccode>estimateGenesis()\u003c/code>, \u003ccode>estimateSync()\u003c/code>, \u003ccode>estimateCleanCode()\u003c/code>, \u003ccode>loadExcludes()\u003c/code>, \u003ccode>addExclude()\u003c/code>, \u003ccode>removeExclude()\u003c/code>, \u003ccode>scanCleanCodeHeuristics()\u003c/code>, \u003ccode>scanCleanCodeHybrid()\u003c/code>, \u003ccode>estimateCleanCode()\u003c/code>, \u003ccode>buildCleanCodeReport()\u003c/code>, \u003ccode>buildCleanCodeMarkdown()\u003c/code>, \u003ccode>writeCleanCodeMarkdown()\u003c/code>, \u003ccode>cleanCodeMarkdownRelPath()\u003c/code>, \u003ccode>loadCleanCodeIgnore()\u003c/code>, \u003ccode>addCleanCodeIgnorePattern()\u003c/code>, \u003ccode>loadCleanCodeParadigm()\u003c/code>, \u003ccode>setCleanCodeParadigm()\u003c/code>, \u003ccode>flaggedFiles()\u003c/code>, \u003ccode>filterIgnored()\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>../providers/types.ts\u003c/code> → \u003ccode>LLMProvider\u003c/code>, \u003ccode>ChatRequest\u003c/code>, \u003ccode>ChatResponse\u003c/code>  \u003c/li>\u003cli>\u003ccode>../providers/retry.ts\u003c/code> → \u003ccode>chatWithRetry()\u003c/code>, \u003ccode>RetryOptions\u003c/code>  \u003c/li>\u003cli>\u003ccode>../config/index.ts\u003c/code> → \u003ccode>getProjectCacheDir()\u003c/code>, \u003ccode>AetherConfig\u003c/code>  \u003c/li>\u003cli>\u003ccode>../prompts/index.ts\u003c/code> → all prompt templates  \u003c/li>\u003cli>\u003ccode>../util/hash.ts\u003c/code> → \u003ccode>hashContent()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../util/env.ts\u003c/code> → \u003ccode>envInt()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../util/tokens.ts\u003c/code> → \u003ccode>estimateTokens()\u003c/code>  \u003c/li>\u003cli>\u003ccode>../pricing/index.ts\u003c/code> → \u003ccode>getModelPricing()\u003c/code>, \u003ccode>ModelPricing\u003c/code>  \u003c/li>\u003cli>\u003ccode>node:fs/promises\u003c/code>, \u003ccode>node:fs\u003c/code>, \u003ccode>node:path\u003c/code>, \u003ccode>node:crypto\u003c/code>, \u003ccode>node:child_process\u003c/code> (execFileSync)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003col>\u003cli>\u003cstrong>Scan\u003c/strong> (\u003ccode>context.ts\u003c/code>) → builds \u003ccode>ProjectContext\u003c/code> (files, tree, config, entry points); respects exclude patterns from \u003ccode>.aether/settings/exclude.json\u003c/code>  \u003c/li>\u003cli>\u003cstrong>Digest\u003c/strong> (\u003ccode>digest.ts\u003c/code>) → \u003ccode>buildPlannerDigest()\u003c/code> creates compact summary for planner  \u003c/li>\u003cli>\u003cstrong>Plan\u003c/strong> (\u003ccode>planner.ts\u003c/code>) → \u003ccode>planDocs()\u003c/code> sends digest to LLM → returns planned \u003ccode>DocDefinition[]\u003c/code> (built-in + custom)  \u003c/li>\u003cli>\u003cstrong>Scope\u003c/strong> (\u003ccode>scope.ts\u003c/code>) → \u003ccode>buildSharedProjectContext()\u003c/code> builds shared context; if over budget, \u003ccode>distillFilesIncremental()\u003c/code> compresses source files via LLM with incremental caching  \u003c/li>\u003cli>\u003cstrong>Generate\u003c/strong> (\u003ccode>docs.ts\u003c/code>) → for each \u003ccode>DocDefinition\u003c/code>, \u003ccode>buildDocPrompt()\u003c/code> creates prompt → sent to LLM → output written to \u003ccode>.aether/docs/\u003c/code>  \u003c/li>\u003cli>\u003cstrong>Fingerprint\u003c/strong> (\u003ccode>fingerprint.ts\u003c/code>) → \u003ccode>buildFingerprint()\u003c/code> hashes all tracked files; \u003ccode>getGitInfo()\u003c/code> captures git state  \u003c/li>\u003cli>\u003cstrong>Snapshot\u003c/strong> → writes \u003ccode>.aether/snapshot.json\u003c/code> with fingerprints, git info, generated docs metadata  \u003c/li>\u003cli>\u003cstrong>Sync\u003c/strong> (\u003ccode>sync.ts\u003c/code>) → on re-run, diffs fingerprints → \u003ccode>SyncPlan\u003c/code> (regenerate/add) → partial updates via \u003ccode>buildSectionPatchPrompt()\u003c/code>  \u003c/li>\u003cli>\u003cstrong>Estimate\u003c/strong> (\u003ccode>estimate.ts\u003c/code>) → \u003ccode>estimateGenesis()\u003c/code> / \u003ccode>estimateSync()\u003c/code> / \u003ccode>estimateCleanCode()\u003c/code> estimate token usage and cost before execution  \u003c/li>\u003cli>\u003cstrong>Exclude\u003c/strong> (\u003ccode>exclude.ts\u003c/code>) → manages \u003ccode>.aether/settings/exclude.json\u003c/code> for paths to skip during scan  \u003c/li>\u003cli>\u003cstrong>Clean Code\u003c/strong> (\u003ccode>cleancode-heuristics.ts\u003c/code>, \u003ccode>cleancode.ts\u003c/code>) → heuristic scan → optional hybrid AI review → markdown report at \u003ccode>.aether/cleancode-report.md\u003c/code>\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-5-srcprompts-prompt-templates\">5. src/prompts — Prompt Templates\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Centralized prompt templates for all LLM interactions: base prompts, per-document prompts, and pipeline prompts (planner, sync, cleancode, optimize).\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/prompts/base.ts\u003c/code> — \u003ccode>BASE_PROMPT\u003c/code>, \u003ccode>PROMPT_SUFFIX\u003c/code>, \u003ccode>HUMAN_BASE_PROMPT\u003c/code>, \u003ccode>HUMAN_PROMPT_SUFFIX\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/prompts/docs/*.ts\u003c/code> — 13 document-specific prompts:  \u003cul>\u003cli>\u003ccode>getting-started.ts\u003c/code> → \u003ccode>GETTING_STARTED_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>onboarding.ts\u003c/code> → \u003ccode>ONBOARDING_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>contributing.ts\u003c/code> → \u003ccode>CONTRIBUTING_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>system-overview.ts\u003c/code> → \u003ccode>SYSTEM_OVERVIEW_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>folder-structure.ts\u003c/code> → \u003ccode>FOLDER_STRUCTURE_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>tech-stack.ts\u003c/code> → \u003ccode>TECH_STACK_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>coding-standards.ts\u003c/code> → \u003ccode>CODING_STANDARDS_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>modules.ts\u003c/code> → \u003ccode>MODULES_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>api.ts\u003c/code> → \u003ccode>API_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>business.ts\u003c/code> → \u003ccode>BUSINESS_RULES_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>diagrams.ts\u003c/code> → \u003ccode>DIAGRAMS_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>ai-context.ts\u003c/code> → \u003ccode>AI_CONTEXT_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>glossary.ts\u003c/code> → \u003ccode>GLOSSARY_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>custom-doc.ts\u003c/code> → \u003ccode>buildCustomDocPrompt(title, focus)\u003c/code>  \u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003ccode>src/prompts/pipeline/planner.ts\u003c/code> → \u003ccode>PLANNER_PROMPT\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/prompts/pipeline/sync.ts\u003c/code> → \u003ccode>SYNC_PLANNER_PROMPT\u003c/code>, \u003ccode>DOC_UPDATE_INSTRUCTIONS\u003c/code>, \u003ccode>SECTION_PATCH_INSTRUCTIONS\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> → \u003ccode>PARADIGMS\u003c/code>, \u003ccode>DEFAULT_PARADIGM\u003c/code>, \u003ccode>paradigmLabel()\u003c/code>, \u003ccode>listParadigms()\u003c/code>, \u003ccode>paradigmFocus()\u003c/code>, \u003ccode>buildCleanCodeScanPrompt()\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/prompts/pipeline/optimize.ts\u003c/code> → \u003ccode>OPTIMIZE_PROMPT\u003c/code>, \u003ccode>buildOptimizePrompt()\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/prompts/index.ts\u003c/code> — Barrel export of all above\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong> All prompt constants and \u003ccode>buildCustomDocPrompt\u003c/code>, \u003ccode>paradigmLabel\u003c/code>, \u003ccode>listParadigms\u003c/code>, \u003ccode>paradigmFocus\u003c/code>, \u003ccode>buildCleanCodeScanPrompt\u003c/code>, \u003ccode>buildOptimizePrompt\u003c/code> functions\u003c/p>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>None (pure string constants)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003col>\u003cli>\u003ccode>genesis/docs.ts\u003c/code> imports prompts → passes to \u003ccode>buildDocPrompt()\u003c/code> with context  \u003c/li>\u003cli>\u003ccode>genesis/planner.ts\u003c/code> uses \u003ccode>PLANNER_PROMPT\u003c/code> + \u003ccode>BASE_PROMPT\u003c/code> + context + \u003ccode>PROMPT_SUFFIX\u003c/code>  \u003c/li>\u003cli>\u003ccode>genesis/sync.ts\u003c/code> uses \u003ccode>SYNC_PLANNER_PROMPT\u003c/code>, \u003ccode>DOC_UPDATE_INSTRUCTIONS\u003c/code>, \u003ccode>SECTION_PATCH_INSTRUCTIONS\u003c/code>  \u003c/li>\u003cli>\u003ccode>genesis/cleancode.ts\u003c/code> uses \u003ccode>buildCleanCodeScanPrompt()\u003c/code> with selected paradigm  \u003c/li>\u003cli>\u003ccode>commands/prompt.ts\u003c/code> uses \u003ccode>buildOptimizePrompt()\u003c/code> for \u003ccode>/prompt\u003c/code> command  \u003c/li>\u003cli>Human-facing docs (Guides) use \u003ccode>HUMAN_BASE_PROMPT\u003c/code>/\u003ccode>HUMAN_PROMPT_SUFFIX\u003c/code>; others use machine prompts\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-6-srcproviders-llm-provider-abstraction\">6. src/providers — LLM Provider Abstraction\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Abstracts LLM providers behind a common interface. Implements \u003ccode>OpenAICompatibleProvider\u003c/code> (used for OpenAI, Gemini, Anthropic, OpenRouter) and \u003ccode>AnthropicProvider\u003c/code> (Anthropic native format). Includes retry logic with exponential backoff and rate-limit handling.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/providers/types.ts\u003c/code> — Interfaces: \u003ccode>ChatMessage\u003c/code>, \u003ccode>ChatRequest\u003c/code>, \u003ccode>ChatResponse\u003c/code>, \u003ccode>StreamChunk\u003c/code>, \u003ccode>PingResult\u003c/code>, \u003ccode>LLMProvider\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/providers/openai-compatible.ts\u003c/code> — \u003ccode>OpenAICompatibleProvider\u003c/code> class implementing \u003ccode>LLMProvider\u003c/code> (chat, chatStream, ping)  \u003c/li>\u003cli>\u003ccode>src/providers/anthropic.ts\u003c/code> — \u003ccode>AnthropicProvider\u003c/code> class implementing \u003ccode>LLMProvider\u003c/code> with Anthropic native API format  \u003c/li>\u003cli>\u003ccode>src/providers/openrouter.ts\u003c/code> — \u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code>, disables reasoning tokens  \u003c/li>\u003cli>\u003ccode>src/providers/factory.ts\u003c/code> — \u003ccode>createProvider(config: AetherConfig)\u003c/code> → switches on provider name, instantiates appropriate provider  \u003c/li>\u003cli>\u003ccode>src/providers/retry.ts\u003c/code> — \u003ccode>chatWithRetry()\u003c/code>, \u003ccode>RetryOptions\u003c/code>, \u003ccode>isRateLimitError()\u003c/code>, \u003ccode>extractRetryDelay()\u003c/code>, \u003ccode>formatRetryLine()\u003c/code>, \u003ccode>createRetryLogger()\u003c/code>  \u003c/li>\u003cli>\u003ccode>src/providers/metered.ts\u003c/code> — \u003ccode>MeteredProvider\u003c/code> wrapper that tracks token usage and call counts  \u003c/li>\u003cli>\u003ccode>src/providers/index.ts\u003c/code> — Barrel export\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>Types: \u003ccode>LLMProvider\u003c/code>, \u003ccode>ChatMessage\u003c/code>, \u003ccode>ChatRequest\u003c/code>, \u003ccode>ChatResponse\u003c/code>, \u003ccode>StreamChunk\u003c/code>, \u003ccode>PingResult\u003c/code>  \u003c/li>\u003cli>\u003ccode>OpenAICompatibleProvider\u003c/code> class  \u003c/li>\u003cli>\u003ccode>AnthropicProvider\u003c/code> class  \u003c/li>\u003cli>\u003ccode>OpenRouterProvider\u003c/code> class  \u003c/li>\u003cli>\u003ccode>createProvider(config)\u003c/code> factory  \u003c/li>\u003cli>\u003ccode>MeteredProvider\u003c/code> class, \u003ccode>UsageTotals\u003c/code>  \u003c/li>\u003cli>Retry utilities: \u003ccode>chatWithRetry()\u003c/code>, \u003ccode>RetryOptions\u003c/code>, \u003ccode>formatRetryLine()\u003c/code>, \u003ccode>createRetryLogger()\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>../config/index.ts\u003c/code> → \u003ccode>AetherConfig\u003c/code>  \u003c/li>\u003cli>\u003ccode>../ui/theme.ts\u003c/code> → \u003ccode>DIM\u003c/code>, \u003ccode>WARN\u003c/code> (for retry logging)  \u003c/li>\u003cli>\u003ccode>node:fetch\u003c/code> (implied by provider implementations)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003col>\u003cli>\u003ccode>createProvider(config)\u003c/code> → returns provider instance based on \u003ccode>config.provider\u003c/code>  \u003c/li>\u003cli>Caller uses \u003ccode>provider.chat(request)\u003c/code> or \u003ccode>provider.chatStream(request)\u003c/code>  \u003c/li>\u003cli>For resilience, callers use \u003ccode>chatWithRetry(provider, request, options)\u003c/code> which handles retries, rate limits (429), exponential backoff, and optional logging via \u003ccode>onRetry\u003c/code> callback  \u003c/li>\u003cli>\u003ccode>MeteredProvider\u003c/code> wraps any provider to track token usage and call counts\u003c/li>\u003c/ol>\n\u003ch2 id=\"md-7-srcui-user-interface-components\">7. src/ui — User Interface Components\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Terminal UI: startup animation, interactive REPL with command dropdown, step runner with spinners, theme constants, cost display, confirmation prompts, and cancellation handling.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/ui/theme.ts\u003c/code> — Color constants: \u003ccode>ACCENT_HEX\u003c/code>, \u003ccode>ACCENT\u003c/code>, \u003ccode>ACCENT_BOLD\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code> (all \u003ccode>chalk\u003c/code> wrappers)  \u003c/li>\u003cli>\u003ccode>src/ui/animation.ts\u003c/code> — \u003ccode>playStartupAnimation()\u003c/code> (clears screen, animated logo, types &quot;⚡ aether&quot;), \u003ccode>printBanner()\u003c/code> (static fallback)  \u003c/li>\u003cli>\u003ccode>src/ui/prompt.ts\u003c/code> — \u003ccode>startChat()\u003c/code> → readline REPL with:  \u003cul>\u003cli>Tab completion for \u003ccode>/\u003c/code> commands via \u003ccode>registry.getAll()\u003c/code>  \u003c/li>\u003cli>Live dropdown on \u003ccode>/\u003c/code> prefix (ANSI cursor save/restore)  \u003c/li>\u003cli>\u003ccode>@\u003c/code> path mentions with inline dropdown (filters project dirs, respects excludes, shows files for \u003ccode>/cleancode\u003c/code>)  \u003c/li>\u003cli>Pattern-matched responses for \u003ccode>help\u003c/code>, \u003ccode>hello\u003c/code>, \u003ccode>genesis\u003c/code> keywords  \u003c/li>\u003cli>Rotating tips every 4 messages  \u003c/li>\u003cli>Reloads dirs/excludes after \u003ccode>/exclude\u003c/code> commands  \u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003ccode>src/ui/steps.ts\u003c/code> — \u003ccode>StepRunner\u003c/code> class for multi-step progress:  \u003cul>\u003cli>\u003ccode>addStep(label)\u003c/code>, \u003ccode>runStep(index, fn)\u003c/code>, \u003ccode>runPooled(limit, fn)\u003c/code> (concurrent with per-step spinners)  \u003c/li>\u003cli>\u003ccode>setWriting(index)\u003c/code>, \u003ccode>setDetail(index, detail)\u003c/code>, \u003ccode>finish(summary?)\u003c/code>, \u003ccode>error(message)\u003c/code>  \u003c/li>\u003cli>\u003ccode>LineSpinner\u003c/code> class for individual line spinners (braille frames)  \u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003ccode>src/ui/cost.ts\u003c/code> — \u003ccode>formatCost()\u003c/code>, \u003ccode>formatCostRange()\u003c/code>, \u003ccode>printCostEstimate()\u003c/code> for displaying token/cost estimates  \u003c/li>\u003cli>\u003ccode>src/ui/confirm.ts\u003c/code> — \u003ccode>confirm()\u003c/code> for yes/no prompts with keyboard navigation  \u003c/li>\u003cli>\u003ccode>src/ui/cancel.ts\u003c/code> — \u003ccode>CancellationToken\u003c/code> and \u003ccode>createCancellationToken()\u003c/code> for cooperative cancellation\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>playStartupAnimation()\u003c/code>, \u003ccode>printBanner()\u003c/code>  \u003c/li>\u003cli>\u003ccode>startChat()\u003c/code>  \u003c/li>\u003cli>\u003ccode>Step\u003c/code>, \u003ccode>StepRunner\u003c/code>, \u003ccode>LineSpinner\u003c/code>  \u003c/li>\u003cli>\u003ccode>formatCost()\u003c/code>, \u003ccode>formatCostRange()\u003c/code>, \u003ccode>printCostEstimate()\u003c/code>  \u003c/li>\u003cli>\u003ccode>confirm()\u003c/code>  \u003c/li>\u003cli>\u003ccode>CancellationToken\u003c/code>, \u003ccode>createCancellationToken()\u003c/code>  \u003c/li>\u003cli>Theme constants: \u003ccode>ACCENT\u003c/code>, \u003ccode>ACCENT_BOLD\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>chalk\u003c/code> (external)  \u003c/li>\u003cli>\u003ccode>node:readline\u003c/code> (prompt.ts)  \u003c/li>\u003cli>\u003ccode>../commands/registry.ts\u003c/code> → \u003ccode>registry\u003c/code>, \u003ccode>Command\u003c/code> (prompt.ts)  \u003c/li>\u003cli>\u003ccode>../genesis/exclude.ts\u003c/code> → \u003ccode>loadExcludes()\u003c/code> (prompt.ts)  \u003c/li>\u003cli>\u003ccode>../genesis/context.ts\u003c/code> → \u003ccode>collectDirectories()\u003c/code>, \u003ccode>collectSourceFiles()\u003c/code> (prompt.ts)  \u003c/li>\u003cli>Internal: \u003ccode>./theme.ts\u003c/code> used by all\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-8-srcutil-utility-functions\">8. src/util — Utility Functions\u003c/h2>\n\u003cp>\u003cstrong>Purpose\u003c/strong> Small, focused helpers used across the codebase.\u003c/p>\n\u003cp>\u003cstrong>Key Files\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>src/util/hash.ts\u003c/code> — \u003ccode>hashContent(content)\u003c/code> → normalizes CRLF→LF, returns SHA-256 hex  \u003c/li>\u003cli>\u003ccode>src/util/env.ts\u003c/code> — \u003ccode>envInt(name, fallback)\u003c/code> → parses positive int from env var with validation  \u003c/li>\u003cli>\u003ccode>src/util/tokens.ts\u003c/code> — \u003ccode>estimateTokens(chars)\u003c/code> → rough token estimate (chars/4)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Exports\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>hashContent(content: string): string\u003c/code>  \u003c/li>\u003cli>\u003ccode>envInt(name: string, fallback: number): number\u003c/code>  \u003c/li>\u003cli>\u003ccode>estimateTokens(chars: number): number\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Dependencies\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>node:crypto\u003c/code> (hash.ts)  \u003c/li>\u003cli>None (env.ts, tokens.ts)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Flow\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003ccode>hashContent()\u003c/code> used by \u003ccode>fingerprint.ts\u003c/code> for file fingerprints and \u003ccode>config/index.ts\u003c/code> for projectId  \u003c/li>\u003cli>\u003ccode>envInt()\u003c/code> used by \u003ccode>genesis/constants.ts\u003c/code> for all env-overridable limits  \u003c/li>\u003cli>\u003ccode>estimateTokens()\u003c/code> used by \u003ccode>genesis/estimate.ts\u003c/code> for cost estimation\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-dependency-map\">Dependency Map\u003c/h2>\n\u003cp>mermaid graph TD CLI[src/cli/index.ts] --&gt; UI_ANIM[src/ui/animation.ts] CLI --&gt; UI_PROMPT[src/ui/prompt.ts] CLI --&gt; CMD_HELP[src/commands/help.ts] CLI --&gt; CMD_BUILTIN[src/commands/builtins.ts] CLI --&gt; CMD_CONFIG[src/commands/config.ts] CLI --&gt; CMD_CLEAN[src/commands/clean.ts] CLI --&gt; CMD_CLEANCODE[src/commands/cleancode.ts] CLI --&gt; CMD_EXCLUDE[src/commands/exclude.ts] CLI --&gt; CMD_PROMPT[src/commands/prompt.ts]\u003c/p>\n\u003cp>CMD_HELP --&gt; REG[src/commands/registry.ts] CMD_BUILTIN --&gt; REG CMD_CONFIG --&gt; REG CMD_CLEAN --&gt; REG CMD_CLEANCODE --&gt; REG CMD_EXCLUDE --&gt; REG CMD_PROMPT --&gt; REG\u003c/p>\n\u003cp>CMD_CONFIG --&gt; CONFIG[src/config/index.ts] CMD_CONFIG --&gt; THEME[src/ui/theme.ts] CMD_CLEAN --&gt; CONFIG CMD_CLEANCODE --&gt; CONFIG CMD_CLEANCODE --&gt; GEN_CLEANCODE[src/genesis/cleancode.ts] CMD_CLEANCODE --&gt; PRICING[src/pricing/index.ts] CMD_CLEANCODE --&gt; PROV_FACTORY[src/providers/factory.ts] CMD_CLEANCODE --&gt; PROV_RETRY[src/providers/retry.ts] CMD_CLEANCODE --&gt; GEN_CONTEXT[src/genesis/context.ts] CMD_CLEANCODE --&gt; GEN_ESTIMATE[src/genesis/estimate.ts]\u003c/p>\n\u003cp>REG --&gt; CMD_HELP REG --&gt; CMD_BUILTIN REG --&gt; CMD_CONFIG REG --&gt; CMD_CLEAN REG --&gt; CMD_CLEANCODE REG --&gt; CMD_EXCLUDE REG --&gt; CMD_PROMPT\u003c/p>\n\u003cp>UI_PROMPT --&gt; REG UI_PROMPT --&gt; THEME UI_PROMPT --&gt; GEN_EXCLUDE[src/genesis/exclude.ts] UI_PROMPT --&gt; GEN_CONTEXT\u003c/p>\n\u003cp>UI_ANIM --&gt; THEME UI_STEPS[src/ui/steps.ts] --&gt; THEME UI_COST[src/ui/cost.ts] --&gt; THEME UI_CONFIRM[src/ui/confirm.ts] --&gt; THEME UI_CANCEL[src/ui/cancel.ts] --&gt; THEME\u003c/p>\n\u003cp>GENESIS_CTX[src/genesis/context.ts] --&gt; GENESIS_TYPES[src/genesis/types.ts] GENESIS_DIGEST[src/genesis/digest.ts] --&gt; GENESIS_TYPES GENESIS_DIGEST --&gt; GENESIS_CONST[src/genesis/constants.ts] GENESIS_FP[src/genesis/fingerprint.ts] --&gt; GENESIS_TYPES GENESIS_FP --&gt; UTIL_HASH[src/util/hash.ts] GENESIS_SCOPE[src/genesis/scope.ts] --&gt; GENESIS_TYPES GENESIS_SCOPE --&gt; CONFIG GENESIS_SCOPE --&gt; PROV_TYPES[src/providers/types.ts] GENESIS_SCOPE --&gt; GENESIS_DISTILL[src/genesis/distill.ts] GENESIS_SCOPE --&gt; GENESIS_CONST GENESIS_DISTILL --&gt; PROV_TYPES GENESIS_DISTILL --&gt; PROV_RETRY GENESIS_PLANNER[src/genesis/planner.ts] --&gt; GENESIS_TYPES GENESIS_PLANNER --&gt; PROV_TYPES GENESIS_PLANNER --&gt; PROV_RETRY GENESIS_PLANNER --&gt; PROMPTS[src/prompts/index.ts] GENESIS_DOCS[src/genesis/docs.ts] --&gt; GENESIS_TYPES GENESIS_DOCS --&gt; PROMPTS GENESIS_SYNC[src/genesis/sync.ts] --&gt; GENESIS_TYPES GENESIS_ESTIMATE[src/genesis/estimate.ts] --&gt; GENESIS_TYPES GENESIS_ESTIMATE --&gt; PROV_TYPES GENESIS_ESTIMATE --&gt; PRICING GENESIS_ESTIMATE --&gt; UTIL_TOKENS[src/util/tokens.ts] GENESIS_CLEANCODE[src/genesis/cleancode.ts] --&gt; GENESIS_TYPES GENESIS_CLEANCODE --&gt; PROV_TYPES GENESIS_CLEANCODE --&gt; PROV_RETRY GENESIS_CLEANCODE --&gt; PROMPTS GENESIS_CLEANCODE_HEURISTICS[src/genesis/cleancode-heuristics.ts] --&gt; GENESIS_TYPES GENESIS_CLEANCODE_HEURISTICS --&gt; GENESIS_CONST\u003c/p>\n\u003cp>PROV_FACTORY --&gt; CONFIG PROV_FACTORY --&gt; PROV_TYPES PROV_FACTORY --&gt; PROV_OAI[src/providers/openai-compatible.ts] PROV_FACTORY --&gt; PROV_ANTHROPIC[src/providers/anthropic.ts] PROV_FACTORY --&gt; PROV_OPENROUTER[src/providers/openrouter.ts]\u003c/p>\n\u003cp>PROV_RETRY --&gt; PROV_TYPES PROV_RETRY --&gt; THEME PROV_METERED[src/providers/metered.ts] --&gt; PROV_TYPES\u003c/p>\n\u003cp>CONFIG --&gt; UTIL_HASH CONFIG --&gt; UTIL_ENV[src/util/env.ts] GENESIS_CONST --&gt; UTIL_ENV\u003c/p>\n\u003cp>CMD_BUILTIN --&gt; GENESIS_PIPELINE[genesis pipeline]\u003c/p>\n\u003ch2 id=\"md-summary-of-module-relationships\">Summary of Module Relationships\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Module\u003c/th>\u003cth>Primary Consumers\u003c/th>\u003cth>Key Exports\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>src/cli\u003c/code>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> bin entry\u003c/td>\u003ctd>\u003ccode>main()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/commands\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/cli\u003c/code>, \u003ccode>src/ui/prompt\u003c/code>\u003c/td>\u003ctd>\u003ccode>registry\u003c/code>, command registrars\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/config\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/commands/config\u003c/code>, \u003ccode>src/commands/clean\u003c/code>, \u003ccode>src/commands/cleancode\u003c/code>, \u003ccode>src/genesis/scope\u003c/code>, \u003ccode>src/providers/factory\u003c/code>\u003c/td>\u003ctd>\u003ccode>loadConfig\u003c/code>, \u003ccode>saveConfig\u003c/code>, \u003ccode>validateConfig\u003c/code>, \u003ccode>getProjectCacheDir\u003c/code>, \u003ccode>AetherConfig\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/commands/builtins\u003c/code> (via genesis pipeline), \u003ccode>src/commands/cleancode\u003c/code>, \u003ccode>src/commands/prompt\u003c/code>\u003c/td>\u003ctd>Types, pipeline functions, \u003ccode>DOC_DEFINITIONS\u003c/code>, clean-code functions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/prompts\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/planner\u003c/code>, \u003ccode>src/genesis/docs\u003c/code>, \u003ccode>src/genesis/sync\u003c/code>, \u003ccode>src/genesis/cleancode\u003c/code>, \u003ccode>src/commands/prompt\u003c/code>\u003c/td>\u003ctd>All prompt templates\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/providers\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope\u003c/code>, \u003ccode>src/genesis/distill\u003c/code>, \u003ccode>src/genesis/planner\u003c/code>, \u003ccode>src/genesis/cleancode\u003c/code>, \u003ccode>src/providers/retry\u003c/code>, \u003ccode>src/commands/cleancode\u003c/code>\u003c/td>\u003ctd>\u003ccode>LLMProvider\u003c/code>, \u003ccode>createProvider\u003c/code>, \u003ccode>chatWithRetry\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/cli\u003c/code>, \u003ccode>src/commands\u003c/code>, \u003ccode>src/genesis\u003c/code> (via StepRunner)\u003c/td>\u003ctd>\u003ccode>startChat\u003c/code>, \u003ccode>StepRunner\u003c/code>, theme constants\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/util\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/config\u003c/code>, \u003ccode>src/genesis/fingerprint\u003c/code>, \u003ccode>src/genesis/constants\u003c/code>, \u003ccode>src/genesis/estimate\u003c/code>\u003c/td>\u003ctd>\u003ccode>hashContent\u003c/code>, \u003ccode>envInt\u003c/code>, \u003ccode>estimateTokens\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/pricing\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/estimate\u003c/code>, \u003ccode>src/commands/cleancode\u003c/code>\u003c/td>\u003ctd>\u003ccode>getModelPricing\u003c/code>, \u003ccode>ModelPricing\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/cost\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/estimate\u003c/code>, \u003ccode>src/commands/builtins\u003c/code>, \u003ccode>src/commands/cleancode\u003c/code>\u003c/td>\u003ctd>\u003ccode>formatCost\u003c/code>, \u003ccode>formatCostRange\u003c/code>, \u003ccode>printCostEstimate\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/confirm\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/commands/builtins\u003c/code>, \u003ccode>src/commands/cleancode\u003c/code>\u003c/td>\u003ctd>\u003ccode>confirm\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/cancel\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope\u003c/code>, \u003ccode>src/genesis/distill\u003c/code>, \u003ccode>src/genesis/planner\u003c/code>, \u003ccode>src/genesis/cleancode\u003c/code>\u003c/td>\u003ctd>\u003ccode>CancellationToken\u003c/code>, \u003ccode>createCancellationToken\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","text":"Modules Overview 1. src/cli — CLI Entry Point Purpose Entry point for the aether CLI. Handles version flags, command registration, interactive detection, startup animation, and launches the interactive chat loop. Key Files src/cli/index.ts — main() async entry point; registers commands in order (help, builtins, config, clean, cleancode, exclude, prompt); detects TTY; plays startup animation or prints banner; calls startChat() . Exports main() — async entry point (called via bin entry in package.json ) Dependencies ../ui/animation.ts → playStartupAnimation() , printBanner() ../ui/prompt.ts → startChat() ../commands/help.ts → registerHelpCommand() ../commands/builtins.ts → registerBuiltinCommands() ../commands/config.ts → registerConfigCommand() ../commands/clean.ts → registerCleanCommand() ../commands/cleancode.ts → registerCleanCodeCommand() ../commands/exclude.ts → registerExcludeCommand() ../commands/prompt.ts → registerPromptCommand() Flow Parse --version / -v → print version and exit Register all commands via registry Detect TTY ( process.stdin.isTTY ) If TTY and not --no-animation → playStartupAnimation() else printBanner() Call startChat() → enters interactive REPL loop Catch errors → stderr + exit(1) 2. src/commands — Command Implementations & Registry Purpose Implements all slash-commands ( /help , /config , /clean , /cleancode , /exclude , /prompt , /genesis via builtins) and provides the command registry for dispatch. Key Files src/commands/registry.ts — CommandRegistry class (Map-based), Command interface, registry singleton, execute(input) parser src/commands/help.ts — registerHelpCommand() → lists all registered commands with descriptions/usage src/commands/config.ts — registerConfigCommand() → /config [--provider|--model|--url|--key] + subcommands ( show , set , quick-setup ) src/commands/clean.ts — registerCleanCommand() → /clean (removes .aether/ cache) src/commands/cleancode.ts — registerCleanCodeCommand() → /cleancode review [path|file] [--yes|-y] , /cleancode ignore [pattern] , /cleancode paradigm [name] src/commands/exclude.ts — registerExcludeCommand() → /exclude \u003cpath> (or @ in prompt to pick) + list , remove / rm subcommands; manages .aether/settings/exclude.json src/commands/prompt.ts — registerPromptCommand() → /prompt \u003cintent> (optimizes a developer task into an AI-ready prompt) src/commands/builtins.ts — registerBuiltinCommands() → registers /genesis (delegates to genesis pipeline) Exports registry (singleton CommandRegistry ) registerHelpCommand() , registerBuiltinCommands() , registerConfigCommand() , registerCleanCommand() , registerCleanCodeCommand() , registerExcludeCommand() , registerPromptCommand() Dependencies ../config/index.ts → loadConfig() , saveConfig() , validateConfig() , getDefaultConfig() , maskKey() ../config/types.ts → AetherConfig ../ui/theme.ts → ACCENT , DIM , SUCCESS , WARN , ERROR ../genesis/exclude.ts → loadExcludes() , addExclude() , removeExclude() ../genesis/cleancode.ts → scanCleanCodeHeuristics() , scanCleanCodeHybrid() , estimateCleanCode() , buildCleanCodeReport() , buildCleanCodeMarkdown() , writeCleanCodeMarkdown() , cleanCodeMarkdownRelPath() , loadCleanCodeIgnore() , addCleanCodeIgnorePattern() , loadCleanCodeParadigm() , setCleanCodeParadigm() , flaggedFiles() , filterIgnored() ../pricing/index.ts → getModelPricing() ../providers/factory.ts → createProvider() ../providers/retry.ts → chatWithRetry() , formatRetryLine() , PingResult ../config/index.ts → getGlobalDir() , getGlobalConfigPath() chalk (external) Flow CLI calls register*Command() during startup → populates registry Map User types /command args in chat → registry.execute(input) parses /name args → calls handler(args) Handlers use config API, chalk/theme for output, and genesis pipeline (for /genesis , /cleancode , /prompt ) or exclude API (for /exclude ) 3. src/config — Configuration Management Purpose Manages global and per-project configuration: provider, model, baseUrl, apiKey, timeouts. Handles precedence (project > global default > env), validation, scaffolding .aether/README.md . Key Files src/config/types.ts — AetherConfig interface ( provider , model , baseUrl , apiKey? , timeout? ) src/config/index.ts — Core logic: DEFAULT_CONFIGS , PROVIDER_HOSTS , detectProviderFromBaseUrl() , getGlobalDir() , getGlobalConfigPath() , projectId() , getProjectCacheDir() , loadConfig() , saveConfig() , validateConfig() src/config/scaffold.ts — ensureProjectReadme(rootDir) writes .aether/README.md from AETHER_README src/config/readme.ts — AETHER_README markdown constant documenting .aether/ structure Exports AetherConfig type DEFAULT_CONFIGS , PROVIDER_HOSTS getDefaultConfig(provider) , detectProviderFromBaseUrl(url) getGlobalDir() , getGlobalConfigPath() , projectId(rootDir) , getProjectCacheDir(rootDir) loadConfig(rootDir) , saveConfig(rootDir, config) , validateConfig(config) ensureProjectReadme(rootDir) AETHER_README Dependencies node:fs/promises , node:fs , node:path , node:os (homedir) ../util/hash.ts → hashContent() (for projectId) ../util/env.ts → envInt() (not directly used here but in constants) Flow loadConfig(rootDir) reads: global config ( ~/.aether/config.json ) → project override ( .aether/config.json or .aether/settings/config.json ) → AETHER_API_KEY env Precedence: project override > global default > env saveConfig() writes to global file; first config becomes default , subsequent per-project under projects[projectId] validateConfig() enforces required fields and valid provider enum ensureProjectReadme() scaffolds .aether/README.md on first genesis 4. src/genesis — Core Analysis & Documentation Pipeline Purpose Core \"genesis\" pipeline: scans a project, builds context, fingerprints files, plans documentation, distills large codebases, generates documentation via LLM, manages snapshots for sync, and performs clean-code reviews. Key Files src/genesis/types.ts — Core types: ProjectContext , FileFingerprint , GitInfo , DistillCache , DocDefinition , DocSection , Snapshot , FileDiff , SyncPlan , SectionPatch , CleanCodeIssue , CleanCodeReport , CleanCodeIgnoreList , CleanCodeParadigm src/genesis/constants.ts — Env-overridable limits: MAX_FILE_SIZE , MAX_TOTAL_CHARS , MAX_FILES_WALKED , MAX_WALK_DEPTH , DOC_CONTEXT_BUDGET , GEN_CONCURRENCY , DISTILL_CONCURRENCY , CLEANCODE_CONTEXT_BUDGET src/genesis/context.ts — builds ProjectContext from filesystem scan; respects exclude patterns from .aether/settings/exclude.json src/genesis/digest.ts — buildPlannerDigest(context) → compact summary for planner; detectSignals() , extractSymbols() src/genesis/fingerprint.ts — buildFingerprint(context) , getGitInfo(rootDir) , getGitLog(rootDir, sinceCommit) src/genesis/scope.ts — buildSharedProjectContext(context, provider, model, hooks?) → builds shared context prompt; distills if over DOC_CONTEXT_BUDGET using incremental cache src/genesis/distill.ts — distillFilesIncremental(files, provider, model, budget, prevCache, hooks) → incremental LLM-based distillation with caching src/genesis/planner.ts — planDocs(contextPrompt, provider, model, options?) → LLM plans which docs to generate; parsePlan() , extractJsonArray() src/genesis/docs.ts — DOC_DEFINITIONS (13 built-in docs), buildDocPrompt() , buildDocUpdatePrompt() , buildSectionPatchPrompt() , buildCustomDocDefinition() , buildDocsIndex() , SECTION_ORDER src/genesis/sync.ts — sync planning/diffing src/genesis/estimate.ts — estimateGenesis() , estimateSync() , estimateCleanCode() → cost estimation for genesis/sync/cleancode operations src/genesis/exclude.ts — loadExcludes(rootDir) , addExclude(rootDir, path) , removeExclude(rootDir, path) ; manages .aether/settings/exclude.json src/genesis/cleancode-heuristics.ts — scanCleanCodeHeuristics(context, paradigm) → static analysis for clean-code violations src/genesis/cleancode.ts — scanCleanCodeHybrid(context, provider, model, paradigm, hooks?) , estimateCleanCode(context, model, provider) , buildCleanCodeReport() , buildCleanCodeMarkdown() , writeCleanCodeMarkdown() , cleanCodeMarkdownRelPath() , loadCleanCodeIgnore() , addCleanCodeIgnorePattern() , loadCleanCodeParadigm() , setCleanCodeParadigm() , flaggedFiles() , filterIgnored() Exports Types: ProjectContext , FileContent , FileFingerprint , GitInfo , DistillCache , DistillHooks , DocSection , DocDefinition , CustomDocSpec , DocIndexEntry , DocMeta , Snapshot , FileDiff , SyncPlan , SectionPatch , CleanCodeIssue , CleanCodeReport , CleanCodeIgnoreList , CleanCodeParadigm Constants: MAX_FILE_SIZE , MAX_TOTAL_CHARS , MAX_FILES_WALKED , MAX_WALK_DEPTH , DOC_CONTEXT_BUDGET , GEN_CONCURRENCY , DISTILL_CONCURRENCY , CLEANCODE_CONTEXT_BUDGET Functions: buildPlannerDigest() , detectSignals() , extractSymbols() , buildFingerprint() , getGitInfo() , getGitLog() , buildSharedProjectContext() , distillFilesIncremental() , planDocs() , parsePlan() , buildDocPrompt() , buildDocUpdatePrompt() , buildSectionPatchPrompt() , buildCustomDocDefinition() , buildDocsIndex() , DOC_DEFINITIONS , SECTION_ORDER , estimateGenesis() , estimateSync() , estimateCleanCode() , loadExcludes() , addExclude() , removeExclude() , scanCleanCodeHeuristics() , scanCleanCodeHybrid() , estimateCleanCode() , buildCleanCodeReport() , buildCleanCodeMarkdown() , writeCleanCodeMarkdown() , cleanCodeMarkdownRelPath() , loadCleanCodeIgnore() , addCleanCodeIgnorePattern() , loadCleanCodeParadigm() , setCleanCodeParadigm() , flaggedFiles() , filterIgnored() Dependencies ../providers/types.ts → LLMProvider , ChatRequest , ChatResponse ../providers/retry.ts → chatWithRetry() , RetryOptions ../config/index.ts → getProjectCacheDir() , AetherConfig ../prompts/index.ts → all prompt templates ../util/hash.ts → hashContent() ../util/env.ts → envInt() ../util/tokens.ts → estimateTokens() ../pricing/index.ts → getModelPricing() , ModelPricing node:fs/promises , node:fs , node:path , node:crypto , node:child_process (execFileSync) Flow Scan ( context.ts ) → builds ProjectContext (files, tree, config, entry points); respects exclude patterns from .aether/settings/exclude.json Digest ( digest.ts ) → buildPlannerDigest() creates compact summary for planner Plan ( planner.ts ) → planDocs() sends digest to LLM → returns planned DocDefinition[] (built-in + custom) Scope ( scope.ts ) → buildSharedProjectContext() builds shared context; if over budget, distillFilesIncremental() compresses source files via LLM with incremental caching Generate ( docs.ts ) → for each DocDefinition , buildDocPrompt() creates prompt → sent to LLM → output written to .aether/docs/ Fingerprint ( fingerprint.ts ) → buildFingerprint() hashes all tracked files; getGitInfo() captures git state Snapshot → writes .aether/snapshot.json with fingerprints, git info, generated docs metadata Sync ( sync.ts ) → on re-run, diffs fingerprints → SyncPlan (regenerate/add) → partial updates via buildSectionPatchPrompt() Estimate ( estimate.ts ) → estimateGenesis() / estimateSync() / estimateCleanCode() estimate token usage and cost before execution Exclude ( exclude.ts ) → manages .aether/settings/exclude.json for paths to skip during scan Clean Code ( cleancode-heuristics.ts , cleancode.ts ) → heuristic scan → optional hybrid AI review → markdown report at .aether/cleancode-report.md 5. src/prompts — Prompt Templates Purpose Centralized prompt templates for all LLM interactions: base prompts, per-document prompts, and pipeline prompts (planner, sync, cleancode, optimize). Key Files src/prompts/base.ts — BASE_PROMPT , PROMPT_SUFFIX , HUMAN_BASE_PROMPT , HUMAN_PROMPT_SUFFIX src/prompts/docs/*.ts — 13 document-specific prompts: getting-started.ts → GETTING_STARTED_PROMPT onboarding.ts → ONBOARDING_PROMPT contributing.ts → CONTRIBUTING_PROMPT system-overview.ts → SYSTEM_OVERVIEW_PROMPT folder-structure.ts → FOLDER_STRUCTURE_PROMPT tech-stack.ts → TECH_STACK_PROMPT coding-standards.ts → CODING_STANDARDS_PROMPT modules.ts → MODULES_PROMPT api.ts → API_PROMPT business.ts → BUSINESS_RULES_PROMPT diagrams.ts → DIAGRAMS_PROMPT ai-context.ts → AI_CONTEXT_PROMPT glossary.ts → GLOSSARY_PROMPT custom-doc.ts → buildCustomDocPrompt(title, focus) src/prompts/pipeline/planner.ts → PLANNER_PROMPT src/prompts/pipeline/sync.ts → SYNC_PLANNER_PROMPT , DOC_UPDATE_INSTRUCTIONS , SECTION_PATCH_INSTRUCTIONS src/prompts/pipeline/cleancode.ts → PARADIGMS , DEFAULT_PARADIGM , paradigmLabel() , listParadigms() , paradigmFocus() , buildCleanCodeScanPrompt() src/prompts/pipeline/optimize.ts → OPTIMIZE_PROMPT , buildOptimizePrompt() src/prompts/index.ts — Barrel export of all above Exports All prompt constants and buildCustomDocPrompt , paradigmLabel , listParadigms , paradigmFocus , buildCleanCodeScanPrompt , buildOptimizePrompt functions Dependencies None (pure string constants) Flow genesis/docs.ts imports prompts → passes to buildDocPrompt() with context genesis/planner.ts uses PLANNER_PROMPT + BASE_PROMPT + context + PROMPT_SUFFIX genesis/sync.ts uses SYNC_PLANNER_PROMPT , DOC_UPDATE_INSTRUCTIONS , SECTION_PATCH_INSTRUCTIONS genesis/cleancode.ts uses buildCleanCodeScanPrompt() with selected paradigm commands/prompt.ts uses buildOptimizePrompt() for /prompt command Human-facing docs (Guides) use HUMAN_BASE_PROMPT / HUMAN_PROMPT_SUFFIX ; others use machine prompts 6. src/providers — LLM Provider Abstraction Purpose Abstracts LLM providers behind a common interface. Implements OpenAICompatibleProvider (used for OpenAI, Gemini, Anthropic, OpenRouter) and AnthropicProvider (Anthropic native format). Includes retry logic with exponential backoff and rate-limit handling. Key Files src/providers/types.ts — Interfaces: ChatMessage , ChatRequest , ChatResponse , StreamChunk , PingResult , LLMProvider src/providers/openai-compatible.ts — OpenAICompatibleProvider class implementing LLMProvider (chat, chatStream, ping) src/providers/anthropic.ts — AnthropicProvider class implementing LLMProvider with Anthropic native API format src/providers/openrouter.ts — OpenRouterProvider extends OpenAICompatibleProvider , disables reasoning tokens src/providers/factory.ts — createProvider(config: AetherConfig) → switches on provider name, instantiates appropriate provider src/providers/retry.ts — chatWithRetry() , RetryOptions , isRateLimitError() , extractRetryDelay() , formatRetryLine() , createRetryLogger() src/providers/metered.ts — MeteredProvider wrapper that tracks token usage and call counts src/providers/index.ts — Barrel export Exports Types: LLMProvider , ChatMessage , ChatRequest , ChatResponse , StreamChunk , PingResult OpenAICompatibleProvider class AnthropicProvider class OpenRouterProvider class createProvider(config) factory MeteredProvider class, UsageTotals Retry utilities: chatWithRetry() , RetryOptions , formatRetryLine() , createRetryLogger() Dependencies ../config/index.ts → AetherConfig ../ui/theme.ts → DIM , WARN (for retry logging) node:fetch (implied by provider implementations) Flow createProvider(config) → returns provider instance based on config.provider Caller uses provider.chat(request) or provider.chatStream(request) For resilience, callers use chatWithRetry(provider, request, options) which handles retries, rate limits (429), exponential backoff, and optional logging via onRetry callback MeteredProvider wraps any provider to track token usage and call counts 7. src/ui — User Interface Components Purpose Terminal UI: startup animation, interactive REPL with command dropdown, step runner with spinners, theme constants, cost display, confirmation prompts, and cancellation handling. Key Files src/ui/theme.ts — Color constants: ACCENT_HEX , ACCENT , ACCENT_BOLD , DIM , SUCCESS , WARN , ERROR (all chalk wrappers) src/ui/animation.ts — playStartupAnimation() (clears screen, animated logo, types \"⚡ aether\"), printBanner() (static fallback) src/ui/prompt.ts — startChat() → readline REPL with: Tab completion for / commands via registry.getAll() Live dropdown on / prefix (ANSI cursor save/restore) @ path mentions with inline dropdown (filters project dirs, respects excludes, shows files for /cleancode ) Pattern-matched responses for help , hello , genesis keywords Rotating tips every 4 messages Reloads dirs/excludes after /exclude commands src/ui/steps.ts — StepRunner class for multi-step progress: addStep(label) , runStep(index, fn) , runPooled(limit, fn) (concurrent with per-step spinners) setWriting(index) , setDetail(index, detail) , finish(summary?) , error(message) LineSpinner class for individual line spinners (braille frames) src/ui/cost.ts — formatCost() , formatCostRange() , printCostEstimate() for displaying token/cost estimates src/ui/confirm.ts — confirm() for yes/no prompts with keyboard navigation src/ui/cancel.ts — CancellationToken and createCancellationToken() for cooperative cancellation Exports playStartupAnimation() , printBanner() startChat() Step , StepRunner , LineSpinner formatCost() , formatCostRange() , printCostEstimate() confirm() CancellationToken , createCancellationToken() Theme constants: ACCENT , ACCENT_BOLD , DIM , SUCCESS , WARN , ERROR Dependencies chalk (external) node:readline (prompt.ts) ../commands/registry.ts → registry , Command (prompt.ts) ../genesis/exclude.ts → loadExcludes() (prompt.ts) ../genesis/context.ts → collectDirectories() , collectSourceFiles() (prompt.ts) Internal: ./theme.ts used by all 8. src/util — Utility Functions Purpose Small, focused helpers used across the codebase. Key Files src/util/hash.ts — hashContent(content) → normalizes CRLF→LF, returns SHA-256 hex src/util/env.ts — envInt(name, fallback) → parses positive int from env var with validation src/util/tokens.ts — estimateTokens(chars) → rough token estimate (chars/4) Exports hashContent(content: string): string envInt(name: string, fallback: number): number estimateTokens(chars: number): number Dependencies node:crypto (hash.ts) None (env.ts, tokens.ts) Flow hashContent() used by fingerprint.ts for file fingerprints and config/index.ts for projectId envInt() used by genesis/constants.ts for all env-overridable limits estimateTokens() used by genesis/estimate.ts for cost estimation Dependency Map mermaid graph TD CLI[src/cli/index.ts] --> UI_ANIM[src/ui/animation.ts] CLI --> UI_PROMPT[src/ui/prompt.ts] CLI --> CMD_HELP[src/commands/help.ts] CLI --> CMD_BUILTIN[src/commands/builtins.ts] CLI --> CMD_CONFIG[src/commands/config.ts] CLI --> CMD_CLEAN[src/commands/clean.ts] CLI --> CMD_CLEANCODE[src/commands/cleancode.ts] CLI --> CMD_EXCLUDE[src/commands/exclude.ts] CLI --> CMD_PROMPT[src/commands/prompt.ts] CMD_HELP --> REG[src/commands/registry.ts] CMD_BUILTIN --> REG CMD_CONFIG --> REG CMD_CLEAN --> REG CMD_CLEANCODE --> REG CMD_EXCLUDE --> REG CMD_PROMPT --> REG CMD_CONFIG --> CONFIG[src/config/index.ts] CMD_CONFIG --> THEME[src/ui/theme.ts] CMD_CLEAN --> CONFIG CMD_CLEANCODE --> CONFIG CMD_CLEANCODE --  GENESIS_TYPES GENESIS_CLEANCODE_HEURISTICS --> GENESIS_CONST PROV_FACTORY --> CONFIG PROV_FACTORY --> PROV_TYPES PROV_FACTORY --> PROV_OAI[src/providers/openai-compatible.ts] PROV_FACTORY --> PROV_ANTHROPIC[src/providers/anthropic.ts] PROV_FACTORY --> PROV_OPENROUTER[src/providers/openrouter.ts] PROV_RETRY --> PROV_TYPES PROV_RETRY --> THEME PROV_METERED[src/providers/metered.ts] --> PROV_TYPES CONFIG --> UTIL_HASH CONFIG --> UTIL_ENV[src/util/env.ts] GENESIS_CONST --> UTIL_ENV CMD_BUILTIN --> GENESIS_PIPELINE[genesis pipeline] Summary of Module Relationships Module Primary Consumers Key Exports src/cli package.json bin entry main() src/commands src/cli , src/ui/prompt registry , command registrars src/config src/commands/config , src/commands/clean , src/commands/cleancode , src/genesis/scope , src/providers/factory loadConfig , saveConfig , validateConfig , getProjectCacheDir , AetherConfig src/genesis src/commands/builtins (via genesis pipeline), src/commands/cleancode , src/commands/prompt Types, pipeline functions, DOC_DEFINITIONS , clean-code functions src/prompts src/genesis/planner , src/genesis/docs , src/genesis/sync , src/genesis/cleancode , src/commands/prompt All prompt templates src/providers src/genesis/scope , src/genesis/distill , src/genesis/planner , src/genesis/cleancode , src/providers/retry , src/commands/cleancode LLMProvider , createProvider , chatWithRetry src/ui src/cli , src/commands , src/genesis (via StepRunner) startChat , StepRunner , theme constants src/util src/config , src/genesis/fingerprint , src/genesis/constants , src/genesis/estimate hashContent , envInt , estimateTokens src/pricing src/genesis/estimate , src/commands/cleancode getModelPricing , ModelPricing src/ui/cost src/genesis/estimate , src/commands/builtins , src/commands/cleancode formatCost , formatCostRange , printCostEstimate src/ui/confirm src/commands/builtins , src/commands/cleancode confirm src/ui/cancel src/genesis/scope , src/genesis/distill , src/genesis/planner , src/genesis/cleancode CancellationToken , createCancellationToken"},{"id":"architecture/coding-standards","title":"Coding Standards","section":"Reference","summary":"Code patterns and conventions used across the project.","html":"\u003ch1 id=\"md-coding-standards-aether\">Coding Standards — Aether\u003c/h1>\n\u003cp>This document codifies the patterns observed in the Aether codebase. Every rule below is verifiable from the provided source files. Do not extrapolate beyond what is shown.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-1-code-style\">1. Code Style\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Rule\u003c/th>\u003cth>Evidence\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Language\u003c/strong>: TypeScript with \u003ccode>&quot;strict&quot;: true\u003c/code>\u003c/td>\u003ctd>\u003ccode>tsconfig.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Target\u003c/strong>: ES2022, NodeNext modules\u003c/td>\u003ctd>\u003ccode>tsconfig.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Module system\u003c/strong>: ES modules (\u003ccode>&quot;type&quot;: &quot;module&quot;\u003c/code> in \u003ccode>package.json\u003c/code>)\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Imports\u003c/strong>: Relative imports \u003cstrong>must\u003c/strong> include \u003ccode>.js\u003c/code> extension\u003c/td>\u003ctd>All source files (e.g., \u003ccode>from '../ui/animation.js'\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node built-ins\u003c/strong>: Use \u003ccode>node:\u003c/code> prefix\u003c/td>\u003ctd>\u003ccode>node:fs/promises\u003c/code>, \u003ccode>node:child_process\u003c/code>, \u003ccode>node:crypto\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exports\u003c/strong>: Named exports only; barrel \u003ccode>index.ts\u003c/code> files re-export\u003c/td>\u003ctd>Every \u003ccode>src/*/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No default exports\u003c/strong>\u003c/td>\u003ctd>Not observed in any provided file\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No \u003ccode>any\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>tsconfig.json\u003c/code> has \u003ccode>&quot;strict&quot;: true\u003c/code>; no \u003ccode>any\u003c/code> in provided code\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Semicolons\u003c/strong>: Used consistently\u003c/td>\u003ctd>All provided \u003ccode>.ts\u003c/code> files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Quotes\u003c/strong>: Single quotes for strings\u003c/td>\u003ctd>All provided \u003ccode>.ts\u003c/code> files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Indentation\u003c/strong>: 2 spaces (inferred)\u003c/td>\u003ctd>Consistent across files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Trailing commas\u003c/strong>: Used in multiline objects/arrays\u003c/td>\u003ctd>Observed in \u003ccode>package.json\u003c/code>, \u003ccode>tsconfig.json\u003c/code>, source objects\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>File extension for ES modules\u003c/strong>: \u003ccode>.mjs\u003c/code> used for build scripts\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>ESM import of JSON\u003c/strong>: \u003ccode>import ... assert { type: 'json' }\u003c/code>\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code> imports \u003ccode>sea-config.json\u003c/code> and \u003ccode>package.json\u003c/code> with \u003ccode>assert { type: 'json' }\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Regex literals\u003c/strong>\u003c/td>\u003ctd>Used in \u003ccode>src/genesis/digest.ts\u003c/code> (\u003ccode>ROUTE_RE\u003c/code>, \u003ccode>DOMAIN_RE\u003c/code>, \u003ccode>TEST_RE\u003c/code>, \u003ccode>SYMBOL_RE\u003c/code>), \u003ccode>src/genesis/exclude.ts\u003c/code>, \u003ccode>src/genesis/sync.ts\u003c/code> (\u003ccode>H2_RE\u003c/code>), \u003ccode>src/ui/prompt.ts\u003c/code> (\u003ccode>REMOVE_RE\u003c/code>, \u003ccode>CLEANCODE_RE\u003c/code>), \u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> (\u003ccode>LONG_FUNCTION_RE\u003c/code>, \u003ccode>DEEP_NESTING_RE\u003c/code>, \u003ccode>MAGIC_NUMBER_RE\u003c/code>, \u003ccode>NAMING_RE\u003c/code>, \u003ccode>DUPLICATION_RE\u003c/code>, \u003ccode>DEAD_CODE_RE\u003c/code>, \u003ccode>ERROR_HANDLING_RE\u003c/code>, \u003ccode>COMPLEXITY_RE\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Async generators\u003c/strong>\u003c/td>\u003ctd>\u003ccode>chatStream\u003c/code> in \u003ccode>src/providers/types.ts\u003c/code>, \u003ccode>OpenAICompatibleProvider\u003c/code>, \u003ccode>AnthropicProvider\u003c/code>; \u003ccode>distillFilesIncremental\u003c/code> in \u003ccode>src/genesis/distill.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Async iterators\u003c/strong>\u003c/td>\u003ctd>\u003ccode>for await (const chunk of ...)\u003c/code> in \u003ccode>src/providers/openai-compatible.ts\u003c/code>, \u003ccode>src/providers/anthropic.ts\u003c/code>, \u003ccode>src/genesis/distill.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>AbortController with idle timeout\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/openai-compatible.ts\u003c/code>, \u003ccode>src/providers/anthropic.ts\u003c/code> reset timeout on each chunk\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SSE parsing\u003c/strong>\u003c/td>\u003ctd>Manual parsing in \u003ccode>src/providers/openai-compatible.ts\u003c/code> and \u003ccode>src/providers/anthropic.ts\u003c/code> (handling \u003ccode>data:\u003c/code>, \u003ccode>[DONE]\u003c/code>, comments)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>JSON extraction from LLM output\u003c/strong>\u003c/td>\u003ctd>\u003ccode>extractJsonArray\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code>, \u003ccode>src/genesis/sync.ts\u003c/code> (handles markdown fences, finds first \u003ccode>[\u003c/code>/\u003ccode>{\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Git via \u003ccode>execFileSync\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/fingerprint.ts\u003c/code> uses \u003ccode>execFileSync('git', ...)\u003c/code> for \u003ccode>rev-parse\u003c/code>, \u003ccode>status\u003c/code>, \u003ccode>log\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SHA-256 via \u003ccode>node:crypto\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/util/hash.ts\u003c/code> uses \u003ccode>createHash('sha256')\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SHA-1 for project ID\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> uses \u003ccode>createHash('sha1')\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Token estimation heuristic\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/util/tokens.ts\u003c/code> uses \u003ccode>Math.ceil(text.length / 4)\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost estimation with token math\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/estimate.ts\u003c/code> uses \u003ccode>tokensFromChars = Math.ceil(chars / 4)\u003c/code> and pricing per 1M tokens\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost formatting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/cost.ts\u003c/code> formats USD with 4 decimals for &lt;$0.01, 2 decimals otherwise\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Token formatting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/cost.ts\u003c/code> formats with commas (e.g., \u003ccode>1,234\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Spinner animation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/steps.ts\u003c/code> uses \u003ccode>SPINNER_FRAMES\u003c/code> array with 80ms interval\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>ANSI cursor control\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/steps.ts\u003c/code> uses \u003ccode>\\x1b[1A\\x1b[2K\u003c/code> for line up/clear\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Raw mode stdin for keypress\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/cancel.ts\u003c/code>, \u003ccode>src/ui/confirm.ts\u003c/code>, \u003ccode>src/ui/prompt.ts\u003c/code> use \u003ccode>stdin.setRawMode(true)\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Readline completer with dropdown\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code> uses \u003ccode>@clack/core\u003c/code> \u003ccode>TextPrompt\u003c/code> with custom \u003ccode>frame()\u003c/code> rendering dropdowns\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Path picker with \u003ccode>@\u003c/code> trigger\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code> \u003ccode>ChatPrompt\u003c/code> shows path dropdown when \u003ccode>@\u003c/code> typed\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Tab completion for slash commands\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code> \u003ccode>completeSlash()\u003c/code> returns completion or common prefix\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Rotating tips in REPL\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code> \u003ccode>TIPS\u003c/code> array printed every 4 messages\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Concurrent step runner with pool\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/steps.ts\u003c/code> \u003ccode>StepRunner.runPooled(limit, fn)\u003c/code> runs up to \u003ccode>limit\u003c/code> concurrent steps\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>AbortSignal propagation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>ChatRequest.signal\u003c/code> in \u003ccode>src/providers/types.ts\u003c/code>; passed through \u003ccode>chatWithRetry\u003c/code>, providers, \u003ccode>MeteredProvider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cs
