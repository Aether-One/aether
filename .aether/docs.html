code>src/config/readme.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing static fallback\u003c/strong>\u003c/td>\u003ctd>\u003ccode>STATIC_PER_MTOK\u003c/code> in \u003ccode>src/pricing/index.ts\u003c/code> for 10 models\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing catalog TTL\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CACHE_TTL_MS = 24 * 60 * 60 * 1000\u003c/code> in \u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max file size for scan\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_FILE_SIZE = envInt(&quot;AETHER_MAX_FILE_SIZE&quot;, 128_000)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max total chars for scan\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_TOTAL_CHARS = envInt(&quot;AETHER_MAX_TOTAL_CHARS&quot;, 2_000_000)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max files walked\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_FILES_WALKED = envInt(&quot;AETHER_MAX_FILES_WALKED&quot;, 10_000)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max walk depth\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_WALK_DEPTH = envInt(&quot;AETHER_MAX_WALK_DEPTH&quot;, 12)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Doc context budget\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DOC_CONTEXT_BUDGET = envInt(&quot;AETHER_DOC_CONTEXT_CHARS&quot;, 48_000)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Genesis concurrency\u003c/strong>\u003c/td>\u003ctd>\u003ccode>GEN_CONCURRENCY = envInt(&quot;AETHER_GEN_CONCURRENCY&quot;, 4)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill concurrency\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DISTILL_CONCURRENCY = envInt(&quot;AETHER_DISTILL_CONCURRENCY&quot;, 4)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code context budget\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CLEANCODE_CONTEXT_BUDGET = envInt(&quot;AETHER_CLEANCODE_CONTEXT_CHARS&quot;, 48_000)\u003c/code> in \u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code heuristic thresholds\u003c/strong>\u003c/td>\u003ctd>\u003ccode>LONG_FUNCTION_THRESHOLD = 50\u003c/code>, \u003ccode>DEEP_NESTING_THRESHOLD = 4\u003c/code> in \u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code regex patterns\u003c/strong>\u003c/td>\u003ctd>\u003ccode>LONG_FUNCTION_RE\u003c/code>, \u003ccode>DEEP_NESTING_RE\u003c/code>, \u003ccode>MAGIC_NUMBER_RE\u003c/code>, \u003ccode>NAMING_RE\u003c/code>, \u003ccode>DUPLICATION_RE\u003c/code>, \u003ccode>DEAD_CODE_RE\u003c/code>, \u003ccode>ERROR_HANDLING_RE\u003c/code>, \u003ccode>COMPLEXITY_RE\u003c/code> in \u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigms\u003c/strong>\u003c/td>\u003ctd>\u003ccode>PARADIGMS\u003c/code> in \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> with 4 paradigms and categories\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Default clean code paradigm\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DEFAULT_PARADIGM = &quot;clean-code&quot;\u003c/code> in \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max plan attempts\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_PLAN_ATTEMPTS = 3\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code> and \u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max custom docs\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_CUSTOM_DOCS = 5\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Core doc IDs\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CORE_IDS\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code> (6 always-generated docs)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Anchor doc IDs\u003c/strong>\u003c/td>\u003ctd>\u003ccode>ANCHOR_IDS\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code> (4 docs regenerated on structural changes)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max listed files in sync\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_LISTED_FILES = 60\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Section order for docs\u003c/strong>\u003c/td>\u003ctd>\u003ccode>SECTION_ORDER\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code> defines section precedence\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Doc definitions catalog\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DOC_DEFINITIONS\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code> maps IDs to \u003ccode>DocDefinition\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Refresh output multipliers\u003c/strong>\u003c/td>\u003ctd>\u003ccode>REFRESH_OUT_LOW = 0.15\u003c/code>, \u003ccode>REFRESH_OUT_HIGH = 0.35\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>New doc output multipliers\u003c/strong>\u003c/td>\u003ctd>\u003ccode>NEW_DOC_OUT_LOW = 0.18\u003c/code>, \u003ccode>NEW_DOC_OUT_HIGH = 0.38\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Genesis output multipliers\u003c/strong>\u003c/td>\u003ctd>\u003ccode>GENESIS_OUT_LOW = 0.18\u003c/code>, \u003ccode>GENESIS_OUT_HIGH = 0.38\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill output per chunk\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DISTILL_OUTPUT_PER_CHUNK = 800\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt overhead chars\u003c/strong>\u003c/td>\u003ctd>\u003ccode>PROMPT_OVERHEAD_CHARS = 2000\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Genesis doc context ratio\u003c/strong>\u003c/td>\u003ctd>\u003ccode>GENESIS_DOC_CONTEXT_RATIO = 0.18\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Genesis doc chars min/max\u003c/strong>\u003c/td>\u003ctd>\u003ccode>GENESIS_DOC_CHARS_MIN = 10000\u003c/code>, \u003ccode>GENESIS_DOC_CHARS_MAX = 30000\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Default doc chars\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DEFAULT_DOC_CHARS = 15000\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry default options\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DEFAULT_OPTIONS = { maxRetries: 3, baseDelay: 2000 }\u003c/code> in \u003ccode>src/providers/retry.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry rate limit options\u003c/strong>\u003c/td>\u003ctd>\u003ccode>RATE_LIMIT_OPTIONS = { maxRetries: 6, baseDelay: 15000 }\u003c/code> in \u003ccode>src/providers/retry.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider hosts for detection\u003c/strong>\u003c/td>\u003ctd>\u003ccode>PROVIDER_HOSTS\u003c/code> in \u003ccode>src/config/index.ts\u003c/code> (4 hosts)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Default provider configs\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DEFAULT_CONFIGS\u003c/code> in \u003ccode>src/config/index.ts\u003c/code> (4 providers)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>OpenRouter models URL\u003c/strong>\u003c/td>\u003ctd>\u003ccode>OPENROUTER_MODELS_URL = &quot;https://openrouter.ai/api/v1/models&quot;\u003c/code> in \u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Static pricing per 1M tokens\u003c/strong>\u003c/td>\u003ctd>\u003ccode>STATIC_PER_MTOK\u003c/code> in \u003ccode>src/pricing/index.ts\u003c/code> (10 models)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Idle timeout default\u003c/strong>\u003c/td>\u003ctd>\u003ccode>120_000\u003c/code> ms in \u003ccode>OpenAICompatibleProvider\u003c/code> and \u003ccode>AnthropicProvider\u003c/code> constructors\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Ping timeout\u003c/strong>\u003c/td>\u003ctd>\u003ccode>10_000\u003c/code> ms in \u003ccode>OpenAICompatibleProvider.ping()\u003c/code> and \u003ccode>AnthropicProvider.ping()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max tokens default\u003c/strong>\u003c/td>\u003ctd>\u003ccode>8192\u003c/code> in \u003ccode>AnthropicProvider.chat()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Temperature default\u003c/strong>\u003c/td>\u003ctd>\u003ccode>0.7\u003c/code> in \u003ccode>OpenAICompatibleProvider.streamRaw()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Spinner interval\u003c/strong>\u003c/td>\u003ctd>\u003ccode>80\u003c/code> ms in \u003ccode>src/ui/steps.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Spinner frames\u003c/strong>\u003c/td>\u003ctd>\u003ccode>SPINNER_FRAMES\u003c/code> array (10 frames) in \u003ccode>src/ui/steps.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max dropdown items\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_DROPDOWN = 6\u003c/code> in \u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Max path dropdown items\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MAX_PATH_DROPDOWN = 10\u003c/code> in \u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Tips rotation interval\u003c/strong>\u003c/td>\u003ctd>Every 4 messages in \u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code report relative path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>cleanCodeMarkdownRelPath()\u003c/code> returns \u003ccode>.aether/cleancode-report.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code ignore patterns\u003c/strong>\u003c/td>\u003ctd>Stored as array of glob strings in \u003ccode>.aether/cleancode-ignore.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigm storage\u003c/strong>\u003c/td>\u003ctd>Stored as string in \u003ccode>.aether/cleancode-paradigm.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude patterns storage\u003c/strong>\u003c/td>\u003ctd>Stored as deduplicated normalized array in \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config file paths\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/config.json\u003c/code> and \u003ccode>.aether/settings/config.json\u003c/code> checked by \u003ccode>projectConfigPaths()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>~/.aether/config.json\u003c/code> via \u003ccode>getGlobalConfigPath()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config structure\u003c/strong>\u003c/td>\u003ctd>\u003ccode>GlobalConfigFile\u003c/code> with \u003ccode>default\u003c/code> and \u003ccode>projects\u003c/code> record in \u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Legacy global config migration\u003c/strong>\u003c/td>\u003ctd>\u003ccode>readGlobalFile()\u003c/code> handles flat config format\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config save strategy\u003c/strong>\u003c/td>\u003ctd>First config becomes \u003ccode>default\u003c/code>; later per-project saves update only their entry\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Env var for API key\u003c/strong>\u003c/td>\u003ctd>\u003ccode>AETHER_API_KEY\u003c/code> checked in \u003ccode>loadConfig()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node version requirement\u003c/strong>\u003c/td>\u003ctd>\u003ccode>&gt;=20.0.0\u003c/code> in \u003ccode>package.json\u003c/code> engines\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-10-testing-quality-observed-config\">10. Testing &amp; Quality (Observed Config)\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Tool\u003c/th>\u003cth>Config\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>TypeScript\u003c/strong>\u003c/td>\u003ctd>\u003ccode>tsc --noEmit\u003c/code> via \u003ccode>npm run typecheck\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Build\u003c/strong>\u003c/td>\u003ctd>\u003ccode>tsc\u003c/code> via \u003ccode>npm run build\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Dev run\u003c/strong>\u003c/td>\u003ctd>\u003ccode>tsx src/cli/index.ts\u003c/code> via \u003ccode>npm run dev\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SEA build\u003c/strong>\u003c/td>\u003ctd>\u003ccode>node scripts/build-sea.mjs\u003c/code> via \u003ccode>npm run build:sea\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node engine\u003c/strong>\u003c/td>\u003ctd>\u003ccode>&gt;=20.0.0\u003c/code> in \u003ccode>package.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Dependencies\u003c/strong>\u003c/td>\u003ctd>\u003ccode>@clack/core\u003c/code>, \u003ccode>chalk\u003c/code> (runtime); \u003ccode>@types/node\u003c/code>, \u003ccode>esbuild\u003c/code>, \u003ccode>postject\u003c/code>, \u003ccode>tsx\u003c/code>, \u003ccode>typescript\u003c/code> (dev)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cblockquote>\u003cp>\u003cstrong>Note\u003c/strong>: No test framework, linting, or formatting config detected in provided files. Do not assume their existence.\u003c/p>\u003c/blockquote>\n\u003ch2 id=\"md-11-references-to-actual-files\">11. References to Actual Files\u003c/h2>\n\u003cp>Every rule above maps to at least one file in the provided context. Examples:\u003c/p>\n\u003cul>\u003cli>\u003ccode>tsconfig.json\u003c/code> → strict, ES2022, NodeNext\u003c/li>\u003cli>\u003ccode>package.json\u003c/code> → \u003ccode>&quot;type&quot;: &quot;module&quot;\u003c/code>, scripts, deps\u003c/li>\u003cli>\u003ccode>src/cli/index.ts\u003c/code> → CLI entry, command registration, error handling\u003c/li>\u003cli>\u003ccode>src/commands/registry.ts\u003c/code> → \u003ccode>CommandRegistry\u003c/code>, \u003ccode>Command\u003c/code> interface\u003c/li>\u003cli>\u003ccode>src/providers/types.ts\u003c/code> → \u003ccode>LLMProvider\u003c/code>, \u003ccode>ChatMessage\u003c/code>, \u003ccode>ChatRequest\u003c/code>, \u003ccode>ChatResponse\u003c/code>, \u003ccode>PingResult\u003c/code>, \u003ccode>StreamChunk\u003c/code>\u003c/li>\u003cli>\u003ccode>src/providers/factory.ts\u003c/code> → \u003ccode>createProvider\u003c/code> factory\u003c/li>\u003cli>\u003ccode>src/providers/retry.ts\u003c/code> → \u003ccode>chatWithRetry\u003c/code>, \u003ccode>formatRetryLine\u003c/code>\u003c/li>\u003cli>\u003ccode>src/providers/openrouter.ts\u003c/code> → \u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code>\u003c/li>\u003cli>\u003ccode>src/providers/anthropic.ts\u003c/code> → \u003ccode>AnthropicProvider\u003c/code> implements \u003ccode>LLMProvider\u003c/code>\u003c/li>\u003cli>\u003ccode>src/providers/metered.ts\u003c/code> → \u003ccode>MeteredProvider\u003c/code> wraps \u003ccode>LLMProvider\u003c/code>\u003c/li>\u003cli>\u003ccode>src/providers/openai-compatible.ts\u003c/code> → \u003ccode>OpenAICompatibleProvider\u003c/code> base class\u003c/li>\u003cli>\u003ccode>src/genesis/constants. ts → planner/sync/cleancode/optimize prompt constants src/config/readme.ts → AETHER_README constant src/config/scaffold.ts → ensureProjectReadme src/config/types.ts → AetherConfig interface src/genesis/types.ts → core domain types src/genesis/digest.ts → buildPlannerDigest src/genesis/distill.ts → distillFilesIncremental src/genesis/planner.ts → planDocs , parsePlan , extractJsonArray src/commands/config.ts → registerConfigCommand , config helpers src/commands/help.ts → registerHelpCommand src/commands/builtins.ts → registerBuiltinCommands src/commands/clean.ts → registerCleanCommand src/commands/exclude.ts → registerExcludeCommand src/commands/cleancode.ts → registerCleanCodeCommand src/commands/prompt.ts → registerPromptCommand src/genesis/cleancode-heuristics.ts → scanCleanCodeHeuristics , flaggedFiles , regex patterns src/genesis/cleancode.ts → scanCleanCodeHybrid , buildCleanCodeReport , buildCleanCodeMarkdown , writeCleanCodeMarkdown , cleanCodeMarkdownRelPath , loadCleanCodeIgnore , addCleanCodeIgnorePattern , loadCleanCodeParadigm , setCleanCodeParadigm , cleanCodeIgnorePath , cleanCodeParadigmPath , cleanCodeReportPath src/prompts/pipeline/cleancode.ts → PARADIGMS , DEFAULT_PARADIGM , paradigmLabel , listParadigms , paradigmFocus , buildCleanCodeScanPrompt src/prompts/pipeline/optimize.ts → OPTIMIZE_PROMPT , buildOptimizePrompt src/genesis/estimate.ts → estimateCleanCode"},{"id":"api/endpoints","title":"API Reference","section":"Reference","summary":"API surface — endpoints or CLI commands.","html":"\u003ch1 id=\"md-aether-cli-api-documentation\">Aether CLI — API Documentation\u003c/h1>\n\u003cp>This project is a \u003cstrong>CLI tool\u003c/strong> (\u003ccode>aether\u003c/code>). It does not expose a REST/GraphQL API or a library API. The public interface is the \u003cstrong>command-line interface\u003c/strong> defined in \u003ccode>src/commands/\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-commands\">Commands\u003c/h2>\n\u003ch3 id=\"md-help\">\u003ccode>/help\u003c/code>\u003c/h3>\n\u003cp>\u003cstrong>Syntax\u003c/strong>\u003c/p>\n\u003cpre>\u003ccode>/help\u003c/code>\u003c/pre>\n\u003cp>\u003cstrong>Description\u003c/strong> Lists all registered commands with their descriptions and usage.\u003c/p>\n\u003cp>\u003cstrong>Behavior\u003c/strong>\u003c/p>\n\u003col>\u003cli>Retrieves all commands from the global \u003ccode>CommandRegistry\u003c/code>.\u003c/li>\u003cli>Prints each command as:\u003cpre>\u003ccode> /name                    description\n   usage: /name [args]\u003c/code>\u003c/pre>\n\u003cul>\u003cli>Command name in accent color, padded to 32 characters.\u003c/li>\u003cli>Description in dim color.\u003c/li>\u003cli>Usage line indented by 2 spaces.\u003c/li>\u003c/ul>\u003c/li>\u003c/ol>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/commands/help.ts\u003c/code> → \u003ccode>registerHelpCommand()\u003c/code>\u003c/p>\n\u003chr>\n\u003ch3 id=\"md-config\">\u003ccode>/config\u003c/code>\u003c/h3>\n\u003cp>\u003cstrong>Syntax\u003c/strong>\u003c/p>\n\u003cpre>\u003ccode>/config [--provider &lt;name&gt;] [--model &lt;model&gt;] [--url &lt;baseUrl&gt;] [--key &lt;apiKey&gt;]\n/config show\n/config set &lt;key&gt; &lt;value&gt;\n/config &lt;provider&gt;          # quick setup for openai | anthropic | gemini | openrouter\n/config help\u003c/code>\u003c/pre>\n\u003cp>\u003cstrong>Description\u003c/strong> Configure the AI provider, model, base URL, and API key. Configuration is stored globally at \u003ccode>~/.aether/config.json\u003c/code> with per-project overrides.\u003c/p>\n\u003cp>\u003cstrong>Subcommands / Flags\u003c/strong>\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Flag / Subcommand\u003c/th>\u003cth>Description\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>--help\u003c/code>, \u003ccode>-h\u003c/code>, \u003ccode>help\u003c/code>\u003c/td>\u003ctd>Show usage and provider details.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>show\u003c/code> (or no args)\u003c/td>\u003ctd>Display current effective config (provider, model, baseUrl, masked API key).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>set &lt;key&gt; &lt;value&gt;\u003c/code>\u003c/td>\u003ctd>Set a single config key. Keys: \u003ccode>provider\u003c/code>, \u003ccode>model\u003c/code>, \u003ccode>url\u003c/code>/\u003ccode>baseurl\u003c/code>, \u003ccode>key\u003c/code>/\u003ccode>apikey\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>openai\u003c/code> \\\u003c/td>\u003ctd>\u003ccode>anthropic\u003c/code> \\\u003c/td>\u003ctd>\u003ccode>gemini\u003c/code> \\\u003c/td>\u003ctd>\u003ccode>openrouter\u003c/code>\u003c/td>\u003ctd>Quick-setup: writes default config for that provider (merges existing \u003ccode>apiKey\u003c/code> if present).\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Key Mapping (\u003ccode>set\u003c/code> subcommand)\u003c/strong>\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Input Key\u003c/th>\u003cth>Config Field\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>provider\u003c/code>\u003c/td>\u003ctd>\u003ccode>provider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>model\u003c/code>\u003c/td>\u003ctd>\u003ccode>model\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>url\u003c/code>, \u003ccode>baseurl\u003c/code>\u003c/td>\u003ctd>\u003ccode>baseUrl\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>key\u003c/code>, \u003ccode>apikey\u003c/code>\u003c/td>\u003ctd>\u003ccode>apiKey\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Provider Auto-Detection\u003c/strong> If \u003ccode>baseUrl\u003c/code> is set via \u003ccode>set url\u003c/code>, the provider is auto-detected from the host:\u003c/p>\n\u003cul>\u003cli>\u003ccode>api.openai.com\u003c/code> → \u003ccode>openai\u003c/code>\u003c/li>\u003cli>\u003ccode>api.anthropic.com\u003c/code> → \u003ccode>anthropic\u003c/code>\u003c/li>\u003cli>\u003ccode>generativelanguage.googleapis.com\u003c/code> → \u003ccode>gemini\u003c/code>\u003c/li>\u003cli>\u003ccode>openrouter.ai\u003c/code> → \u003ccode>openrouter\u003c/code>\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Validation\u003c/strong> \u003ccode>validateConfig(config)\u003c/code> enforces:\u003c/p>\n\u003cul>\u003cli>\u003ccode>provider\u003c/code> ∈ {\u003ccode>openai\u003c/code>, \u003ccode>anthropic\u003c/code>, \u003ccode>gemini\u003c/code>, \u003ccode>openrouter\u003c/code>}\u003c/li>\u003cli>\u003ccode>model\u003c/code> (non-empty string)\u003c/li>\u003cli>\u003ccode>baseUrl\u003c/code> (non-empty string)\u003c/li>\u003cli>\u003ccode>apiKey\u003c/code> (non-empty string)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Config Precedence\u003c/strong> (highest → lowest)\u003c/p>\n\u003col>\u003cli>Project override: \u003ccode>.aether/config.json\u003c/code> or \u003ccode>.aether/settings/config.json\u003c/code>\u003c/li>\u003cli>Global per-project entry: \u003ccode>~/.aether/config.json\u003c/code> → \u003ccode>projects[&lt;projectId&gt;]\u003c/code>\u003c/li>\u003cli>Global default: \u003ccode>~/.aether/config.json\u003c/code> → \u003ccode>default\u003c/code>\u003c/li>\u003cli>Environment variable: \u003ccode>AETHER_API_KEY\u003c/code> (only fills \u003ccode>apiKey\u003c/code> if missing)\u003c/li>\u003c/ol>\n\u003cp>\u003cstrong>Config File Structure\u003c/strong> (\u003ccode>~/.aether/config.json\u003c/code>)\u003c/p>\n\u003cpre>\u003ccode class=\"language-json\">{\n  &quot;default&quot;: { &quot;provider&quot;: &quot;openai&quot;, &quot;model&quot;: &quot;gpt-4o&quot;, &quot;baseUrl&quot;: &quot;https://api.openai.com/v1&quot;, &quot;apiKey&quot;: &quot;sk-...&quot; },\n  &quot;projects&quot;: {\n    &quot;myproject-a1b2c3d4e5f6&quot;: { &quot;model&quot;: &quot;gpt-4o-mini&quot; }\n  }\n}\u003c/code>\u003c/pre>\n\u003cp>\u003cstrong>Project ID\u003c/strong> Stable ID = \u003ccode>basename(absPath) + &quot;-&quot; + sha1(absPath).slice(0,12)\u003c/code> (see \u003ccode>projectId()\u003c/code> in \u003ccode>src/config/index.ts\u003c/code>).\u003c/p>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/commands/config.ts\u003c/code> → \u003ccode>registerConfigCommand()\u003c/code>, \u003ccode>src/config/index.ts\u003c/code> → \u003ccode>loadConfig()\u003c/code>, \u003ccode>saveConfig()\u003c/code>, \u003ccode>validateConfig()\u003c/code>, \u003ccode>getDefaultConfig()\u003c/code>, \u003ccode>detectProviderFromBaseUrl()\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch3 id=\"md-clean\">\u003ccode>/clean\u003c/code>\u003c/h3>\n\u003cp>\u003cstrong>Syntax\u003c/strong>\u003c/p>\n\u003cpre>\u003ccode>/clean\u003c/code>\u003c/pre>\n\u003cp>\u003cstrong>Description\u003c/strong> Registered via \u003ccode>registerCleanCommand()\u003c/code> in \u003ccode>src/commands/clean.ts\u003c/code>. Implementation details not shown in provided context.\u003c/p>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/commands/clean.ts\u003c/code> (registered in \u003ccode>src/cli/index.ts\u003c/code>)\u003c/p>\n\u003chr>\n\u003ch3 id=\"md-genesis\">\u003ccode>/genesis\u003c/code>\u003c/h3>\n\u003cp>\u003cstrong>Syntax\u003c/strong>\u003c/p>\n\u003cpre>\u003ccode>/genesis\u003c/code>\u003c/pre>\n\u003cp>\u003cstrong>Description\u003c/strong> Registered via \u003ccode>registerBuiltinCommands()\u003c/code> in \u003ccode>src/commands/builtins.ts\u003c/code>. Implementation resides in \u003ccode>src/genesis/\u003c/code> (not fully shown in context). Per README: &quot;Initialize — analyze and prepare your project&quot;. Generates \u003ccode>.aether/\u003c/code> knowledge base.\u003c/p>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/commands/builtins.ts\u003c/code>, \u003ccode>src/genesis/\u003c/code>\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-global-cli-options\">Global CLI Options\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Flag\u003c/th>\u003cth>Description\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>--version\u003c/code>, \u003ccode>-v\u003c/code>\u003c/td>\u003ctd>Print version (\u003ccode>aether v&lt;version&gt;\u003c/code>) and exit.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>--no-animation\u003c/code>\u003c/td>\u003ctd>Disable startup animation.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/cli/index.ts\u003c/code> → \u003ccode>main()\u003c/code>\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-interactive-mode\">Interactive Mode\u003c/h2>\n\u003cp>When \u003ccode>stdin\u003c/code> is a TTY and \u003ccode>--no-animation\u003c/code> is \u003cstrong>not\u003c/strong> set:\u003c/p>\n\u003col>\u003cli>Plays startup animation (\u003ccode>playStartupAnimation()\u003c/code> from \u003ccode>src/ui/animation.ts\u003c/code>).\u003c/li>\u003cli>Prints banner (\u003ccode>printBanner()\u003c/code>).\u003c/li>\u003cli>Enters interactive chat via \u003ccode>startChat()\u003c/code> (\u003ccode>src/ui/prompt.ts\u003c/code>).\u003c/li>\u003c/ol>\n\u003cp>\u003cstrong>Interactive Features\u003c/strong>\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Tab completion\u003c/strong> for \u003ccode>/\u003c/code> commands (via readline completer).\u003c/li>\u003cli>\u003cstrong>Dropdown suggestions\u003c/strong> when typing \u003ccode>/\u003c/code> (shows up to 6 matching commands).\u003c/li>\u003cli>\u003cstrong>Free-text responses\u003c/strong> for non-command input (pattern-matched for help, greetings, genesis keywords).\u003c/li>\u003cli>\u003cstrong>Rotating tips\u003c/strong> every 4 messages.\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/ui/prompt.ts\u003c/code> → \u003ccode>startChat()\u003c/code>, \u003ccode>showDropdown()\u003c/code>, \u003ccode>completer()\u003c/code>, \u003ccode>promptUser()\u003c/code>, \u003ccode>respond()\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-configuration-types\">Configuration Types\u003c/h2>\n\u003ch3 id=\"md-aetherconfig-srcconfigtypests\">\u003ccode>AetherConfig\u003c/code> (\u003ccode>src/config/types.ts\u003c/code>)\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface AetherConfig {\n  provider: &quot;openai&quot; | &quot;anthropic&quot; | &quot;gemini&quot; | &quot;openrouter&quot;;\n  model: string;\n  baseUrl: string;\n  apiKey?: string;\n  timeout?: number; // idle timeout in ms\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-globalconfigfile-srcconfigindexts\">\u003ccode>GlobalConfigFile\u003c/code> (\u003ccode>src/config/index.ts\u003c/code>)\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface GlobalConfigFile {\n  default?: Partial&lt;AetherConfig&gt;;\n  projects?: Record&lt;string, Partial&lt;AetherConfig&gt;&gt;;\n}\u003c/code>\u003c/pre>\n\u003chr>\n\u003ch2 id=\"md-environment-variables\">Environment Variables\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Variable\u003c/th>\u003cth>Used For\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>AETHER_API_KEY\u003c/code>\u003c/td>\u003ctd>Fallback API key if not set in config.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>MAX_FILE_SIZE\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>MAX_FILE_SIZE\u003c/code> (default 128,000).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>MAX_TOTAL_CHARS\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>MAX_TOTAL_CHARS\u003c/code> (default 2,000,000).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>MAX_FILES_WALKED\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>MAX_FILES_WALKED\u003c/code> (default 10,000).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>MAX_WALK_DEPTH\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>MAX_WALK_DEPTH\u003c/code> (default 12).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>DOC_CONTEXT_BUDGET\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>DOC_CONTEXT_BUDGET\u003c/code> (default 48,000).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>GEN_CONCURRENCY\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>GEN_CONCURRENCY\u003c/code> (default 4).\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>DISTILL_CONCURRENCY\u003c/code>\u003c/td>\u003ctd>Override \u003ccode>DISTILL_CONCURRENCY\u003c/code> (default 4).\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/genesis/constants.ts\u003c/code> → \u003ccode>envInt()\u003c/code>, \u003ccode>src/config/index.ts\u003c/code> → \u003ccode>loadConfig()\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-project-structure-generated-aether\">Project Structure Generated (\u003ccode>.aether/\u003c/code>)\u003c/h2>\n\u003cp>Per \u003ccode>src/config/readme.ts\u003c/code> (\u003ccode>AETHER_README\u003c/code>):\u003c/p>\n\u003cpre>\u003ccode>.aether/\n├── README.md           # This file (auto-generated)\n├── docs/               # Generated documentation (commit to git)\n├── settings/           # Project settings (commit to git, needed for /sync)\n└── cache/              # Local cache (gitignored)\u003c/code>\u003c/pre>\n\u003cp>Global config: \u003ccode>~/.aether/config.json\u003c/code> Global cache: \u003ccode>~/.aether/cache/&lt;project-id&gt;/\u003c/code>\u003c/p>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/config/readme.ts\u003c/code>, \u003ccode>src/config/scaffold.ts\u003c/code> → \u003ccode>ensureProjectReadme()\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-llm-provider-interface-internal\">LLM Provider Interface (Internal)\u003c/h2>\n\u003cp>Not a public CLI command, but the provider interface used by \u003ccode>/genesis\u003c/code> and future \u003ccode>/sync\u003c/code>.\u003c/p>\n\u003ch3 id=\"md-llmprovider-srcproviderstypests\">\u003ccode>LLMProvider\u003c/code> (\u003ccode>src/providers/types.ts\u003c/code>)\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface LLMProvider {\n  name: string;\n  chat(request: ChatRequest): Promise&lt;ChatResponse&gt;;\n  chatStream(request: ChatRequest): AsyncGenerator&lt;StreamChunk&gt;;\n  ping(): Promise&lt;boolean&gt;;\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-chatrequest\">\u003ccode>ChatRequest\u003c/code>\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface ChatRequest {\n  messages: ChatMessage[];\n  model: string;\n  temperature?: number;\n  maxTokens?: number;\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-chatmessage\">\u003ccode>ChatMessage\u003c/code>\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface ChatMessage {\n  role: &quot;system&quot; | &quot;user&quot; | &quot;assistant&quot;;\n  content: string;\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-chatresponse\">\u003ccode>ChatResponse\u003c/code>\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface ChatResponse {\n  content: string;\n  model: string;\n  usage?: { promptTokens: number; completionTokens: number; totalTokens: number };\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-streamchunk\">\u003ccode>StreamChunk\u003c/code>\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">interface StreamChunk {\n  content: string;\n  done: boolean;\n}\u003c/code>\u003c/pre>\n\u003ch3 id=\"md-provider-factory-srcprovidersfactoryts\">Provider Factory (\u003ccode>src/providers/factory.ts\u003c/code>)\u003c/h3>\n\u003cpre>\u003ccode class=\"language-ts\">function createProvider(config: AetherConfig): LLMProvider\u003c/code>\u003c/pre>\n\u003cul>\u003cli>\u003ccode>openai\u003c/code> → \u003ccode>OpenAICompatibleProvider\u003c/code> (baseUrl, apiKey, timeout, &quot;openai&quot;)\u003c/li>\u003cli>\u003ccode>gemini\u003c/code> → \u003ccode>OpenAICompatibleProvider\u003c/code> (baseUrl, apiKey, timeout, &quot;gemini&quot;)\u003c/li>\u003cli>\u003ccode>anthropic\u003c/code> → \u003ccode>OpenAICompatibleProvider\u003c/code> (baseUrl, apiKey, timeout, &quot;anthropic&quot;) — \u003cem>TODO: different API format\u003c/em>\u003c/li>\u003cli>\u003ccode>openrouter\u003c/code> → \u003ccode>OpenAICompatibleProvider\u003c/code> (baseUrl, apiKey, timeout, &quot;openrouter&quot;)\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/providers/types.ts\u003c/code>, \u003ccode>src/providers/factory.ts\u003c/code>, \u003ccode>src/providers/openai-compatible.ts\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-retry-logic-internal\">Retry Logic (Internal)\u003c/h2>\n\u003cp>\u003ccode>chatWithRetry(provider, request, options?)\u003c/code> (\u003ccode>src/providers/retry.ts\u003c/code>):\u003c/p>\n\u003cul>\u003cli>Default: 3 retries, 2s base delay, exponential backoff.\u003c/li>\u003cli>On rate limit (429 / &quot;rate limit&quot;): upgrades to 6 retries, 15s base delay, respects \u003ccode>retry-after\u003c/code> header if parsed.\u003c/li>\u003cli>Calls \u003ccode>onRetry(attempt, maxRetries, error)\u003c/code> callback for UI.\u003c/li>\u003c/ul>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>src/providers/retry.ts\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"md-version\">Version\u003c/h2>\n\u003cp>\u003ccode>aether v0.1.4\u003c/code> (from \u003ccode>package.json\u003c/code> version, injected as \u003ccode>__AETHER_VERSION__\u003c/code> at build).\u003c/p>\n\u003cp>\u003cstrong>Source\u003c/strong>: \u003ccode>package.json\u003c/code>, \u003ccode>src/cli/index.ts\u003c/code> → \u003ccode>VERSION\u003c/code>.## src/cli/index.ts\u003c/p>\n\u003cul>\u003cli>\u003cstrong>Entry point\u003c/strong>: \u003ccode>main()\u003c/code> function (async, called at bottom)\u003c/li>\u003cli>\u003cstrong>Version flag\u003c/strong>: \u003ccode>--version\u003c/code> / \u003ccode>-v\u003c/code> prints \u003ccode>aether v${VERSION}\u003c/code> and exits (VERSION from \u003ccode>__AETHER_VERSION__\u003c/code> or \u003ccode>0.0.0-dev\u003c/code>)\u003c/li>\u003cli>\u003cstrong>Command registration order\u003c/strong>:\u003cul>\u003cli>\u003ccode>registerHelpCommand()\u003c/code> from \u003ccode>../commands/help.js\u003c/code>\u003c/li>\u003cli>\u003ccode>registerBuiltinCommands()\u003c/code> from \u003ccode>../commands/builtins.js\u003c/code>\u003c/li>\u003cli>\u003ccode>registerConfigCommand()\u003c/code> from \u003ccode>../commands/config.js\u003c/code>\u003c/li>\u003cli>\u003ccode>registerCleanCommand()\u003c/code> from \u003ccode>../commands/clean.js\u003c/code>\u003c/li>\u003cli>\u003ccode>registerExcludeCommand()\u003c/code> from \u003ccode>../commands/exclude.js\u003c/code>\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Startup UI\u003c/strong>:\u003cul>\u003cli>\u003ccode>isInteractive = process.stdin.isTTY ?? false\u003c/code>\u003c/li>\u003cli>\u003ccode>noAnimation = process.argv.includes(&quot;--no-animation&quot;)\u003c/code>\u003c/li>\u003cli>If interactive and not \u003ccode>--no-animation\u003c/code>: \u003ccode>await playStartupAnimation()\u003c/code> from \u003ccode>../ui/animation.js\u003c/code>\u003c/li>\u003cli>Else: \u003ccode>printBanner()\u003c/code> from \u003ccode>../ui/animation.js\u003c/code>\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Chat entry\u003c/strong>: \u003ccode>await startChat()\u003c/code> from \u003ccode>../ui/prompt.js\u003c/code>\u003c/li>\u003cli>\u003cstrong>Error handling\u003c/strong>: Catches errors, writes to stderr, exits with code 1\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-srccommandsbuiltinsts\">src/commands/builtins.ts\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Exported function: \u003ccode>registerBuiltinCommands()\u003c/code>\u003c/strong> — Registers four built-in CLI commands with the global \u003ccode>registry\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Command: \u003ccode>genesis\u003c/code>\u003c/strong>\u003cul>\u003cli>Description: &quot;Analyze and document your project with AI&quot;\u003c/li>\u003cli>Usage: \u003ccode>/genesis [path]\u003c/code>\u003c/li>\u003cli>Flags: \u003ccode>--force\u003c/code> (regenerate even if \u003ccode>.aether/docs\u003c/code> exists), \u003ccode>--yes\u003c/code> / \u003ccode>-y\u003c/code> (skip cost confirmation)\u003c/li>\u003cli>Handler flow:\u003cul>\u003cli>Validates target directory exists and is a directory.\u003c/li>\u003cli>Loads config via \u003ccode>loadConfig(process.cwd())\u003c/code>; exits if missing.\u003c/li>\u003cli>Creates \u003ccode>MeteredProvider\u003c/code> wrapping \u003ccode>createProvider(config)\u003c/code>.\u003c/li>\u003cli>Pings provider; on failure, prints cause-specific error via \u003ccode>formatPingError()\u003c/code>.\u003c/li>\u003cli>Scans project context via \u003ccode>scanContext(targetDir)\u003c/code>; logs omitted file count.\u003c/li>\u003cli>Plans docs via \u003ccode>planDocs(buildPlannerDigest(context), provider, config.model)\u003c/code> with retry spinner.\u003c/li>\u003cli>Prints exclude hint via \u003ccode>printExcludeHint()\u003c/code>.\u003c/li>\u003cli>Estimates cost via \u003ccode>estimateGenesis(context, docsToGenerate.length, pricing)\u003c/code> and prints via \u003ccode>formatEstimate()\u003c/code>.\u003c/li>\u003cli>Prompts confirmation via \u003ccode>promptConfirm()\u003c/code> unless \u003ccode>--yes\u003c/code>.\u003c/li>\u003cli>Sets up \u003ccode>AbortController\u003c/code> + \u003ccode>watchCancelKey()\u003c/code> for ESC cancellation.\u003c/li>\u003cli>Builds shared project context via \u003ccode>buildSharedProjectContext(context, provider, config.model)\u003c/code> with distill progress callbacks.\u003c/li>\u003cli>Generates docs in parallel via \u003ccode>StepRunner.runPooled(GEN_CONCURRENCY, ...)\u003c/code>:\u003cul>\u003cli>Each doc: builds prompt via \u003ccode>buildDocPrompt(doc, sharedContext)\u003c/code>, calls \u003ccode>chatWithRetry()\u003c/code> with temperature 0.3.\u003c/li>\u003cli>Writes output to \u003ccode>.aether/&lt;doc.outputPath&gt;\u003c/code>.\u003c/li>\u003c/ul>\u003c/li>\u003cli>Writes docs index via \u003ccode>buildDocsIndex(context.name, docsToGenerate)\u003c/code> to \u003ccode>.aether/docs/README.md\u003c/code>.\u003c/li>\u003cli>Writes snapshot via \u003ccode>writeSnapshot(targetDir, {provider, model}, context, docsToGenerate.map(metaFromDefinition))\u003c/code>.\u003c/li>\u003cli>Ensures project README via \u003ccode>ensureProjectReadme(targetDir)\u003c/code>.\u003c/li>\u003cli>Prints elapsed time.\u003c/li>\u003c/ul>\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Command: \u003ccode>sync\u003c/code>\u003c/strong>\u003cul>\u003cli>Description: &quot;Refresh only the docs affected by what changed since the last run&quot;\u003c/li>\u003cli>Usage: \u003ccode>/sync [path]\u003c/code>\u003c/li>\u003cli>Flags: \u003ccode>--yes\u003c/code> / \u003ccode>-y\u003c/code> (skip cost confirmation)\u003c/li>\u003cli>Handler flow:\u003cul>\u003cli>Loads snapshot via \u003ccode>loadSnapshot(targetDir)\u003c/code>; exits if missing (prompts \u003ccode>/genesis\u003c/code> first).\u003c/li>\u003cli>Loads config; creates \u003ccode>MeteredProvider\u003c/code>; pings provider.\u003c/li>\u003cli>Scans context via \u003ccode>scanContext(targetDir)\u003c/code>; diffs fingerprint via \u003ccode>diffFingerprint(snapshot.files, context)\u003c/code>.\u003c/li>\u003cli>If \u003ccode>hasChanges(diff)\u003c/code> false, prints up-to-date message and exits.\u003c/li>\u003cli>Gets git log via \u003ccode>getGitLog(targetDir, snapshot.git.commit)\u003c/code> if snapshot has git commit.\u003c/li>\u003cli>Plans sync via \u003ccode>planSync(buildPlannerDigest(context), diff, snapshot.docs, gitLog, provider, config.model)\u003c/code> with retry spinner.\u003c/li>\u003cli>Builds jobs: \u003ccode>plan.regenerate\u003c/code> (update=true) + \u003ccode>plan.add\u003c/code> (update=false).\u003c/li>\u003cli>If no jobs, advances snapshot via \u003ccode>writeSnapshot()\u003c/code> and exits.\u003c/li>\u003cli>Prints exclude hint.\u003c/li>\u003cli>Estimates cost via \u003ccode>estimateSync(context, refreshDocChars, plan.add.length, pricing)\u003c/code> using existing doc sizes for refresh estimates.\u003c/li>\u003cli>Prompts confirmation unless \u003ccode>--yes\u003c/code>.\u003c/li>\u003cli>Sets up abort controller + cancel key watcher.\u003c/li>\u003cli>Builds shared context via \u003ccode>buildSharedProjectContext()\u003c/code> (same as genesis).\u003c/li>\u003cli>Formats changes via \u003ccode>formatChanges(diff, gitLog)\u003c/code>.\u003c/li>\u003cli>Runs jobs in parallel via \u003ccode>StepRunner.runPooled(GEN_CONCURRENCY, ...)\u003c/code>:\u003cul>\u003cli>For updates: reads existing doc, calls \u003ccode>refreshDoc(doc, sharedContext, existing, changeText, provider, config.model, signal)\u003c/code>.\u003c/li>\u003cli>For new: calls \u003ccode>chatWithRetry()\u003c/code> with \u003ccode>buildDocPrompt(doc, sharedContext)\u003c/code>.\u003c/li>\u003cli>Writes output.\u003c/li>\u003c/ul>\u003c/li>\u003cli>Merges doc metas via \u003ccode>mergeDocMetas(snapshot.docs, plan.add)\u003c/code>.\u003c/li>\u003cli>Rebuilds index via \u003ccode>buildDocsIndex(context.name, mergedDocs)\u003c/code>.\u003c/li>\u003cli>Writes new snapshot via \u003ccode>writeSnapshot(targetDir, {provider, model}, context, mergedDocs)\u003c/code>.\u003c/li>\u003cli>Ensures project README.\u003c/li>\u003c/ul>\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Command: \u003ccode>exit\u003c/code>\u003c/strong>\u003cul>\u003cli>Description: &quot;Exit Aether&quot;\u003c/li>\u003cli>Usage: \u003ccode>/exit\u003c/code>\u003c/li>\u003cli>Handler: prints goodbye message, calls \u003ccode>process.exit(0)\u003c/code>.\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Command: \u003ccode>clear\u003c/code>\u003c/strong>\u003cul>\u003cli>Description: &quot;Clear the screen&quot;\u003c/li>\u003cli>Usage: \u003ccode>/clear\u003c/code>\u003c/li>\u003cli>Handler: writes ANSI escape \u003ccode>\\x1Bc\u003c/code> to stdout.\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Internal helper: \u003ccode>formatPingError(config, ping)\u003c/code>\u003c/strong> — Returns cause-specific error string for ping failures (timeout, HTTP 401/403, other).\u003c/li>\u003cli>\u003cstrong>Internal helper: \u003ccode>printExcludeHint()\u003c/code>\u003c/strong> — Prints yellow hint about \u003ccode>/exclude &lt;path&gt;\u003c/code> to reduce scan size/cost.\u003c/li>\u003cli>\u003cstrong>Internal helper: \u003ccode>showGenesisHelp()\u003c/code>\u003c/strong> — Prints detailed usage, flags, requirements, generated doc structure (always/conditional), planner behavior.\u003c/li>\u003cli>\u003cstrong>Internal helper: \u003ccode>showSyncHelp()\u003c/code>\u003c/strong> — Prints usage, flags, how sync works (diff against snapshot, incremental update, never deletes).\u003c/li>\u003cli>\u003cstrong>Internal helper: \u003ccode>readFileSafe(path)\u003c/code>\u003c/strong> — Returns file content or null on error.\u003c/li>\u003cli>\u003cstrong>Internal helper: \u003ccode>formatError(err)\u003c/code>\u003c/strong> — Normalizes error messages: rate limit (429), auth (401/403), timeout/abort, network (ECONNREFUSED/ENOTFOUND), generic fallback (first line, truncated to 120 chars).\u003c/li>\u003cli>\u003cstrong>Dependencies used\u003c/strong> (imported and invoked):\u003cul>\u003cli>\u003ccode>chalk\u003c/code>, \u003ccode>registry\u003c/code>, \u003ccode>loadConfig\u003c/code>, \u003ccode>ensureProjectReadme\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>createProvider\u003c/code>, \u003ccode>MeteredProvider\u003c/code>, \u003ccode>PingResult\u003c/code>, \u003ccode>chatWithRetry\u003c/code>, \u003ccode>formatRetryLine\u003c/code>, \u003ccode>scanContext\u003c/code>, \u003ccode>buildPlannerDigest\u003c/code>, \u003ccode>planDocs\u003c/code>, \u003ccode>buildSharedProjectContext\u003c/code>, \u003ccode>buildDocsIndex\u003c/code>, \u003ccode>buildDocPrompt\u003c/code>, \u003ccode>getGitLog\u003c/code>, \u003ccode>getModelPricing\u003c/code>, \u003ccode>estimateGenesis\u003c/code>, \u003ccode>estimateSync\u003c/code>, \u003ccode>formatEstimate\u003c/code>, \u003ccode>promptConfirm\u003c/code>, \u003ccode>watchCancelKey\u003c/code>, \u003ccode>loadSnapshot\u003c/code>, \u003ccode>diffFingerprint\u003c/code>, \u003ccode>hasChanges\u003c/code>, \u003ccode>planSync\u003c/code>, \u003ccode>refreshDoc\u003c/code>, \u003ccode>writeSnapshot\u003c/code>, \u003ccode>metaFromDefinition\u003c/code>, \u003ccode>mergeDocMetas\u003c/code>, \u003ccode>formatChanges\u003c/code>, \u003ccode>StepRunner\u003c/code>, \u003ccode>LineSpinner\u003c/code>, \u003ccode>mkdir\u003c/code>, \u003ccode>writeFile\u003c/code>, \u003ccode>readFile\u003c/code>, \u003ccode>existsSync\u003c/code>, \u003ccode>statSync\u003c/code>, \u003ccode>join\u003c/code>, \u003ccode>dirname\u003c/code>, \u003ccode>ACCENT\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>.\u003c/li>\u003c/ul>\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-srcgenesiscontextts\">src/genesis/context.ts\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Exported\u003c/strong>: \u003ccode>ProjectContext\u003c/code> type (re-exported from \u003ccode>./types.js\u003c/code>), \u003ccode>collectDirectories(rootDir, excludes, maxDepth?)\u003c/code>, \u003ccode>scanContext(rootDir)\u003c/code>, \u003ccode>buildPrompt(context)\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Constants\u003c/strong>:\u003cul>\u003cli>\u003ccode>CONFIG_FILES\u003c/code> — 13 known config filenames (e.g., \u003ccode>package.json\u003c/code>, \u003ccode>tsconfig.json\u003c/code>, \u003ccode>Cargo.toml\u003c/code>, \u003ccode>go.mod\u003c/code>, \u003ccode>pyproject.toml\u003c/code>, \u003ccode>requirements.txt\u003c/code>, \u003ccode>Gemfile\u003c/code>, \u003ccode>pom.xml\u003c/code>, \u003ccode>docker-compose.yml\u003c/code>, \u003ccode>Dockerfile\u003c/code>, \u003ccode>.env.example\u003c/code>, \u003ccode>README.md\u003c/code>).\u003c/li>\u003cli>\u003ccode>VISION_FILE_CANDIDATES\u003c/code> — \u003ccode>[&quot;CONTEXT.md&quot;, &quot;CONTRIBUTING.md&quot;, &quot;ARCHITECTURE.md&quot;, &quot;VISION.md&quot;]\u003c/code>.\u003c/li>\u003cli>\u003ccode>IGNORED_DIRS\u003c/code> — Set of 18 directory names to skip (e.g., \u003ccode>node_modules\u003c/code>, \u003ccode>.git\u003c/code>, \u003ccode>dist\u003c/code>, \u003ccode>build\u003c/code>, \u003ccode>.next\u003c/code>, \u003ccode>.nuxt\u003c/code>, \u003ccode>.cache\u003c/code>, \u003ccode>coverage\u003c/code>, \u003ccode>target\u003c/code>, \u003ccode>.aether\u003c/code>, \u003ccode>__pycache__\u003c/code>, \u003ccode>.venv\u003c/code>, \u003ccode>venv\u003c/code>, \u003ccode>vendor\u003c/code>, \u003ccode>.turbo\u003c/code>, \u003ccode>.vercel\u003c/code>).\u003c/li>\u003cli>\u003ccode>SOURCE_EXTENSIONS\u003c/code> — Set of 16 source file extensions (e.g., \u003ccode>.ts\u003c/code>, \u003ccode>.tsx\u003c/code>, \u003ccode>.js\u003c/code>, \u003ccode>.jsx\u003c/code>, \u003ccode>.py\u003c/code>, \u003ccode>.rs\u003c/code>, \u003ccode>.go\u003c/code>, \u003ccode>.java\u003c/code>, \u003ccode>.kt\u003c/code>, \u003ccode>.rb\u003c/code>, \u003ccode>.ex\u003c/code>, \u003ccode>.exs\u003c/code>, \u003ccode>.php\u003c/code>, \u003ccode>.swift\u003c/code>, \u003ccode>.vue\u003c/code>, \u003ccode>.svelte\u003c/code>).\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>\u003ccode>collectDirectories\u003c/code>\u003c/strong> — walks \u003ccode>rootDir\u003c/code> up to \u003ccode>maxDepth\u003c/code> (default 6), skips ignored/dot/excluded dirs, returns sorted relative directory paths.\u003c/li>\u003cli>\u003cstrong>\u003ccode>scanContext(rootDir)\u003c/code>\u003c/strong> — returns \u003ccode>ProjectContext\u003c/code> with fields: \u003ccode>name\u003c/code>, \u003ccode>rootDir\u003c/code>, \u003ccode>configFiles[]\u003c/code>, \u003ccode>visionFiles[]\u003c/code>, \u003ccode>entryPoints[]\u003c/code>, \u003ccode>sourceFiles[]\u003c/code>, \u003ccode>directoryTree\u003c/code>, \u003ccode>omittedFiles[]\u003c/code>.\u003cul>\u003cli>Steps: loads excludes; reads config files (extracts name/description from \u003ccode>package.json\u003c/code>); reads vision files (candidates + \u003ccode>docs/*.md\u003c/code>); builds directory tree; finds entry points (predefined candidate paths); finds all source files ranked by importance, adds until \u003ccode>MAX_TOTAL_CHARS\u003c/code> budget exceeded.\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>\u003ccode>buildPrompt(context)\u003c/code>\u003c/strong> — constructs a markdown prompt with sections: Project Context header, Directory Structure, Product Vision (if any), Configuration Files, Entry Points, Key Source Files, Omitted Files, and a final reminder.\u003c/li>\u003cli>\u003cstrong>Helpers\u003c/strong>:\u003cul>\u003cli>\u003ccode>safeReadFile(filePath, label, omitted)\u003c/code> — reads file if size ≤ \u003ccode>MAX_FILE_SIZE\u003c/code>, else records in \u003ccode>omitted\u003c/code>.\u003c/li>\u003cli>\u003ccode>buildDirectoryTree(rootDir, maxDepth, excludes)\u003c/code> — ASCII tree with \u003ccode>├──\u003c/code>/\u003ccode>└──\u003c/code> connectors, respects ignores/excludes.\u003c/li>\u003cli>\u003ccode>findVisionFiles(rootDir, excludes)\u003c/code> — checks candidates + \u003ccode>docs/*.md\u003c/code>.\u003c/li>\u003cli>\u003ccode>findEntryPoints(rootDir, excludes)\u003c/code> — checks 20 predefined candidate paths.\u003c/li>\u003cli>\u003ccode>findSourceFiles(rootDir, omitted, excludes)\u003c/code> — walks entire tree (max \u003ccode>MAX_WALK_DEPTH\u003c/code>, max \u003ccode>MAX_FILES_WALKED\u003c/code>), collects files with \u003ccode>SOURCE_EXTENSIONS\u003c/code>, ranks by \u003ccode>getImportanceScore\u003c/code>.\u003c/li>\u003cli>\u003ccode>getImportanceScore(filePath, size)\u003c/code> — scores based on filename keywords (\u003ccode>index\u003c/code>, \u003ccode>main\u003c/code>, \u003ccode>app\u003c/code>, \u003ccode>server\u003c/code>, \u003ccode>router\u003c/code>, \u003ccode>routes\u003c/code>, \u003ccode>config\u003c/code>, \u003ccode>setup\u003c/code>, \u003ccode>types\u003c/code>, \u003ccode>schema\u003c/code>), depth (shallower = higher), size (500–5000 bytes sweet spot).\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Dependencies\u003c/strong>: \u003ccode>node:fs/promises\u003c/code> (\u003ccode>readFile\u003c/code>, \u003ccode>readdir\u003c/code>, \u003ccode>stat\u003c/code>), \u003ccode>node:fs\u003c/code> (\u003ccode>existsSync\u003c/code>), \u003ccode>node:path\u003c/code> (\u003ccode>join\u003c/code>, \u003ccode>relative\u003c/code>, \u003ccode>extname\u003c/code>, \u003ccode>basename\u003c/code>), \u003ccode>./types.js\u003c/code> (\u003ccode>ProjectContext\u003c/code>), \u003ccode>./constants.js\u003c/code> (\u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>MAX_TOTAL_CHARS\u003c/code>, \u003ccode>MAX_FILES_WALKED\u003c/code>, \u003ccode>MAX_WALK_DEPTH\u003c/code>), \u003ccode>./exclude.js\u003c/code> (\u003ccode>loadExcludes\u003c/code>, \u003ccode>isExcluded\u003c/code>).\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-srcuipromptts\">src/ui/prompt.ts\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Exported\u003c/strong>: \u003ccode>startChat()\u003c/code> — async function that starts the interactive chat loop.\u003c/li>\u003cli>\u003cstrong>Behavior\u003c/strong>:\u003cul>\u003cli>Loads config via \u003ccode>loadConfig(process.cwd())\u003c/code>; exits with error if missing.\u003c/li>\u003cli>Creates provider via \u003ccode>createProvider(config)\u003c/code> wrapped in \u003ccode>MeteredProvider\u003c/code>.\u003c/li>\u003cli>Pings provider; on failure prints error via \u003ccode>formatPingError()\u003c/code> and exits.\u003c/li>\u003cli>Prints welcome banner with provider/model info.\u003c/li>\u003cli>Enters REPL loop:\u003cul>\u003cli>Prompts user via \u003ccode>promptInput()\u003c/code> with \u003ccode>&gt;\u003c/code> prompt.\u003c/li>\u003cli>Handles \u003ccode>/exit\u003c/code>, \u003ccode>/clear\u003c/code>, \u003ccode>/help\u003c/code> as built-in commands.\u003c/li>\u003cli>For other input: builds context via \u003ccode>buildChatContext()\u003c/code> (loads \u003ccode>.aether/settings/context.json\u003c/code> if exists), sends to provider via \u003ccode>chatWithRetry()\u003c/code> with temperature 0.7.\u003c/li>\u003cli>Streams response via \u003ccode>chatStream()\u003c/code> with \u003ccode>LineSpinner\u003c/code> for thinking animation.\u003c/li>\u003cli>Prints response with \u003ccode>ACCENT\u003c/code> color.\u003c/li>\u003cli>Handles abort via \u003ccode>AbortController\u003c/code> + \u003ccode>watchCancelKey()\u003c/code>.\u003c/li>\u003cli>Catches errors, formats via \u003ccode>formatError()\u003c/code>, prints in \u003ccode>ERROR\u003c/code> color.\u003c/li>\u003c/ul>\u003c/li>\u003c/ul>\u003c/li>\u003cli>\u003cstrong>Dependencies\u003c/strong>: \u003ccode>chalk\u003c/code>, \u003ccode>loadConfig\u003c/code>, \u003ccode>createProvider\u003c/code>, \u003ccode>MeteredProvider\u003c/code>, \u003ccode>chatWithRetry\u003c/code>, \u003ccode>chatStream\u003c/code>, \u003ccode>formatPingError\u003c/code>, \u003ccode>formatError\u003c/code>, \u003ccode>promptInput\u003c/code>, \u003ccode>watchCancelKey\u003c/code>, \u003ccode>LineSpinner\u003c/code>, \u003ccode>ACCENT\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>ERROR\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>buildChatContext\u003c/code>, \u003ccode>loadSnapshot\u003c/code>, \u003ccode>formatError\u003c/code>.\u003c/li>\u003c/ul>","text":"Aether CLI — API Documentation This project is a CLI tool ( aether ). It does not expose a REST/GraphQL API or a library API. The public interface is the command-line interface defined in src/commands/ . Commands /help Syntax /help Description Lists all registered commands with their descriptions and usage. Behavior Retrieves all commands from the global CommandRegistry . Prints each command as: /name description usage: /name [args] Command name in accent color, padded to 32 characters. Description in dim color. Usage line indented by 2 spaces. Source : src/commands/help.ts → registerHelpCommand() /config Syntax /config [--provider \u003cname>] [--model \u003cmodel>] [--url \u003cbaseUrl>] [--key \u003capiKey>] /config show /config set \u003ckey> \u003cvalue> /config \u003cprovider> # quick setup for openai | anthropic | gemini | openrouter /config help Description Configure the AI provider, model, base URL, and API key. Configuration is stored globally at ~/.aether/config.json with per-project overrides. Subcommands / Flags Flag / Subcommand Description --help , -h , help Show usage and provider details. show (or no args) Display current effective config (provider, model, baseUrl, masked API key). set \u003ckey> \u003cvalue> Set a single config key. Keys: provider , model , url / baseurl , key / apikey . openai \\ anthropic \\ gemini \\ openrouter Quick-setup: writes default config for that provider (merges existing apiKey if present). Key Mapping ( set subcommand) Input Key Config Field provider provider model model url , baseurl baseUrl key , apikey apiKey Provider Auto-Detection If baseUrl is set via set url , the provider is auto-detected from the host: api.openai.com → openai api.anthropic.com → anthropic generativelanguage.googleapis.com → gemini openrouter.ai → openrouter Validation validateConfig(config) enforces: provider ∈ { openai , anthropic , gemini , openrouter } model (non-empty string) baseUrl (non-empty string) apiKey (non-empty string) Config Precedence (highest → lowest) Project override: .aether/config.json or .aether/settings/config.json Global per-project entry: ~/.aether/config.json → projects[\u003cprojectId>] Global default: ~/.aether/config.json → default Environment variable: AETHER_API_KEY (only fills apiKey if missing) Config File Structure ( ~/.aether/config.json ) { \"default\": { \"provider\": \"openai\", \"model\": \"gpt-4o\", \"baseUrl\": \"https://api.openai.com/v1\", \"apiKey\": \"sk-...\" }, \"projects\": { \"myproject-a1b2c3d4e5f6\": { \"model\": \"gpt-4o-mini\" } } } Project ID Stable ID = basename(absPath) + \"-\" + sha1(absPath).slice(0,12) (see projectId() in src/config/index.ts ). Source : src/commands/config.ts → registerConfigCommand() , src/config/index.ts → loadConfig() , saveConfig() , validateConfig() , getDefaultConfig() , detectProviderFromBaseUrl() . /clean Syntax /clean Description Registered via registerCleanCommand() in src/commands/clean.ts . Implementation details not shown in provided context. Source : src/commands/clean.ts (registered in src/cli/index.ts ) /genesis Syntax /genesis Description Registered via registerBuiltinCommands() in src/commands/builtins.ts . Implementation resides in src/genesis/ (not fully shown in context). Per README: \"Initialize — analyze and prepare your project\". Generates .aether/ knowledge base. Source : src/commands/builtins.ts , src/genesis/ Global CLI Options Flag Description --version , -v Print version ( aether v\u003cversion> ) and exit. --no-animation Disable startup animation. Source : src/cli/index.ts → main() Interactive Mode When stdin is a TTY and --no-animation is not set: Plays startup animation ( playStartupAnimation() from src/ui/animation.ts ). Prints banner ( printBanner() ). Enters interactive chat via startChat() ( src/ui/prompt.ts ). Interactive Features Tab completion for / commands (via readline completer). Dropdown suggestions when typing / (shows up to 6 matching commands). Free-text responses for non-command input (pattern-matched for help, greetings, genesis keywords). Rotating tips every 4 messages. Source : src/ui/prompt.ts → startChat() , showDropdown() , completer() , promptUser() , respond() . Configuration Types AetherConfig ( src/config/types.ts ) interface AetherConfig { provider: \"openai\" | \"anthropic\" | \"gemini\" | \"openrouter\"; model: string; baseUrl: string; apiKey?: string; timeout?: number; // idle timeout in ms } GlobalConfigFile ( src/config/index.ts ) interface GlobalConfigFile { default?: Partial\u003cAetherConfig>; projects?: Record\u003cstring, Partial\u003cAetherConfig>>; } Environment Variables Variable Used For AETHER_API_KEY Fallback API key if not set in config. MAX_FILE_SIZE Override MAX_FILE_SIZE (default 128,000). MAX_TOTAL_CHARS Override MAX_TOTAL_CHARS (default 2,000,000). MAX_FILES_WALKED Override MAX_FILES_WALKED (default 10,000). MAX_WALK_DEPTH Override MAX_WALK_DEPTH (default 12). DOC_CONTEXT_BUDGET Override DOC_CONTEXT_BUDGET (default 48,000). GEN_CONCURRENCY Override GEN_CONCURRENCY (default 4). DISTILL_CONCURRENCY Override DISTILL_CONCURRENCY (default 4). Source : src/genesis/constants.ts → envInt() , src/config/index.ts → loadConfig() . Project Structure Generated ( .aether/ ) Per src/config/readme.ts ( AETHER_README ): .aether/ ├── README.md # This file (auto-generated) ├── docs/ # Generated documentation (commit to git) ├── settings/ # Project settings (commit to git, needed for /sync) └── cache/ # Local cache (gitignored) Global config: ~/.aether/config.json Global cache: ~/.aether/cache/\u003cproject-id>/ Source : src/config/readme.ts , src/config/scaffold.ts → ensureProjectReadme() . LLM Provider Interface (Internal) Not a public CLI command, but the provider interface used by /genesis and future /sync . LLMProvider ( src/providers/types.ts ) interface LLMProvider { name: string; chat(request: ChatRequest): Promise\u003cChatResponse>; chatStream(request: ChatRequest): AsyncGenerator\u003cStreamChunk>; ping(): Promise\u003cboolean>; } ChatRequest interface ChatRequest { messages: ChatMessage[]; model: string; temperature?: number; maxTokens?: number; } ChatMessage interface ChatMessage { role: \"system\" | \"user\" | \"assistant\"; content: string; } ChatResponse interface ChatResponse { content: string; model: string; usage?: { promptTokens: number; completionTokens: number; totalTokens: number }; } StreamChunk interface StreamChunk { content: string; done: boolean; } Provider Factory ( src/providers/factory.ts ) function createProvider(config: AetherConfig): LLMProvider openai → OpenAICompatibleProvider (baseUrl, apiKey, timeout, \"openai\") gemini → OpenAICompatibleProvider (baseUrl, apiKey, timeout, \"gemini\") anthropic → OpenAICompatibleProvider (baseUrl, apiKey, timeout, \"anthropic\") — TODO: different API format openrouter → OpenAICompatibleProvider (baseUrl, apiKey, timeout, \"openrouter\") Source : src/providers/types.ts , src/providers/factory.ts , src/providers/openai-compatible.ts . Retry Logic (Internal) chatWithRetry(provider, request, options?) ( src/providers/retry.ts ): Default: 3 retries, 2s base delay, exponential backoff. On rate limit (429 / \"rate limit\"): upgrades to 6 retries, 15s base delay, respects retry-after header if parsed. Calls onRetry(attempt, maxRetries, error) callback for UI. Source : src/providers/retry.ts . Version aether v0.1.4 (from package.json version, injected as __AETHER_VERSION__ at build). Source : package.json , src/cli/index.ts → VERSION .## src/cli/index.ts Entry point : main() function (async, called at bottom) Version flag : --version / -v prints aether v${VERSION} and exits (VERSION from __AETHER_VERSION__ or 0.0.0-dev ) Command registration order : registerHelpCommand() from ../commands/help.js registerBuiltinCommands() from ../commands/builtins.js registerConfigCommand() from ../commands/config.js registerCleanCommand() from ../commands/clean.js registerExcludeCommand() from ../commands/exclude.js Startup UI : isInteractive = process.stdin.isTTY ?? false noAnimation = process.argv.includes(\"--no-animation\") If interactive and not --no-animation : await playStartupAnimation() from ../ui/animation.js Else: printBanner() from ../ui/animation.js Chat entry : await startChat() from ../ui/prompt.js Error handling : Catches errors, writes to stderr, exits with code 1 src/commands/builtins.ts Exported function: registerBuiltinCommands() — Registers four built-in CLI commands with the global registry . Command: genesis Description: \"Analyze and document your project with AI\" Usage: /genesis [path] Flags: --force (regenerate even if .aether/docs exists), --yes / -y (skip cost confirmation) Handler flow: Validates target directory exists and is a directory. Loads config via loadConfig(process.cwd()) ; exits if missing. Creates MeteredProvider wrapping createProvider(config) . Pings provider; on failure, prints cause-specific error via formatPingError() . Scans project context via scanContext(targetDir) ; logs omitted file count. Plans docs via planDocs(buildPlannerDigest(context), provider, config.model) with retry spinner. Prints exclude hint via printExcludeHint() . Estimates cost via estimateGenesis(context, docsToGenerate.length, pricing) and prints via formatEstimate() . Prompts confirmation via promptConfirm() unless --yes . Sets up AbortController + watchCancelKey() for ESC cancellation. Builds shared project context via buildSharedProjectContext(context, provider, config.model) with distill progress callbacks. Generates docs in parallel via StepRunner.runPooled(GEN_CONCURRENCY, ...) : Each doc: builds prompt via buildDocPrompt(doc, sharedContext) , calls chatWithRetry() with temperature 0.3. Writes output to .aether/\u003cdoc.outputPath> . Writes docs index via buildDocsIndex(context.name, docsToGenerate) to .aether/docs/README.md . Writes snapshot via writeSnapshot(targetDir, {provider, model}, context, docsToGenerate.map(metaFromDefinition)) . Ensures project README via ensureProjectReadme(targetDir) . Prints elapsed time. Command: sync Description: \"Refresh only the docs affected by what changed since the last run\" Usage: /sync [path] Flags: --yes / -y (skip cost confirmation) Handler flow: Loads snapshot via loadSnapshot(targetDir) ; exits if missing (prompts /genesis first). Loads config; creates MeteredProvider ; pings provider. Scans context via scanContext(targetDir) ; diffs fingerprint via diffFingerprint(snapshot.files, context) . If hasChanges(diff) false, prints up-to-date message and exits. Gets git log via getGitLog(targetDir, snapshot.git.commit) if snapshot has git commit. Plans sync via planSync(buildPlannerDigest(context), diff, snapshot.docs, gitLog, provider, config.model) with retry spinner. Builds jobs: plan.regenerate (update=true) + plan.add (update=false). If no jobs, advances snapshot via writeSnapshot() and exits. Prints exclude hint. Estimates cost via estimateSync(context, refreshDocChars, plan.add.length, pricing) using existing doc sizes for refresh estimates. Prompts confirmation unless --yes . Sets up abort controller + cancel key watcher. Builds shared context via buildSharedProjectContext() (same as genesis). Formats changes via formatChanges(diff, gitLog) . Runs jobs in parallel via StepRunner.runPooled(GEN_CONCURRENCY, ...) : For updates: reads existing doc, calls refreshDoc(doc, sharedContext, existing, changeText, provider, config.model, signal) . For new: calls chatWithRetry() with buildDocPrompt(doc, sharedContext) . Writes output. Merges doc metas via mergeDocMetas(snapshot.docs, plan.add) . Rebuilds index via buildDocsIndex(context.name, mergedDocs) . Writes new snapshot via writeSnapshot(targetDir, {provider, model}, context, mergedDocs) . Ensures project README. Command: exit Description: \"Exit Aether\" Usage: /exit Handler: prints goodbye message, calls process.exit(0) . Command: clear Description: \"Clear the screen\" Usage: /clear Handler: writes ANSI escape \\x1Bc to stdout. Internal helper: formatPingError(config, ping) — Returns cause-specific error string for ping failures (timeout, HTTP 401/403, other). Internal helper: printExcludeHint() — Prints yellow hint about /exclude \u003cpath> to reduce scan size/cost. Internal helper: showGenesisHelp() — Prints detailed usage, flags, requirements, generated doc structure (always/conditional), planner behavior. Internal helper: showSyncHelp() — Prints usage, flags, how sync works (diff against snapshot, incremental update, never deletes). Internal helper: readFileSafe(path) — Returns file content or null on error. Internal helper: formatError(err) — Normalizes error messages: rate limit (429), auth (401/403), timeout/abort, network (ECONNREFUSED/ENOTFOUND), generic fallback (first line, truncated to 120 chars). Dependencies used (imported and invoked): chalk , registry , loadConfig , ensureProjectReadme , GEN_CONCURRENCY , createProvider , MeteredProvider , PingResult , chatWithRetry , formatRetryLine , scanContext , buildPlannerDigest , planDocs , buildSharedProjectContext , buildDocsIndex , buildDocPrompt , getGitLog , getModelPricing , estimateGenesis , estimateSync , formatEstimate , promptConfirm , watchCancelKey , loadSnapshot , diffFingerprint , hasChanges , planSync , refreshDoc , writeSnapshot , metaFromDefinition , mergeDocMetas , formatChanges , StepRunner , LineSpinner , mkdir , writeFile , readFile , existsSync , statSync , join , dirname , ACCENT , DIM , SUCCESS . src/genesis/context.ts Exported : ProjectContext type (re-exported from ./types.js ), collectDirectories(rootDir, excludes, maxDepth?) , scanContext(rootDir) , buildPrompt(context) . Constants : CONFIG_FILES — 13 known config filenames (e.g., package.json , tsconfig.json , Cargo.toml , go.mod , pyproject.toml , requirements.txt , Gemfile , pom.xml , docker-compose.yml , Dockerfile , .env.example , README.md ). VISION_FILE_CANDIDATES — [\"CONTEXT.md\", \"CONTRIBUTING.md\", \"ARCHITECTURE.md\", \"VISION.md\"] . IGNORED_DIRS — Set of 18 directory names to skip (e.g., node_modules , .git , dist , build , .next , .nuxt , .cache , coverage , target , .aether , __pycache__ , .venv , venv , vendor , .turbo , .vercel ). SOURCE_EXTENSIONS — Set of 16 source file extensions (e.g., .ts , .tsx , .js , .jsx , .py , .rs , .go , .java , .kt , .rb , .ex , .exs , .php , .swift , .vue , .svelte ). collectDirectories — walks rootDir up to maxDepth (default 6), skips ignored/dot/excluded dirs, returns sorted relative directory paths. scanContext(rootDir) — returns ProjectContext with fields: name , rootDir , configFiles[] , visionFiles[] , entryPoints[] , sourceFiles[] , directoryTree , omittedFiles[] . Steps: loads excludes; reads config files (extracts name/description from package.json ); reads vision files (candidates + docs/*.md ); builds directory tree; finds entry points (predefined candidate paths); finds all source files ranked by importance, adds until MAX_TOTAL_CHARS budget exceeded. buildPrompt(context) — constructs a markdown prompt with sections: Project Context header, Directory Structure, Product Vision (if any), Configuration Files, Entry Points, Key Source Files, Omitted Files, and a final reminder. Helpers : safeReadFile(filePath, label, omitted) — reads file if size ≤ MAX_FILE_SIZE , else records in omitted . buildDirectoryTree(rootDir, maxDepth, excludes) — ASCII tree with ├── / └── connectors, respects ignores/excludes. findVisionFiles(rootDir, excludes) — checks candidates + docs/*.md . findEntryPoints(rootDir, excludes) — checks 20 predefined candidate paths. findSourceFiles(rootDir, omitted, excludes) — walks entire tree (max MAX_WALK_DEPTH , max MAX_FILES_WALKED ), collects files with SOURCE_EXTENSIONS , ranks by getImportanceScore . getImportanceScore(filePath, size) — scores based on filename keywords ( index , main , app , server , router , routes , config , setup , types , schema ), depth (shallower = higher), size (500–5000 bytes sweet spot). Dependencies : node:fs/promises ( readFile , readdir , stat ), node:fs ( existsSync ), node:path ( join , relative , extname , basename ), ./types.js ( ProjectContext ), ./constants.js ( MAX_FILE_SIZE , MAX_TOTAL_CHARS , MAX_FILES_WALKED , MAX_WALK_DEPTH ), ./exclude.js ( loadExcludes , isExcluded ). src/ui/prompt.ts Exported : startChat() — async function that starts the interactive chat loop. Behavior : Loads config via loadConfig(process.cwd()) ; exits with error if missing. Creates provider via createProvider(config) wrapped in MeteredProvider . Pings provider; on failure prints error via formatPingError() and exits. Prints welcome banner with provider/model info. Enters REPL loop: Prompts user via promptInput() with > prompt. Handles /exit , /clear , /help as built-in commands. For other input: builds context via buildChatContext() (loads .aether/settings/context.json if exists), sends to provider via chatWithRetry() with temperature 0.7. Streams response via chatStream() with LineSpinner for thinking animation. Prints response with ACCENT color. Handles abort via AbortController + watchCancelKey() . Catches errors, formats via formatError() , prints in ERROR color. Dependencies : chalk , loadConfig , createProvider , MeteredProvider , chatWithRetry , chatStream , formatPingError , formatError , promptInput , watchCancelKey , LineSpinner , ACCENT , DIM , ERROR , SUCCESS , buildChatContext , loadSnapshot , formatError ."},{"id":"AI_CONTEXT","title":"AI Context","section":"AI Context","summary":"System prompt for AI assistants working on this project.","html":"\u003ch1 id=\"md-ai-context-aether\">AI Context — Aether\u003c/h1>\n\u003ch2 id=\"md-project-identity\">Project Identity\u003c/h2>\n\u003cp>Aether is an open-source CLI that transforms any codebase into an AI-native workspace by building a complete knowledge base through static analysis and optional LLM enrichment, outputting to a \u003ccode>.aether/\u003c/code> directory. It also provides a hybrid clean-code review system combining static heuristics with optional AI analysis.\u003c/p>\n\u003ch2 id=\"md-always-follow\">Always Follow\u003c/h2>\n\u003ch3 id=\"md-architecture-patterns\">Architecture Patterns\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>CLI entry point\u003c/strong>: \u003ccode>src/cli/index.ts\u003c/code> exports \u003ccode>main()\u003c/code>; registers commands in order: \u003ccode>registerHelpCommand()\u003c/code>, \u003ccode>registerBuiltinCommands()\u003c/code>, \u003ccode>registerConfigCommand()\u003c/code>, \u003ccode>registerCleanCommand()\u003c/code>, \u003ccode>registerCleanCodeCommand()\u003c/code>, \u003ccode>registerExcludeCommand()\u003c/code>, \u003ccode>registerPromptCommand()\u003c/code>; starts interactive chat via \u003ccode>startChat()\u003c/code> after banner/animation.\u003c/li>\u003cli>\u003cstrong>Command registry\u003c/strong>: \u003ccode>src/commands/registry.ts\u003c/code> exports \u003ccode>CommandRegistry\u003c/code> class and singleton \u003ccode>registry\u003c/code>; commands implement \u003ccode>{ name, description, usage?, handler: (args: string) =&gt; Promise&lt;void&gt; | void }\u003c/code>; executed via \u003ccode>registry.execute(input)\u003c/code> parsing \u003ccode>/name args\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Provider factory\u003c/strong>: \u003ccode>src/providers/factory.ts\u003c/code> exports \u003ccode>createProvider(config: AetherConfig)\u003c/code> returning \u003ccode>LLMProvider\u003c/code>; switches on \u003ccode>config.provider\u003c/code> (\u003ccode>openai\u003c/code> | \u003ccode>anthropic\u003c/code> | \u003ccode>gemini\u003c/code> | \u003ccode>openrouter\u003c/code>) instantiating \u003ccode>OpenAICompatibleProvider\u003c/code> (anthropic has TODO for different API format).\u003c/li>\u003cli>\u003cstrong>Retry wrapper\u003c/strong>: \u003ccode>src/providers/retry.ts\u003c/code> exports \u003ccode>chatWithRetry(provider, request, options?)\u003c/code> with exponential backoff, rate-limit (429) detection, provider-suggested delay extraction, and \u003ccode>createRetryLogger()\u003c/code> for stdout progress.\u003c/li>\u003cli>\u003cstrong>Distillation cache\u003c/strong>: \u003ccode>src/genesis/scope.ts\u003c/code> uses \u003ccode>distillFilesIncremental\u003c/code> with cache at \u003ccode>~/.aether/cache/&lt;project-id&gt;/distill-cache.json\u003c/code> keyed by model; \u003ccode>DOC_CONTEXT_BUDGET = 48_000\u003c/code> chars; \u003ccode>DISTILL_CONCURRENCY = 4\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Project identity\u003c/strong>: \u003ccode>projectId(rootDir)\u003c/code> = \u003ccode>basename(abs)-sha1(abs).slice(0,12)\u003c/code>; global dir \u003ccode>~/.aether/\u003c/code>; project cache \u003ccode>~/.aether/cache/&lt;project-id&gt;/\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Config precedence\u003c/strong> (\u003ccode>src/config/index.ts\u003c/code>): project global entry → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env.\u003c/li>\u003cli>\u003cstrong>Genesis pipeline\u003c/strong>: \u003ccode>ProjectContext\u003c/code> built from scanned files → \u003ccode>buildPlannerDigest\u003c/code> → \u003ccode>planDocs\u003c/code> (LLM) → \u003ccode>DOC_DEFINITIONS\u003c/code> (13 built-in) → generate docs via prompts.\u003c/li>\u003cli>\u003cstrong>Document definitions\u003c/strong>: 13 \u003ccode>DocDefinition\u003c/code> constants in \u003ccode>src/genesis/docs.ts\u003c/code> grouped by \u003ccode>SECTION_ORDER\u003c/code>: Guides (human), Architecture, Reference, AI Context, Project-specific; each has \u003ccode>id\u003c/code>, \u003ccode>outputPath\u003c/code>, \u003ccode>label\u003c/code>, \u003ccode>title\u003c/code>, \u003ccode>section\u003c/code>, \u003ccode>summary\u003c/code>, \u003ccode>prompt\u003c/code>, \u003ccode>human?\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Interactive CLI\u003c/strong>: \u003ccode>src/ui/prompt.ts\u003c/code> uses \u003ccode>node:readline\u003c/code> with completer for \u003ccode>/\u003c/code> commands, dropdown suggestions (ANSI cursor save/restore), rotating tips, pattern-matched responses.\u003c/li>\u003cli>\u003cstrong>Step runner\u003c/strong>: \u003ccode>src/ui/steps.ts\u003c/code> exports \u003ccode>StepRunner\u003c/code> (sequential/pooled steps with spinners) and \u003ccode>LineSpinner\u003c/code> (braille frames, succeed/fail).\u003c/li>\u003cli>\u003cstrong>Theme\u003c/strong>: \u003ccode>src/ui/theme.ts\u003c/code> exports \u003ccode>ACCENT_HEX = &quot;#895bf4&quot;\u003c/code>, \u003ccode>ACCENT\u003c/code>, \u003ccode>ACCENT_BOLD\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code> via \u003ccode>chalk\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Constants via env\u003c/strong>: \u003ccode>src/genesis/constants.ts\u003c/code> uses \u003ccode>envInt(name, fallback)\u003c/code> for \u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>MAX_TOTAL_CHARS\u003c/code>, \u003ccode>MAX_FILES_WALKED\u003c/code>, \u003ccode>MAX_WALK_DEPTH\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>DISTILL_CONCURRENCY\u003c/code>, \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Hashing\u003c/strong>: \u003ccode>src/util/hash.ts\u003c/code> exports \u003ccode>hashContent(content)\u003c/code> normalizing CRLF→LF, returning SHA-256 hex.\u003c/li>\u003cli>\u003cstrong>Git integration\u003c/strong>: \u003ccode>src/genesis/fingerprint.ts\u003c/code> uses \u003ccode>execFileSync\u003c/code> for \u003ccode>git rev-parse\u003c/code>, \u003ccode>git status --porcelain\u003c/code>, \u003ccode>git log\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Exclude system\u003c/strong>: \u003ccode>src/genesis/exclude.ts\u003c/code> manages \u003ccode>.aether/settings/exclude.json\u003c/code> with \u003ccode>loadExcludes\u003c/code>, \u003ccode>addExclude\u003c/code>, \u003ccode>removeExclude\u003c/code>; \u003ccode>src/commands/exclude.ts\u003c/code> registers \u003ccode>/exclude\u003c/code> command for add/list/remove; \u003ccode>src/ui/prompt.ts\u003c/code> integrates \u003ccode>@\u003c/code> path mentions with exclude-aware dropdown.\u003c/li>\u003cli>\u003cstrong>Clean-code review\u003c/strong>: \u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> provides \u003ccode>scanCleanCodeHeuristics\u003c/code> (static AST-based scan); \u003ccode>src/genesis/cleancode.ts\u003c/code> provides \u003ccode>scanCleanCodeHybrid\u003c/code> (AI hybrid review), \u003ccode>estimateCleanCode\u003c/code>, \u003ccode>buildCleanCodeReport\u003c/code>, \u003ccode>buildCleanCodeMarkdown\u003c/code>, \u003ccode>writeCleanCodeMarkdown\u003c/code>; \u003ccode>src/commands/cleancode.t
