eScript configuration ( tsconfig.json ): Strict TypeScript — strict: true , no any , explicit types ES2022 / NodeNext modules — import / export syntax, .js extensions in imports Small, focused functions — prefer pure functions over classes where practical No any — use unknown or proper types Explicit imports — import { foo } from \"./foo.js\" ( .js extension required by moduleResolution: NodeNext ) No ESLint, Prettier, or other formatters are configured. Follow the existing code style in the repository. Quality Gates Before a PR Run these locally before opening a PR: bash 1. Type-check (strict, no emit) npm run typecheck 2. Build (emits to dist/) npm run build 3. Test manually in dev mode npm run dev There is no test suite configured. The package.json has no test script, and no test files exist in the repository. Do not invent a test command — manual verification via npm run dev is the current validation path. Branch & Commit Conventions From CONTRIBUTING.md (this matches the project's stated convention): Prefix Use feat/ New features fix/ Bug fixes docs/ Documentation only refactor/ Code changes that don't fix bugs or add features test/ Adding or updating tests (when tests exist) Commit message format: feat: add dependency detection for Python projects fix: handle empty directories in scanner docs: update roadmap with new commands refactor: extract technology detection into separate module Branch from main . Keep commits focused and messages descriptive. Submitting Changes Fork the repository Create a branch from main using the prefix convention above Make your changes — keep functions small, add types, follow existing patterns Run quality gates — npm run typecheck && npm run build Test manually — npm run dev and exercise your change Commit with a clear message Push and open a Pull Request against main The project is in early stages. There is no formal CI pipeline, no PR template, and no required review process documented. PRs are reviewed by maintainers when capacity allows. Project Vision Context Aether's goal is to transform any codebase into an AI-native workspace by building a living knowledge base ( .aether/ ) through static analysis first, then optional AI enrichment. The genesis command is the only implemented command today; sync , doctor , explain , export , MCP server, and VS Code extension are on the roadmap (see README.md ). When contributing, consider how your change fits into the genesis → sync → doctor → explain → export lifecycle described in the README's philosophy section. Questions? Open an issue or start a discussion on GitHub. No question is too small."},{"id":"architecture/system-overview","title":"System Overview","section":"Architecture","summary":"High-level architecture and how the system fits together.","html":"\u003ch1 id=\"md-system-overview\">System Overview\u003c/h1>\n\u003ch2 id=\"md-goal\">Goal\u003c/h2>\n\u003cp>Aether is a CLI tool that transforms any codebase into an AI-native workspace by automatically analyzing repository structure, detecting technologies, and generating a comprehensive knowledge base (\u003ccode>.aether/\u003c/code>) that helps both developers and AI assistants understand the project. It uses a hybrid approach: static analysis first, optional LLM-powered deep analysis second.\u003c/p>\n\u003ch2 id=\"md-architecture\">Architecture\u003c/h2>\n\u003cp>\u003cstrong>Type\u003c/strong>: Node.js/TypeScript command-line application \u003cstrong>Runtime\u003c/strong>: Node.js ≥20 (ESM) \u003cstrong>Distribution\u003c/strong>: npm package with global binary (\u003ccode>aether\u003c/code>); optional Single Executable Application (SEA) build via \u003ccode>esbuild\u003c/code> + \u003ccode>postject\u003c/code>\u003c/p>\n\u003ch3 id=\"md-layers\">Layers\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Layer\u003c/th>\u003cth>Responsibility\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>CLI Entry\u003c/strong>\u003c/td>\u003ctd>Argument parsing, version flag, interactive/non-interactive mode detection, startup animation/banner\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command Registry\u003c/strong>\u003c/td>\u003ctd>Slash-command routing (\u003ccode>/genesis\u003c/code>, \u003ccode>/sync\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>, \u003ccode>/help\u003c/code>, \u003ccode>/exit\u003c/code>, \u003ccode>/clear\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Genesis Pipeline\u003c/strong>\u003c/td>\u003ctd>Project scanning → context building → doc planning → distillation → parallel doc generation → snapshot\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider Abstraction\u003c/strong>\u003c/td>\u003ctd>Unified interface for OpenAI-compatible APIs (OpenAI, Anthropic, Gemini, OpenRouter) with retry/rate-limit handling\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Configuration\u003c/strong>\u003c/td>\u003ctd>Global (\u003ccode>~/.aether/config.json\u003c/code>) + per-project overrides; env var \u003ccode>AETHER_API_KEY\u003c/code> fallback\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>UI System\u003c/strong>\u003c/td>\u003ctd>Animated startup, interactive readline chat with dropdown completion, step runners with spinners, cancellation/confirmation prompts\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>File System Ops\u003c/strong>\u003c/td>\u003ctd>Repository walking, fingerprinting (SHA-256), git integration, cache management, output writing\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost Estimation\u003c/strong>\u003c/td>\u003ctd>Token/cost estimation for genesis/sync/cleancode using live OpenRouter catalog or static fallback pricing\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Usage Metering\u003c/strong>\u003c/td>\u003ctd>Tracks prompt/completion tokens and call counts per provider session\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing Catalog\u003c/strong>\u003c/td>\u003ctd>24h-cached OpenRouter model pricing with static fallback for 10 common models\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Token Utilities\u003c/strong>\u003c/td>\u003ctd>Token estimation helpers for cost calculations\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Anthropic Provider\u003c/strong>\u003c/td>\u003ctd>Native Anthropic API support via OpenAI-compatible adapter with custom headers\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>OpenRouter Provider\u003c/strong>\u003c/td>\u003ctd>OpenRouter-specific provider with reasoning tokens disabled\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry Logic\u003c/strong>\u003c/td>\u003ctd>Exponential backoff; rate-limit (429) detection with provider-suggested delay upgrade\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Interactive Prompt\u003c/strong>\u003c/td>\u003ctd>Readline loop with \u003ccode>/\u003c/code> command dropdown, keyword responses, rotating tips\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Step Runner\u003c/strong>\u003c/td>\u003ctd>\u003ccode>StepRunner\u003c/code> (sequential/pooled steps with spinners), \u003ccode>LineSpinner\u003c/code> (braille animation)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Theme\u003c/strong>\u003c/td>\u003ctd>Chalk styles: \u003ccode>ACCENT\u003c/code> (#895bf4), \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config Loader\u003c/strong>\u003c/td>\u003ctd>Precedence: project global → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Fingerprinting\u003c/strong>\u003c/td>\u003ctd>SHA-256 hashes of tracked files; git commit/branch/dirty; git log since last snapshot\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Utilities\u003c/strong>\u003c/td>\u003ctd>SHA-256 content hashing (CRLF-normalized); safe env int parsing\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude Management\u003c/strong>\u003c/td>\u003ctd>Per-project path exclusions stored in \u003ccode>.aether/settings/exclude.json\u003c/code>; reduces scan size and cost\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Path Mention Completion\u003c/strong>\u003c/td>\u003ctd>\u003ccode>@\u003c/code> inline dropdown in chat for quick path selection and exclusion\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean Code Review\u003c/strong>\u003c/td>\u003ctd>Heuristic + hybrid AI scan for code quality issues; paradigm-based rules (Clean Code, SOLID, Functional, Google Style); ignore patterns; markdown reports\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt Optimization\u003c/strong>\u003c/td>\u003ctd>Generates optimized, file-referencing prompts for other AI assistants from \u003ccode>.aether/docs/\u003c/code> knowledge base\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-system-components\">System Components\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Component\u003c/th>\u003cth>File(s)\u003c/th>\u003cth>Role\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>CLI Entry\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code>\u003c/td>\u003ctd>Bootstraps app, registers commands, starts animation or banner, launches interactive chat\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command Registry\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/registry.ts\u003c/code>\u003c/td>\u003ctd>Maps slash commands to handlers; parses \u003ccode>/name args\u003c/code> input\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Genesis Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/builtins.ts\u003c/code>\u003c/td>\u003ctd>Orchestrates full analysis: scan → plan → distill → generate → index → snapshot\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Sync Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/builtins.ts\u003c/code>\u003c/td>\u003ctd>Incremental update: diff fingerprints → plan affected docs → regenerate/add → merge snapshot\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/config.ts\u003c/code>\u003c/td>\u003ctd>Manages provider/model/URL/key; quick-setup for 4 providers; show/set subcommands\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/clean.ts\u003c/code>\u003c/td>\u003ctd>Removes global config, cache, or per-project data; lists projects with sizes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/exclude.ts\u003c/code>\u003c/td>\u003ctd>Manages per-project path exclusions (add/remove/list) stored in \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>CleanCode Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003ctd>Hybrid clean-code review: heuristic scan → optional AI review → markdown report; manages ignore patterns and paradigms\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt Command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/prompt.ts\u003c/code>\u003c/td>\u003ctd>Generates optimized prompts for other AI assistants from \u003ccode>.aether/docs/\u003c/code>; staleness check; cost confirmation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Context Scanner\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/context.ts\u003c/code>\u003c/td>\u003ctd>Walks repo (max 10k files, depth 12), collects config/vision/entry/source files, builds directory tree\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude Manager\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code>\u003c/td>\u003ctd>Loads, adds, removes, and checks path exclusions against scanned files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Digest Builder\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/digest.ts\u003c/code>\u003c/td>\u003ctd>Extracts signals (routes, domain logic, tests) and symbols for planner context\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Planner\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/planner.ts\u003c/code>\u003c/td>\u003ctd>Asks LLM which docs to generate (6 core + conditional + up to 5 custom); falls back to core set\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distiller\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/distill.ts\u003c/code>\u003c/td>\u003ctd>Incrementally summarizes large file sets into budgeted notes with chunk caching (SHA-256)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Doc Generator\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/docs.ts\u003c/code>\u003c/td>\u003ctd>13 predefined \u003ccode>DocDefinition\u003c/code>s across 5 sections; builds prompts from \u003ccode>src/prompts/\u003c/code>; writes markdown\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Sync Engine\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003ctd>Diffs fingerprints, plans refreshes/additions, supports section-level patches, merges metadata\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean Code Heuristics\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>\u003c/td>\u003ctd>Static detectors for long functions, deep nesting, magic numbers, dead code, poor naming per paradigm\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean Code Engine\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003ctd>Hybrid scan orchestration: heuristics → flagged files → AI review → report generation; ignore/paradigm persistence\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider Factory\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/factory.ts\u003c/code>\u003c/td>\u003ctd>Creates \u003ccode>OpenAICompatibleProvider\u003c/code> for \u003ccode>openai\u003c/code>/\u003ccode>gemini\u003c/code>/\u003ccode>anthropic\u003c/code>/\u003ccode>openrouter\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>OpenAI-Compatible Provider\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/openai-compatible.ts\u003c/code>\u003c/td>\u003ctd>Implements \u003ccode>LLMProvider\u003c/code> interface: \u003ccode>chat\u003c/code>, \u003ccode>chatStream\u003c/code>, \u003ccode>ping\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Anthropic Provider\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/anthropic.ts\u003c/code>\u003c/td>\u003ctd>Native Anthropic API support via OpenAI-compatible adapter with custom headers\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>OpenRouter Provider\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/openrouter.ts\u003c/code>\u003c/td>\u003ctd>OpenRouter-specific provider with reasoning tokens disabled\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry Logic\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/retry.ts\u003c/code>\u003c/td>\u003ctd>Exponential backoff; rate-limit (429) detection with provider-suggested delay upgrade\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Metered Provider\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/metered.ts\u003c/code>\u003c/td>\u003ctd>Wraps any \u003ccode>LLMProvider\u003c/code> to track token usage and call counts per session\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing Catalog\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003ctd>24h-cached OpenRouter model pricing with static fallback for 10 common models\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost Estimation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003ctd>Token/cost estimation for genesis/sync/cleancode using live or static pricing\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Token Utilities\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/util/tokens.ts\u003c/code>\u003c/td>\u003ctd>Token estimation helpers for cost calculations\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Interactive Prompt\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003ctd>Readline loop with \u003ccode>/\u003c/code> command dropdown, keyword responses, rotating tips, \u003ccode>@\u003c/code> path mentions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Step Runner\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/steps.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>StepRunner\u003c/code> (sequential/pooled steps with spinners), \u003ccode>LineSpinner\u003c/code> (braille animation)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Theme\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/theme.ts\u003c/code>\u003c/td>\u003ctd>Chalk styles: \u003ccode>ACCENT\u003c/code> (#895bf4), \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config Loader\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003ctd>Precedence: project global → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Fingerprinting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/fingerprint.ts\u003c/code>\u003c/td>\u003ctd>SHA-256 hashes of tracked files; git commit/branch/dirty; git log since last snapshot\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Utilities\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/util/hash.ts\u003c/code>, \u003ccode>src/util/env.ts\u003c/code>\u003c/td>\u003ctd>SHA-256 content hashing (CRLF-normalized); safe env int parsing\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cancellation Watcher\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/cancel.ts\u003c/code>\u003c/td>\u003ctd>Raw-mode stdin listener for ESC/q/Ctrl+C to abort long-running operations\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Confirmation Prompt\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/confirm.ts\u003c/code>\u003c/td>\u003ctd>Single-key y/n confirmation with raw-mode TTY support and fallback\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost Formatting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/cost.ts\u003c/code>\u003c/td>\u003ctd>USD formatting and multi-line cost estimate display for genesis/sync/cleancode confirmation\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-communication-patterns\">Communication Patterns\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pattern\u003c/th>\u003cth>Usage\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Slash Commands\u003c/strong>\u003c/td>\u003ctd>Primary CLI interaction: \u003ccode>/genesis\u003c/code>, \u003ccode>/sync\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>, \u003ccode>/help\u003c/code>, \u003ccode>/exit\u003c/code>, \u003ccode>/clear\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Interactive Chat\u003c/strong>\u003c/td>\u003ctd>Readline-based REPL with tab completion and dropdown suggestions for commands and \u003ccode>@\u003c/code> path mentions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>LLM Request/Response\u003c/strong>\u003c/td>\u003ctd>\u003ccode>LLMProvider.chat(request)\u003c/code> → \u003ccode>ChatResponse\u003c/code>; \u003ccode>chatStream\u003c/code> for streaming; all via OpenAI-compatible HTTP\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>File System\u003c/strong>\u003c/td>\u003ctd>Synchronous/async reads for scanning; writes for \u003ccode>.aether/docs/\u003c/code>, \u003ccode>.aether/docs/README.md\u003c/code>, snapshots, cache\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Git Subprocess\u003c/strong>\u003c/td>\u003ctd>\u003ccode>execFileSync\u003c/code> for \u003ccode>git rev-parse\u003c/code>, \u003ccode>git status\u003c/code>, \u003ccode>git log\u003c/code> (fingerprinting, sync diffs)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Inter-Process (SEA)\u003c/strong>\u003c/td>\u003ctd>Single executable bundles Node + script via \u003ccode>esbuild\u003c/code> + \u003ccode>postject\u003c/code> (optional distribution)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost Estimation Flow\u003c/strong>\u003c/td>\u003ctd>\u003ccode>estimateGenesis\u003c/code>/\u003ccode>estimateSync\u003c/code>/\u003ccode>estimateCleanCode\u003c/code> → \u003ccode>getModelPricing\u003c/code> (live OpenRouter catalog → static fallback) → \u003ccode>formatEstimate\u003c/code> for user confirmation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Usage Metering\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MeteredProvider\u003c/code> wraps inner provider; tracks \u003ccode>promptTokens\u003c/code>, \u003ccode>completionTokens\u003c/code>, \u003ccode>calls\u003c/code>; exposes \u003ccode>usage\u003c/code> totals\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cancellation Signal\u003c/strong>\u003c/td>\u003ctd>\u003ccode>AbortController\u003c/code> + \u003ccode>watchCancelKey\u003c/code> (ESC/q/Ctrl+C) → injects \u003ccode>signal\u003c/code> into LLM requests via \u003ccode>MeteredProvider.setSignal\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Confirmation Gate\u003c/strong>\u003c/td>\u003ctd>\u003ccode>promptConfirm\u003c/code> (raw-mode y/n) gates genesis/sync/cleancode execution after cost estimate display\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry with Backoff\u003c/strong>\u003c/td>\u003ctd>\u003ccode>chatWithRetry\u003c/code> wraps \u003ccode>provider.chat\u003c/code>; on 429 upgrades to \u003ccode>RATE_LIMIT_OPTIONS\u003c/code> (6 retries, 15s base); respects abort signals\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing Cache\u003c/strong>\u003c/td>\u003ctd>\u003ccode>loadCatalog\u003c/code> fetches OpenRouter models (8s timeout), caches to \u003ccode>~/.aether/cache/pricing.json\u003c/code> for 24h\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Token Estimation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>estimateTokens\u003c/code> (chars/4) used when provider doesn't return usage; feeds into \u003ccode>MeteredProvider\u003c/code> and cost estimates\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude Filtering\u003c/strong>\u003c/td>\u003ctd>\u003ccode>isExcluded()\u003c/code> checks scanned paths against \u003ccode>.aether/settings/exclude.json\u003c/code> before adding to context\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Path Mention Resolution\u003c/strong>\u003c/td>\u003ctd>\u003ccode>@partial\u003c/code> in chat triggers dropdown of project directories; \u003ccode>/exclude remove @\u003c/code> shows excluded paths instead; \u003ccode>/cleancode review @\u003c/code> shows source files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean Code Review Flow\u003c/strong>\u003c/td>\u003ctd>Heuristic scan → flagged files → optional AI review (hybrid) → markdown report with severity icons and AI cleanup instructions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt Optimization Flow\u003c/strong>\u003c/td>\u003ctd>Staleness check → docs context build → single optimization prompt → SLUG extraction → unique file write to \u003ccode>.aether/prompts/\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-authentication-authorization\">Authentication &amp; Authorization\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>LLM Provider API Keys\u003c/strong>: Stored in global config (\u003ccode>~/.aether/config.json\u003c/code>) per provider/project; masked on display (first 4 + \u003ccode>••••\u003c/code> + last 4)\u003c/li>\u003cli>\u003cstrong>Environment Variable Fallback\u003c/strong>: \u003ccode>AETHER_API_KEY\u003c/code> read by \u003ccode>loadConfig()\u003c/code> if no config entry exists\u003c/li>\u003cli>\u003cstrong>Supported Providers\u003c/strong>: \u003ccode>openai\u003c/code> (requires \u003ccode>OPENAI_API_KEY\u003c/code>), \u003ccode>anthropic\u003c/code> (requires \u003ccode>ANTHROPIC_API_KEY\u003c/code>), \u003ccode>gemini\u003c/code>, \u003ccode>openrouter\u003c/code> (requires \u003ccode>OPENROUTER_API_KEY\u003c/code>)\u003c/li>\u003cli>\u003cstrong>No Project-Level Auth\u003c/strong>: Aether itself has no user authentication; it operates on local repository files\u003c/li>\u003cli>\u003cstrong>Provider-Specific Headers\u003c/strong>: Anthropic provider sends \u003ccode>anthropic-version: 2023-06-01\u003c/code> and \u003ccode>anthropic-dangerous-direct-browser-access: true\u003c/code> headers\u003c/li>\u003cli>\u003cstrong>OpenRouter Reasoning Control\u003c/strong>: OpenRouter provider explicitly disables reasoning tokens via \u003ccode>reasoning: { enabled: false, exclude: true }\u003c/code>\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-deployment\">Deployment\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Installation\u003c/strong>: \u003ccode>npm install -g aether\u003c/code> (bin entry \u003ccode>./dist/cli/index.js\u003c/code>)\u003c/li>\u003cli>\u003cstrong>Build\u003c/strong>: \u003ccode>npm run build\u003c/code> → TypeScript → \u003ccode>dist/\u003c/code> (declaration maps, source maps)\u003c/li>\u003cli>\u003cstrong>Development\u003c/strong>: \u003ccode>npm run dev\u003c/code> → \u003ccode>tsx src/cli/index.ts\u003c/code>\u003c/li>\u003cli>\u003cstrong>SEA Build\u003c/strong>: \u003ccode>npm run build:sea\u003c/code> → \u003ccode>scripts/build-sea.mjs\u003c/code> uses \u003ccode>esbuild\u003c/code> + \u003ccode>postject\u003c/code> to produce single binary\u003c/li>\u003cli>\u003cstrong>Requirements\u003c/strong>: Node.js ≥20 (enforced in \u003ccode>package.json\u003c/code> \u003ccode>engines\u003c/code>)\u003c/li>\u003cli>\u003cstrong>Configuration Persistence\u003c/strong>: Global directory \u003ccode>~/.aether/\u003c/code> (config.json, cache/ per project)\u003c/li>\u003cli>\u003cstrong>Project Output\u003c/strong>: \u003ccode>.aether/\u003c/code> in repository root (docs/, README.md, snapshots) — intended for version control\u003c/li>\u003c/ul>","text":"System Overview Goal Aether is a CLI tool that transforms any codebase into an AI-native workspace by automatically analyzing repository structure, detecting technologies, and generating a comprehensive knowledge base ( .aether/ ) that helps both developers and AI assistants understand the project. It uses a hybrid approach: static analysis first, optional LLM-powered deep analysis second. Architecture Type : Node.js/TypeScript command-line application Runtime : Node.js ≥20 (ESM) Distribution : npm package with global binary ( aether ); optional Single Executable Application (SEA) build via esbuild + postject Layers Layer Responsibility CLI Entry Argument parsing, version flag, interactive/non-interactive mode detection, startup animation/banner Command Registry Slash-command routing ( /genesis , /sync , /config , /clean , /exclude , /cleancode , /prompt , /help , /exit , /clear ) Genesis Pipeline Project scanning → context building → doc planning → distillation → parallel doc generation → snapshot Provider Abstraction Unified interface for OpenAI-compatible APIs (OpenAI, Anthropic, Gemini, OpenRouter) with retry/rate-limit handling Configuration Global ( ~/.aether/config.json ) + per-project overrides; env var AETHER_API_KEY fallback UI System Animated startup, interactive readline chat with dropdown completion, step runners with spinners, cancellation/confirmation prompts File System Ops Repository walking, fingerprinting (SHA-256), git integration, cache management, output writing Cost Estimation Token/cost estimation for genesis/sync/cleancode using live OpenRouter catalog or static fallback pricing Usage Metering Tracks prompt/completion tokens and call counts per provider session Pricing Catalog 24h-cached OpenRouter model pricing with static fallback for 10 common models Token Utilities Token estimation helpers for cost calculations Anthropic Provider Native Anthropic API support via OpenAI-compatible adapter with custom headers OpenRouter Provider OpenRouter-specific provider with reasoning tokens disabled Retry Logic Exponential backoff; rate-limit (429) detection with provider-suggested delay upgrade Interactive Prompt Readline loop with / command dropdown, keyword responses, rotating tips Step Runner StepRunner (sequential/pooled steps with spinners), LineSpinner (braille animation) Theme Chalk styles: ACCENT (#895bf4), DIM , SUCCESS , WARN , ERROR Config Loader Precedence: project global → global default → in-repo override → AETHER_API_KEY env Fingerprinting SHA-256 hashes of tracked files; git commit/branch/dirty; git log since last snapshot Utilities SHA-256 content hashing (CRLF-normalized); safe env int parsing Exclude Management Per-project path exclusions stored in .aether/settings/exclude.json ; reduces scan size and cost Path Mention Completion @ inline dropdown in chat for quick path selection and exclusion Clean Code Review Heuristic + hybrid AI scan for code quality issues; paradigm-based rules (Clean Code, SOLID, Functional, Google Style); ignore patterns; markdown reports Prompt Optimization Generates optimized, file-referencing prompts for other AI assistants from .aether/docs/ knowledge base System Components Component File(s) Role CLI Entry src/cli/index.ts Bootstraps app, registers commands, starts animation or banner, launches interactive chat Command Registry src/commands/registry.ts Maps slash commands to handlers; parses /name args input Genesis Command src/commands/builtins.ts Orchestrates full analysis: scan → plan → distill → generate → index → snapshot Sync Command src/commands/builtins.ts Incremental update: diff fingerprints → plan affected docs → regenerate/add → merge snapshot Config Command src/commands/config.ts Manages provider/model/URL/key; quick-setup for 4 providers; show/set subcommands Clean Command src/commands/clean.ts Removes global config, cache, or per-project data; lists projects with sizes Exclude Command src/commands/exclude.ts Manages per-project path exclusions (add/remove/list) stored in .aether/settings/exclude.json CleanCode Command src/commands/cleancode.ts Hybrid clean-code review: heuristic scan → optional AI review → markdown report; manages ignore patterns and paradigms Prompt Command src/commands/prompt.ts Generates optimized prompts for other AI assistants from .aether/docs/ ; staleness check; cost confirmation Context Scanner src/genesis/context.ts Walks repo (max 10k files, depth 12), collects config/vision/entry/source files, builds directory tree Exclude Manager src/genesis/exclude.ts Loads, adds, removes, and checks path exclusions against scanned files Digest Builder src/genesis/digest.ts Extracts signals (routes, domain logic, tests) and symbols for planner context Planner src/genesis/planner.ts Asks LLM which docs to generate (6 core + conditional + up to 5 custom); falls back to core set Distiller src/genesis/distill.ts Incrementally summarizes large file sets into budgeted notes with chunk caching (SHA-256) Doc Generator src/genesis/docs.ts 13 predefined DocDefinition s across 5 sections; builds prompts from src/prompts/ ; writes markdown Sync Engine src/genesis/sync.ts Diffs fingerprints, plans refreshes/additions, supports section-level patches, merges metadata Clean Code Heuristics src/genesis/cleancode-heuristics.ts Static detectors for long functions, deep nesting, magic numbers, dead code, poor naming per paradigm Clean Code Engine src/genesis/cleancode.ts Hybrid scan orchestration: heuristics → flagged files → AI review → report generation; ignore/paradigm persistence Provider Factory src/providers/factory.ts Creates OpenAICompatibleProvider for openai / gemini / anthropic / openrouter OpenAI-Compatible Provider src/providers/openai-compatible.ts Implements LLMProvider interface: chat , chatStream , ping Anthropic Provider src/providers/anthropic.ts Native Anthropic API support via OpenAI-compatible adapter with custom headers OpenRouter Provider src/providers/openrouter.ts OpenRouter-specific provider with reasoning tokens disabled Retry Logic src/providers/retry.ts Exponential backoff; rate-limit (429) detection with provider-suggested delay upgrade Metered Provider src/providers/metered.ts Wraps any LLMProvider to track token usage and call counts per session Pricing Catalog src/pricing/index.ts 24h-cached OpenRouter model pricing with static fallback for 10 common models Cost Estimation src/genesis/estimate.ts Token/cost estimation for genesis/sync/cleancode using live or static pricing Token Utilities src/util/tokens.ts Token estimation helpers for cost calculations Interactive Prompt src/ui/prompt.ts Readline loop with / command dropdown, keyword responses, rotating tips, @ path mentions Step Runner src/ui/steps.ts StepRunner (sequential/pooled steps with spinners), LineSpinner (braille animation) Theme src/ui/theme.ts Chalk styles: ACCENT (#895bf4), DIM , SUCCESS , WARN , ERROR Config Loader src/config/index.ts Precedence: project global → global default → in-repo override → AETHER_API_KEY env Fingerprinting src/genesis/fingerprint.ts SHA-256 hashes of tracked files; git commit/branch/dirty; git log since last snapshot Utilities src/util/hash.ts , src/util/env.ts SHA-256 content hashing (CRLF-normalized); safe env int parsing Cancellation Watcher src/ui/cancel.ts Raw-mode stdin listener for ESC/q/Ctrl+C to abort long-running operations Confirmation Prompt src/ui/confirm.ts Single-key y/n confirmation with raw-mode TTY support and fallback Cost Formatting src/ui/cost.ts USD formatting and multi-line cost estimate display for genesis/sync/cleancode confirmation Communication Patterns Pattern Usage Slash Commands Primary CLI interaction: /genesis , /sync , /config , /clean , /exclude , /cleancode , /prompt , /help , /exit , /clear Interactive Chat Readline-based REPL with tab completion and dropdown suggestions for commands and @ path mentions LLM Request/Response LLMProvider.chat(request) → ChatResponse ; chatStream for streaming; all via OpenAI-compatible HTTP File System Synchronous/async reads for scanning; writes for .aether/docs/ , .aether/docs/README.md , snapshots, cache Git Subprocess execFileSync for git rev-parse , git status , git log (fingerprinting, sync diffs) Inter-Process (SEA) Single executable bundles Node + script via esbuild + postject (optional distribution) Cost Estimation Flow estimateGenesis / estimateSync / estimateCleanCode → getModelPricing (live OpenRouter catalog → static fallback) → formatEstimate for user confirmation Usage Metering MeteredProvider wraps inner provider; tracks promptTokens , completionTokens , calls ; exposes usage totals Cancellation Signal AbortController + watchCancelKey (ESC/q/Ctrl+C) → injects signal into LLM requests via MeteredProvider.setSignal Confirmation Gate promptConfirm (raw-mode y/n) gates genesis/sync/cleancode execution after cost estimate display Retry with Backoff chatWithRetry wraps provider.chat ; on 429 upgrades to RATE_LIMIT_OPTIONS (6 retries, 15s base); respects abort signals Pricing Cache loadCatalog fetches OpenRouter models (8s timeout), caches to ~/.aether/cache/pricing.json for 24h Token Estimation estimateTokens (chars/4) used when provider doesn't return usage; feeds into MeteredProvider and cost estimates Exclude Filtering isExcluded() checks scanned paths against .aether/settings/exclude.json before adding to context Path Mention Resolution @partial in chat triggers dropdown of project directories; /exclude remove @ shows excluded paths instead; /cleancode review @ shows source files Clean Code Review Flow Heuristic scan → flagged files → optional AI review (hybrid) → markdown report with severity icons and AI cleanup instructions Prompt Optimization Flow Staleness check → docs context build → single optimization prompt → SLUG extraction → unique file write to .aether/prompts/ Authentication & Authorization LLM Provider API Keys : Stored in global config ( ~/.aether/config.json ) per provider/project; masked on display (first 4 + •••• + last 4) Environment Variable Fallback : AETHER_API_KEY read by loadConfig() if no config entry exists Supported Providers : openai (requires OPENAI_API_KEY ), anthropic (requires ANTHROPIC_API_KEY ), gemini , openrouter (requires OPENROUTER_API_KEY ) No Project-Level Auth : Aether itself has no user authentication; it operates on local repository files Provider-Specific Headers : Anthropic provider sends anthropic-version: 2023-06-01 and anthropic-dangerous-direct-browser-access: true headers OpenRouter Reasoning Control : OpenRouter provider explicitly disables reasoning tokens via reasoning: { enabled: false, exclude: true } Deployment Installation : npm install -g aether (bin entry ./dist/cli/index.js ) Build : npm run build → TypeScript → dist/ (declaration maps, source maps) Development : npm run dev → tsx src/cli/index.ts SEA Build : npm run build:sea → scripts/build-sea.mjs uses esbuild + postject to produce single binary Requirements : Node.js ≥20 (enforced in package.json engines ) Configuration Persistence : Global directory ~/.aether/ (config.json, cache/ per project) Project Output : .aether/ in repository root (docs/, README.md, snapshots) — intended for version control"},{"id":"architecture/folder-structure","title":"Folder Structure","section":"Architecture","summary":"Directory layout and where things live.","html":"\u003ch1 id=\"md-folder-structure\">Folder Structure\u003c/h1>\n\u003ch2 id=\"md-overview\">Overview\u003c/h2>\n\u003cp>Aether is a TypeScript-based CLI tool built with Node.js (ESM) that transforms codebases into AI-native workspaces. The project follows a modular architecture with clear separation between CLI entry points, command implementations, core domain logic (genesis), AI provider abstractions, prompt templates, UI components, and utilities. The codebase uses strict TypeScript with ES modules and targets Node.js 20+.\u003c/p>\n\u003ch2 id=\"md-root-structure\">Root Structure\u003c/h2>\n\u003cpre class=\"tree\">\u003ccode>aether/\n├── scripts/                 # Build and utility scripts\n│   ├── build-sea.mjs        # Single Executable Application build script (uses esbuild + postject)\n│   ├── install.ps1          # Windows PowerShell installer\n│   └── install.sh           # macOS/Linux shell installer\n├── src/                     # TypeScript source code (rootDir for tsc)\n├── dist/                    # Compiled output (outDir, gitignored)\n├── node_modules/            # Dependencies (gitignored)\n├── .aether/                 # Generated knowledge base output (gitignored, created at runtime)\n├── CONTRIBUTING.md          # Contribution guidelines\n├── LICENSE                  # MIT license\n├── package.json             # Package manifest (name: &quot;aether&quot;, version: &quot;0.2.0&quot;)\n├── package-lock.json        # Lockfile\n├── README.md                # Project documentation\n├── sea-config.json          # SEA (Single Executable Application) config\n└── tsconfig.json            # TypeScript configuration (ES2022, NodeNext, strict)\u003c/code>\u003c/pre>\n\u003ch2 id=\"md-source-structure\">Source Structure\u003c/h2>\n\u003cpre class=\"tree\">\u003ccode>src/\n├── cli/\n│   └── index.ts             # CLI entry point (main(), version flag, command registration, startup animation)\n├── commands/\n│   ├── builtins.ts          # Registers built-in commands (genesis, sync, doctor, explain, export)\n│   ├── clean.ts             # /clean command implementation\n│   ├── cleancode.ts         # /cleancode command (review, ignore, paradigm)\n│   ├── config.ts            # /config command (provider/model/key/url configuration)\n│   ├── exclude.ts           # /exclude command (skip large paths during genesis/sync)\n│   ├── help.ts              # /help command (lists registered commands)\n│   ├── prompt.ts            # /prompt command (optimize developer task into AI prompt)\n│   └── registry.ts          # CommandRegistry class + global registry instance\n├── config/\n│   ├── index.ts             # Config loading/saving/validation (global + per-project)\n│   ├── readme.ts            # AETHER_README constant for .aether/README.md\n│   ├── scaffold.ts          # ensureProjectReadme() writes .aether/README.md\n│   └── types.ts             # AetherConfig interface (provider, model, baseUrl, apiKey, timeout)\n├── genesis/\n│   ├── cleancode-heuristics.ts  # Heuristic clean-code scan (regex-based, no AI)\n│   ├── cleancode.ts             # Hybrid clean-code review (heuristics + AI), report generation\n│   ├── constants.ts             # Env-overridable constants (MAX_FILE_SIZE, MAX_TOTAL_CHARS, etc.)\n│   ├── context.ts               # ProjectContext, FileContent, scanContext()\n│   ├── digest.ts                # buildPlannerDigest(), detectSignals(), extractSymbols()\n│   ├── distill.ts               # distillFilesIncremental(), distill cache logic\n│   ├── docs.ts                  # DocDefinition[], DOC_DEFINITIONS (13 docs), buildDocPrompt()\n│   ├── estimate.ts              # estimateGenesis(), estimateSync(), CostEstimate interface\n│   ├── exclude.ts               # Exclude list management (loadExcludes, addExclude, removeExclude, isExcluded)\n│   ├── fingerprint.ts           # buildFingerprint(), getGitInfo(), getGitLog()\n│   ├── planner.ts               # planDocs(), parsePlan(), CORE_IDS, MAX_CUSTOM_DOCS\n│   ├── scope.ts                 # buildSharedProjectContext(), distill cache load/save\n│   ├── sync.ts                  # Sync logic (planned, not fully implemented)\n│   └── types.ts                 # Core types: ProjectContext, FileFingerprint, GitInfo, DocDefinition, Snapshot, SyncPlan\n├── pricing/\n│   └── index.ts             # Model pricing catalog (OpenRouter + static fallback), getModelPricing()\n├── prompts/\n│   ├── base.ts              # BASE_PROMPT, PROMPT_SUFFIX, HUMAN_BASE_PROMPT, HUMAN_PROMPT_SUFFIX\n│   ├── index.ts             # Barrel export for all prompts\n│   ├── docs/                # Per-document prompt templates (13 files)\n│   │   ├── ai-context.ts\n│   │   ├── api.ts\n│   │   ├── business.ts\n│   │   ├── coding-standards.ts\n│   │   ├── contributing.ts\n│   │   ├── custom-doc.ts\n│   │   ├── diagrams.ts\n│   │   ├── folder-structure.ts\n│   │   ├── getting-started.ts\n│   │   ├── glossary.ts\n│   │   ├── modules.ts\n│   │   ├── onboarding.ts\n│   │   ├── system-overview.ts\n│   │   └── tech-stack.ts\n│   └── pipeline/\n│       ├── cleancode.ts     # CLEANCODE paradigms, buildCleanCodeScanPrompt()\n│       ├── optimize.ts      # OPTIMIZE_PROMPT, buildOptimizePrompt()\n│       ├── planner.ts       # PLANNER_PROMPT\n│       └── sync.ts          # SYNC_PLANNER_PROMPT, DOC_UPDATE_INSTRUCTIONS, SECTION_PATCH_INSTRUCTIONS\n├── providers/\n│   ├── anthropic.ts         # AnthropicProvider (extends OpenAICompatibleProvider)\n│   ├── factory.ts           # createProvider(config) → LLMProvider\n│   ├── index.ts             # Barrel export (types, OpenAICompatibleProvider, createProvider)\n│   ├── metered.ts           # MeteredProvider (usage tracking), UsageTotals\n│   ├── openai-compatible.ts # OpenAICompatibleProvider (OpenAI, Gemini, Anthropic, OpenRouter base)\n│   ├── openrouter.ts        # OpenRouterProvider (extends OpenAICompatibleProvider, disables reasoning)\n│   ├── retry.ts             # chatWithRetry() with exponential backoff, rate-limit handling\n│   └── types.ts             # LLMProvider, ChatMessage, ChatRequest, ChatResponse, StreamChunk, PingResult\n├── ui/\n│   ├── animation.ts         # playStartupAnimation(), printBanner()\n│   ├── cancel.ts            # Cancellation token / AbortSignal helpers\n│   ├── confirm.ts           # Confirmation prompts\n│   ├── cost.ts              # Cost display formatting\n│   ├── prompt.ts            # startChat(), readline interface with slash-command dropdown\n│   ├── steps.ts             # StepRunner, LineSpinner (concurrent step rendering)\n│   └── theme.ts             # Chalk theme constants (ACCENT, DIM, SUCCESS, WARN, ERROR)\n└── util/\n    ├── env.ts               # envInt() helper for env-overridable integers\n    ├── hash.ts              # hashContent() → SHA-256 hex (normalizes CRLF)\n    └── tokens.ts            # Token estimation utilities\u003c/code>\u003c/pre>\n\u003ch2 id=\"md-naming-conventions\">Naming Conventions\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pattern\u003c/th>\u003cth>Example\u003c/th>\u003cth>Source\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Directories\u003c/strong>\u003c/td>\u003ctd>kebab-case\u003c/td>\u003ctd>\u003ccode>src/commands/\u003c/code>, \u003ccode>src/prompts/docs/\u003c/code>, \u003ccode>src/ui/\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>TypeScript files\u003c/strong>\u003c/td>\u003ctd>kebab-case + \u003ccode>.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code>, \u003ccode>src/genesis/constants.ts\u003c/code>, \u003ccode>src/providers/openrouter.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Barrel exports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>index.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/prompts/index.ts\u003c/code>, \u003ccode>src/providers/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Type definitions\u003c/strong>\u003c/td>\u003ctd>\u003ccode>types.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/types.ts\u003c/code>, \u003ccode>src/config/types.ts\u003c/code>, \u003ccode>src/providers/types.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Constants\u003c/strong>\u003c/td>\u003ctd>\u003ccode>constants.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Interfaces\u003c/strong>\u003c/td>\u003ctd>PascalCase\u003c/td>\u003ctd>\u003ccode>AetherConfig\u003c/code>, \u003ccode>ProjectContext\u003c/code>, \u003ccode>LLMProvider\u003c/code>, \u003ccode>Command\u003c/code>, \u003ccode>CostEstimate\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Functions\u003c/strong>\u003c/td>\u003ctd>camelCase\u003c/td>\u003ctd>\u003ccode>buildPlannerDigest()\u003c/code>, \u003ccode>createProvider()\u003c/code>, \u003ccode>hashContent()\u003c/code>, \u003ccode>getModelPricing()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Constants (values)\u003c/strong>\u003c/td>\u003ctd>UPPER_SNAKE_CASE\u003c/td>\u003ctd>\u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>ACCENT_HEX\u003c/code>, \u003ccode>MAX_CUSTOM_DOCS\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt constants\u003c/strong>\u003c/td>\u003ctd>UPPER_SNAKE_CASE + \u003ccode>_PROMPT\u003c/code>\u003c/td>\u003ctd>\u003ccode>GETTING_STARTED_PROMPT\u003c/code>, \u003ccode>PLANNER_PROMPT\u003c/code>, \u003ccode>SYNC_PLANNER_PROMPT\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config keys\u003c/strong>\u003c/td>\u003ctd>camelCase\u003c/td>\u003ctd>\u003ccode>provider\u003c/code>, \u003ccode>model\u003c/code>, \u003ccode>baseUrl\u003c/code>, \u003ccode>apiKey\u003c/code>, \u003ccode>timeout\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing constants\u003c/strong>\u003c/td>\u003ctd>UPPER_SNAKE_CASE\u003c/td>\u003ctd>\u003ccode>OPENROUTER_MODELS_URL\u003c/code>, \u003ccode>CACHE_TTL_MS\u003c/code>, \u003ccode>STATIC_PER_MTOK\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>UI components\u003c/strong>\u003c/td>\u003ctd>PascalCase + suffix\u003c/td>\u003ctd>\u003ccode>StepRunner\u003c/code>, \u003ccode>LineSpinner\u003c/code>, \u003ccode>MeteredProvider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Utility functions\u003c/strong>\u003c/td>\u003ctd>camelCase + verb\u003c/td>\u003ctd>\u003ccode>envInt()\u003c/code>, \u003ccode>hashContent()\u003c/code>, \u003ccode>tokensFromChars()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Type definitions\u003c/strong>\u003c/td>\u003ctd>PascalCase + suffix\u003c/td>\u003ctd>\u003ccode>CostEstimate\u003c/code>, \u003ccode>UsageTotals\u003c/code>, \u003ccode>DistillCache\u003c/code>, \u003ccode>SyncPlan\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean-code paradigms\u003c/strong>\u003c/td>\u003ctd>kebab-case\u003c/td>\u003ctd>\u003ccode>clean-code\u003c/code>, \u003ccode>solid\u003c/code>, \u003ccode>functional\u003c/code>, \u003ccode>google-style\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean-code categories\u003c/strong>\u003c/td>\u003ctd>kebab-case\u003c/td>\u003ctd>\u003ccode>long-function\u003c/code>, \u003ccode>deep-nesting\u003c/code>, \u003ccode>magic-number\u003c/code>, \u003ccode>srp-violation\u003c/code>, \u003ccode>side-effect\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-key-files\">Key Files\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>File\u003c/th>\u003cth>Purpose\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>CLI entry point\u003c/strong> — \u003ccode>main()\u003c/code> handles version flag, command registration order, interactive detection, startup animation, chat loop\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>package.json\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Package manifest\u003c/strong> — name, version, bin entry (\u003ccode>aether\u003c/code> → \u003ccode>dist/cli/index.js\u003c/code>), scripts (\u003ccode>build\u003c/code>, \u003ccode>dev\u003c/code>, \u003ccode>build:sea\u003c/code>), dependencies (\u003ccode>chalk\u003c/code>, \u003ccode>@clack/core\u003c/code>), devDependencies (\u003ccode>typescript\u003c/code>, \u003ccode>tsx\u003c/code>, \u003ccode>esbuild\u003c/code>, \u003ccode>postject\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>tsconfig.json\u003c/code>\u003c/td>\u003ctd>\u003cstrong>TypeScript config\u003c/strong> — ES2022, NodeNext modules, strict mode, declaration maps, source maps, outDir \u003ccode>./dist\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/commands/registry.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>CommandRegistry\u003c/strong> — registers \u003ccode>/genesis\u003c/code>, \u003ccode>/sync\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/help\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>; parses \u003ccode>/command args\u003c/code> input\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Config system\u003c/strong> — \u003ccode>loadConfig()\u003c/code> (precedence: project global → global default → in-repo → env), \u003ccode>saveConfig()\u003c/code>, \u003ccode>validateConfig()\u003c/code>, \u003ccode>getGlobalDir()\u003c/code> (\u003ccode>~/.aether\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/types.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Core domain types\u003c/strong> — \u003ccode>ProjectContext\u003c/code>, \u003ccode>FileFingerprint\u003c/code>, \u003ccode>DocDefinition\u003c/code>, \u003ccode>Snapshot\u003c/code>, \u003ccode>SyncPlan\u003c/code>, \u003ccode>DocSection\u003c/code> enum, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/docs.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Document catalog\u003c/strong> — 13 \u003ccode>DocDefinition\u003c/code> constants in \u003ccode>DOC_DEFINITIONS\u003c/code> (Guides: 3, Architecture: 5, Reference: 4, AI Context: 1)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/planner.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>AI planning\u003c/strong> — \u003ccode>planDocs()\u003c/code> calls LLM to select docs, falls back to \u003ccode>CORE_IDS\u003c/code> (6 core docs), limits custom docs to 5\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/providers/factory.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Provider factory\u003c/strong> — \u003ccode>createProvider()\u003c/code> switches on \u003ccode>config.provider\u003c/code> (openai, gemini, anthropic, openrouter) → \u003ccode>OpenAICompatibleProvider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/providers/retry.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Retry logic\u003c/strong> — \u003ccode>chatWithRetry()\u003c/code> with exponential backoff, rate-limit detection (429), provider-suggested delays\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Interactive REPL\u003c/strong> — \u003ccode>startChat()\u003c/code> with readline, slash-command dropdown (\u003ccode>/genesis\u003c/code>, \u003ccode>/config\u003c/code>, \u003ccode>/exclude\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>, etc.), keyword responses\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/steps.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Step rendering\u003c/strong> — \u003ccode>StepRunner\u003c/code> (sequential/pooled steps with spinners), \u003ccode>LineSpinner\u003c/code> (braille animation frames)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/scope.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Shared context builder\u003c/strong> — \u003ccode>buildSharedProjectContext()\u003c/code> builds/distills project context once for all docs, uses distill cache\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Cost estimation\u003c/strong> — \u003ccode>estimateGenesis()\u003c/code>, \u003ccode>estimateSync()\u003c/code>, \u003ccode>CostEstimate\u003c/code> interface with token/cost breakdown\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Model pricing\u003c/strong> — \u003ccode>getModelPricing()\u003c/code> fetches from OpenRouter catalog (24h cache) with static fallback for 10 models\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/providers/metered.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Usage tracking\u003c/strong> — \u003ccode>MeteredProvider\u003c/code> wraps providers, tracks \u003ccode>UsageTotals\u003c/code> (prompt/completion tokens, calls, estimated cost)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code>\u003c/td>\u003ctd>\u003cstrong>SEA build\u003c/strong> — esbuild bundles to \u003ccode>dist/sea-prep.js\u003c/code>, postject injects into Node binary → \u003ccode>dist/aether\u003c/code> (single executable)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/commands/exclude.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Exclude command\u003c/strong> — \u003ccode>/exclude &lt;path&gt;\u003c/code> to skip large paths during genesis/sync, stores in \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Exclude logic\u003c/strong> — \u003ccode>loadExcludes()\u003c/code>, \u003ccode>addExclude()\u003c/code>, \u003ccode>removeExclude()\u003c/code>, \u003ccode>isExcluded()\u003c/code> for path filtering during scan\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/context.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Project scanning\u003c/strong> — \u003ccode>scanContext()\u003c/code> builds \u003ccode>ProjectContext\u003c/code> with config/vision/entry/source files, respects excludes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/commands/builtins.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Built-in commands\u003c/strong> — registers \u003ccode>genesis\u003c/code>, \u003ccode>sync\u003c/code>, \u003ccode>exit\u003c/code>, \u003ccode>clear\u003c/code> with handlers, cost estimation, confirmation, parallel generation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Clean-code command\u003c/strong> — \u003ccode>/cleancode review [path] [--yes]\u003c/code>, \u003ccode>/cleancode ignore [pattern]\u003c/code>, \u003ccode>/cleancode paradigm [name]\u003c/code>; hybrid AI+heuristic review with cost confirmation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Hybrid clean-code review\u003c/strong> — \u003ccode>scanCleanCodeHeuristics()\u003c/code>, \u003ccode>scanCleanCodeHybrid()\u003c/code>, \u003ccode>buildCleanCodeReport()\u003c/code>, \u003ccode>buildCleanCodeMarkdown()\u003c/code>; writes \u003ccode>.aether/cleancode-report.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Heuristic clean-code scan\u003c/strong> — regex-based detection for \u003ccode>long-function\u003c/code>, \u003ccode>deep-nesting\u003c/code>, \u003ccode>magic-number\u003c/code>, \u003ccode>naming\u003c/code>, \u003ccode>duplication\u003c/code>, \u003ccode>dead-code\u003c/code>, \u003ccode>error-handling\u003c/code>, \u003ccode>complexity\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Clean-code prompts\u003c/strong> — 4 paradigms (\u003ccode>clean-code\u003c/code>, \u003ccode>solid\u003c/code>, \u003ccode>functional\u003c/code>, \u003ccode>google-style\u003c/code>), \u003ccode>buildCleanCodeScanPrompt()\u003c/code> outputs JSON array of violations\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/prompts/pipeline/optimize.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Optimize prompt\u003c/strong> — \u003ccode>OPTIMIZE_PROMPT\u003c/code>, \u003ccode>buildOptimizePrompt()\u003c/code> turns developer task into optimized prompt for another AI coding assistant\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/commands/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Prompt command\u003c/strong> — \u003ccode>/prompt &lt;intent&gt;\u003c/code> optimizes a developer task into an AI-ready prompt using project context\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Env-overridable constants\u003c/strong> — \u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>MAX_TOTAL_CHARS\u003c/code>, \u003ccode>MAX_FILES_WALKED\u003c/code>, \u003ccode>MAX_WALK_DEPTH\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>DISTILL_CONCURRENCY\u003c/code>, \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/animation.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Startup animation\u003c/strong> — \u003ccode>playStartupAnimation()\u003c/code> (animated logo with stars), \u003ccode>printBanner()\u003c/code> (static fallback)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003ccode>src/ui/theme.ts\u003c/code>\u003c/td>\u003ctd>\u003cstrong>Theme constants\u003c/strong> — \u003ccode>ACCENT_HEX\u003c/code>, \u003ccode>ACCENT\u003c/code>, \u003ccode>ACCENT_BOLD\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code> (chalk-based)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","text":"Folder Structure Overview Aether is a TypeScript-based CLI tool built with Node.js (ESM) that transforms codebases into AI-native workspaces. The project follows a modular architecture with clear separation between CLI entry points, command implementations, core domain logic (genesis), AI provider abstractions, prompt templates, UI components, and utilities. The codebase uses strict TypeScript with ES modules and targets Node.js 20+. Root Structure aether/ ├── scripts/ # Build and utility scripts │ ├── build-sea.mjs # Single Executable Application build script (uses esbuild + postject) │ ├── install.ps1 # Windows PowerShell installer │ └── install.sh # macOS/Linux shell installer ├── src/ # TypeScript source code (rootDir for tsc) ├── dist/ # Compiled output (outDir, gitignored) ├── node_modules/ # Dependencies (gitignored) ├── .aether/ # Generated knowledge base output (gitignored, created at runtime) ├── CONTRIBUTING.md # Contribution guidelines ├── LICENSE # MIT license ├── package.json # Package manifest (name: \"aether\", version: \"0.2.0\") ├── package-lock.json # Lockfile ├── README.md # Project documentation ├── sea-config.json # SEA (Single Executable Application) config └── tsconfig.json # TypeScript configuration (ES2022, NodeNext, strict) Source Structure src/ ├── cli/ │ └── index.ts # CLI entry point (main(), version flag, command registration, startup animation) ├── commands/ │ ├── builtins.ts # Registers built-in commands (genesis, sync, doctor, explain, export) │ ├── clean.ts # /clean command implementation │ ├── cleancode.ts # /cleancode command (review, ignore, paradigm) │ ├── config.ts # /config command (provider/model/key/url configuration) │ ├── exclude.ts # /exclude command (skip large paths during genesis/sync) │ ├── help.ts # /help command (lists registered commands) │ ├── prompt.ts # /prompt command (optimize developer task into AI prompt) │ └── registry.ts # CommandRegistry class + global registry instance ├── config/ │ ├── index.ts # Config loading/saving/validation (global + per-project) │ ├── readme.ts # AETHER_README constant for .aether/README.md │ ├── scaffold.ts # ensureProjectReadme() writes .aether/README.md │ └── types.ts # AetherConfig interface (provider, model, baseUrl, apiKey, timeout) ├── genesis/ │ ├── cleancode-heuristics.ts # Heuristic clean-code scan (regex-based, no AI) │ ├── cleancode.ts # Hybrid clean-code review (heuristics + AI), report generation │ ├── constants.ts # Env-overridable constants (MAX_FILE_SIZE, MAX_TOTAL_CHARS, etc.) │ ├── context.ts # ProjectContext, FileContent, scanContext() │ ├── digest.ts # buildPlannerDigest(), detectSignals(), extractSymbols() │ ├── distill.ts # distillFilesIncremental(), distill cache logic │ ├── docs.ts # DocDefinition[], DOC_DEFINITIONS (13 docs), buildDocPrompt() │ ├── estimate.ts # estimateGenesis(), estimateSync(), CostEstimate interface │ ├── exclude.ts # Exclude list management (loadExcludes, addExclude, removeExclude, isExcluded) │ ├── fingerprint.ts # buildFingerprint(), getGitInfo(), getGitLog() │ ├── planner.ts # planDocs(), parsePlan(), CORE_IDS, MAX_CUSTOM_DOCS │ ├── scope.ts # buildSharedProjectContext(), distill cache load/save │ ├── sync.ts # Sync logic (planned, not fully implemented) │ └── types.ts # Core types: ProjectContext, FileFingerprint, GitInfo, DocDefinition, Snapshot, SyncPlan ├── pricing/ │ └── index.ts # Model pricing catalog (OpenRouter + static fallback), getModelPricing() ├── prompts/ │ ├── base.ts # BASE_PROMPT, PROMPT_SUFFIX, HUMAN_BASE_PROMPT, HUMAN_PROMPT_SUFFIX │ ├── index.ts # Barrel export for all prompts │ ├── docs/ # Per-document prompt templates (13 files) │ │ ├── ai-context.ts │ │ ├── api.ts │ │ ├── business.ts │ │ ├── coding-standards.ts │ │ ├── contributing.ts │ │ ├── custom-doc.ts │ │ ├── diagrams.ts │ │ ├── folder-structure.ts │ │ ├── getting-started.ts │ │ ├── glossary.ts │ │ ├── modules.ts │ │ ├── onboarding.ts │ │ ├── system-overview.ts │ │ └── tech-stack.ts │ └── pipeline/ │ ├── cleancode.ts # CLEANCODE paradigms, buildCleanCodeScanPrompt() │ ├── optimize.ts # OPTIMIZE_PROMPT, buildOptimizePrompt() │ ├── planner.ts # PLANNER_PROMPT │ └── sync.ts # SYNC_PLANNER_PROMPT, DOC_UPDATE_INSTRUCTIONS, SECTION_PATCH_INSTRUCTIONS ├── providers/ │ ├── anthropic.ts # AnthropicProvider (extends OpenAICompatibleProvider) │ ├── factory.ts # createProvider(config) → LLMProvider │ ├── index.ts # Barrel export (types, OpenAICompatibleProvider, createProvider) │ ├── metered.ts # MeteredProvider (usage tracking), UsageTotals │ ├── openai-compatible.ts # OpenAICompatibleProvider (OpenAI, Gemini, Anthropic, OpenRouter base) │ ├── openrouter.ts # OpenRouterProvider (extends OpenAICompatibleProvider, disables reasoning) │ ├── retry.ts # chatWithRetry() with exponential backoff, rate-limit handling │ └── types.ts # LLMProvider, ChatMessage, ChatRequest, ChatResponse, StreamChunk, PingResult ├── ui/ │ ├── animation.ts # playStartupAnimation(), printBanner() │ ├── cancel.ts # Cancellation token / AbortSignal helpers │ ├── confirm.ts # Confirmation prompts │ ├── cost.ts # Cost display formatting │ ├── prompt.ts # startChat(), readline interface with slash-command dropdown │ ├── steps.ts # StepRunner, LineSpinner (concurrent step rendering) │ └── theme.ts # Chalk theme constants (ACCENT, DIM, SUCCESS, WARN, ERROR) └── util/ ├── env.ts # envInt() helper for env-overridable integers ├── hash.ts # hashContent() → SHA-256 hex (normalizes CRLF) └── tokens.ts # Token estimation utilities Naming Conventions Pattern Example Source Directories kebab-case src/commands/ , src/prompts/docs/ , src/ui/ TypeScript files kebab-case + .ts src/cli/index.ts , src/genesis/constants.ts , src/providers/openrouter.ts Barrel exports index.ts src/prompts/index.ts , src/providers/index.ts Type definitions types.ts src/genesis/types.ts , src/config/types.ts , src/providers/types.ts Constants constants.ts src/genesis/constants.ts Interfaces PascalCase AetherConfig , ProjectContext , LLMProvider , Command , CostEstimate Functions camelCase buildPlannerDigest() , createProvider() , hashContent() , getModelPricing() Constants (values) UPPER_SNAKE_CASE MAX_FILE_SIZE , DOC_CONTEXT_BUDGET , ACCENT_HEX , MAX_CUSTOM_DOCS Prompt constants UPPER_SNAKE_CASE + _PROMPT GETTING_STARTED_PROMPT , PLANNER_PROMPT , SYNC_PLANNER_PROMPT Config keys camelCase provider , model , baseUrl , apiKey , timeout Pricing constants UPPER_SNAKE_CASE OPENROUTER_MODELS_URL , CACHE_TTL_MS , STATIC_PER_MTOK UI components PascalCase + suffix StepRunner , LineSpinner , MeteredProvider Utility functions camelCase + verb envInt() , hashContent() , tokensFromChars() Type definitions PascalCase + suffix CostEstimate , UsageTotals , DistillCache , SyncPlan Clean-code paradigms kebab-case clean-code , solid , functional , google-style Clean-code categories kebab-case long-function , deep-nesting , magic-number , srp-violation , side-effect Key Files File Purpose src/cli/index.ts CLI entry point — main() handles version flag, command registration order, interactive detection, startup animation, chat loop package.json Package manifest — name, version, bin entry ( aether → dist/cli/index.js ), scripts ( build , dev , build:sea ), dependencies ( chalk , @clack/core ), devDependencies ( typescript , tsx , esbuild , postject ) tsconfig.json TypeScript config — ES2022, NodeNext modules, strict mode, declaration maps, source maps, outDir ./dist src/commands/registry.ts CommandRegistry — registers /genesis , /sync , /config , /clean , /help , /exclude , /cleancode , /prompt ; parses /command args input src/config/index.ts Config system — loadConfig() (precedence: project global → global default → in-repo → env), saveConfig() , validateConfig() , getGlobalDir() ( ~/.aether ) src/genesis/types.ts Core domain types — ProjectContext , FileFingerprint , DocDefinition , Snapshot , SyncPlan , DocSection enum, CleanCodeIssue , CleanCodeReport , CleanCodeParadigm src/genesis/docs.ts Document catalog — 13 DocDefinition constants in DOC_DEFINITIONS (Guides: 3, Architecture: 5, Reference: 4, AI Context: 1) src/genesis/planner.ts AI planning — planDocs() calls LLM to select docs, falls back to CORE_IDS (6 core docs), limits custom docs to 5 src/providers/factory.ts Provider factory — createProvider() switches on config.provider (openai, gemini, anthropic, openrouter) → OpenAICompatibleProvider src/providers/retry.ts Retry logic — chatWithRetry() with exponential backoff, rate-limit detection (429), provider-suggested delays src/ui/prompt.ts Interactive REPL — startChat() with readline, slash-command dropdown ( /genesis , /config , /exclude , /cleancode , /prompt , etc.), keyword responses src/ui/steps.ts Step rendering — StepRunner (sequential/pooled steps with spinners), LineSpinner (braille animation frames) src/genesis/scope.ts Shared context builder — buildSharedProjectContext() builds/distills project context once for all docs, uses distill cache src/genesis/estimate.ts Cost estimation — estimateGenesis() , estimateSync() , CostEstimate interface with token/cost breakdown src/pricing/index.ts Model pricing — getModelPricing() fetches from OpenRouter catalog (24h cache) with static fallback for 10 models src/providers/metered.ts Usage tracking — MeteredProvider wraps providers, tracks UsageTotals (prompt/completion tokens, calls, estimated cost) scripts/build-sea.mjs SEA build — esbuild bundles to dist/sea-prep.js , postject injects into Node binary → dist/aether (single executable) src/commands/exclude.ts Exclude command — /exclude \u003cpath> to skip large paths during genesis/sync, stores in .aether/settings/exclude.json src/genesis/exclude.ts Exclude logic — loadExcludes() , addExclude() , removeExclude() , isExcluded() for path filtering during scan src/genesis/context.ts Project scanning — scanContext() builds ProjectContext with config/vision/entry/source files, respects excludes src/commands/builtins.ts Built-in commands — registers genesis , sync , exit , clear with handlers, cost estimation, confirmation, parallel generation src/commands/cleancode.ts Clean-code command — /cleancode review [path] [--yes] , /cleancode ignore [pattern] , /cleancode paradigm [name] ; hybrid AI+heuristic review with cost confirmation src/genesis/cleancode.ts Hybrid clean-code review — scanCleanCodeHeuristics() , scanCleanCodeHybrid() , buildCleanCodeReport() , buildCleanCodeMarkdown() ; writes .aether/cleancode-report.md src/genesis/cleancode-heuristics.ts Heuristic clean-code scan — regex-based detection for long-function , deep-nesting , magic-number , naming , duplication , dead-code , error-handling , complexity src/prompts/pipeline/cleancode.ts Clean-code prompts — 4 paradigms ( clean-code , solid , functional , google-style ), buildCleanCodeScanPrompt() outputs JSON array of violations src/prompts/pipeline/optimize.ts Optimize prompt — OPTIMIZE_PROMPT , buildOptimizePrompt() turns developer task into optimized prompt for another AI coding assistant src/commands/prompt.ts Prompt command — /prompt \u003cintent> optimizes a developer task into an AI-ready prompt using project context src/genesis/constants.ts Env-overridable constants — MAX_FILE_SIZE , MAX_TOTAL_CHARS , MAX_FILES_WALKED , MAX_WALK_DEPTH , DOC_CONTEXT_BUDGET , GEN_CONCURRENCY , DISTILL_CONCURRENCY , CLEANCODE_CONTEXT_BUDGET src/ui/animation.ts Startup animation — playStartupAnimation() (animated logo with stars), printBanner() (static fallback) src/ui/theme.ts Theme constants — ACCENT_HEX , ACCENT , ACCENT_BOLD , DIM , SUCCESS , WARN , ERROR (chalk-based)"},{"id":"architecture/tech-stack","title":"Tech Stack","section":"Architecture","summary":"Languages, frameworks, and key dependencies.","html":"\u003ch1 id=\"md-tech-stack\">Tech Stack\u003c/h1>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Category\u003c/th>\u003cth>Technology\u003c/th>\u003cth>Version\u003c/th>\u003cth>Purpose\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Languages\u003c/strong>\u003c/td>\u003ctd>TypeScript\u003c/td>\u003ctd>5.8.3\u003c/td>\u003ctd>Primary language; strict type checking, ES2022 target, NodeNext modules\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>JavaScript (ESM)\u003c/td>\u003ctd>—\u003c/td>\u003ctd>Runtime via Node.js; \u003ccode>type: &quot;module&quot;\u003c/code> in package.json\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Runtime\u003c/strong>\u003c/td>\u003ctd>Node.js\u003c/td>\u003ctd>≥20.0.0\u003c/td>\u003ctd>Execution environment; required by \u003ccode>engines\u003c/code> field\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Build Tools\u003c/strong>\u003c/td>\u003ctd>TypeScript Compiler (tsc)\u003c/td>\u003ctd>5.8.3\u003c/td>\u003ctd>Compiles \u003ccode>src/\u003c/code> → \u003ccode>dist/\u003c/code>; emits declarations, source maps\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>tsx\u003c/td>\u003ctd>4.19.4\u003c/td>\u003ctd>Development runner (\u003ccode>npm run dev\u003c/code>); executes TS directly\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>esbuild\u003c/td>\u003ctd>0.28.1\u003c/td>\u003ctd>Used in \u003ccode>scripts/build-sea.mjs\u003c/code> for Single Executable Application bundling\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>postject\u003c/td>\u003ctd>1.0.0-alpha.6\u003c/td>\u003ctd>Injects JS bundle into Node.js binary for SEA build\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Core Dependencies\u003c/strong>\u003c/td>\u003ctd>chalk\u003c/td>\u003ctd>5.4.1\u003c/td>\u003ctd>Terminal styling (colors, bold, dim) across CLI output, animations, themes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Development Tools\u003c/strong>\u003c/td>\u003ctd>@types/node\u003c/td>\u003ctd>22.15.21\u003c/td>\u003ctd>Type definitions for Node.js APIs (fs, path, crypto, child_process, readline)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Configuration\u003c/strong>\u003c/td>\u003ctd>tsconfig.json\u003c/td>\u003ctd>—\u003c/td>\u003ctd>Strict mode, NodeNext resolution, declaration maps, source maps\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>package.json\u003c/td>\u003ctd>—\u003c/td>\u003ctd>ESM entry, scripts (build, dev, typecheck, SEA), dependency management\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-notes\">Notes\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>No test framework detected\u003c/strong> — No \u003ccode>jest\u003c/code>, \u003ccode>vitest\u003c/code>, \u003ccode>mocha\u003c/code>, or test scripts in \u003ccode>package.json\u003c/code>.\u003c/li>\u003cli>\u003cstrong>No linter/formatter detected\u003c/strong> — No \u003ccode>eslint\u003c/code>, \u003ccode>prettier\u003c/code>, \u003ccode>biome\u003c/code>, or related configs in provided context.\u003c/li>\u003cli>\u003cstrong>No Docker/CI/CD detected\u003c/strong> — No \u003ccode>Dockerfile\u003c/code>, \u003ccode>docker-compose.yml\u003c/code>, GitHub Actions, or similar in provided context.\u003c/li>\u003cli>\u003cstrong>No additional frameworks\u003c/strong> — No Express, Fastify, React, or other application frameworks imported.\u003c/li>\u003cli>\u003cstrong>Single Executable Application (SEA)\u003c/strong> — \u003ccode>build:sea\u003c/code> script uses \u003ccode>esbuild\u003c/code> + \u003ccode>postject\u003c/code> to produce a standalone binary (see \u003ccode>scripts/build-sea.mjs\u003c/code>).\u003c/li>\u003cli>\u003cstrong>AI Provider Integrations\u003c/strong> — Supports OpenAI, Anthropic, Gemini, and OpenRouter via dedicated provider classes (\u003ccode>src/providers/\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Cost Estimation &amp; Metering\u003c/strong> — Built-in token pricing catalog (OpenRouter + static fallback), usage tracking via \u003ccode>MeteredProvider\u003c/code>, and cost formatting for user confirmation prompts.\u003c/li>\u003cli>\u003cstrong>Interactive CLI\u003c/strong> — Uses \u003ccode>@clack/core\u003c/code> for spinners, prompts, and cancellation handling (ESC/q/Ctrl+C).\u003c/li>\u003cli>\u003cstrong>Distillation Caching\u003c/strong> — Incremental LLM-based file distillation with content-addressable caching (SHA-256) to avoid re-processing unchanged files during \u003ccode>/genesis\u003c/code> and \u003ccode>/sync\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Clean Code Review\u003c/strong> — Hybrid static + AI analysis (\u003ccode>/cleancode review\u003c/code>) with heuristic detectors (long functions, deep nesting, magic numbers, dead code, poor naming) and paradigm support (Clean Code, SOLID, Functional, Google Style).\u003c/li>\u003cli>\u003cstrong>Optimized Prompt Generation\u003c/strong> — \u003ccode>/prompt\u003c/code> command generates file-referencing prompts for other AI assistants using project knowledge base from \u003ccode>.aether/docs/\u003c/code>.\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-core-dependencies\">Core Dependencies\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Category\u003c/th>\u003cth>Technology\u003c/th>\u003cth>Version\u003c/th>\u003cth>Purpose\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Core Dependencies\u003c/strong>\u003c/td>\u003ctd>chalk\u003c/td>\u003ctd>5.4.1\u003c/td>\u003ctd>Terminal styling (colors, bold, dim) across CLI output, animations, themes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>@clack/core\u003c/td>\u003ctd>1.4.3\u003c/td>\u003ctd>Interactive CLI primitives (spinners, prompts, text input) used in UI components\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>esbuild\u003c/td>\u003ctd>0.28.1\u003c/td>\u003ctd>Used in \u003ccode>scripts/build-sea.mjs\u003c/code> for Single Executable Application bundling\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>postject\u003c/td>\u003ctd>1.0.0-alpha.6\u003c/td>\u003ctd>Injects JS bundle into Node.js binary for SEA build\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>tsx\u003c/td>\u003ctd>4.19.4\u003c/td>\u003ctd>Development runner (\u003ccode>npm run dev\u003c/code>); executes TS directly\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003c/td>\u003ctd>TypeScript Compiler (tsc)\u003c/td>\u003ctd>5.8.3\u003c/td>\u003ctd>Compiles \u003ccode>src/\u003c/code> → \u003ccode>dist/\u003c/code>; emits declarations, source maps\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-development-tools\">Development Tools\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Category\u003c/th>\u003cth>Technology\u003c/th>\u003cth>Version\u003c/th>\u003cth>Purpose\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Development Tools\u003c/strong>\u003c/td>\u003ctd>@types/node\u003c/td>\u003ctd>22.15.21\u003c/td>\u003ctd>Type definitions for Node.js APIs (fs, path, crypto, child_process, readline)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>","text":"Tech Stack Category Technology Version Purpose Languages TypeScript 5.8.3 Primary language; strict type checking, ES2022 target, NodeNext modules JavaScript (ESM) — Runtime via Node.js; type: \"module\" in package.json Runtime Node.js ≥20.0.0 Execution environment; required by engines field Build Tools TypeScript Compiler (tsc) 5.8.3 Compiles src/ → dist/ ; emits declarations, source maps tsx 4.19.4 Development runner ( npm run dev ); executes TS directly esbuild 0.28.1 Used in scripts/build-sea.mjs for Single Executable Application bundling postject 1.0.0-alpha.6 Injects JS bundle into Node.js binary for SEA build Core Dependencies chalk 5.4.1 Terminal styling (colors, bold, dim) across CLI output, animations, themes Development Tools @types/node 22.15.21 Type definitions for Node.js APIs (fs, path, crypto, child_process, readline) Configuration tsconfig.json — Strict mode, NodeNext resolution, declaration maps, source maps package.json — ESM entry, scripts (build, dev, typecheck, SEA), dependency management Notes No test framework detected — No jest , vitest , mocha , or test scripts in package.json . No linter/formatter detected — No eslint , prettier , biome , or related configs in provided context. No Docker/CI/CD detected — No Dockerfile , docker-compose.yml , GitHub Actions, or similar in provided cont
