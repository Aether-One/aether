trong>Cancellation handler\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/cancel.ts\u003c/code> \u003ccode>setupCancelHandler()\u003c/code> sets up SIGINT/SIGTERM and raw mode ESC/q/Ctrl+C\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Confirmation prompt\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/confirm.ts\u003c/code> \u003ccode>confirm()\u003c/code> uses raw mode for y/n/ESC/Ctrl+C\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost estimation before AI calls\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/cleancode.ts\u003c/code> calls \u003ccode>estimateCleanCode()\u003c/code> and prompts for confirmation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Heuristic + hybrid clean code scan\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> (regex heuristics) + \u003ccode>src/genesis/cleancode.ts\u003c/code> (AI hybrid)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigms\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> defines \u003ccode>CleanCodeParadigm\u003c/code> enum and \u003ccode>PARADIGMS\u003c/code> specs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Ignore patterns for clean code\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code> \u003ccode>loadCleanCodeIgnore\u003c/code>/\u003ccode>addCleanCodeIgnorePattern\u003c/code> with glob patterns\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill cache with model key\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope.ts\u003c/code> \u003ccode>DistillCache\u003c/code> includes \u003ccode>model\u003c/code> field; invalidated on model change\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Git fingerprinting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/fingerprint.ts\u003c/code> \u003ccode>buildFingerprint\u003c/code> hashes file contents; \u003ccode>getGitInfo\u003c/code> gets commit/branch/dirty\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill incremental with concurrency\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/distill.ts\u003c/code> \u003ccode>distillFilesIncremental\u003c/code> processes chunks with \u003ccode>p-limit\u003c/code> style concurrency\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing catalog with TTL cache\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>loadCatalog()\u003c/code> caches OpenRouter models for 24h\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Static pricing fallback\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>STATIC_PER_MTOK\u003c/code> fallback for 10 models\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider factory\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/factory.ts\u003c/code> \u003ccode>createProvider()\u003c/code> switches on \u003ccode>config.provider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider inheritance\u003c/strong>\u003c/td>\u003ctd>\u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code> and overrides \u003ccode>providerParams()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider wrapper for metering\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MeteredProvider\u003c/code> wraps any \u003ccode>LLMProvider\u003c/code> and tracks token usage\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry with rate-limit detection\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/retry.ts\u003c/code> \u003ccode>chatWithRetry\u003c/code> detects 429/rate-limit and switches to longer backoff\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Error sanitization for logging\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/retry.ts\u003c/code> \u003ccode>formatRetryLine\u003c/code> truncates to 80 chars, single line\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config precedence\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>loadConfig()\u003c/code>: project global → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config validation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>validateConfig()\u003c/code> checks provider, model, baseUrl, apiKey\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>API key masking\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/config.ts\u003c/code> \u003ccode>maskKey()\u003c/code> shows first 4 + \u003ccode>••••\u003c/code> + last 4\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project ID from path hash\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>projectId()\u003c/code> uses \u003ccode>basename + '-' + sha1(abs).slice(0,12)\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config dir\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>getGlobalDir()\u003c/code> returns \u003ccode>~/.aether\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project cache dir\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>getProjectCacheDir()\u003c/code> returns \u003ccode>~/.aether/cache/&lt;projectId&gt;/\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill cache path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope.ts\u003c/code> \u003ccode>distillCachePath()\u003c/code> returns \u003ccode>&lt;projectCacheDir&gt;/distill-cache.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing cache path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>cachePath()\u003c/code> returns \u003ccode>~/.aether/cache/pricing.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude file path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code> \u003ccode>excludeFilePath()\u003c/code> returns \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code ignore path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>cleanCodeIgnorePath()\u003c/code> returns \u003ccode>.aether/cleancode-ignore.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigm path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>cleanCodeParadigmPath()\u003c/code> returns \u003ccode>.aether/cleancode-paradigm.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code report path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>cleanCodeReportPath()\u003c/code> returns \u003ccode>.aether/cleancode-report.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Snapshot path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/sync.ts\u003c/code> \u003ccode>snapshotPath()\u003c/code> returns \u003ccode>.aether/settings/context.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Legacy snapshot path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/sync.ts\u003c/code> \u003ccode>resolveSnapshotPath()\u003c/code> checks \u003ccode>.aether/context.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project readme scaffold\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/scaffold.ts\u003c/code> \u003ccode>ensureProjectReadme()\u003c/code> writes \u003ccode>.aether/README.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global readme content\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/readme.ts\u003c/code> \u003ccode>AETHER_README\u003c/code> constant\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command registry\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/registry.ts\u003c/code> \u003ccode>CommandRegistry\u003c/code> with \u003ccode>register\u003c/code>, \u003ccode>get\u003c/code>, \u003ccode>getAll\u003c/code>, \u003ccode>execute\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command registration functions\u003c/strong>\u003c/td>\u003ctd>Each \u003ccode>src/commands/*.ts\u003c/code> exports \u003ccode>registerXCommand()\u003c/code> calling \u003ccode>registry.register()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>CLI entry registers all commands\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>registerHelpCommand()\u003c/code>, \u003ccode>registerBuiltinCommands()\u003c/code>, \u003ccode>registerConfigCommand()\u003c/code>, \u003ccode>registerCleanCommand()\u003c/code>, \u003ccode>registerCleanCodeCommand()\u003c/code>, \u003ccode>registerExcludeCommand()\u003c/code>, \u003ccode>registerPromptCommand()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Startup animation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>playStartupAnimation()\u003c/code> if TTY and not \u003ccode>--no-animation\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Banner fallback\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>printBanner()\u003c/code> if not interactive or \u003ccode>--no-animation\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Chat REPL\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>startChat()\u003c/code> from \u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Version flag\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> checks \u003ccode>--version\u003c/code>, \u003ccode>-v\u003c/code>, \u003ccode>-version\u003c/code> and prints \u003ccode>__AETHER_VERSION__\u003c/code> or \u003ccode>0.0.0-dev\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Top-level error handling\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> \u003ccode>main().catch(err =&gt; { stderr.write(err + '\\n'); process.exit(1); })\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>ESM import assertions for JSON\u003c/strong>\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code> uses \u003ccode>assert { type: 'json' }\u003c/code> for \u003ccode>sea-config.json\u003c/code> and \u003ccode>package.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SEA build with esbuild + postject\u003c/strong>\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code> bundles with esbuild, injects blob with postject\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No test framework detected\u003c/strong>\u003c/td>\u003ctd>Not in \u003ccode>package.json\u003c/code> devDependencies\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No lint/formatter config detected\u003c/strong>\u003c/td>\u003ctd>Not in provided files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node engine &gt;=20\u003c/strong>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> \u003ccode>&quot;engines&quot;: { &quot;node&quot;: &quot;&gt;=20.0.0&quot; }\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Runtime deps\u003c/strong>: \u003ccode>@clack/core\u003c/code>, \u003ccode>chalk\u003c/code>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> dependencies\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Dev deps\u003c/strong>: \u003ccode>@types/node\u003c/code>, \u003ccode>esbuild\u003c/code>, \u003ccode>postject\u003c/code>, \u003ccode>tsx\u003c/code>, \u003ccode>typescript\u003c/code>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> devDependencies\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-2-naming-conventions\">2. Naming Conventions\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Category\u003c/th>\u003cth>Convention\u003c/th>\u003cth>Examples\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Files\u003c/strong>\u003c/td>\u003ctd>kebab-case\u003c/td>\u003ctd>\u003ccode>build-sea.mjs\u003c/code>, \u003ccode>ai-context.ts\u003c/code>, \u003ccode>openai-compatible.ts\u003c/code>, \u003ccode>cli/index.ts\u003c/code>, \u003ccode>openrouter.ts\u003c/code>, \u003ccode>metered.ts\u003c/code>, \u003ccode>estimate.ts\u003c/code>, \u003ccode>cancel.ts\u003c/code>, \u003ccode>confirm.ts\u003c/code>, \u003ccode>cost.ts\u003c/code>, \u003ccode>anthropic.ts\u003c/code>, \u003ccode>tokens.ts\u003c/code>, \u003ccode>cleancode-heuristics.ts\u003c/code>, \u003ccode>cleancode.ts\u003c/code>, \u003ccode>cleancode.ts\u003c/code> (command), \u003ccode>prompt.ts\u003c/code> (command)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Directories\u003c/strong>\u003c/td>\u003ctd>kebab-case\u003c/td>\u003ctd>\u003ccode>src/commands/\u003c/code>, \u003ccode>src/genesis/\u003c/code>, \u003ccode>src/providers/\u003c/code>, \u003ccode>src/pricing/\u003c/code>, \u003ccode>src/ui/\u003c/code>, \u003ccode>src/prompts/pipeline/\u003c/code>, \u003ccode>src/prompts/docs/\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Classes\u003c/strong>\u003c/td>\u003ctd>PascalCase\u003c/td>\u003ctd>\u003ccode>CommandRegistry\u003c/code>, \u003ccode>StepRunner\u003c/code>, \u003ccode>LineSpinner\u003c/code>, \u003ccode>OpenAICompatibleProvider\u003c/code>, \u003ccode>OpenRouterProvider\u003c/code>, \u003ccode>AnthropicProvider\u003c/code>, \u003ccode>MeteredProvider\u003c/code>, \u003ccode>ChatPrompt\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Interfaces\u003c/strong>\u003c/td>\u003ctd>PascalCase\u003c/td>\u003ctd>\u003ccode>AetherConfig\u003c/code>, \u003ccode>ChatMessage\u003c/code>, \u003ccode>LLMProvider\u003c/code>, \u003ccode>ProjectContext\u003c/code>, \u003ccode>FileFingerprint\u003c/code>, \u003ccode>ModelPricing\u003c/code>, \u003ccode>OpenRouterModel\u003c/code>, \u003ccode>UsageTotals\u003c/code>, \u003ccode>PingResult\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>, \u003ccode>ParadigmSpec\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Type aliases\u003c/strong>\u003c/td>\u003ctd>PascalCase\u003c/td>\u003ctd>\u003ccode>FileContent\u003c/code>, \u003ccode>DocSection\u003c/code>, \u003ccode>DistillCache\u003c/code>, \u003ccode>SyncPlan\u003c/code>, \u003ccode>CostEstimate\u003c/code>, \u003ccode>DistillPlan\u003c/code>, \u003ccode>DistillJob\u003c/code>, \u003ccode>CustomDocSpec\u003c/code>, \u003ccode>DocIndexEntry\u003c/code>, \u003ccode>DocMeta\u003c/code>, \u003ccode>FileDiff\u003c/code>, \u003ccode>SyncPlan\u003c/code>, \u003ccode>SectionPatch\u003c/code>, \u003ccode>AssembleHooks\u003c/code>, \u003ccode>DistillHooks\u003c/code>, \u003ccode>ParsedPlan\u003c/code>, \u003ccode>RawSection\u003c/code>, \u003ccode>SectionPatch\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Union types (enum-like)\u003c/strong>\u003c/td>\u003ctd>PascalCase\u003c/td>\u003ctd>\u003ccode>DocSection = &quot;Guides&quot; | &quot;Architecture&quot; | ...\u003c/code>, \u003ccode>CleanCodeParadigm = &quot;clean-code&quot; | &quot;solid&quot; | &quot;functional&quot; | &quot;google-style&quot;\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Functions / variables\u003c/strong>\u003c/td>\u003ctd>camelCase\u003c/td>\u003ctd>\u003ccode>buildPlannerDigest\u003c/code>, \u003ccode>createProvider\u003c/code>, \u003ccode>getProjectCacheDir\u003c/code>, \u003ccode>hashContent\u003c/code>, \u003ccode>getModelPricing\u003c/code>, \u003ccode>estimateGenesis\u003c/code>, \u003ccode>estimateSync\u003c/code>, \u003ccode>buildFingerprint\u003c/code>, \u003ccode>getGitInfo\u003c/code>, \u003ccode>buildSharedProjectContext\u003c/code>, \u003ccode>chatWithRetry\u003c/code>, \u003ccode>formatRetryLine\u003c/code>, \u003ccode>hashContent\u003c/code>, \u003ccode>envInt\u003c/code>, \u003ccode>tokensFromChars\u003c/code>, \u003ccode>sharedContextChars\u003c/code>, \u003ccode>distillPlan\u003c/code>, \u003ccode>assemble\u003c/code>, \u003ccode>clamp\u003c/code>, \u003ccode>scanCleanCodeHeuristics\u003c/code>, \u003ccode>flaggedFiles\u003c/code>, \u003ccode>scanCleanCodeHybrid\u003c/code>, \u003ccode>buildCleanCodeReport\u003c/code>, \u003ccode>buildCleanCodeMarkdown\u003c/code>, \u003ccode>writeCleanCodeMarkdown\u003c/code>, \u003ccode>cleanCodeMarkdownRelPath\u003c/code>, \u003ccode>loadCleanCodeIgnore\u003c/code>, \u003ccode>addCleanCodeIgnorePattern\u003c/code>, \u003ccode>loadCleanCodeParadigm\u003c/code>, \u003ccode>setCleanCodeParadigm\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Constants (module-level)\u003c/strong>\u003c/td>\u003ctd>UPPER_SNAKE_CASE\u003c/td>\u003ctd>\u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>SPINNER_FRAMES\u003c/code>, \u003ccode>OPENROUTER_MODELS_URL\u003c/code>, \u003ccode>CACHE_TTL_MS\u003c/code>, \u003ccode>STATIC_PER_MTOK\u003c/code>, \u003ccode>REFRESH_OUT_LOW\u003c/code>, \u003ccode>REFRESH_OUT_HIGH\u003c/code>, \u003ccode>NEW_DOC_OUT_LOW\u003c/code>, \u003ccode>NEW_DOC_OUT_HIGH\u003c/code>, \u003ccode>GENESIS_OUT_LOW\u003c/code>, \u003ccode>GENESIS_OUT_HIGH\u003c/code>, \u003ccode>DISTILL_OUTPUT_PER_CHUNK\u003c/code>, \u003ccode>PROMPT_OVERHEAD_CHARS\u003c/code>, \u003ccode>GENESIS_DOC_CONTEXT_RATIO\u003c/code>, \u003ccode>GENESIS_DOC_CHARS_MIN\u003c/code>, \u003ccode>GENESIS_DOC_CHARS_MAX\u003c/code>, \u003ccode>DEFAULT_DOC_CHARS\u003c/code>, \u003ccode>MAX_PLAN_ATTEMPTS\u003c/code>, \u003ccode>MAX_CUSTOM_DOCS\u003c/code>, \u003ccode>CORE_IDS\u003c/code>, \u003ccode>SECTION_ORDER\u003c/code>, \u003ccode>DOC_DEFINITIONS\u003c/code>, \u003ccode>DEFAULT_OPTIONS\u003c/code>, \u003ccode>RATE_LIMIT_OPTIONS\u003c/code>, \u003ccode>PROVIDER_HOSTS\u003c/code>, \u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>MAX_TOTAL_CHARS\u003c/code>, \u003ccode>MAX_FILES_WALKED\u003c/code>, \u003ccode>MAX_WALK_DEPTH\u003c/code>, \u003ccode>DOC_CONTEXT_BUDGET\u003c/code>, \u003ccode>GEN_CONCURRENCY\u003c/code>, \u003ccode>DISTILL_CONCURRENCY\u003c/code>, \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code>, \u003ccode>LONG_FUNCTION_THRESHOLD\u003c/code>, \u003ccode>DEEP_NESTING_THRESHOLD\u003c/code>, \u003ccode>MAGIC_NUMBER_RE\u003c/code>, \u003ccode>NAMING_RE\u003c/code>, \u003ccode>DUPLICATION_RE\u003c/code>, \u003ccode>DEAD_CODE_RE\u003c/code>, \u003ccode>ERROR_HANDLING_RE\u003c/code>, \u003ccode>COMPLEXITY_RE\u003c/code>, \u003ccode>ROUTE_RE\u003c/code>, \u003ccode>DOMAIN_RE\u003c/code>, \u003ccode>TEST_RE\u003c/code>, \u003ccode>SYMBOL_RE\u003c/code>, \u003ccode>H2_RE\u003c/code>, \u003ccode>REMOVE_RE\u003c/code>, \u003ccode>CLEANCODE_RE\u003c/code>, \u003ccode>TIPS\u003c/code>, \u003ccode>MAX_DROPDOWN\u003c/code>, \u003ccode>MAX_PATH_DROPDOWN\u003c/code>, \u003ccode>PARADIGMS\u003c/code>, \u003ccode>DEFAULT_PARADIGM\u003c/code>, \u003ccode>OPTIMIZE_PROMPT\u003c/code>, \u003ccode>PLANNER_PROMPT\u003c/code>, \u003ccode>SYNC_PLANNER_PROMPT\u003c/code>, \u003ccode>SECTION_PATCH_INSTRUCTIONS\u003c/code>, \u003ccode>DOC_UPDATE_INSTRUCTIONS\u003c/code>, \u003ccode>BASE_PROMPT\u003c/code>, \u003ccode>PROMPT_SUFFIX\u003c/code>, \u003ccode>HUMAN_BASE_PROMPT\u003c/code>, \u003ccode>HUMAN_PROMPT_SUFFIX\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Enum-like constants\u003c/strong>\u003c/td>\u003ctd>UPPER_SNAKE_CASE\u003c/td>\u003ctd>\u003ccode>DEFAULT_OPTIONS\u003c/code>, \u003ccode>RATE_LIMIT_OPTIONS\u003c/code>, \u003ccode>SECTION_ORDER\u003c/code>, \u003ccode>CORE_IDS\u003c/code>, \u003ccode>PROVIDER_HOSTS\u003c/code>, \u003ccode>PARADIGMS\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Private class members\u003c/strong>\u003c/td>\u003ctd>No leading underscore observed\u003c/td>\u003ctd>\u003ccode>CommandRegistry#register\u003c/code>, \u003ccode>StepRunner#startSpinner\u003c/code>, \u003ccode>MeteredProvider#inner\u003c/code>, \u003ccode>MeteredProvider#totals\u003c/code>, \u003ccode>ChatPrompt#dirs\u003c/code>, \u003ccode>ChatPrompt#files\u003c/code>, \u003ccode>ChatPrompt#excluded\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Type parameters\u003c/strong>\u003c/td>\u003ctd>Single uppercase letter\u003c/td>\u003ctd>\u003ccode>AsyncGenerator&lt;StreamChunk&gt;\u003c/code>, \u003ccode>Promise&lt;ChatResponse&gt;\u003c/code>, \u003ccode>Record&lt;string, FileFingerprint&gt;\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Regex constants\u003c/strong>\u003c/td>\u003ctd>UPPER_SNAKE_CASE with \u003ccode>_RE\u003c/code> suffix\u003c/td>\u003ctd>\u003ccode>ROUTE_RE\u003c/code>, \u003ccode>DOMAIN_RE\u003c/code>, \u003ccode>TEST_RE\u003c/code>, \u003ccode>SYMBOL_RE\u003c/code>, \u003ccode>H2_RE\u003c/code>, \u003ccode>REMOVE_RE\u003c/code>, \u003ccode>CLEANCODE_RE\u003c/code>, \u003ccode>LONG_FUNCTION_RE\u003c/code>, \u003ccode>DEEP_NESTING_RE\u003c/code>, \u003ccode>MAGIC_NUMBER_RE\u003c/code>, \u003ccode>NAMING_RE\u003c/code>, \u003ccode>DUPLICATION_RE\u003c/code>, \u003ccode>DEAD_CODE_RE\u003c/code>, \u003ccode>ERROR_HANDLING_RE\u003c/code>, \u003ccode>COMPLEXITY_RE\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-3-architecture-patterns\">3. Architecture Patterns\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pattern\u003c/th>\u003cth>Where Observed\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Command pattern\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CommandRegistry\u003c/code> + \u003ccode>Command\u003c/code> interface in \u003ccode>src/commands/registry.ts\u003c/code>; each command in \u003ccode>src/commands/*.ts\u003c/code> registers via \u003ccode>registerXCommand()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider pattern\u003c/strong>\u003c/td>\u003ctd>\u003ccode>LLMProvider\u003c/code> interface in \u003ccode>src/providers/types.ts\u003c/code>; \u003ccode>OpenAICompatibleProvider\u003c/code> implements it; \u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code>; \u003ccode>AnthropicProvider\u003c/code> implements it; \u003ccode>createProvider\u003c/code> factory in \u003ccode>src/providers/factory.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Factory pattern\u003c/strong>\u003c/td>\u003ctd>\u003ccode>createProvider(config)\u003c/code> switches on \u003ccode>config.provider\u003c/code> in \u003ccode>src/providers/factory.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Registry pattern\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CommandRegistry\u003c/code> holds \u003ccode>Map&lt;string, Command&gt;\u003c/code>; \u003ccode>registry.execute(input)\u003c/code> parses \u003ccode>/name args\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pipeline / Step runner\u003c/strong>\u003c/td>\u003ctd>\u003ccode>StepRunner\u003c/code> runs steps sequentially or pooled (\u003ccode>runPooled\u003c/code>); \u003ccode>LineSpinner\u003c/code> for per-step animation in \u003ccode>src/ui/steps.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Barrel exports\u003c/strong>\u003c/td>\u003ctd>Every \u003ccode>src/*/index.ts\u003c/code> re-exports from sibling modules\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Configuration precedence\u003c/strong>\u003c/td>\u003ctd>\u003ccode>loadConfig()\u003c/code> in \u003ccode>src/config/index.ts\u003c/code>: project global → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Caching with fingerprints\u003c/strong>\u003c/td>\u003ctd>\u003ccode>buildFingerprint()\u003c/code> in \u003ccode>src/genesis/fingerprint.ts\u003c/code>; distill cache in \u003ccode>src/genesis/scope.ts\u003c/code>; pricing cache in \u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Git integration\u003c/strong>\u003c/td>\u003ctd>\u003ccode>getGitInfo()\u003c/code>, \u003ccode>getGitLog()\u003c/code> in \u003ccode>src/genesis/fingerprint.ts\u003c/code> using \u003ccode>execFileSync\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry with backoff\u003c/strong>\u003c/td>\u003ctd>\u003ccode>chatWithRetry()\u003c/code> in \u003ccode>src/providers/retry.ts\u003c/code> with rate-limit detection and exponential backoff\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt templates as constants\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/prompts/docs/*.ts\u003c/code> export \u003ccode>*_PROMPT\u003c/code> string constants; \u003ccode>src/prompts/pipeline/*.ts\u003c/code> export planner/sync/cleancode/optimize prompts\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider-specific behavior via inheritance\u003c/strong>\u003c/td>\u003ctd>\u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code> and overrides \u003ccode>providerParams()\u003c/code> to disable reasoning tokens in \u003ccode>src/providers/openrouter.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Usage metering wrapper\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MeteredProvider\u003c/code> wraps any \u003ccode>LLMProvider\u003c/code> and tracks token usage in \u003ccode>src/providers/metered.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing catalog with caching\u003c/strong>\u003c/td>\u003ctd>\u003ccode>loadCatalog()\u003c/code> fetches from OpenRouter with 24h TTL cache in \u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost estimation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>estimateGenesis()\u003c/code> and \u003ccode>estimateSync()\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code> compute token/cost estimates; \u003ccode>estimateCleanCode()\u003c/code> in \u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>UI cancellation handling\u003c/strong>\u003c/td>\u003ctd>\u003ccode>setupCancelHandler()\u003c/code> in \u003ccode>src/ui/cancel.ts\u003c/code> sets up SIGINT/SIGTERM handlers\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>UI confirmation prompts\u003c/strong>\u003c/td>\u003ctd>\u003ccode>confirm()\u003c/code> in \u003ccode>src/ui/confirm.ts\u003c/code> for interactive confirmations\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost display formatting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>formatCost()\u003c/code>, \u003ccode>formatTokens()\u003c/code> in \u003ccode>src/ui/cost.ts\u003c/code> for CLI cost display\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Token counting utility\u003c/strong>\u003c/td>\u003ctd>\u003ccode>countTokens()\u003c/code> in \u003ccode>src/util/tokens.ts\u003c/code> using GPT tokenizer approximation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Heuristic + hybrid clean code scan\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> (regex heuristics) + \u003ccode>src/genesis/cleancode.ts\u003c/code> (AI hybrid)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigms\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> defines \u003ccode>CleanCodeParadigm\u003c/code> enum and \u003ccode>PARADIGMS\u003c/code> specs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Ignore patterns for clean code\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code> \u003ccode>loadCleanCodeIgnore\u003c/code>/\u003ccode>addCleanCodeIgnorePattern\u003c/code> with glob patterns\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill cache with model key\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope.ts\u003c/code> \u003ccode>DistillCache\u003c/code> includes \u003ccode>model\u003c/code> field; invalidated on model change\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Git fingerprinting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/fingerprint.ts\u003c/code> \u003ccode>buildFingerprint\u003c/code> hashes file contents; \u003ccode>getGitInfo\u003c/code> gets commit/branch/dirty\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill incremental with concurrency\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/distill.ts\u003c/code> \u003ccode>distillFilesIncremental\u003c/code> processes chunks with \u003ccode>p-limit\u003c/code> style concurrency\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing catalog with TTL cache\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>loadCatalog()\u003c/code> caches OpenRouter models for 24h\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Static pricing fallback\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>STATIC_PER_MTOK\u003c/code> fallback for 10 models\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider factory\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/factory.ts\u003c/code> \u003ccode>createProvider()\u003c/code> switches on \u003ccode>config.provider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider inheritance\u003c/strong>\u003c/td>\u003ctd>\u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code> and overrides \u003ccode>providerParams()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider wrapper for metering\u003c/strong>\u003c/td>\u003ctd>\u003ccode>MeteredProvider\u003c/code> wraps any \u003ccode>LLMProvider\u003c/code> for usage tracking\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry with rate-limit detection\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/retry.ts\u003c/code> \u003ccode>chatWithRetry\u003c/code> detects 429/rate-limit and switches to longer backoff\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Error sanitization for logging\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/retry.ts\u003c/code> \u003ccode>formatRetryLine\u003c/code> truncates to 80 chars, single line\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config precedence\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>loadConfig()\u003c/code>: project global → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config validation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>validateConfig()\u003c/code> checks provider, model, baseUrl, apiKey\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>API key masking\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/config.ts\u003c/code> \u003ccode>maskKey()\u003c/code> shows first 4 + \u003ccode>••••\u003c/code> + last 4\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project ID from path hash\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>projectId()\u003c/code> uses \u003ccode>basename + '-' + sha1(abs).slice(0,12)\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config dir\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>getGlobalDir()\u003c/code> returns \u003ccode>~/.aether\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project cache dir\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>getProjectCacheDir()\u003c/code> returns \u003ccode>~/.aether/cache/&lt;projectId&gt;/\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill cache path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope.ts\u003c/code> \u003ccode>distillCachePath()\u003c/code> returns \u003ccode>&lt;projectCacheDir&gt;/distill-cache.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing cache path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>cachePath()\u003c/code> returns \u003ccode>~/.aether/cache/pricing.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude file path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code> \u003ccode>excludeFilePath()\u003c/code> returns \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code ignore path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>cleanCodeIgnorePath()\u003c/code> returns \u003ccode>.aether/cleancode-ignore.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigm path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>cleanCodeParadigmPath()\u003c/code> returns \u003ccode>.aether/cleancode-paradigm.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code report path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>cleanCodeReportPath()\u003c/code> returns \u003ccode>.aether/cleancode-report.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Snapshot path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/sync.ts\u003c/code> \u003ccode>snapshotPath()\u003c/code> returns \u003ccode>.aether/settings/context.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Legacy snapshot path\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/sync.ts\u003c/code> \u003ccode>resolveSnapshotPath()\u003c/code> checks \u003ccode>.aether/context.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project readme scaffold\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/scaffold.ts\u003c/code> \u003ccode>ensureProjectReadme()\u003c/code> writes \u003ccode>.aether/README.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global readme content\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/readme.ts\u003c/code> \u003ccode>AETHER_README\u003c/code> constant\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command registry\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/registry.ts\u003c/code> \u003ccode>CommandRegistry\u003c/code> with \u003ccode>register\u003c/code>, \u003ccode>get\u003c/code>, \u003ccode>getAll\u003c/code>, \u003ccode>execute\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command registration functions\u003c/strong>\u003c/td>\u003ctd>Each \u003ccode>src/commands/*.ts\u003c/code> exports \u003ccode>registerXCommand()\u003c/code> calling \u003ccode>registry.register()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>CLI entry registers all commands\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>registerHelpCommand()\u003c/code>, \u003ccode>registerBuiltinCommands()\u003c/code>, \u003ccode>registerConfigCommand()\u003c/code>, \u003ccode>registerCleanCommand()\u003c/code>, \u003ccode>registerCleanCodeCommand()\u003c/code>, \u003ccode>registerExcludeCommand()\u003c/code>, \u003ccode>registerPromptCommand()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Startup animation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>playStartupAnimation()\u003c/code> if TTY and not \u003ccode>--no-animation\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Banner fallback\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>printBanner()\u003c/code> if not interactive or \u003ccode>--no-animation\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Chat REPL\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>startChat()\u003c/code> from \u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Version flag\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> checks \u003ccode>--version\u003c/code>, \u003ccode>-v\u003c/code>, \u003ccode>-version\u003c/code> and prints \u003ccode>__AETHER_VERSION__\u003c/code> or \u003ccode>0.0.0-dev\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Top-level error handling\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> \u003ccode>main().catch(err =&gt; { stderr.write(err + '\\n'); process.exit(1); })\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>ESM import assertions for JSON\u003c/strong>\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code> uses \u003ccode>assert { type: 'json' }\u003c/code> for \u003ccode>sea-config.json\u003c/code> and \u003ccode>package.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SEA build with esbuild + postject\u003c/strong>\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code> bundles with esbuild, injects blob with postject\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No test framework detected\u003c/strong>\u003c/td>\u003ctd>Not in \u003ccode>package.json\u003c/code> devDependencies\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No lint/formatter config detected\u003c/strong>\u003c/td>\u003ctd>Not in provided files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node engine &gt;=20\u003c/strong>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> \u003ccode>&quot;engines&quot;: { &quot;node&quot;: &quot;&gt;=20.0.0&quot; }\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Runtime deps\u003c/strong>: \u003ccode>@clack/core\u003c/code>, \u003ccode>chalk\u003c/code>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> dependencies\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Dev deps\u003c/strong>: \u003ccode>@types/node\u003c/code>, \u003ccode>esbuild\u003c/code>, \u003ccode>postject\u003c/code>, \u003ccode>tsx\u003c/code>, \u003ccode>typescript\u003c/code>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> devDependencies\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-4-file-organization\">4. File Organization\u003c/h2>\n\u003cpre class=\"tree\">\u003ccode>src/\n├── cli/           # Entry point only (index.ts)\n├── commands/      # One file per command + registry\n├── config/        # Config types, loading, scaffolding, readme\n├── genesis/       # Core analysis: context, digest, distill, scope, sync, fingerprint, estimate, exclude, cleancode\n├── pricing/       # Pricing catalog, caching, cost estimation\n├── prompts/       # Prompt templates (docs/, pipeline/, base.ts, index.ts)\n├── providers/     # LLM provider abstraction + factory + retry + metered + anthropic + openrouter\n├── ui/            # CLI UX: animation, prompt (readline), steps, theme, cancel, confirm, cost\n└── util/          # Pure utilities: env, hash, tokens\u003c/code>\u003c/pre>\n\u003cp>\u003cstrong>Rules observed:\u003c/strong>\u003c/p>\n\u003cul>\u003cli>One primary concern per file.\u003c/li>\u003cli>Types often co-located in \u003ccode>types.ts\u003c/code> within a domain (\u003ccode>genesis/types.ts\u003c/code>, \u003ccode>config/types.ts\u003c/code>, \u003ccode>providers/types.ts\u003c/code>).\u003c/li>\u003cli>Constants in \u003ccode>constants.ts\u003c/code> (\u003ccode>genesis/constants.ts\u003c/code>).\u003c/li>\u003cli>Barrel \u003ccode>index.ts\u003c/code> re-exports everything intended as public API.\u003c/li>\u003cli>New domains get their own directory (\u003ccode>pricing/\u003c/code>, \u003ccode>ui/cancel.ts\u003c/code>, \u003ccode>ui/confirm.ts\u003c/code>, \u003ccode>ui/cost.ts\u003c/code>, \u003ccode>providers/anthropic.ts\u003c/code>, \u003ccode>providers/openrouter.ts\u003c/code>, \u003ccode>providers/metered.ts\u003c/code>, \u003ccode>util/tokens.ts\u003c/code>, \u003ccode>genesis/exclude.ts\u003c/code>, \u003ccode>genesis/cleancode-heuristics.ts\u003c/code>, \u003ccode>genesis/cleancode.ts\u003c/code>, \u003ccode>prompts/pipeline/cleancode.ts\u003c/code>, \u003ccode>prompts/pipeline/optimize.ts\u003c/code>, \u003ccode>commands/cleancode.ts\u003c/code>, \u003ccode>commands/prompt.ts\u003c/code>).\u003c/li>\u003cli>Pipeline prompts organized in \u003ccode>src/prompts/pipeline/\u003c/code> (planner, sync, cleancode, optimize).\u003c/li>\u003cli>Document prompts organized in \u003ccode>src/prompts/docs/\u003c/code> (13 files).\u003c/li>\u003cli>Clean code heuristics in \u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>.\u003c/li>\u003cli>Clean code hybrid scan in \u003ccode>src/genesis/cleancode.ts\u003c/code>.\u003c/li>\u003cli>Clean code command in \u003ccode>src/commands/cleancode.ts\u003c/code>.\u003c/li>\u003cli>Prompt command in \u003ccode>src/commands/prompt.ts\u003c/code>.\u003c/li>\u003cli>Builtin commands registered in \u003ccode>src/commands/builtins.ts\u003c/code>.\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-5-import-conventions\">5. Import Conventions\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Rule\u003c/th>\u003cth>Example\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Relative imports use \u003ccode>.js\u003c/code> extension\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { playStartupAnimation } from '../ui/animation.js'\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node built-ins use \u003ccode>node:\u003c/code> prefix\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { execFileSync } from 'node:child_process'\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Named imports only\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { AetherConfig } from '../config/index.js'\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Barrel imports from domain index\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { registry } from './registry.js'\u003c/code> (from \u003ccode>commands/\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No path aliases\u003c/strong>\u003c/td>\u003ctd>Not configured in \u003ccode>tsconfig.json\u003c/code>; all relative\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>JSON imports with import assertions\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import seaConfig from '../sea-config.json' assert { type: 'json' }\u003c/code> in \u003ccode>scripts/build-sea.mjs\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Package.json imports with assertions\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import pkg from '../package.json' assert { type: 'json' }\u003c/code> in \u003ccode>scripts/build-sea.mjs\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Sibling module imports in commands\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { loadExcludes, addExclude, removeExclude } from '../genesis/exclude.js'\u003c/code> in \u003ccode>src/commands/exclude.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Sibling module imports in genesis\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { loadExcludes, addExclude, removeExclude } from './exclude.js'\u003c/code> in \u003ccode>src/genesis/context.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>UI prompt imports from genesis\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { loadExcludes } from '../genesis/exclude.js'\u003c/code> in \u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { scanCleanCodeHeuristics, flaggedFiles } from '../genesis/cleancode-heuristics.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code hybrid imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { scanCleanCodeHybrid, buildCleanCodeReport, buildCleanCodeMarkdown, writeCleanCodeMarkdown, cleanCodeMarkdownRelPath } from '../genesis/cleancode.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code ignore/paradigm imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { loadCleanCodeIgnore, addCleanCodeIgnorePattern, loadCleanCodeParadigm, setCleanCodeParadigm } from '../genesis/cleancode.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Estimate imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { estimateCleanCode } from '../genesis/estimate.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { getModelPricing } from '../pricing/index.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { loadConfig, saveConfig, getGlobalDir, getGlobalConfigPath } from '../config/index.js'\u003c/code> in \u003ccode>src/commands/clean.ts\u003c/code> and \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>UI theme imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { ACCENT, DIM, SUCCESS, WARN } from '../ui/theme.js'\u003c/code> in \u003ccode>src/commands/clean.ts\u003c/code> and \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { chatWithRetry, formatRetryLine } from '../providers/retry.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { createProvider, PingResult } from '../providers/index.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Context imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { scanContext } from '../genesis/context.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Filter imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { filterIgnored } from '../genesis/exclude.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt pipeline imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { buildCleanCodeScanPrompt, listParadigms, paradigmLabel, paradigmFocus, DEFAULT_PARADIGM } from '../prompts/pipeline/cleancode.js'\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt base imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { BASE_PROMPT, PROMPT_SUFFIX } from '../prompts/base.js'\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code> and \u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt docs imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { GETTING_STARTED_PROMPT, ONBOARDING_PROMPT, ... } from '../prompts/docs/*.js'\u003c/code> in \u003ccode>src/prompts/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt pipeline imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { PLANNER_PROMPT } from '../prompts/pipeline/planner.js'\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Sync prompt imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { SYNC_PLANNER_PROMPT, DOC_UPDATE_INSTRUCTIONS, SECTION_PATCH_INSTRUCTIONS } from '../prompts/pipeline/sync.js'\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Optimize prompt imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { OPTIMIZE_PROMPT, buildOptimizePrompt } from '../prompts/pipeline/optimize.js'\u003c/code> in \u003ccode>src/commands/prompt.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code prompt imports\u003c/strong>\u003c/td>\u003ctd>\u003ccode>import { buildCleanCodeScanPrompt } from '../prompts/pipeline/cleancode.js'\u003c/code> in \u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-6-error-handling\">6. Error Handling\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pattern\u003c/th>\u003cth>Where Seen\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Top-level CLI try/catch\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code>: \u003ccode>main()\u003c/code> wraps all logic, logs to \u003ccode>stderr\u003c/code>, \u003ccode>process.exit(1)\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Swallowed errors for non-critical ops\u003c/strong>\u003c/td>\u003ctd>\u003ccode>saveDistillCache()\u003c/code> in \u003ccode>src/genesis/scope.ts\u003c/code>: \u003ccode>try { ... } catch { /* best effort */ }\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Git commands return \u003ccode>null\u003c/code> on failure\u003c/strong>\u003c/td>\u003ctd>\u003ccode>getGitInfo()\u003c/code>, \u003ccode>getGitLog()\u003c/code> in \u003ccode>src/genesis/fingerprint.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Retry with exponential backoff\u003c/strong>\u003c/td>\u003ctd>\u003ccode>chatWithRetry()\u003c/code> in \u003ccode>src/providers/retry.ts\u003c/code>; rate-limit detection upgrades retry budget\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Error sanitization for logging\u003c/strong>\u003c/td>\u003ctd>\u003ccode>formatRetryLine()\u003c/code> truncates to 80 chars, single-line in \u003ccode>src/providers/retry.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No \u003ccode>throw\u003c/code> of raw strings\u003c/strong>\u003c/td>\u003ctd>Errors are \u003ccode>Error\u003c/code> instances or caught from APIs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider ping returns structured error info\u003c/strong>\u003c/td>\u003ctd>\u003ccode>PingResult\u003c/code> in \u003ccode>src/providers/types.ts\u003c/code> includes \u003ccode>reason\u003c/code>, \u003ccode>status\u003c/code>, \u003ccode>message\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>AbortSignal support for cancellation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>ChatRequest\u003c/code> includes optional \u003ccode>signal?: AbortSignal\u003c/code> in \u003ccode>src/providers/types.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cancellation handler setup\u003c/strong>\u003c/td>\u003ctd>\u003ccode>setupCancelHandler()\u003c/code> in \u003ccode>src/ui/cancel.ts\u003c/code> registers SIGINT/SIGTERM handlers\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Confirmation prompts for destructive actions\u003c/strong>\u003c/td>\u003ctd>\u003ccode>confirm()\u003c/code> in \u003ccode>src/ui/confirm.ts\u003c/code> prompts user before destructive operations\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost estimation confirmation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/cleancode.ts\u003c/code> calls \u003ccode>estimateCleanCode()\u003c/code> and prompts for confirmation before AI review\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Error formatting for CLI output\u003c/strong>\u003c/td>\u003ctd>\u003ccode>formatError()\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code> truncates error message to 120 chars\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Ping error formatting\u003c/strong>\u003c/td>\u003ctd>\u003ccode>formatPingError()\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code> formats provider connection errors\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Graceful cache write failures\u003c/strong>\u003c/td>\u003ctd>\u003ccode>saveDistillCache()\u003c/code>, \u003ccode>saveCleanCodeIgnore()\u003c/code>, \u003ccode>saveCleanCodeParadigm()\u003c/code> all use best-effort writes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>AbortSignal propagation in clean code\u003c/strong>\u003c/td>\u003ctd>\u003ccode>scanCleanCodeHybrid\u003c/code> accepts \u003ccode>signal\u003c/code> and passes to \u003ccode>chatWithRetry\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>AbortSignal in distill\u003c/strong>\u003c/td>\u003ctd>\u003ccode>distillFilesIncremental\u003c/code> accepts \u003ccode>signal\u003c/code> and passes to provider calls\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>AbortSignal in sync\u003c/strong>\u003c/td>\u003ctd>\u003ccode>refreshDoc\u003c/code> and \u003ccode>fullUpdate\u003c/code> accept \u003ccode>signal\u003c/code> and pass to \u003ccode>chatWithRetry\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-7-type-patterns\">7. Type Patterns\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pattern\u003c/th>\u003cth>Example\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Interface for config/contracts\u003c/strong>\u003c/td>\u003ctd>\u003ccode>AetherConfig\u003c/code>, \u003ccode>LLMProvider\u003c/code>, \u003ccode>ChatRequest\u003c/code>, \u003ccode>ChatResponse\u003c/code>, \u003ccode>PingResult\u003c/code>, \u003ccode>ModelPricing\u003c/code>, \u003ccode>OpenRouterModel\u003c/code>, \u003ccode>UsageTotals\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>, \u003ccode>ParadigmSpec\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Type alias for data shapes\u003c/strong>\u003c/td>\u003ctd>\u003ccode>FileContent\u003c/code>, \u003ccode>ProjectContext\u003c/code>, \u003ccode>FileFingerprint\u003c/code>, \u003ccode>DistillCache\u003c/code>, \u003ccode>CostEstimate\u003c/code>, \u003ccode>DistillPlan\u003c/code>, \u003ccode>DistillJob\u003c/code>, \u003ccode>CustomDocSpec\u003c/code>, \u003ccode>DocIndexEntry\u003c/code>, \u003ccode>DocMeta\u003c/code>, \u003ccode>FileDiff\u003c/code>, \u003ccode>SyncPlan\u003c/code>, \u003ccode>SectionPatch\u003c/code>, \u003ccode>AssembleHooks\u003c/code>, \u003ccode>DistillHooks\u003c/code>, \u003ccode>ParsedPlan\u003c/code>, \u003ccode>RawSection\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Union of string literals for enums\u003c/strong>\u003c/td>\u003ctd>\u003ccode>type DocSection = &quot;Guides&quot; | &quot;Architecture&quot; | &quot;Reference&quot; | &quot;AI Context&quot; | &quot;Project-specific&quot;\u003c/code>, \u003ccode>type CleanCodeParadigm = &quot;clean-code&quot; | &quot;solid&quot; | &quot;functional&quot; | &quot;google-style&quot;\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Generic async generators\u003c/strong>\u003c/td>\u003ctd>\u003ccode>chatStream(request): AsyncGenerator&lt;StreamChunk&gt;\u003c/code> in \u003ccode>LLMProvider\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Optional properties with \u003ccode>?\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>apiKey?: string\u003c/code>, \u003ccode>timeout?: number\u003c/code> in \u003ccode>AetherConfig\u003c/code>; \u003ccode>reason?: &quot;timeout&quot; | &quot;network&quot; | &quot;http&quot;\u003c/code> in \u003ccode>PingResult\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>\u003ccode>Pick\u003c/code> / \u003ccode>Record\u003c/code> utility types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DocIndexEntry = Pick&lt;DocDefinition, ...&gt;\u003c/code>, \u003ccode>Record&lt;string, FileFingerprint&gt;\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No \u003ccode>type\u003c/code> exports for classes\u003c/strong>\u003c/td>\u003ctd>Classes exported as values (\u003ccode>export class StepRunner\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No \u003ccode>namespace\u003c/code> or \u003ccode>declare module\u003c/code>\u003c/strong>\u003c/td>\u003ctd>Not observed\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Re-export types from domain index\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/index.ts\u003c/code> re-exports \u003ccode>LLMProvider\u003c/code>, \u003ccode>ChatMessage\u003c/code>, etc. from \u003ccode>./types.js\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider-specific types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>OpenRouterModel\u003c/code> in \u003ccode>src/pricing/index.ts\u003c/code> with \u003ccode>id\u003c/code>, \u003ccode>pricing.prompt\u003c/code>, \u003ccode>pricing.completion\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>, \u003ccode>ParadigmSpec\u003c/code> in \u003ccode>src/genesis/types.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt pipeline types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>ParsedPlan\u003c/code> in \u003ccode>src/genesis/planner.ts\u003c/code> with \u003ccode>catalogIds\u003c/code> and \u003ccode>customDocs\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Sync types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>RawSection\u003c/code>, \u003ccode>SectionPatch\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Estimate types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CostEstimate\u003c/code>, \u003ccode>DistillPlan\u003c/code>, \u003ccode>DistillJob\u003c/code> in \u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing types\u003c/strong>\u003c/td>\u003ctd>\u003ccode>ModelPricing\u003c/code>, \u003ccode>OpenRouterModel\u003c/code> in \u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-8-do-dont\">8. Do / Don't\u003c/h2>\n\u003ch3 id=\"md--do\">✅ Do\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Use ES modules\u003c/strong> with \u003ccode>.js\u003c/code> extensions in imports.\u003c/li>\u003cli>\u003cstrong>Enable strict TypeScript\u003c/strong> (\u003ccode>&quot;strict&quot;: true\u003c/code> in \u003ccode>tsconfig.json\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Export named constants\u003c/strong> for prompts, config defaults, limits.\u003c/li>\u003cli>\u003cstrong>Use barrel \u003ccode>index.ts\u003c/code>\u003c/strong> to define public API of each domain.\u003c/li>\u003cli>\u003cstrong>Implement provider interfaces\u003c/strong> (\u003ccode>LLMProvider\u003c/code>) for external services.\u003c/li>\u003cli>\u003cstrong>Register commands\u003c/strong> via \u003ccode>CommandRegistry.register()\u003c/code> in \u003ccode>registerXCommand()\u003c/code> functions.\u003c/li>\u003cli>\u003cstrong>Use \u003ccode>StepRunner\u003c/code>\u003c/strong> for multi-step CLI operations with spinners.\u003c/li>\u003cli>\u003cstrong>Cache with content hashes\u003c/strong> (\u003ccode>hashContent\u003c/code> using SHA-256) for incremental work.\u003c/li>\u003cli>\u003cstrong>Detect git state\u003c/strong> via \u003ccode>execFileSync\u003c/code> for version tracking.\u003c/li>\u003cli>\u003cstrong>Retry LLM calls\u003c/strong> with \u003ccode>chatWithRetry\u003c/code>; handle rate limits specially.\u003c/li>\u003cli>\u003cstrong>Sanitize error messages\u003c/strong> before logging (single line, length limit).\u003c/li>\u003cli>\u003cstrong>Use \u003ccode>node:\u003c/code> prefix\u003c/strong> for built-in modules.\u003c/li>\u003cli>\u003cstrong>Define config precedence\u003c/strong> explicitly (global default → global project → local override → env).\u003c/li>\u003cli>\u003cstrong>Write pure utilities\u003c/strong> in \u003ccode>src/util/\u003c/code> (e.g., \u003ccode>hash.ts\u003c/code>, \u003ccode>env.ts\u003c/code>, \u003ccode>tokens.ts\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Extend base providers for provider-specific behavior\u003c/strong> (e.g., \u003ccode>OpenRouterProvider\u003c/code> extends \u003ccode>OpenAICompatibleProvider\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Wrap providers for cross-cutting concerns\u003c/strong> (e.g., \u003ccode>MeteredProvider\u003c/code> wraps any \u003ccode>LLMProvider\u003c/code> for usage tracking).\u003c/li>\u003cli>\u003cstrong>Cache external catalogs with TTL\u003c/strong> (e.g., OpenRouter pricing catalog with 24h TTL).\u003c/li>\u003cli>\u003cstrong>Estimate costs before expensive operations\u003c/strong> (e.g., \u003ccode>estimateGenesis\u003c/code>, \u003ccode>estimateSync\u003c/code>, \u003ccode>estimateCleanCode\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Handle cancellation signals\u003c/strong> via \u003ccode>AbortSignal\u003c/code> in async operations.\u003c/li>\u003cli>\u003cstrong>Prompt for confirmation\u003c/strong> before destructive operations.\u003c/li>\u003cli>\u003cstrong>Format costs and tokens\u003c/strong> for human-readable CLI output.\u003c/li>\u003cli>\u003cstrong>Approximate token counts\u003c/strong> with utility functions when exact counts unavailable.\u003c/li>\u003cli>\u003cstrong>Use regex constants\u003c/strong> with \u003ccode>_RE\u003c/code> suffix for pattern matching.\u003c/li>\u003cli>\u003cstrong>Extract JSON from LLM output\u003c/strong> with \u003ccode>extractJsonArray\u003c/code> handling markdown fences.\u003c/li>\u003cli>\u003cstrong>Use incremental distillation\u003c/strong> with concurrency control for large contexts.\u003c/li>\u003cli>\u003cstrong>Fingerprint files with SHA-256\u003c/strong> for change detection.\u003c/li>\u003cli>\u003cstrong>Track git commit/branch/dirty state\u003c/strong> for snapshots.\u003c/li>\u003cli>\u003cstrong>Mask API keys\u003c/strong> in CLI output (first 4 + \u003ccode>••••\u003c/code> + last 4).\u003c/li>\u003cli>\u003cstrong>Validate config\u003c/strong> before saving (provider, model, baseUrl, apiKey).\u003c/li>\u003cli>\u003cstrong>Detect provider from baseUrl\u003c/strong> for auto-configuration.\u003c/li>\u003cli>\u003cstrong>Use project ID from path hash\u003c/strong> for cache isolation.\u003c/li>\u003cli>\u003cstrong>Scaffold project readme\u003c/strong> on first run.\u003c/li>\u003cli>\u003cstrong>Register all commands at CLI startup\u003c/strong> in defined order.\u003c/li>\u003cli>\u003cstrong>Show startup animation\u003c/strong> in interactive TTY mode.\u003c/li>\u003cli>\u003cstrong>Fall back to static banner\u003c/strong> when not interactive.\u003c/li>\u003cli>\u003cstrong>Run chat REPL\u003c/strong> after startup.\u003c/li>\u003cli>\u003cstrong>Handle version flag\u003c/strong> before command processing.\u003c/li>\u003cli>\u003cstrong>Build SEA binary\u003c/strong> with esbuild + postject for distribution.\u003c/li>\u003cli>\u003cstrong>Use import assertions\u003c/strong> for JSON imports in build scripts.\u003c/li>\u003c/ul>\n\u003cp>| \u003cstrong>Heuristic + hybrid clean code review\u003c/strong> | \u003ccode>scanCleanCodeHeuristics\u003c/code> (regex) + \u003ccode>scanCleanCodeHybrid\u003c/code> (AI) in \u003ccode>src/genesis/cleancode.ts\u003c/code> | | \u003cstrong>Clean code paradigms\u003c/strong> | \u003ccode>PARADIGMS\u003c/code> in \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> defines 4 paradigms with categories | | \u003cstrong>Ignore patterns for clean code\u003c/strong> | \u003ccode>loadCleanCodeIgnore\u003c/code>/\u003ccode>addCleanCodeIgnorePattern\u003c/code> with glob patterns in \u003ccode>src/genesis/cleancode.ts\u003c/code> | | \u003cstrong>Distill cache invalidation on model change\u003c/strong> | \u003ccode>DistillCache\u003c/code> includes \u003ccode>model\u003c/code> field in \u003ccode>src/genesis/scope.ts\u003c/code> | | \u003cstrong>Concurrent distill with chunking\u003c/strong> | \u003ccode>distillFilesIncremental\u003c/code> processes chunks with configurable concurrency | | \u003cstrong>Pricing catalog with live + static fallback\u003c/strong> | \u003ccode>loadCatalog\u003c/code> fetches OpenRouter, falls back to \u003ccode>STATIC_PER_MTOK\u003c/code> | | \u003cstrong>Provider factory with inheritance\u003c/strong> | \u003ccode>createProvider\u003c/code> switches on provider; \u003ccode>OpenRouterProvider\u003c/code> extends base | | \u003cstrong>Metered provider wrapper\u003c/strong> | \u003ccode>MeteredProvider\u003c/code> tracks usage across any \u003ccode>LLMProvider\u003c/code> | | \u003cstrong>Retry with rate-limit upgrade\u003c/strong> | \u003ccode>chatWithRetry\u003c/code> detects 429 and switches to \u003ccode>RATE_LIMIT_OPTIONS\u003c/code> | | \u003cstrong>Error sanitization\u003c/strong> | \u003ccode>formatRetryLine\u003c/code> truncates to 80 chars for logging | | \u003cstrong>Config precedence\u003c/strong> | \u003ccode>loadConfig\u003c/code>: project global → global default → in-repo override → \u003ccode>AETHER_API_KEY\u003c/code> env | | \u003cstrong>API key masking\u003c/strong> | \u003ccode>maskKey\u003c/code> shows first 4 + \u003ccode>••••\u003c/code> + last 4 | | \u003cstrong>Project ID from path hash\u003c/strong> | \u003ccode>projectId()\u003c/code> uses \u003ccode>basename + '-' + sha1(abs).slice(0,12)\u003c/code> | | \u003cstrong>Global config dir\u003c/strong> | \u003ccode>getGlobalDir()\u003c/code> returns \u003ccode>~/.aether\u003c/code> | | \u003cstrong>Project cache dir\u003c/strong> | \u003ccode>getProjectCacheDir()\u003c/code> returns \u003ccode>~/.aether/cache/&lt;projectId&gt;/\u003c/code> | | \u003cstrong>Distill cache path\u003c/strong> | \u003ccode>distillCachePath()\u003c/code> returns \u003ccode>&lt;projectCacheDir&gt;/distill-cache.json\u003c/code> | | \u003cstrong>Pricing cache path\u003c/strong> | \u003ccode>cachePath()\u003c/code> returns \u003ccode>~/.aether/cache/pricing.json\u003c/code> | | \u003cstrong>Exclude file path\u003c/strong> | \u003ccode>excludeFilePath()\u003c/code> returns \u003ccode>.aether/settings/exclude.json\u003c/code> | | \u003cstrong>Clean code ignore path\u003c/strong> | \u003ccode>cleanCodeIgnorePath()\u003c/code> returns \u003ccode>.aether/cleancode-ignore.json\u003c/code> | | \u003cstrong>Clean code paradigm path\u003c/strong> | \u003ccode>cleanCodeParadigmPath()\u003c/code> returns \u003ccode>.aether/cleancode-paradigm.json\u003c/code> | | \u003cstrong>Clean code report path\u003c/strong> | \u003ccode>cleanCodeReportPath()\u003c/code> returns \u003ccode>.aether/cleancode-report.md\u003c/code> | | \u003cstrong>Snapshot path\u003c/strong> | \u003ccode>snapshotPath()\u003c/code> returns \u003ccode>.aether/settings/context.json\u003c/code> | | \u003cstrong>Legacy snapshot path\u003c/strong> | \u003ccode>resolveSnapshotPath()\u003c/code> checks \u003ccode>.aether/context.json\u003c/code> | | \u003cstrong>Project readme scaffold\u003c/strong> | \u003ccode>ensureProjectReadme()\u003c/code> writes \u003ccode>.aether/README.md\u003c/code> | | \u003cstrong>Global readme content\u003c/strong> | \u003ccode>AETHER_README\u003c/code> constant in \u003ccode>src/config/readme.ts\u003c/code> | | \u003cstrong>Command registry\u003c/strong> | \u003ccode>CommandRegistry\u003c/code> with \u003ccode>register\u003c/code>, \u003ccode>get\u003c/code>, \u003ccode>getAll\u003c/code>, \u003ccode>execute\u003c/code> | | \u003cstrong>Command registration functions\u003c/strong> | Each \u003ccode>src/commands/*.ts\u003c/code> exports \u003ccode>registerXCommand()\u003c/code> calling \u003ccode>registry.register()\u003c/code> | | \u003cstrong>CLI entry registers all commands\u003c/strong> | \u003ccode>src/cli/index.ts\u003c/code> calls all \u003ccode>registerXCommand()\u003c/code> functions | | \u003cstrong>Startup animation\u003c/strong> | \u003ccode>playStartupAnimation()\u003c/code> if TTY and not \u003ccode>--no-animation\u003c/code> | | \u003cstrong>Banner fallback\u003c/strong> | \u003ccode>printBanner()\u003c/code> if not interactive or \u003ccode>--no-animation\u003c/code> | | \u003cstrong>Chat REPL\u003c/strong> | \u003ccode>startChat()\u003c/code> from \u003ccode>src/ui/prompt.ts\u003c/code> | | \u003cstrong>Version flag\u003c/strong> | Checks \u003ccode>--version\u003c/code>, \u003ccode>-v\u003c/code>, \u003ccode>-version\u003c/code> prints \u003ccode>__AETHER_VERSION__\u003c/code> or \u003ccode>0.0.0-dev\u003c/code> | | \u003cstrong>Top-level error handling\u003c/strong> | \u003ccode>main().catch(err =&gt; { stderr.write(err + '\\n'); process.exit(1); })\u003c/code> | | \u003cstrong>ESM import assertions for JSON\u003c/strong> | \u003ccode>scripts/build-sea.mjs\u003c/code> uses \u003ccode>assert { type: 'json' }\u003c/code> | | \u003cstrong>SEA build with esbuild + postject\u003c/strong> | \u003ccode>scripts/build-sea.mjs\u003c/code> bundles and injects blob | | \u003cstrong>No test framework detected\u003c/strong> | Not in \u003ccode>package.json\u003c/code> devDependencies | | \u003cstrong>No lint/formatter config detected\u003c/strong> | Not in provided files | | \u003cstrong>Node engine &gt;=20\u003c/strong> | \u003ccode>package.json\u003c/code> \u003ccode>&quot;engines&quot;: { &quot;node&quot;: &quot;&gt;=20.0.0&quot; }\u003c/code> | | \u003cstrong>Runtime deps\u003c/strong>: \u003ccode>@clack/core\u003c/code>, \u003ccode>chalk\u003c/code> | \u003ccode>package.json\u003c/code> dependencies | | \u003cstrong>Dev deps\u003c/strong>: \u003ccode>@types/node\u003c/code>, \u003ccode>esbuild\u003c/code>, \u003ccode>postject\u003c/code>, \u003ccode>tsx\u003c/code>, \u003ccode>typescript\u003c/code> | \u003ccode>package.json\u003c/code> devDependencies |\u003c/p>\n\u003ch3 id=\"md--dont\">❌ Don't\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Don't use CommonJS\u003c/strong> (\u003ccode>require\u003c/code>, \u003ccode>module.exports\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Don't omit \u003ccode>.js\u003c/code>\u003c/strong> on relative imports.\u003c/li>\u003cli>\u003cstrong>Don't use default exports\u003c/strong>.\u003c/li>\u003cli>\u003cstrong>Don't use \u003ccode>any\u003c/code>\u003c/strong> (strict mode forbids it).\u003c/li>\u003cli>\u003cstrong>Don't throw strings\u003c/strong> — throw \u003ccode>Error\u003c/code> instances.\u003c/li>\u003cli>\u003cstrong>Don't skip error handling\u003c/strong> on external calls (git, network, FS).\u003c/li>\u003cli>\u003cstrong>Don't hardcode magic numbers\u003c/strong> — use constants in \u003ccode>constants.ts\u003c/code> or module-level \u003ccode>UPPER_SNAKE_CASE\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Don't couple domains\u003c/strong> — \u003ccode>genesis\u003c/code> doesn't import \u003ccode>cli\u003c/code> or \u003ccode>ui\u003c/code>; \u003ccode>providers\u003c/code> doesn't import \u003ccode>genesis\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Don't put logic in \u003ccode>index.ts\u003c/code> barrels\u003c/strong> — only re-exports.\u003c/li>\u003cli>\u003cstrong>Don't use \u003ccode>namespace\u003c/code> or \u003ccode>declare global\u003c/code>\u003c/strong>.\u003c/li>\u003cli>\u003cstrong>Don't mutate config objects\u003c/strong> — \u003ccode>loadConfig\u003c/code> returns new object; \u003ccode>saveConfig\u003c/code> writes fresh.\u003c/li>\u003cli>\u003cstrong>Don't hardcode provider-specific logic in base classes\u003c/strong> — override in subclasses (e.g., \u003ccode>OpenRouterProvider.providerParams()\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Don't skip caching for expensive external calls\u003c/strong> — use TTL-based file caches.\u003c/li>\u003cli>\u003cstrong>Don't estimate costs without pricing data\u003c/strong> — fall back to static tables when live catalog unavailable.\u003c/li>\u003cli>\u003cstrong>Don't ignore rate limit signals\u003c/strong> — detect and extend retry budget.\u003c/li>\u003cli>\u003cstrong>Don't log raw error objects\u003c/strong> — sanitize first.\u003c/li>\u003cli>\u003cstrong>Don't omit \u003ccode>AbortSignal\u003c/code> support\u003c/strong> in long-running async operations.\u003c/li>\u003cli>\u003cstrong>Don't perform destructive actions without confirmation\u003c/strong> in interactive mode.\u003c/li>\u003cli>\u003cstrong>Don't show raw token counts\u003c/strong> — format for readability.\u003c/li>\u003cli>\u003cstrong>Don't use leading underscore for private members\u003c/strong> — not observed in codebase.\u003c/li>\u003cli>\u003cstrong>Don't use \u003ccode>any\u003c/code> type\u003c/strong> — strict mode prevents it.\u003c/li>\u003cli>\u003cstrong>Don't use default exports\u003c/strong> — not observed in any file.\u003c/li>\u003cli>\u003cstrong>Don't omit \u003ccode>.js\u003c/code> extension\u003c/strong> on relative imports.\u003c/li>\u003cli>\u003cstrong>Don't use \u003ccode>require\u003c/code> or \u003ccode>module.exports\u003c/code>\u003c/strong> — ESM only.\u003c/li>\u003cli>\u003cstrong>Don't hardcode provider URLs\u003c/strong> — use \u003ccode>DEFAULT_CONFIGS\u003c/code> and \u003ccode>detectProviderFromBaseUrl\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Don't skip git error handling\u003c/strong> — \u003ccode>getGitInfo\u003c/code>/\u003ccode>getGitLog\u003c/code> return \u003ccode>null\u003c/code> on failure.\u003c/li>\u003cli>\u003cstrong>Don't write cache files without error handling\u003c/strong> — all cache writes are best-effort.\u003c/li>\u003cli>\u003cstrong>Don't run AI review without cost confirmation\u003c/strong> — \u003ccode>estimateCleanCode\u003c/code> + \u003ccode>confirm()\u003c/code> in \u003ccode>src/commands/cleancode.ts\u003c/code> |\u003c/li>\u003c/ul>\n\u003cp>| \u003cstrong>Don't skip heuristic scan\u003c/strong> | \u003ccode>scanCleanCodeHeuristics\u003c/code> runs first, then \u003ccode>scanCleanCodeHybrid\u003c/code> for flagged files | | \u003cstrong>Don't ignore clean code paradigms\u003c/strong> | \u003ccode>PARADIGMS\u003c/code> defines categories per paradigm; \u003ccode>buildCleanCodeScanPrompt\u003c/code> uses them | | \u003cstrong>Don't hardcode clean code categories\u003c/strong> | Categories come from \u003ccode>PARADIGMS[paradigm].categories\u003c/code> | | \u003cstrong>Don't forget distill cache model key\u003c/strong> | \u003ccode>DistillCache\u003c/code> includes \u003ccode>model\u003c/code>; cache invalidated on model change | | \u003cstrong>Don't estimate clean code cost without pricing\u003c/strong> | \u003ccode>estimateCleanCode\u003c/code> uses \u003ccode>getModelPricing\u003c/code> with live/static fallback | | \u003cstrong>Don't run clean code review without provider\u003c/strong> | \u003ccode>runReview\u003c/code> checks \u003ccode>config\u003c/code> and \u003ccode>ping\u003c/code> before AI phase | | \u003cstrong>Don't write clean code report without issues\u003c/strong> | \u003ccode>writeCleanCodeMarkdown\u003c/code> only writes if issues exist | | \u003cstrong>Don't ignore exclude patterns in clean code\u003c/strong> | \u003ccode>filterIgnored\u003c/code> removes excluded files before scanning | | \u003cstrong>Don't forget to load paradigm preference\u003c/strong> | \u003ccode>loadCleanCodeParadigm\u003c/code> reads \u003ccode>.aether/cleancode-paradigm.json\u003c/code> | | \u003cstrong>Don't forget to save paradigm preference\u003c/strong> | \u003ccode>setCleanCodeParadigm\u003c/code> writes \u003ccode>.aether/cleancode-paradigm.json\u003c/code> |\u003c/p>\n\u003ch2 id=\"md-9-configuration-environment\">9. Configuration &amp; Environment\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pattern\u003c/th>\u003cth>Source\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Env overrides for constants\u003c/strong>\u003c/td>\u003ctd>\u003ccode>envInt(name, fallback)\u003c/code> in \u003ccode>src/util/env.ts\u003c/code> used in \u003ccode>genesis/constants.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config dir\u003c/strong>\u003c/td>\u003ctd>\u003ccode>~/.aether/\u003c/code> via \u003ccode>getGlobalDir()\u003c/code> in \u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project cache dir\u003c/strong>\u003c/td>\u003ctd>\u003ccode>~/.aether/cache/&lt;projectId&gt;/\u003c/code> via \u003ccode>getProjectCacheDir()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project ID\u003c/strong>\u003c/td>\u003ctd>\u003ccode>basename(abs) + &quot;-&quot; + sha1(abs).slice(0,12)\u003c/code> in \u003ccode>projectId()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider defaults\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DEFAULT_CONFIGS\u003c/code> record in \u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>API key from env\u003c/strong>\u003c/td>\u003ctd>\u003ccode>AETHER_API_KEY\u003c/code> checked in \u003ccode>loadConfig()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Pricing cache\u003c/strong>\u003c/td>\u003ctd>\u003ccode>~/.aether/cache/pricing.json\u003c/code> with 24h TTL in \u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distill cache\u003c/strong>\u003c/td>\u003ctd>\u003ccode>&lt;projectCacheDir&gt;/distill-cache.json\u003c/code> in \u003ccode>src/genesis/scope.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider-specific defaults\u003c/strong>\u003c/td>\u003ctd>\u003ccode>DEFAULT_CONFIGS\u003c/code> includes \u003ccode>openai\u003c/code>, \u003ccode>anthropic\u003c/code>, \u003ccode>gemini\u003c/code>, \u003ccode>openrouter\u003c/code> with model/baseUrl defaults\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Provider detection from baseUrl\u003c/strong>\u003c/td>\u003ctd>\u003ccode>detectProviderFromBaseUrl()\u003c/code> matches hostnames in \u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Config validation\u003c/strong>\u003c/td>\u003ctd>\u003ccode>validateConfig()\u003c/code> checks provider, model, baseUrl, apiKey in \u003ccode>src/config/index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>API key masking in output\u003c/strong>\u003c/td>\u003ctd>\u003ccode>maskKey()\u003c/code> shows first 4 + \u003ccode>••••\u003c/code> + last 4 in \u003ccode>src/commands/config.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code ignore file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/cleancode-ignore.json\u003c/code> via \u003ccode>cleanCodeIgnorePath()\u003c/code> in \u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code paradigm file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/cleancode-paradigm.json\u003c/code> via \u003ccode>cleanCodeParadigmPath()\u003c/code> in \u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean code report file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/cleancode-report.md\u003c/code> via \u003ccode>cleanCodeReportPath()\u003c/code> in \u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude settings file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/settings/exclude.json\u003c/code> via \u003ccode>excludeFilePath()\u003c/code> in \u003ccode>src/genesis/exclude.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Snapshot file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/settings/context.json\u003c/code> via \u003ccode>snapshotPath()\u003c/code> in \u003ccode>src/genesis/sync.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Legacy snapshot file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/context.json\u003c/code> checked by \u003ccode>resolveSnapshotPath()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project readme file\u003c/strong>\u003c/td>\u003ctd>\u003ccode>.aether/README.md\u003c/code> via \u003ccode>ensureProjectReadme()\u003c/code> in \u003ccode>src/config/scaffold.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global readme content\u003c/strong>\u003c/td>\u003ctd>\u003ccode>AETHER_README\u003c/code> constant in \u003c
