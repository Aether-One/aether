s\u003c/code> registers \u003ccode>/cleancode\u003c/code> command with \u003ccode>review\u003c/code>, \u003ccode>ignore\u003c/code>, \u003ccode>paradigm\u003c/code> subcommands; \u003ccode>src/genesis/estimate.ts\u003c/code> provides \u003ccode>estimateCleanCode\u003c/code> cost estimation; \u003ccode>CLEANCODE_CONTEXT_BUDGET = 48_000\u003c/code> chars via \u003ccode>envInt\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Prompt optimization\u003c/strong>: \u003ccode>src/commands/prompt.ts\u003c/code> registers \u003ccode>/prompt\u003c/code> command; \u003ccode>src/prompts/pipeline/optimize.ts\u003c/code> provides \u003ccode>OPTIMIZE_PROMPT\u003c/code> and \u003ccode>buildOptimizePrompt\u003c/code> for turning developer intent into optimized AI prompts.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-coding-standards\">Coding Standards\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>TypeScript only\u003c/strong> (\u003ccode>&quot;type&quot;: &quot;module&quot;\u003c/code>, \u003ccode>&quot;strict&quot;: true\u003c/code> in \u003ccode>tsconfig.json\u003c/code>); no \u003ccode>any\u003c/code>.\u003c/li>\u003cli>\u003cstrong>ES modules\u003c/strong> with \u003ccode>.js\u003c/code> extensions in imports (e.g., \u003ccode>from '../ui/animation.js'\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Small, focused functions\u003c/strong>; types exported from co-located \u003ccode>types.ts\u003c/code> files.\u003c/li>\u003cli>\u003cstrong>Chalk for all terminal output\u003c/strong>: \u003ccode>ACCENT\u003c/code>, \u003ccode>ACCENT_BOLD\u003c/code>, \u003ccode>DIM\u003c/code>, \u003ccode>SUCCESS\u003c/code>, \u003ccode>WARN\u003c/code>, \u003ccode>ERROR\u003c/code> from \u003ccode>src/ui/theme.js\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Error handling\u003c/strong>: \u003ccode>try/catch\u003c/code> with \u003ccode>process.stderr.write\u003c/code> and \u003ccode>process.exit(1)\u003c/code> in \u003ccode>main()\u003c/code>; best-effort writes swallow errors (e.g., \u003ccode>ensureProjectReadme\u003c/code>, \u003ccode>saveDistillCache\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Concurrency limits\u003c/strong>: \u003ccode>GEN_CONCURRENCY = 4\u003c/code>, \u003ccode>DISTILL_CONCURRENCY = 4\u003c/code> via \u003ccode>StepRunner.runPooled\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Retry defaults\u003c/strong>: \u003ccode>maxRetries: 3\u003c/code>, \u003ccode>baseDelay: 2000\u003c/code>; rate limit upgrades to \u003ccode>maxRetries: 6\u003c/code>, \u003ccode>baseDelay: 15000\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Planner retries\u003c/strong>: \u003ccode>MAX_PLAN_ATTEMPTS = 3\u003c/code>, temperature 0 on retry, falls back to \u003ccode>CORE_IDS\u003c/code> (6 hardcoded doc IDs).\u003c/li>\u003cli>\u003cstrong>Custom docs limit\u003c/strong>: \u003ccode>MAX_CUSTOM_DOCS = 5\u003c/code> via \u003ccode>dedupeCustomDocs().slice(0, 5)\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Exclude system\u003c/strong>: \u003ccode>src/genesis/exclude.ts\u003c/code> manages \u003ccode>.aether/settings/exclude.json\u003c/code>; \u003ccode>src/commands/exclude.ts\u003c/code> registers \u003ccode>/exclude\u003c/code> command; \u003ccode>src/ui/prompt.ts\u003c/code> integrates \u003ccode>@\u003c/code> path mentions with exclude-aware dropdown.\u003c/li>\u003cli>\u003cstrong>Clean-code paradigms\u003c/strong>: \u003ccode>CleanCodeParadigm\u003c/code> type (\u003ccode>clean-code\u003c/code> | \u003ccode>solid\u003c/code> | \u003ccode>functional\u003c/code> | \u003ccode>google-style\u003c/code>) in \u003ccode>src/genesis/types.ts\u003c/code>; paradigms defined in \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> with \u003ccode>PARADIGMS\u003c/code> record; \u003ccode>DEFAULT_PARADIGM = &quot;clean-code&quot;\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Cost estimation\u003c/strong>: \u003ccode>src/pricing/index.ts\u003c/code> provides \u003ccode>getModelPricing\u003c/code> with OpenRouter live catalog + static fallback; \u003ccode>src/genesis/estimate.ts\u003c/code> provides \u003ccode>estimateCleanCode\u003c/code> for clean-code review cost estimation.\u003c/li>\u003cli>\u003cstrong>Interactive cost confirmation\u003c/strong>: \u003ccode>/cleancode review\u003c/code> prompts for confirmation with cost estimate unless \u003ccode>--yes\u003c/code> flag provided.\u003c/li>\u003cli>\u003cstrong>File-aware @ picker\u003c/strong>: \u003ccode>src/ui/prompt.ts\u003c/code> \u003ccode>ChatPrompt\u003c/code> filters \u003ccode>@\u003c/code> path mentions for \u003ccode>/cleancode\u003c/code> and \u003ccode>/exclude remove\u003c/code> commands.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-never-do\">Never Do\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Never use \u003ccode>any\u003c/code>\u003c/strong> — strict TypeScript enforced.\u003c/li>\u003cli>\u003cstrong>Never use CommonJS \u003ccode>require\u003c/code>\u003c/strong> — only ES \u003ccode>import\u003c/code> with \u003ccode>.js\u003c/code> extensions.\u003c/li>\u003cli>\u003cstrong>Never invent providers\u003c/strong> — only \u003ccode>openai\u003c/code>, \u003ccode>anthropic\u003c/code>, \u003ccode>gemini\u003c/code>, \u003ccode>openrouter\u003c/code> via \u003ccode>OpenAICompatibleProvider\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never skip config validation\u003c/strong> — \u003ccode>validateConfig\u003c/code> checks \u003ccode>provider\u003c/code> (enum), \u003ccode>model\u003c/code>, \u003ccode>baseUrl\u003c/code>, \u003ccode>apiKey\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never write to \u003ccode>dist/\u003c/code> directly\u003c/strong> — build via \u003ccode>npm run build\u003c/code> (\u003ccode>tsc\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Never hardcode paths\u003c/strong> — use \u003ccode>getGlobalDir()\u003c/code>, \u003ccode>getProjectCacheDir(rootDir)\u003c/code>, \u003ccode>projectConfigPaths(rootDir)\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never bypass retry logic\u003c/strong> — use \u003ccode>chatWithRetry\u003c/code> for all LLM calls.\u003c/li>\u003cli>\u003cstrong>Never exceed context budget\u003c/strong> — \u003ccode>buildSharedProjectContext\u003c/code> distills when \u003ccode>buildPrompt(context).length &gt; DOC_CONTEXT_BUDGET\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never add commands without registry\u003c/strong> — all commands via \u003ccode>registry.register()\u003c/code> in \u003ccode>registerXxxCommand()\u003c/code> functions.\u003c/li>\u003cli>\u003cstrong>Never use untyped config\u003c/strong> — \u003ccode>AetherConfig\u003c/code> interface required; \u003ccode>DEFAULT_CONFIGS\u003c/code> provides per-provider defaults.\u003c/li>\u003cli>\u003cstrong>Never ignore git errors\u003c/strong> — \u003ccode>getGitInfo\u003c/code>/\u003ccode>getGitLog\u003c/code> return \u003ccode>null\u003c/code> on failure, callers handle gracefully.\u003c/li>\u003cli>\u003cstrong>Never skip deduplication\u003c/strong> — \u003ccode>dedupe(files)\u003c/code> by path before distillation; \u003ccode>dedupeCustomDocs()\u003c/code> by path before planning.\u003c/li>\u003cli>\u003cstrong>Never use \u003ccode>chalk\u003c/code> directly without theme\u003c/strong> — import \u003ccode>ACCENT\u003c/code>, \u003ccode>DIM\u003c/code>, etc. from \u003ccode>../ui/theme.js\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never block event loop\u003c/strong> — \u003ccode>sleep(ms)\u003c/code> helper wraps \u003ccode>setTimeout\u003c/code>; spinners use intervals.\u003c/li>\u003cli>\u003cstrong>Never ignore exclude paths\u003c/strong> — \u003ccode>collectDirectories\u003c/code> in \u003ccode>src/genesis/context.ts\u003c/code> filters by \u003ccode>loadExcludes\u003c/code>; \u003ccode>src/ui/prompt.ts\u003c/code> filters \u003ccode>@\u003c/code> mentions against excludes.\u003c/li>\u003cli>\u003cstrong>Never skip cost confirmation\u003c/strong> — \u003ccode>/cleancode review\u003c/code> requires \u003ccode>--yes\u003c/code> flag to bypass cost estimate prompt.\u003c/li>\u003cli>\u003cstrong>Never exceed clean-code context budget\u003c/strong> — \u003ccode>CLEANCODE_CONTEXT_BUDGET = 48_000\u003c/code> chars enforced in \u003ccode>scanCleanCodeHybrid\u003c/code>.\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-never-do-1\">Never Do\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Never use \u003ccode>any\u003c/code>\u003c/strong> — strict TypeScript enforced.\u003c/li>\u003cli>\u003cstrong>Never use CommonJS \u003ccode>require\u003c/code>\u003c/strong> — only ES \u003ccode>import\u003c/code> with \u003ccode>.js\u003c/code> extensions.\u003c/li>\u003cli>\u003cstrong>Never invent providers\u003c/strong> — only \u003ccode>openai\u003c/code>, \u003ccode>anthropic\u003c/code>, \u003ccode>gemini\u003c/code>, \u003ccode>openrouter\u003c/code> via \u003ccode>OpenAICompatibleProvider\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never skip config validation\u003c/strong> — \u003ccode>validateConfig\u003c/code> checks \u003ccode>provider\u003c/code> (enum), \u003ccode>model\u003c/code>, \u003ccode>baseUrl\u003c/code>, \u003ccode>apiKey\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never write to \u003ccode>dist/\u003c/code> directly\u003c/strong> — build via \u003ccode>npm run build\u003c/code> (\u003ccode>tsc\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Never hardcode paths\u003c/strong> — use \u003ccode>getGlobalDir()\u003c/code>, \u003ccode>getProjectCacheDir(rootDir)\u003c/code>, \u003ccode>projectConfigPaths(rootDir)\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never bypass retry logic\u003c/strong> — use \u003ccode>chatWithRetry\u003c/code> for all LLM calls.\u003c/li>\u003cli>\u003cstrong>Never exceed context budget\u003c/strong> — \u003ccode>buildSharedProjectContext\u003c/code> distills when \u003ccode>buildPrompt(context).length &gt; DOC_CONTEXT_BUDGET\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never add commands without registry\u003c/strong> — all commands via \u003ccode>registry.register()\u003c/code> in \u003ccode>registerXxxCommand()\u003c/code> functions.\u003c/li>\u003cli>\u003cstrong>Never use untyped config\u003c/strong> — \u003ccode>AetherConfig\u003c/code> interface required; \u003ccode>DEFAULT_CONFIGS\u003c/code> provides per-provider defaults.\u003c/li>\u003cli>\u003cstrong>Never ignore git errors\u003c/strong> — \u003ccode>getGitInfo\u003c/code>/\u003ccode>getGitLog\u003c/code> return \u003ccode>null\u003c/code> on failure, callers handle gracefully.\u003c/li>\u003cli>\u003cstrong>Never skip deduplication\u003c/strong> — \u003ccode>dedupe(files)\u003c/code> by path before distillation; \u003ccode>dedupeCustomDocs()\u003c/code> by path before planning.\u003c/li>\u003cli>\u003cstrong>Never use \u003ccode>chalk\u003c/code> directly without theme\u003c/strong> — import \u003ccode>ACCENT\u003c/code>, \u003ccode>DIM\u003c/code>, etc. from \u003ccode>../ui/theme.js\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Never block event loop\u003c/strong> — \u003ccode>sleep(ms)\u003c/code> helper wraps \u003ccode>setTimeout\u003c/code>; spinners use intervals.\u003c/li>\u003c/ul>\n\u003chr>\n\u003ch2 id=\"md-key-decisions\">Key Decisions\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Decision\u003c/th>\u003cth>Evidence\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Hybrid analysis: static first, AI second\u003c/strong>\u003c/td>\u003ctd>README: &quot;Aether uses a hybrid approach: static analysis first, AI second.&quot;\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>CLI-first with interactive chat\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> calls \u003ccode>startChat()\u003c/code> after banner; \u003ccode>src/ui/prompt.ts\u003c/code> implements readline loop with \u003ccode>/\u003c/code> commands.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Command registry for extensibility\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/registry.ts\u003c/code> \u003ccode>CommandRegistry\u003c/code> class; commands registered in \u003ccode>cli/index.ts\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>All LLM providers via OpenAI-compatible wrapper\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/providers/factory.ts\u003c/code> switches on provider, all instantiate \u003ccode>OpenAICompatibleProvider\u003c/code>; anthropic has TODO.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Distillation cache per-project, per-model\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/scope.ts\u003c/code> \u003ccode>distillCachePath\u003c/code>, \u003ccode>loadDistillCache\u003c/code>, \u003ccode>saveDistillCache\u003c/code>; \u003ccode>DistillCache\u003c/code> has \u003ccode>model\u003c/code> and \u003ccode>chunks\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Global config at \u003ccode>~/.aether/config.json\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/config/index.ts\u003c/code> \u003ccode>getGlobalConfigPath()\u003c/code>, \u003ccode>GlobalConfigFile\u003c/code> with \u003ccode>default\u003c/code> and \u003ccode>projects\u003c/code> entries.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Project config at \u003ccode>.aether/config.json\u003c/code> or \u003ccode>.aether/settings/config.json\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>projectConfigPaths(rootDir)\u003c/code> returns both; \u003ccode>loadConfig\u003c/code> reads in precedence order.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>13 built-in document types, fixed sections\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/docs.ts\u003c/code> \u003ccode>DOC_DEFINITIONS\u003c/code> array, \u003ccode>SECTION_ORDER = [&quot;Guides&quot;,&quot;Architecture&quot;,&quot;Reference&quot;,&quot;AI Context&quot;,&quot;Project-specific&quot;]\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Planner LLM selects docs, falls back to 6 core\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/planner.ts\u003c/code> \u003ccode>planDocs\u003c/code> retries 3×, falls back to \u003ccode>CORE_IDS\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Startup animation optional (\u003ccode>--no-animation\u003c/code>)\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> checks flag, calls \u003ccode>playStartupAnimation()\u003c/code> or \u003ccode>printBanner()\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Version from \u003ccode>__AETHER_VERSION__\u003c/code> or dev fallback\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code> \u003ccode>VERSION = __AETHER_VERSION__ ?? &quot;0.0.0-dev&quot;\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>SEA build for single executable\u003c/strong>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> \u003ccode>build:sea\u003c/code> script, \u003ccode>scripts/build-sea.mjs\u003c/code> uses esbuild + postject.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>No test framework, no linting, no CI config detected\u003c/strong>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> devDeps only: \u003ccode>@types/node\u003c/code>, \u003ccode>esbuild\u003c/code>, \u003ccode>postject\u003c/code>, \u003ccode>tsx\u003c/code>, \u003ccode>typescript\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Node ≥ 20 required\u003c/strong>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> \u003ccode>&quot;engines&quot;: { &quot;node&quot;: &quot;&gt;=20.0.0&quot; }\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Only runtime dependency is \u003ccode>chalk\u003c/code>\u003c/strong>\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code> \u003ccode>dependencies: { &quot;chalk&quot;: &quot;^5.4.1&quot; }\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Exclude system for skipping paths\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/exclude.ts\u003c/code> manages \u003ccode>.aether/settings/exclude.json\u003c/code>; \u003ccode>src/commands/exclude.ts\u003c/code> registers \u003ccode>/exclude\u003c/code> command; \u003ccode>src/ui/prompt.ts\u003c/code> integrates \u003ccode>@\u003c/code> path mentions with exclude-aware dropdown.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Interactive prompt integrates exclude system\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code> \u003ccode>ChatPrompt\u003c/code> class filters \u003ccode>@\u003c/code> path mentions against excludes; \u003ccode>/exclude remove @\u003c/code> shows excluded paths in dropdown.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Hybrid clean-code review: heuristics + optional AI\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> \u003ccode>scanCleanCodeHeuristics\u003c/code> (static); \u003ccode>src/genesis/cleancode.ts\u003c/code> \u003ccode>scanCleanCodeHybrid\u003c/code> (AI); \u003ccode>src/commands/cleancode.ts\u003c/code> \u003ccode>/cleancode review\u003c/code> with cost confirmation.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Clean-code paradigms configurable\u003c/strong>\u003c/td>\u003ctd>\u003ccode>CleanCodeParadigm\u003c/code> type in \u003ccode>src/genesis/types.ts\u003c/code>; \u003ccode>PARADIGMS\u003c/code> record in \u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> with 4 paradigms; \u003ccode>/cleancode paradigm\u003c/code> command to set.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Cost estimation before AI review\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code> \u003ccode>getModelPricing\u003c/code>; \u003ccode>src/genesis/estimate.ts\u003c/code> \u003ccode>estimateCleanCode\u003c/code>; \u003ccode>/cleancode review\u003c/code> prompts with cost unless \u003ccode>--yes\u003c/code>.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Prompt optimization command\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/commands/prompt.ts\u003c/code> registers \u003ccode>/prompt\u003c/code>; \u003ccode>src/prompts/pipeline/optimize.ts\u003c/code> \u003ccode>OPTIMIZE_PROMPT\u003c/code> and \u003ccode>buildOptimizePrompt\u003c/code> turn intent into optimized AI prompt.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>File-aware @ picker for cleancode/exclude\u003c/strong>\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code> \u003ccode>ChatPrompt.sourcePaths()\u003c/code> filters by command regex (\u003ccode>CLEANCODE_RE\u003c/code>, \u003ccode>REMOVE_RE\u003c/code>).\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-conventions\">Conventions\u003c/h2>\n\u003ch3 id=\"md-naming\">Naming\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Files\u003c/strong>: kebab-case (\u003ccode>build-sea.mjs\u003c/code>, \u003ccode>ai-context.ts\u003c/code>, \u003ccode>openai-compatible.ts\u003c/code>, \u003ccode>cleancode-heuristics.ts\u003c/code>, \u003ccode>cleancode.ts\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Exports\u003c/strong>: named exports; default export only for \u003ccode>CommandRegistry\u003c/code> instance (\u003ccode>registry\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Types\u003c/strong>: PascalCase interfaces (\u003ccode>AetherConfig\u003c/code>, \u003ccode>ProjectContext\u003c/code>, \u003ccode>LLMProvider\u003c/code>, \u003ccode>CleanCodeParadigm\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>); type aliases for unions (\u003ccode>DocSection\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Constants\u003c/strong>: UPPER_SNAKE_CASE (\u003ccode>MAX_FILE_SIZE\u003c/code>, \u003ccode>ACCENT_HEX\u003c/code>, \u003ccode>SECTION_ORDER\u003c/code>, \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code>, \u003ccode>DEFAULT_PARADIGM\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Functions\u003c/strong>: camelCase (\u003ccode>buildPlannerDigest\u003c/code>, \u003ccode>createProvider\u003c/code>, \u003ccode>chatWithRetry\u003c/code>, \u003ccode>scanCleanCodeHeuristics\u003c/code>, \u003ccode>estimateCleanCode\u003c/code>, \u003ccode>estimateCleanCode\u003c/code>, \u003ccode>buildOptimizePrompt\u003c/code>).\u003c/li>\u003cli>\u003cstrong>Command names\u003c/strong>: lowercase with slash prefix in usage (\u003ccode>/config\u003c/code>, \u003ccode>/genesis\u003c/code>, \u003ccode>/help\u003c/code>, \u003ccode>/clean\u003c/code>, \u003ccode>/cleancode\u003c/code>, \u003ccode>/prompt\u003c/code>, \u003ccode>/exclude\u003c/code>).\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-imports\">Imports\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Relative imports with \u003ccode>.js\u003c/code> extension\u003c/strong>: \u003ccode>from '../ui/animation.js'\u003c/code>, \u003ccode>from './types.js'\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Node built-ins with \u003ccode>node:\u003c/code> prefix\u003c/strong>: \u003ccode>node:fs/promises\u003c/code>, \u003ccode>node:child_process\u003c/code>, \u003ccode>node:crypto\u003c/code>, \u003ccode>node:readline\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Re-export barrels\u003c/strong>: \u003ccode>src/prompts/index.ts\u003c/code>, \u003ccode>src/providers/index.ts\u003c/code>, \u003ccode>src/config/index.ts\u003c/code> aggregate submodules.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-error-handling\">Error Handling\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Top-level\u003c/strong>: \u003ccode>main()\u003c/code> wraps in \u003ccode>try/catch\u003c/code>, writes to \u003ccode>stderr\u003c/code>, exits \u003ccode>1\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Best-effort writes\u003c/strong>: \u003ccode>ensureProjectReadme\u003c/code>, \u003ccode>saveDistillCache\u003c/code>, \u003ccode>saveConfig\u003c/code> swallow errors.\u003c/li>\u003cli>\u003cstrong>Git commands\u003c/strong>: return \u003ccode>null\u003c/code> on failure; callers check.\u003c/li>\u003cli>\u003cstrong>Retry\u003c/strong>: \u003ccode>chatWithRetry\u003c/code> loops, calls \u003ccode>onRetry\u003c/code> callback, throws last error after \u003ccode>maxRetries\u003c/code>.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-async-patterns\">Async Patterns\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>\u003ccode>async/await\u003c/code> throughout\u003c/strong>; no raw promises.\u003c/li>\u003cli>\u003cstrong>Concurrency\u003c/strong>: \u003ccode>StepRunner.runPooled(limit, fn)\u003c/code> runs up to \u003ccode>limit\u003c/code> concurrent steps.\u003c/li>\u003cli>\u003cstrong>Streams\u003c/strong>: \u003ccode>LLMProvider.chatStream\u003c/code> returns \u003ccode>AsyncGenerator&lt;StreamChunk&gt;\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Readline\u003c/strong>: \u003ccode>promptUser\u003c/code> recursive async loop.\u003c/li>\u003c/ul>\n\u003ch3 id=\"md-configuration\">Configuration\u003c/h3>\n\u003cul>\u003cli>\u003cstrong>Env overrides for constants\u003c/strong>: \u003ccode>envInt(name, fallback)\u003c/code> in \u003ccode>src/util/env.ts\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Provider defaults\u003c/strong>: \u003ccode>DEFAULT_CONFIGS\u003c/code> object keyed by provider with \u003ccode>model\u003c/code>, \u003ccode>baseUrl\u003c/code>.\u003c/li>\u003cli>\u003cstrong>Auto-detect provider from baseUrl\u003c/strong>: \u003ccode>PROVIDER_HOSTS\u003c/code> array maps host substrings to provider names.\u003c/li>\u003cli>\u003cstrong>API key masking\u003c/strong>: \u003ccode>maskKey(key)\u003c/code> shows first 4 + \u003ccode>••••\u003c/code> + last 4.\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-file-patterns\">File Patterns\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Purpose\u003c/th>\u003cth>Location\u003c/th>\u003cth>Pattern\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>CLI entry\u003c/td>\u003ctd>\u003ccode>src/cli/index.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>main()\u003c/code> function, command registration order\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Command implementation\u003c/td>\u003ctd>\u003ccode>src/commands/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>register&lt;Name&gt;Command()\u003c/code> export, uses \u003ccode>registry\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Command registry\u003c/td>\u003ctd>\u003ccode>src/commands/registry.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>CommandRegistry\u003c/code> class, \u003ccode>registry\u003c/code> singleton\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Genesis pipeline\u003c/td>\u003ctd>\u003ccode>src/genesis/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>context.ts\u003c/code>, \u003ccode>digest.ts\u003c/code>, \u003ccode>fingerprint.ts\u003c/code>, \u003ccode>scope.ts\u003c/code>, \u003ccode>planner.ts\u003c/code>, \u003ccode>docs.ts\u003c/code>, \u003ccode>distill.ts\u003c/code>, \u003ccode>sync.ts\u003c/code>, \u003ccode>types.ts\u003c/code>, \u003ccode>constants.ts\u003c/code>, \u003ccode>exclude.ts\u003c/code>, \u003ccode>cleancode-heuristics.ts\u003c/code>, \u003ccode>cleancode.ts\u003c/code>, \u003ccode>estimate.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Document prompts\u003c/td>\u003ctd>\u003ccode>src/prompts/docs/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>One per doc type (e.g., \u003ccode>getting-started.ts\u003c/code>, \u003ccode>api.ts\u003c/code>), exports \u003ccode>*_PROMPT\u003c/code> const\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pipeline prompts\u003c/td>\u003ctd>\u003ccode>src/prompts/pipeline/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>planner.ts\u003c/code> (\u003ccode>PLANNER_PROMPT\u003c/code>), \u003ccode>sync.ts\u003c/code> (\u003ccode>SYNC_PLANNER_PROMPT\u003c/code>, etc.), \u003ccode>cleancode.ts\u003c/code> (\u003ccode>PARADIGMS\u003c/code>, \u003ccode>buildCleanCodeScanPrompt\u003c/code>), \u003ccode>optimize.ts\u003c/code> (\u003ccode>OPTIMIZE_PROMPT\u003c/code>, \u003ccode>buildOptimizePrompt\u003c/code>)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Prompt barrel\u003c/td>\u003ctd>\u003ccode>src/prompts/index.ts\u003c/code>\u003c/td>\u003ctd>Re-exports all prompts, base prompts, \u003ccode>buildCustomDocPrompt\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>LLM providers\u003c/td>\u003ctd>\u003ccode>src/providers/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>openai-compatible.ts\u003c/code>, \u003ccode>factory.ts\u003c/code>, \u003ccode>retry.ts\u003c/code>, \u003ccode>types.ts\u003c/code>, \u003ccode>index.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Config system\u003c/td>\u003ctd>\u003ccode>src/config/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>index.ts\u003c/code> (main), \u003ccode>types.ts\u003c/code>, \u003ccode>readme.ts\u003c/code>, \u003ccode>scaffold.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>UI components\u003c/td>\u003ctd>\u003ccode>src/ui/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>animation.ts\u003c/code>, \u003ccode>prompt.ts\u003c/code>, \u003ccode>steps.ts\u003c/code>, \u003ccode>theme.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Utilities\u003c/td>\u003ctd>\u003ccode>src/util/&lt;name&gt;.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>env.ts\u003c/code>, \u003ccode>hash.ts\u003c/code>, \u003ccode>tokens.ts\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build script\u003c/td>\u003ctd>\u003ccode>scripts/build-sea.mjs\u003c/code>\u003c/td>\u003ctd>ES module, uses esbuild + postject\u003c/td>\u003c/tr>\u003ctr>\u003ctd>TypeScript config\u003c/td>\u003ctd>\u003ccode>tsconfig.json\u003c/code>\u003c/td>\u003ctd>\u003ccode>NodeNext\u003c/code>, \u003ccode>ES2022\u003c/code>, \u003ccode>strict\u003c/code>, \u003ccode>declarationMap\u003c/code>, \u003ccode>sourceMap\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Package config\u003c/td>\u003ctd>\u003ccode>package.json\u003c/code>\u003c/td>\u003ctd>\u003ccode>&quot;type&quot;: &quot;module&quot;\u003c/code>, \u003ccode>bin.aether\u003c/code>, scripts, engines, deps\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Generated output\u003c/td>\u003ctd>\u003ccode>.aether/\u003c/code> (runtime)\u003c/td>\u003ctd>\u003ccode>architecture.md\u003c/code>, \u003ccode>context.json\u003c/code>, \u003ccode>docs/\u003c/code>, \u003ccode>diagrams/\u003c/code>, \u003ccode>cleancode-report.md\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Global config\u003c/td>\u003ctd>\u003ccode>~/.aether/config.json\u003c/code>\u003c/td>\u003ctd>\u003ccode>GlobalConfigFile\u003c/code> with \u003ccode>default\u003c/code> and \u003ccode>projects\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Project cache\u003c/td>\u003ctd>\u003ccode>~/.aether/cache/&lt;project-id&gt;/\u003c/code>\u003c/td>\u003ctd>\u003ccode>distill-cache.json\u003c/code> per model\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Project README\u003c/td>\u003ctd>\u003ccode>.aether/README.md\u003c/code>\u003c/td>\u003ctd>Written by \u003ccode>ensureProjectReadme\u003c/code> from \u003ccode>AETHER_README\u003c/code> constant\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Exclude settings\u003c/td>\u003ctd>\u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/td>\u003ctd>Managed by \u003ccode>src/genesis/exclude.ts\u003c/code>, edited via \u003ccode>/exclude\u003c/code> command\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Exclude command\u003c/td>\u003ctd>\u003ccode>src/commands/exclude.ts\u003c/code>\u003c/td>\u003ctd>Registers \u003ccode>/exclude\u003c/code> command for add/list/remove\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Interactive prompt integration\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>ChatPrompt\u003c/code> class filters \u003ccode>@\u003c/code> mentions against excludes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Genesis context collection\u003c/td>\u003ctd>\u003ccode>src/genesis/context.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>collectDirectories\u003c/code> filters by \u003ccode>loadExcludes\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Built-in commands registration\u003c/td>\u003ctd>\u003ccode>src/commands/builtins.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>registerBuiltinCommands()\u003c/code> includes \u003ccode>registerExcludeCommand()\u003c/code>, \u003ccode>registerCleanCodeCommand()\u003c/code>, \u003ccode>registerPromptCommand()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Clean-code heuristics\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>scanCleanCodeHeuristics\u003c/code> static AST-based scan\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Clean-code hybrid review\u003c/td>\u003ctd>\u003ccode>src/genesis/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>scanCleanCodeHybrid\u003c/code>, \u003ccode>estimateCleanCode\u003c/code>, \u003ccode>buildCleanCodeReport\u003c/code>, \u003ccode>buildCleanCodeMarkdown\u003c/code>, \u003ccode>writeCleanCodeMarkdown\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Clean-code command\u003c/td>\u003ctd>\u003ccode>src/commands/cleancode.ts\u003c/code>\u003c/td>\u003ctd>Registers \u003ccode>/cleancode\u003c/code> with \u003ccode>review\u003c/code>, \u003ccode>ignore\u003c/code>, \u003ccode>paradigm\u003c/code> subcommands\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Prompt optimization\u003c/td>\u003ctd>\u003ccode>src/commands/prompt.ts\u003c/code>\u003c/td>\u003ctd>Registers \u003ccode>/prompt\u003c/code> command\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Cost estimation\u003c/td>\u003ctd>\u003ccode>src/genesis/estimate.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>estimateCleanCode\u003c/code> for clean-code review cost\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pricing catalog\u003c/td>\u003ctd>\u003ccode>src/pricing/index.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>getModelPricing\u003c/code> with OpenRouter live + static fallback\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Paradigm definitions\u003c/td>\u003ctd>\u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>PARADIGMS\u003c/code> record with 4 paradigms, \u003ccode>DEFAULT_PARADIGM\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Clean-code types\u003c/td>\u003ctd>\u003ccode>src/genesis/types.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>CleanCodeParadigm\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Clean-code constants\u003c/td>\u003ctd>\u003ccode>src/genesis/constants.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code> via \u003ccode>envInt\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>File-aware @ picker\u003c/td>\u003ctd>\u003ccode>src/ui/prompt.ts\u003c/code>\u003c/td>\u003ctd>\u003ccode>ChatPrompt.sourcePaths()\u003c/code> filters by command regex (\u003ccode>CLEANCODE_RE\u003c/code>, \u003ccode>REMOVE_RE\u003c/code>)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch2 id=\"md-critical-files-to-know\">Critical Files to Know\u003c/h2>\n\u003cul>\u003cli>\u003ccode>src/cli/index.ts\u003c/code> — entry point, command registration, startup flow\u003c/li>\u003cli>\u003ccode>src/commands/registry.ts\u003c/code> — command system foundation\u003c/li>\u003cli>\u003ccode>src/genesis/docs.ts\u003c/code> — 13 built-in document definitions, generation order\u003c/li>\u003cli>\u003ccode>src/genesis/planner.ts\u003c/code> — LLM-driven doc selection, fallback logic\u003c/li>\u003cli>\u003ccode>src/genesis/scope.ts\u003c/code> — shared context building, distillation cache\u003c/li>\u003cli>\u003ccode>src/providers/factory.ts\u003c/code> + \u003ccode>retry.ts\u003c/code> — provider creation, resilient LLM calls\u003c/li>\u003cli>\u003ccode>src/config/index.ts\u003c/code> — config loading, precedence, validation, paths\u003c/li>\u003cli>\u003ccode>src/ui/prompt.ts\u003c/code> — interactive chat, command completion, dropdown\u003c/li>\u003cli>\u003ccode>src/ui/steps.ts\u003c/code> — multi-step progress with spinners\u003c/li>\u003cli>\u003ccode>src/util/hash.ts\u003c/code> — content hashing for fingerprints\u003c/li>\u003cli>\u003ccode>src/genesis/constants.ts\u003c/code> — all tunable limits via env vars\u003c/li>\u003cli>\u003ccode>src/genesis/exclude.ts\u003c/code> — exclude path management, \u003ccode>.aether/settings/exclude.json\u003c/code>\u003c/li>\u003cli>\u003ccode>src/commands/exclude.ts\u003c/code> — \u003ccode>/exclude\u003c/code> command registration and handling\u003c/li>\u003cli>\u003ccode>src/commands/builtins.ts\u003c/code> — registers all built-in commands including exclude, cleancode, prompt\u003c/li>\u003cli>\u003ccode>src/genesis/context.ts\u003c/code> — \u003ccode>collectDirectories\u003c/code> filters by excludes\u003c/li>\u003cli>\u003ccode>src/ui/prompt.ts\u003c/code> — \u003ccode>ChatPrompt\u003c/code> integrates exclude-aware \u003ccode>@\u003c/code> path mentions\u003c/li>\u003cli>\u003ccode>src/genesis/cleancode-heuristics.ts\u003c/code> — static clean-code heuristic scan (\u003ccode>scanCleanCodeHeuristics\u003c/code>)\u003c/li>\u003cli>\u003ccode>src/genesis/cleancode.ts\u003c/code> — hybrid clean-code review (\u003ccode>scanCleanCodeHybrid\u003c/code>), cost estimation, report generation\u003c/li>\u003cli>\u003ccode>src/commands/cleancode.ts\u003c/code> — \u003ccode>/cleancode\u003c/code> command with \u003ccode>review\u003c/code>, \u003ccode>ignore\u003c/code>, \u003ccode>paradigm\u003c/code> subcommands\u003c/li>\u003cli>\u003ccode>src/commands/prompt.ts\u003c/code> — \u003ccode>/prompt\u003c/code> command registration\u003c/li>\u003cli>\u003ccode>src/genesis/estimate.ts\u003c/code> — \u003ccode>estimateCleanCode\u003c/code> cost estimation for clean-code review\u003c/li>\u003cli>\u003ccode>src/pricing/index.ts\u003c/code> — \u003ccode>getModelPricing\u003c/code> with OpenRouter live catalog + static fallback\u003c/li>\u003cli>\u003ccode>src/prompts/pipeline/cleancode.ts\u003c/code> — \u003ccode>PARADIGMS\u003c/code> record, \u003ccode>DEFAULT_PARADIGM\u003c/code>, \u003ccode>buildCleanCodeScanPrompt\u003c/code>\u003c/li>\u003cli>\u003ccode>src/prompts/pipeline/optimize.ts\u003c/code> — \u003ccode>OPTIMIZE_PROMPT\u003c/code>, \u003ccode>buildOptimizePrompt\u003c/code> for prompt optimization\u003c/li>\u003cli>\u003ccode>src/genesis/types.ts\u003c/code> — \u003ccode>CleanCodeParadigm\u003c/code>, \u003ccode>CleanCodeIssue\u003c/code>, \u003ccode>CleanCodeReport\u003c/code>, \u003ccode>CleanCodeIgnoreList\u003c/code> types\u003c/li>\u003cli>\u003ccode>src/genesis/constants.ts\u003c/code> — \u003ccode>CLEANCODE_CONTEXT_BUDGET\u003c/code> via \u003ccode>envInt\u003c/code>\u003c/li>\u003cli>\u003ccode>src/ui/prompt.ts\u003c/code> — \u003ccode>ChatPrompt.sourcePaths()\u003c/code> for file-aware \u003ccode>@\u003c/code> picker in cleancode/exclude\u003c/li>\u003c/ul>\n\u003ch2 id=\"md-technologies-verified\">Technologies (Verified)\u003c/h2>\n\u003cul>\u003cli>\u003cstrong>Runtime\u003c/strong>: Node.js ≥ 20.0.0\u003c/li>\u003cli>\u003cstrong>Language\u003c/strong>: TypeScript 5.8.3 (ES2022, NodeNext modules)\u003c/li>\u003cli>\u003cstrong>Dev runner\u003c/strong>: tsx 4.19.4\u003c/li>\u003cli>\u003cstrong>Build\u003c/strong>: tsc (outputs \u003ccode>dist/\u003c/code>), esbuild + postject for SEA\u003c/li>\u003cli>\u003cstrong>Terminal UI\u003c/strong>: chalk 5.4.1 (only runtime dependency)\u003c/li>\u003cli>\u003cstrong>Types\u003c/strong>: @types/node 22.15.21\u003c/li>\u003cli>**No test framework, linter, formatter, CI, database, or web framework detected\u003c/li>\u003c/ul>","text":"AI Context — Aether Project Identity Aether is an open-source CLI that transforms any codebase into an AI-native workspace by building a complete knowledge base through static analysis and optional LLM enrichment, outputting to a .aether/ directory. It also provides a hybrid clean-code review system combining static heuristics with optional AI analysis. Always Follow Architecture Patterns CLI entry point : src/cli/index.ts exports main() ; registers commands in order: registerHelpCommand() , registerBuiltinCommands() , registerConfigCommand() , registerCleanCommand() , registerCleanCodeCommand() , registerExcludeCommand() , registerPromptCommand() ; starts interactive chat via startChat() after banner/animation. Command registry : src/commands/registry.ts exports CommandRegistry class and singleton registry ; commands implement { name, description, usage?, handler: (args: string) => Promise\u003cvoid> | void } ; executed via registry.execute(input) parsing /name args . Provider factory : src/providers/factory.ts exports createProvider(config: AetherConfig) returning LLMProvider ; switches on config.provider ( openai | anthropic | gemini | openrouter ) instantiating OpenAICompatibleProvider (anthropic has TODO for different API format). Retry wrapper : src/providers/retry.ts exports chatWithRetry(provider, request, options?) with exponential backoff, rate-limit (429) detection, provider-suggested delay extraction, and createRetryLogger() for stdout progress. Distillation cache : src/genesis/scope.ts uses distillFilesIncremental with cache at ~/.aether/cache/\u003cproject-id>/distill-cache.json keyed by model; DOC_CONTEXT_BUDGET = 48_000 chars; DISTILL_CONCURRENCY = 4 . Project identity : projectId(rootDir) = basename(abs)-sha1(abs).slice(0,12) ; global dir ~/.aether/ ; project cache ~/.aether/cache/\u003cproject-id>/ . Config precedence ( src/config/index.ts ): project global entry → global default → in-repo override → AETHER_API_KEY env. Genesis pipeline : ProjectContext built from scanned files → buildPlannerDigest → planDocs (LLM) → DOC_DEFINITIONS (13 built-in) → generate docs via prompts. Document definitions : 13 DocDefinition constants in src/genesis/docs.ts grouped by SECTION_ORDER : Guides (human), Architecture, Reference, AI Context, Project-specific; each has id , outputPath , label , title , section , summary , prompt , human? . Interactive CLI : src/ui/prompt.ts uses node:readline with completer for / commands, dropdown suggestions (ANSI cursor save/restore), rotating tips, pattern-matched responses. Step runner : src/ui/steps.ts exports StepRunner (sequential/pooled steps with spinners) and LineSpinner (braille frames, succeed/fail). Theme : src/ui/theme.ts exports ACCENT_HEX = \"#895bf4\" , ACCENT , ACCENT_BOLD , DIM , SUCCESS , WARN , ERROR via chalk . Constants via env : src/genesis/constants.ts uses envInt(name, fallback) for MAX_FILE_SIZE , MAX_TOTAL_CHARS , MAX_FILES_WALKED , MAX_WALK_DEPTH , DOC_CONTEXT_BUDGET , GEN_CONCURRENCY , DISTILL_CONCURRENCY , CLEANCODE_CONTEXT_BUDGET . Hashing : src/util/hash.ts exports hashContent(content) normalizing CRLF→LF, returning SHA-256 hex. Git integration : src/genesis/fingerprint.ts uses execFileSync for git rev-parse , git status --porcelain , git log . Exclude system : src/genesis/exclude.ts manages .aether/settings/exclude.json with loadExcludes , addExclude , removeExclude ; src/commands/exclude.ts registers /exclude command for add/list/remove; src/ui/prompt.ts integrates @ path mentions with exclude-aware dropdown. Clean-code review : src/genesis/cleancode-heuristics.ts provides scanCleanCodeHeuristics (static AST-based scan); src/genesis/cleancode.ts provides scanCleanCodeHybrid (AI hybrid review), estimateCleanCode , buildCleanCodeReport , buildCleanCodeMarkdown , writeCleanCodeMarkdown ; src/commands/cleancode.ts registers /cleancode command with review , ignore , paradigm subcommands; src/genesis/estimate.ts provides estimateCleanCode cost estimation; CLEANCODE_CONTEXT_BUDGET = 48_000 chars via envInt . Prompt optimization : src/commands/prompt.ts registers /prompt command; src/prompts/pipeline/optimize.ts provides OPTIMIZE_PROMPT and buildOptimizePrompt for turning developer intent into optimized AI prompts. Coding Standards TypeScript only ( \"type\": \"module\" , \"strict\": true in tsconfig.json ); no any . ES modules with .js extensions in imports (e.g., from '../ui/animation.js' ). Small, focused functions ; types exported from co-located types.ts files. Chalk for all terminal output : ACCENT , ACCENT_BOLD , DIM , SUCCESS , WARN , ERROR from src/ui/theme.js . Error handling : try/catch with process.stderr.write and process.exit(1) in main() ; best-effort writes swallow errors (e.g., ensureProjectReadme , saveDistillCache ). Concurrency limits : GEN_CONCURRENCY = 4 , DISTILL_CONCURRENCY = 4 via StepRunner.runPooled . Retry defaults : maxRetries: 3 , baseDelay: 2000 ; rate limit upgrades to maxRetries: 6 , baseDelay: 15000 . Planner retries : MAX_PLAN_ATTEMPTS = 3 , temperature 0 on retry, falls back to CORE_IDS (6 hardcoded doc IDs). Custom docs limit : MAX_CUSTOM_DOCS = 5 via dedupeCustomDocs().slice(0, 5) . Exclude system : src/genesis/exclude.ts manages .aether/settings/exclude.json ; src/commands/exclude.ts registers /exclude command; src/ui/prompt.ts integrates @ path mentions with exclude-aware dropdown. Clean-code paradigms : CleanCodeParadigm type ( clean-code | solid | functional | google-style ) in src/genesis/types.ts ; paradigms defined in src/prompts/pipeline/cleancode.ts with PARADIGMS record; DEFAULT_PARADIGM = \"clean-code\" . Cost estimation : src/pricing/index.ts provides getModelPricing with OpenRouter live catalog + static fallback; src/genesis/estimate.ts provides estimateCleanCode for clean-code review cost estimation. Interactive cost confirmation : /cleancode review prompts for confirmation with cost estimate unless --yes flag provided. File-aware @ picker : src/ui/prompt.ts ChatPrompt filters @ path mentions for /cleancode and /exclude remove commands. Never Do Never use any — strict TypeScript enforced. Never use CommonJS require — only ES import with .js extensions. Never invent providers — only openai , anthropic , gemini , openrouter via OpenAICompatibleProvider . Never skip config validation — validateConfig checks provider (enum), model , baseUrl , apiKey . Never write to dist/ directly — build via npm run build ( tsc ). Never hardcode paths — use getGlobalDir() , getProjectCacheDir(rootDir) , projectConfigPaths(rootDir) . Never bypass retry logic — use chatWithRetry for all LLM calls. Never exceed context budget — buildSharedProjectContext distills when buildPrompt(context).length > DOC_CONTEXT_BUDGET . Never add commands without registry — all commands via registry.register() in registerXxxCommand() functions. Never use untyped config — AetherConfig interface required; DEFAULT_CONFIGS provides per-provider defaults. Never ignore git errors — getGitInfo / getGitLog return null on failure, callers handle gracefully. Never skip deduplication — dedupe(files) by path before distillation; dedupeCustomDocs() by path before planning. Never use chalk directly without theme — import ACCENT , DIM , etc. from ../ui/theme.js . Never block event loop — sleep(ms) helper wraps setTimeout ; spinners use intervals. Never ignore exclude paths — collectDirectories in src/genesis/context.ts filters by loadExcludes ; src/ui/prompt.ts filters @ mentions against excludes. Never skip cost confirmation — /cleancode review requires --yes flag to bypass cost estimate prompt. Never exceed clean-code context budget — CLEANCODE_CONTEXT_BUDGET = 48_000 chars enforced in scanCleanCodeHybrid . Never Do Never use any — strict TypeScript enforced. Never use CommonJS require — only ES import with .js extensions. Never invent providers — only openai , anthropic , gemini , openrouter via OpenAICompatibleProvider . Never skip config validation — validateConfig checks provider (enum), model , baseUrl , apiKey . Never write to dist/ directly — build via npm run build ( tsc ). Never hardcode paths — use getGlobalDir() , getProjectCacheDir(rootDir) , projectConfigPaths(rootDir) . Never bypass retry logic — use chatWithRetry for all LLM calls. Never exceed context budget — buildSharedProjectContext distills when buildPrompt(context).length > DOC_CONTEXT_BUDGET . Never add commands without registry — all commands via registry.register() in registerXxxCommand() functions. Never use untyped config — AetherConfig interface required; DEFAULT_CONFIGS provides per-provider defaults. Never ignore git errors — getGitInfo / getGitLog return null on failure, callers handle gracefully. Never skip deduplication — dedupe(files) by path before distillation; dedupeCustomDocs() by path before planning. Never use chalk directly without theme — import ACCENT , DIM , etc. from ../ui/theme.js . Never block event loop — sleep(ms) helper wraps setTimeout ; spinners use intervals. Key Decisions Decision Evidence Hybrid analysis: static first, AI second README: \"Aether uses a hybrid approach: static analysis first, AI second.\" CLI-first with interactive chat src/cli/index.ts calls startChat() after banner; src/ui/prompt.ts implements readline loop with / commands. Command registry for extensibility src/commands/registry.ts CommandRegistry class; commands registered in cli/index.ts . All LLM providers via OpenAI-compatible wrapper src/providers/factory.ts switches on provider, all instantiate OpenAICompatibleProvider ; anthropic has TODO. Distillation cache per-project, per-model src/genesis/scope.ts distillCachePath , loadDistillCache , saveDistillCache ; DistillCache has model and chunks . Global config at ~/.aether/config.json src/config/index.ts getGlobalConfigPath() , GlobalConfigFile with default and projects entries. Project config at .aether/config.json or .aether/settings/config.json projectConfigPaths(rootDir) returns both; loadConfig reads in precedence order. 13 built-in document types, fixed sections src/genesis/docs.ts DOC_DEFINITIONS array, SECTION_ORDER = [\"Guides\",\"Architecture\",\"Reference\",\"AI Context\",\"Project-specific\"] . Planner LLM selects docs, falls back to 6 core src/genesis/planner.ts planDocs retries 3×, falls back to CORE_IDS . Startup animation optional ( --no-animation ) src/cli/index.ts checks flag, calls playStartupAnimation() or printBanner() . Version from __AETHER_VERSION__ or dev fallback src/cli/index.ts VERSION = __AETHER_VERSION__ ?? \"0.0.0-dev\" . SEA build for single executable package.json build:sea script, scripts/build-sea.mjs uses esbuild + postject. No test framework, no linting, no CI config detected package.json devDeps only: @types/node , esbuild , postject , tsx , typescript . Node ≥ 20 required package.json \"engines\": { \"node\": \">=20.0.0\" } . Only runtime dependency is chalk package.json dependencies: { \"chalk\": \"^5.4.1\" } . Exclude system for skipping paths src/genesis/exclude.ts manages .aether/settings/exclude.json ; src/commands/exclude.ts registers /exclude command; src/ui/prompt.ts integrates @ path mentions with exclude-aware dropdown. Interactive prompt integrates exclude system src/ui/prompt.ts ChatPrompt class filters @ path mentions against excludes; /exclude remove @ shows excluded paths in dropdown. Hybrid clean-code review: heuristics + optional AI src/genesis/cleancode-heuristics.ts scanCleanCodeHeuristics (static); src/genesis/cleancode.ts scanCleanCodeHybrid (AI); src/commands/cleancode.ts /cleancode review with cost confirmation. Clean-code paradigms configurable CleanCodeParadigm type in src/genesis/types.ts ; PARADIGMS record in src/prompts/pipeline/cleancode.ts with 4 paradigms; /cleancode paradigm command to set. Cost estimation before AI review src/pricing/index.ts getModelPricing ; src/genesis/estimate.ts estimateCleanCode ; /cleancode review prompts with cost unless --yes . Prompt optimization command src/commands/prompt.ts registers /prompt ; src/prompts/pipeline/optimize.ts OPTIMIZE_PROMPT and buildOptimizePrompt turn intent into optimized AI prompt. File-aware @ picker for cleancode/exclude src/ui/prompt.ts ChatPrompt.sourcePaths() filters by command regex ( CLEANCODE_RE , REMOVE_RE ). Conventions Naming Files : kebab-case ( build-sea.mjs , ai-context.ts , openai-compatible.ts , cleancode-heuristics.ts , cleancode.ts ). Exports : named exports; default export only for CommandRegistry instance ( registry ). Types : PascalCase interfaces ( AetherConfig , ProjectContext , LLMProvider , CleanCodeParadigm , CleanCodeIssue , CleanCodeReport ); type aliases for unions ( DocSection ). Constants : UPPER_SNAKE_CASE ( MAX_FILE_SIZE , ACCENT_HEX , SECTION_ORDER , CLEANCODE_CONTEXT_BUDGET , DEFAULT_PARADIGM ). Functions : camelCase ( buildPlannerDigest , createProvider , chatWithRetry , scanCleanCodeHeuristics , estimateCleanCode , estimateCleanCode , buildOptimizePrompt ). Command names : lowercase with slash prefix in usage ( /config , /genesis , /help , /clean , /cleancode , /prompt , /exclude ). Imports Relative imports with .js extension : from '../ui/animation.js' , from './types.js' . Node built-ins with node: prefix : node:fs/promises , node:child_process , node:crypto , node:readline . Re-export barrels : src/prompts/index.ts , src/providers/index.ts , src/config/index.ts aggregate submodules. Error Handling Top-level : main() wraps in try/catch , writes to stderr , exits 1 . Best-effort writes : ensureProjectReadme , saveDistillCache , saveConfig swallow errors. Git commands : return null on failure; callers check. Retry : chatWithRetry loops, calls onRetry callback, throws last error after maxRetries . Async Patterns async/await throughout ; no raw promises. Concurrency : StepRunner.runPooled(limit, fn) runs up to limit concurrent steps. Streams : LLMProvider.chatStream returns AsyncGenerator\u003cStreamChunk> . Readline : promptUser recursive async loop. Configuration Env overrides for constants : envInt(name, fallback) in src/util/env.ts . Provider defaults : DEFAULT_CONFIGS object keyed by provider with model , baseUrl . Auto-detect provider from baseUrl : PROVIDER_HOSTS array maps host substrings to provider names. API key masking : maskKey(key) shows first 4 + •••• + last 4. File Patterns Purpose Location Pattern CLI entry src/cli/index.ts main() function, command registration order Command implementation src/commands/\u003cname>.ts register\u003cName>Command() export, uses registry Command registry src/commands/registry.ts CommandRegistry class, registry singleton Genesis pipeline src/genesis/\u003cname>.ts context.ts , digest.ts , fingerprint.ts , scope.ts , planner.ts , docs.ts , distill.ts , sync.ts , types.ts , constants.ts , exclude.ts , cleancode-heuristics.ts , cleancode.ts , estimate.ts Document prompts src/prompts/docs/\u003cname>.ts One per doc type (e.g., getting-started <script>
(function () {
  'use strict';
  var data = JSON.parse(document.getElementById('aether-data').textContent);
  var byId = Object.create(null);
  for (var i = 0; i < data.pages.length; i++) byId[data.pages[i].id] = data.pages[i];

  var content = document.getElementById('content');
  var nav = document.getElementById('nav');
  var results = document.getElementById('search-results');
  var searchInput = document.getElementById('search');

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escapeReg(s) {
    return s.replace(/[.*+?^$()|[\]{}\\]/g, '\\$&');
  }
  function norm(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }
  function slug(s) {
    return norm(s).replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
  }

  // --- Routing: #/page-id?h=anchor&q=term ---
  function parseHash() {
    var h = location.hash || '';
    if (h.indexOf('#/') !== 0) return { id: data.pages[0].id, params: new URLSearchParams('') };
    var rest = h.slice(2);
    var qi = rest.indexOf('?');
    var id = qi === -1 ? rest : rest.slice(0, qi);
    var params = new URLSearchParams(qi === -1 ? '' : rest.slice(qi + 1));
    return { id: decodeURIComponent(id), params: params };
  }

  function setActive(id) {
    var links = document.querySelectorAll('.nav-link');
    for (var i = 0; i < links.length; i++) {
      links[i].classList.toggle('active', links[i].getAttribute('data-id') === id);
    }
  }

  function renderRoute() {
    var route = parseHash();
    var page = byId[route.id] || data.pages[0];
    content.innerHTML = page.html;
    document.title = page.title + ' — ' + data.project;
    setActive(page.id);
    document.body.classList.remove('nav-open');

    var q = route.params.get('q');
    if (q) highlightTerm(content, q);

    if (data.hasMermaid && content.querySelector('.mermaid-block')) queueMermaid();

    var anchor = route.params.get('h');
    var el = null;
    if (anchor) el = document.getElementById('md-' + anchor) || document.getElementById('md-' + slug(anchor));
    if (el) el.scrollIntoView();
    else if (!q) window.scrollTo(0, 0);
  }
  window.addEventListener('hashchange', renderRoute);

  // --- Mermaid: loaded from CDN on demand, falls back to source when offline ---
  var mermaidState = 'idle';
  var mermaidSeq = 0;

  function queueMermaid() {
    if (mermaidState === 'ready') { renderMermaidBlocks(); return; }
    if (mermaidState === 'failed') { markMermaidFailed(); return; }
    if (mermaidState === 'loading') return; // onload renders whatever page is current
    mermaidState = 'loading';
    var s = document.createElement('script');
    s.src = data.mermaidCdn;
    s.onload = function () {
      mermaidState = 'ready';
      initMermaid();
      renderMermaidBlocks();
    };
    s.onerror = function () { mermaidState = 'failed'; markMermaidFailed(); };
    document.head.appendChild(s);
    setTimeout(function () {
      if (mermaidState === 'loading') { mermaidState = 'failed'; markMermaidFailed(); }
    }, 12000);
  }

  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  }

  function initMermaid() {
    window.mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'strict',
      theme: currentTheme() === 'dark' ? 'dark' : 'default'
    });
  }

  function renderMermaidBlocks() {
    var blocks = content.querySelectorAll('.mermaid-block:not([data-rendered])');
    for (var i = 0; i < blocks.length; i++) renderOneMermaid(blocks[i]);
  }

  function renderOneMermaid(block) {
    var srcEl = block.querySelector('.mermaid-src');
    var target = block.querySelector('.mermaid-target');
    if (!srcEl || !target) return;
    block.setAttribute('data-rendered', '1');
    mermaidSeq += 1;
    window.mermaid.render('aether-mmd-' + mermaidSeq, srcEl.textContent).then(function (res) {
      target.innerHTML = res.svg;
      target.classList.remove('hidden');
      srcEl.classList.add('hidden');
    }).catch(function () {
      showMermaidNote(block, 'This diagram could not be rendered — showing its source instead.');
    });
  }

  function markMermaidFailed() {
    var blocks = content.querySelectorAll('.mermaid-block');
    for (var i = 0; i < blocks.length; i++) {
      showMermaidNote(blocks[i], 'Rendering diagrams needs an internet connection — showing the source instead.');
    }
  }

  function showMermaidNote(block, text) {
    var note = block.querySelector('.mermaid-note');
    if (note) {
      note.textContent = '⚠ ' + text;
      note.classList.remove('hidden');
    }
  }

  // --- Theme toggle ---
  document.getElementById('theme-toggle').addEventListener('click', function () {
    var next = currentTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('aether-theme', next); } catch (e) {}
    if (mermaidState === 'ready') {
      initMermaid();
      renderRoute(); // re-render so diagrams pick up the new theme
    }
  });

  // --- Mobile nav ---
  document.getElementById('nav-toggle').addEventListener('click', function () {
    document.body.classList.toggle('nav-open');
  });

  // --- Search: full text across every page, accent-insensitive ---
  var searchTimer = null;
  searchInput.addEventListener('input', function () {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 120);
  });
  searchInput.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape') {
      searchInput.value = '';
      runSearch();
      searchInput.blur();
    }
  });
  document.addEventListener('keydown', function (ev) {
    if (ev.key === '/' && document.activeElement !== searchInput) {
      ev.preventDefault();
      searchInput.focus();
    }
  });

  function runSearch() {
    var q = searchInput.value.trim();
    if (q.length < 2) {
      results.classList.add('hidden');
      results.innerHTML = '';
      nav.classList.remove('hidden');
      return;
    }
    var nq = norm(q);
    var found = [];
    for (var i = 0; i < data.pages.length; i++) {
      var p = data.pages[i];
      var hay = norm(p.title) + ' ' + norm(p.text);
      var count = 0;
      var idx = hay.indexOf(nq);
      while (idx !== -1) {
        count += 1;
        idx = hay.indexOf(nq, idx + nq.length);
      }
      if (count === 0) continue;
      var ti = norm(p.text).indexOf(nq);
      var snippet = '';
      if (ti !== -1) {
        var start = Math.max(0, ti - 50);
        var end = Math.min(p.text.length, ti + nq.length + 70);
        snippet = (start > 0 ? '…' : '') + p.text.slice(start, end) + (end < p.text.length ? '…' : '');
      }
      found.push({ page: p, count: count, snippet: snippet });
    }
    found.sort(function (a, b) { return b.count - a.count; });
    renderResults(found, q);
  }

  function renderResults(found, q) {
    nav.classList.add('hidden');
    results.classList.remove('hidden');
    var re = new RegExp('(' + escapeReg(q) + ')', 'gi');
    var html = '<div class="results-count">' + found.length + (found.length === 1 ? ' page' : ' pages') + ' with matches</div>';
    for (var i = 0; i < found.length; i++) {
      var r = found[i];
      var snip = escapeHtml(r.snippet).replace(re, '<mark>$1</mark>');
      html += '<a class="result" href="#/' + r.page.id + '?q=' + encodeURIComponent(q) + '">' +
        '<span class="result-count">' + r.count + '</span>' +
        '<span class="result-title">' + escapeHtml(r.page.title) + '</span>' +
        (snip ? '<span class="result-snippet">' + snip + '</span>' : '') +
        '</a>';
    }
    if (found.length === 0) html += '<div class="results-empty">No matches. Try a different term.</div>';
    results.innerHTML = html;
  }

  // --- In-page term highlighting after a search jump ---
  function highlightTerm(root, q) {
    var re = new RegExp(escapeReg(q), 'gi');
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    var nodes = [];
    var node;
    while ((node = walker.nextNode())) {
      var parent = node.parentElement;
      if (!parent || parent.closest('.mermaid-block')) continue;
      if (re.test(node.nodeValue)) nodes.push(node);
      re.lastIndex = 0;
    }
    var wrapRe = new RegExp('(' + escapeReg(q) + ')', 'gi');
    for (var i = 0; i < nodes.length; i++) {
      var span = document.createElement('span');
      span.innerHTML = escapeHtml(nodes[i].nodeValue).replace(wrapRe, '<mark>$1</mark>');
      nodes[i].parentNode.replaceChild(span, nodes[i]);
    }
    var first = root.querySelector('mark');
    if (first) first.scrollIntoView({ block: 'center' });
  }

  renderRoute();
})();
</script>
</body>
